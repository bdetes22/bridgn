                        <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.title}</div>
                        <a href={l.url} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:"var(--accent)",textDecoration:"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"block"}}>{l.url}</a>
                      </div>
                      <button onClick={()=>removeLink(i)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--text3)",padding:"4px 6px"}}>✕</button>
                    </div>
                  ))}
                </div>
              )}
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <input className="fi" value={newLink.url} onChange={e=>setNewLink(p=>({...p,url:e.target.value}))} placeholder="Paste a URL (TikTok, YouTube, Instagram, Pinterest...)" style={{padding:"10px 14px",fontSize:13}}/>
                <div style={{display:"flex",gap:8}}>
                  <input className="fi" value={newLink.title} onChange={e=>setNewLink(p=>({...p,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addLink()} placeholder="Title (optional)" style={{flex:1,padding:"10px 14px",fontSize:13}}/>
                  <button onClick={addLink} disabled={!newLink.url.trim()} className="btn btn-primary btn-sm" style={{opacity:newLink.url.trim()?1:.5}}>Add</button>
                </div>
              </div>
            </div>

            {/* Quick link to Deal Room */}
            <div onClick={()=>{setSelected&&setSelected(selectedDeal);setPage("deal-room");}} className="card card-hover" style={{padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:32,height:32,borderRadius:8,background:bc(selectedDeal.ci),display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"white",flexShrink:0}}>{selectedDeal.bi}</div>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>Open Deal Room</div><div style={{fontSize:11,color:"var(--text3)"}}>View brief, contract, messages, and progress</div></div>
              <span style={{fontSize:16,color:"var(--text3)"}}>→</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function DealRoomPage({setPage,setSelected,deals,role,authUser,updateDeal,selected}) {
  const loading = useSkeleton();
  const [fireConfetti,confettiFiring] = useConfetti();
  const [dealView,setDealView] = useState(selected?"room":"list");

  // Brand walkthrough — shows once when arriving from an invite
  const [walkStep,setWalkStep] = useState(()=>{
    if(role!=="brand" || !selected) return -1;
    try { if(localStorage.getItem("bridgn_brand_walkthrough_done")==="1") return -1; } catch {}
    return 0;
  });
  const walkSteps = [
    {title:"Welcome to your Deal Room",desc:"This is your shared workspace with the creator. Everything about this deal lives here — briefs, contracts, content, messages, and payments."},
    {title:"Upload your brief",desc:"Start by uploading a creative brief. You can attach a document, paste a link, and add notes. The creator will review and acknowledge it before creating content."},
    {title:"Send a contract",desc:"Upload a contract for the creator to sign, or paste a link to DocuSign or PandaDoc. You'll see when they've signed it."},
    {title:"Review content",desc:"When the creator uploads their content, you'll see it here. Review it, approve deliverables, or request revisions — all in one place."},
    {title:"Messages",desc:"Send messages directly in the Deal Room. Both sides see everything in real time. No more email threads."},
    {title:"Fund & release payment",desc:"When you're ready, fund the deal via ACH. The money is held in escrow until you approve the content. Then release it to the creator with one click."},
  ];
  const dismissWalk = () => {
    setWalkStep(-1);
    try { localStorage.setItem("bridgn_brand_walkthrough_done","1"); } catch {}
  };
  const [activeDeal,setActiveDeal] = useState(selected||deals.find(d=>!["Completed","payment_released"].includes(d.status))||deals[0]);

  // Brand profile info (visible to creators in the sidebar)
  const [brandProfile,setBrandProfile] = useState(null);
  useEffect(()=>{
    if(role!=="creator" || !activeDeal?.brandUserId) return;
    fetch(`${BRIDGN_API_URL}/api/deals/profile/${activeDeal.brandUserId}`)
      .then(r=>r.ok?r.json():null)
      .then(data=>{ if(data?.profile) setBrandProfile(data.profile); })
      .catch(()=>{});
  },[activeDeal?.brandUserId, role]);

  // Inline editing for deal title and deadline
  const [editingTitle,setEditingTitle] = useState(false);
  const [editingDeadline,setEditingDeadline] = useState(false);
  const [editTitle,setEditTitle] = useState("");
  const [editDeadline,setEditDeadline] = useState("");

  const saveTitle = () => {
    const newTitle = editTitle.trim();
    if(!newTitle || newTitle===activeDeal.campaignTitle) { setEditingTitle(false); return; }
    setActiveDeal(prev=>({...prev, campaignTitle:newTitle}));
    syncDealFields({campaign_title:newTitle});
    notifyOther("new_message",{messagePreview:isBrand?`${userName} renamed this deal to "${newTitle}"`:`${userName} renamed this deal to "${newTitle}"`});
    // Also send as a deal message so it shows in chat
    supabase.from("deal_messages").insert({
      deal_id:String(activeDeal.id), sender_id:authUser.id, sender_role:role,
      sender_name:userName, body:`Changed deal title to "${newTitle}"`,
    }).then(()=>{});
    setEditingTitle(false);
  };

  const saveDeadline = () => {
    const newDeadline = editDeadline;
    if(!newDeadline || newDeadline===activeDeal.deadline) { setEditingDeadline(false); return; }
    setActiveDeal(prev=>({...prev, deadline:newDeadline}));
    syncDealFields({deadline:newDeadline});
    notifyOther("new_message",{messagePreview:`${userName} changed the deadline to ${newDeadline}`});
    supabase.from("deal_messages").insert({
      deal_id:String(activeDeal.id), sender_id:authUser.id, sender_role:role,
      sender_name:userName, body:`Changed deadline to ${newDeadline}`,
    }).then(()=>{});
    setEditingDeadline(false);
  };

  // Keep activeDeal in sync when deals array changes (loaded from DB, refreshed, etc.)
  // Skip if poll is paused — local state is more recent than what the server returned.
  useEffect(()=>{
    if(!deals.length) return;
    if(pollPaused.current) return;
    if(activeDeal) {
      const fresh = deals.find(d=>String(d.id)===String(activeDeal.id));
      if(fresh) { setActiveDeal(fresh); syncFromDeal(fresh); }
    } else {
      const found = deals.find(d=>d.status==="Active")||deals.find(d=>d.status!=="Completed")||deals[0];
      if(found) setActiveDeal(found);
    }
  },[deals]);

  const [msgInput,setMsgInput] = useState("");
  const [msgs,setMsgs] = useState([]);
  const msgEndRef = React.useRef(null);
  const lastMsgEmailRef = React.useRef(0); // timestamp of last message email sent

  // Load existing messages + subscribe to new ones via Supabase Realtime
  useEffect(()=>{
    const dealId = activeDeal?.id;
    if(!dealId) return;

    // 1. Fetch existing messages
    supabase
      .from("deal_messages")
      .select("*")
      .eq("deal_id", String(dealId))
      .order("created_at", {ascending:true})
      .then(({data})=>{
        if(data) setMsgs(data.map(r=>({
          id:r.id, from:r.sender_id===authUser?.id?"me":"them",
          senderName:r.sender_name||"", senderRole:r.sender_role,
          text:r.body, time:dealRelTime(new Date(r.created_at)),
        })));
      });

    // 2. Subscribe to INSERT events on this deal's messages
    const channel = supabase
      .channel("deal-msgs-"+dealId)
      .on("postgres_changes",
        {event:"INSERT", schema:"public", table:"deal_messages", filter:"deal_id=eq."+dealId},
        (payload)=>{
          const r = payload.new;
          // Skip messages from ourselves — the optimistic insert already shows them
          if(r.sender_id === authUser?.id) return;
          setMsgs(prev=>{
            if(prev.some(m=>m.id===r.id)) return prev;
            return [...prev, {
              id:r.id, from:"them",
              senderName:r.sender_name||"", senderRole:r.sender_role,
              text:r.body, time:dealRelTime(new Date(r.created_at)), animate:true,
            }];
          });
        }
      )
      .subscribe();

    return ()=>{ supabase.removeChannel(channel); };
  },[activeDeal?.id, authUser?.id]);

  // Auto-scroll to bottom when new messages arrive
  useEffect(()=>{
    msgEndRef.current?.scrollIntoView({behavior:"smooth"});
  },[msgs.length]);
  // Brief state — initialized from deal (loaded from DB)
  // Post details (CTA, link, caption)
  const [postCta,setPostCta] = useState(activeDeal?.postCta||"");
  const [postLink,setPostLink] = useState(activeDeal?.postLink||"");
  const [postCaption,setPostCaption] = useState(activeDeal?.postCaption||"");
  const [postDetailsSent,setPostDetailsSent] = useState(!!activeDeal?.postDetailsSent);

  const [briefFile,setBriefFile] = useState(activeDeal?.briefFile||null);
  const [briefLink,setBriefLink] = useState(activeDeal?.briefLink||"");
  const [briefComments,setBriefComments] = useState(activeDeal?.briefComments||"");
  const [briefSubmitted,setBriefSubmitted] = useState(!!activeDeal?.briefSubmitted);
  const [briefAcknowledged,setBriefAcknowledged] = useState(!!activeDeal?.briefAcknowledged);

  const [briefUploading,setBriefUploading] = useState(false);
  const handleBriefFileChange = async (e) => {
    const file = e.target.files?.[0];
    if(!file || !activeDeal) return;
    setBriefUploading(true);
    try {
      const path = `deals/${activeDeal.id}/brief/${Date.now()}_${file.name}`;
      const {data,error} = await supabase.storage.from("deal-files").upload(path, file, {upsert:true});
      if(error) throw error;
      const {data:urlData} = supabase.storage.from("deal-files").getPublicUrl(path);
      setBriefFile({name:file.name, size:file.size, dataUrl:urlData.publicUrl});
    } catch(err) {
      console.error("[briefUpload]", err);
      // Fallback to dataUrl for small files
      const reader = new FileReader();
      reader.onload = () => setBriefFile({name:file.name, size:file.size, dataUrl:reader.result});
      reader.readAsDataURL(file);
    }
    setBriefUploading(false);
  };
  const briefFileInputRef = React.useRef(null);

  // Contract state — initialized from deal
  const [contractFile,setContractFile] = useState(activeDeal?.contractFile||null);
  const [contractLink,setContractLink] = useState(activeDeal?.contractLink||"");
  const [contractNotes,setContractNotes] = useState(activeDeal?.contractNotes||"");
  const [contractSent,setContractSent] = useState(!!activeDeal?.contractSent);
  const [contractSigned,setContractSigned] = useState(!!activeDeal?.contractSigned);
  const [contractSignedAt,setContractSignedAt] = useState(activeDeal?.contractSignedAt||null);
  const [signedFile,setSignedFile] = useState(activeDeal?.signedFile||null);
  const [signedFileUploading,setSignedFileUploading] = useState(false);
  const signedFileInputRef = React.useRef(null);

  const handleSignedFileUpload = async (e) => {
    const file = e.target.files?.[0];
    if(!file || !activeDeal) return;
    setSignedFileUploading(true);
    try {
      const path = `deals/${activeDeal.id}/signed/${Date.now()}_${file.name}`;
      const {error} = await supabase.storage.from("deal-files").upload(path, file, {upsert:true});
      if(error) throw error;
      const {data:urlData} = supabase.storage.from("deal-files").getPublicUrl(path);
      const sf = {name:file.name, size:file.size, dataUrl:urlData.publicUrl};
      setSignedFile(sf);
      syncDealFields({signed_file_name:sf.name, signed_file_data:sf.dataUrl});
    } catch(err) {
      console.error("[signedFileUpload]", err);
    }
    setSignedFileUploading(false);
  };

  const [contractUploading,setContractUploading] = useState(false);
  const handleContractFileChange = async (e) => {
    const file = e.target.files?.[0];
    if(!file || !activeDeal) return;
    setContractUploading(true);
    try {
      const path = `deals/${activeDeal.id}/contract/${Date.now()}_${file.name}`;
      const {data,error} = await supabase.storage.from("deal-files").upload(path, file, {upsert:true});
      if(error) throw error;
      const {data:urlData} = supabase.storage.from("deal-files").getPublicUrl(path);
      setContractFile({name:file.name, size:file.size, dataUrl:urlData.publicUrl});
    } catch(err) {
      console.error("[contractUpload]", err);
      const reader = new FileReader();
      reader.onload = () => setContractFile({name:file.name, size:file.size, dataUrl:reader.result});
      reader.readAsDataURL(file);
    }
    setContractUploading(false);
  };
  const contractFileInputRef = React.useRef(null);

  // Pause polling briefly after a local write so the poll doesn't overwrite with stale data
  const pollPaused = React.useRef(false);
  const pausePoll = () => { pollPaused.current = true; setTimeout(()=>{ pollPaused.current = false; }, 8000); };

  // Sync brief/contract state to Supabase and update App-level deals
  // Fire an email notification to the other party.
  // Calls the Express route which looks up the recipient's email,
  // then sends via the Supabase Edge Function.
  const notifyOther = (type, extra={}) => {
    if(!activeDeal?.id || !authUser?.id) return;
    fetch(`${BRIDGN_API_URL}/api/notify`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({type, dealId:String(activeDeal.id), senderUserId:authUser.id, ...extra}),
    }).catch(e=>console.error("[notify]",e));
  };

  const syncDealFields = (fields) => {
    if(!activeDeal?.id) return;
    pausePoll();
    fetch(`${BRIDGN_API_URL}/api/deals/update`, {
      method:"PUT", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({bridgnDealId:String(activeDeal.id), userId:authUser?.id, fields}),
    })
    .then(r=>r.ok?r.json():null)
    .then(data=>{
      if(data?.deal) {
        // Update the App-level deals array so the data persists across navigation
        updateDeal && updateDeal(activeDeal.id, data.deal);
        setActiveDeal(prev=>({...prev, ...data.deal}));
      }
    })
    .catch(e=>console.error("[syncDealFields]",e));
  };

  // Sync local brief/contract state from deal data
  const syncFromDeal = (deal) => {
    if(!deal) return;
    setBriefFile(deal.briefFile||null);
    setBriefLink(deal.briefLink||"");
    setBriefComments(deal.briefComments||"");
    setBriefSubmitted(!!deal.briefSubmitted);
    setBriefAcknowledged(!!deal.briefAcknowledged);
    setContractFile(deal.contractFile||null);
    setContractLink(deal.contractLink||"");
    setContractNotes(deal.contractNotes||"");
    setContractSent(!!deal.contractSent);
    setContractSigned(!!deal.contractSigned);
    setContractSignedAt(deal.contractSignedAt||null);
    setSignedFile(deal.signedFile||null);
    // Load content files — support multi-file format (names/urls separated by |||)
    if(deal.contentFile) {
      const names = (deal.contentFile.name||"").split("|||");
      const urls = (deal.contentFile.dataUrl||"").split("|||");
      if(names.length>1) {
        setContentFiles(names.map((n,i)=>({name:n,size:0,dataUrl:urls[i]||""})));
      } else {
        setContentFiles([deal.contentFile]);
      }
    } else {
      setContentFiles([]);
    }
    setScriptUrl(deal.scriptUrl||"");
    setScriptSubmitted(!!deal.scriptSubmitted);
    if(Array.isArray(deal.approvedDeliverables)) setApproved(deal.approvedDeliverables);
    setPostCta(deal.postCta||"");
    setPostLink(deal.postLink||"");
    setPostCaption(deal.postCaption||"");
    setPostDetailsSent(!!deal.postDetailsSent);
  };

  // Re-sync when activeDeal changes (switching deals or initial load)
  useEffect(()=>{ syncFromDeal(activeDeal); },[activeDeal?.id]);

  // Poll for deal updates every 5 seconds so both sides see changes live
  // (brief submitted, contract sent, acknowledged, signed, etc.)
  useEffect(()=>{
    const dealId = activeDeal?.id;
    if(!dealId || !authUser) return;
    const poll = setInterval(()=>{
      if(pollPaused.current) return;
      fetch(`${BRIDGN_API_URL}/api/deals?userId=${authUser.id}`)
        .then(r=>r.ok?r.json():null)
        .then(data=>{
          const fresh = data?.deals?.find(d=>d.id===String(dealId));
          if(!fresh) return;
          // Update activeDeal + local state if something changed
          setActiveDeal(prev=>{
            if(!prev) return fresh;
            if(prev.briefSubmitted!==fresh.briefSubmitted || prev.briefAcknowledged!==fresh.briefAcknowledged ||
               prev.contractSent!==fresh.contractSent || prev.contractSigned!==fresh.contractSigned ||
               prev.status!==fresh.status) {
              syncFromDeal(fresh);
              return fresh;
            }
            return prev;
          });
        })
        .catch(()=>{});
    }, 5000);
    return ()=>clearInterval(poll);
  },[activeDeal?.id, authUser?.id]);

  const [contentFiles,setContentFiles] = useState(()=>{
    // Load from activeDeal — support old single file and new array
    if(activeDeal?.contentFiles?.length) return activeDeal.contentFiles;
    if(activeDeal?.contentFile) return [activeDeal.contentFile];
    return [];
  });
  const contentUploaded = contentFiles.length > 0;
  const [uploadingContent,setUploadingContent] = useState(false);
  const contentFileInputRef = React.useRef(null);

  const handleContentFileUpload = async (e) => {
    const files = Array.from(e.target.files||[]);
    if(!files.length || !activeDeal) return;
    setUploadingContent(true);
    try {
      const uploaded = [];
      for(const file of files) {
        const path = `deals/${activeDeal.id}/content/${Date.now()}_${file.name}`;
        const {error} = await supabase.storage.from("deal-files").upload(path, file, {upsert:true});
        if(error) throw error;
        const {data:urlData} = supabase.storage.from("deal-files").getPublicUrl(path);
        uploaded.push({name:file.name, size:file.size, dataUrl:urlData.publicUrl});
      }
      const allFiles = [...contentFiles, ...uploaded];
      setContentFiles(allFiles);
      const hasPayment = !!activeDeal.paymentIntentId;
      const newStatus = (hasPayment && activeDeal.status==="payment_held") ? "content_delivered" : activeDeal.status;
      const upd = {...activeDeal, contentFile:allFiles[0], status:newStatus};
      setActiveDeal(upd);
      if(newStatus!==activeDeal.status) updateDeal && updateDeal(activeDeal.id, {status:newStatus});
      pausePoll();
      // Save first file to the single columns for backward compat, store all names in a metadata field
      syncDealFields({content_file_name:allFiles.map(f=>f.name).join("|||"), content_file_data:allFiles.map(f=>f.dataUrl).join("|||"), ...(newStatus!==activeDeal.status?{status:newStatus}:{})});
      notifyOther("content_submitted", {fileName:uploaded.map(f=>f.name).join(", ")});
    } catch(err) {
      console.error("[contentUpload]", err);
    }
    setUploadingContent(false);
  };
  const [scriptUrl,setScriptUrl] = useState(activeDeal?.scriptUrl||"");
  const [scriptSubmitted,setScriptSubmitted] = useState(!!activeDeal?.scriptSubmitted);

  const copyAff = (a) => {
    const text = a.type==="code"?a.code:"https://bridgn.com/r/"+a.code;
    navigator.clipboard.writeText(text).catch(()=>{});
    setAffCopied(a.code);setTimeout(()=>setAffCopied(null),2000);
  };

  // ── ACH Payment + Escrow state ──────────────────────────────────────────────
  const [achPhase,setAchPhase] = useState("idle");
  const [isFirstDealFree,setIsFirstDealFree] = useState(false);

  // Check if brand gets their first deal free
  useEffect(()=>{
    if(!isBrand||!authUser) return;
    supabase.from("brand_profiles").select("first_deal_used").eq("user_id",authUser.id).maybeSingle()
      .then(({data})=>{ if(data && !data.first_deal_used) setIsFirstDealFree(true); });
  },[authUser,isBrand]);
  const [previewFile,setPreviewFile] = useState(null); // {name, url}
  const openPreview = (file) => {
    if(!file?.dataUrl) return;
    setPreviewFile({name:file.name, url:file.dataUrl});
  };
  const previewUrl = (url) => {
    if(!url) return url;
    const ext = (url.split("?")[0].split(".").pop()||"").toLowerCase();
    // PDFs and images render natively in iframes
    if(["pdf","png","jpg","jpeg","gif","webp","svg"].includes(ext)) return url;
    // DOC/DOCX/PPT use Google Docs Viewer
    return "https://docs.google.com/gview?url="+encodeURIComponent(url)+"&embedded=true";
  };
  const [achError,setAchError] = useState(null);
  const [releaseLoading,setReleaseLoading] = useState(false);
  const [disputeLoading,setDisputeLoading] = useState(false);
  const [showDisputeModal,setShowDisputeModal] = useState(false);
  const [disputeReason,setDisputeReason] = useState("");
  const [liveUrl,setLiveUrl] = useState("");
  const [markingLive,setMarkingLive] = useState(false);
  const [remainingPhase,setRemainingPhase] = useState("idle"); // idle|creating|collecting|confirming|done|error
  const [remainingError,setRemainingError] = useState(null);
  const handlePayRemaining = async () => {
    if(!activeDeal || !authUser) return;
    setRemainingPhase("creating");
    setRemainingError(null);
    try {
      const resp = await fetch(`${BRIDGN_API_URL}/api/stripe/pay-remaining`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          dealId: activeDeal.id,
          brandUserId: authUser.id,
          brandEmail: authUser.email,
          brandName: authUser.user_metadata?.full_name||authUser.user_metadata?.company_name||authUser.email,
        }),
      });
      if(!resp.ok) { const err = await resp.json().catch(()=>({error:"Network error"})); throw new Error(err.error||"Server error"); }
      const { clientSecret, publishableKey } = await resp.json();
      if(!window.Stripe) throw new Error("Stripe.js failed to load.");
      const stripeJs = window.Stripe(publishableKey);
      setRemainingPhase("collecting");
      const { paymentIntent:pi1, error:collectErr } = await stripeJs.collectBankAccountForPayment({
        clientSecret,
        params:{payment_method_type:"us_bank_account",payment_method_data:{billing_details:{name:authUser.user_metadata?.full_name||authUser.email,email:authUser.email}}},
        expand:["payment_method"],
      });
      if(collectErr) throw new Error(collectErr.message);
      if(pi1.status==="requires_payment_method"){setRemainingPhase("idle");return;}
      setRemainingPhase("confirming");
      const { paymentIntent:pi2, error:confirmErr } = await stripeJs.confirmUsBankAccountPayment(clientSecret);
      if(confirmErr) throw new Error(confirmErr.message);
      setRemainingPhase("done");
      setActiveDeal(prev=>({...prev,remainingPaid:true}));
      updateDeal&&updateDeal(activeDeal.id,{remainingPaid:true});
    } catch(err) { console.error("[payRemaining]",err); setRemainingError(err.message); setRemainingPhase("error"); }
  };
  const handleMarkLive = async () => {
    if(!activeDeal || !authUser || !liveUrl.trim()) return;
    setMarkingLive(true);
    try {
      const resp = await fetch(`${BRIDGN_API_URL}/api/deals/mark-live`, {
        method:"PUT", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({bridgnDealId:activeDeal.id, userId:authUser.id, postLink:liveUrl.trim()}),
      });
      if(resp.ok) {
        const {deal} = await resp.json();
        setActiveDeal(prev=>({...prev,...deal}));
        updateDeal && updateDeal(activeDeal.id, deal);
      }
    } catch(e) { console.error("[markLive]",e); }
    setMarkingLive(false);
  };
  const [escrowToast,setEscrowToast] = useState(null);

  const isBrand = role === "brand";
  const escrowReleaseDays = activeDeal?.escrowReleaseDays || 14;

  const showEscrowToast = (msg,type="success") => {
    setEscrowToast({msg,type});
    setTimeout(()=>setEscrowToast(null),4000);
  };

  const handleFundDeal = async () => {
    if(!activeDeal || !authUser) return;
    setAchPhase("creating");
    setAchError(null);
    try {
      const resp = await fetch(`${BRIDGN_API_URL}/api/stripe/create-deal-payment`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          dealId:             activeDeal.id,
          amount:             activeDeal.amount,
          brandUserId:        authUser.id,
          brandEmail:         authUser.email,
          brandName:          authUser.user_metadata?.full_name || authUser.user_metadata?.company_name || authUser.email,
          creatorUserId:      activeDeal.creatorUserId || "",
          escrowReleaseDays:  escrowReleaseDays,
          upfrontPct:         activeDeal.upfrontPct || 100,
        }),
      });
      if(!resp.ok) {
        const err = await resp.json().catch(()=>({error:"Network error"}));
        throw new Error(err.error || "Server error");
      }
      const { clientSecret, publishableKey } = await resp.json();

      if(!window.Stripe) throw new Error("Stripe.js failed to load. Please refresh and try again.");
      const stripeJs = window.Stripe(publishableKey);

      setAchPhase("collecting");
      const { paymentIntent: pi1, error: collectErr } = await stripeJs.collectBankAccountForPayment({
        clientSecret,
        params: {
          payment_method_type: "us_bank_account",
          payment_method_data: {
            billing_details: {
              name:  authUser.user_metadata?.full_name || authUser.user_metadata?.company_name || authUser.email,
              email: authUser.email,
            },
          },
        },
        expand: ["payment_method"],
      });
      if(collectErr) throw new Error(collectErr.message);
      if(pi1.status === "requires_payment_method") { setAchPhase("idle"); return; }

      setAchPhase("confirming");
      const { paymentIntent: pi2, error: confirmErr } = await stripeJs.confirmUsBankAccountPayment(clientSecret);
      if(confirmErr) throw new Error(confirmErr.message);

      // Only now mark the deal as payment_processing — bank was confirmed
      setAchPhase("done");
      await fetch(`${BRIDGN_API_URL}/api/deals/status`, {
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({dealId:activeDeal.id, status:"payment_processing"}),
      }).catch(()=>{});
      const updated = {...activeDeal, status:"payment_processing", paymentIntentId: pi2?.id};
      setActiveDeal(updated);
      updateDeal && updateDeal(activeDeal.id, {status:"payment_processing", paymentIntentId: pi2?.id});
    } catch(err) {
      console.error("[ACH payment]", err);
      setAchError(err.message);
      setAchPhase("error");
    }
  };

  const handleRelease = async () => {
    if(!activeDeal || !authUser) return;
    setReleaseLoading(true);
    try {
      const resp = await fetch(`${BRIDGN_API_URL}/api/stripe/release-payment`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ dealId: activeDeal.id, brandUserId: authUser.id }),
      });
      const json = await resp.json();
      if(!resp.ok) throw new Error(json.error || "Server error");
      const updated = {...activeDeal, status:"payment_released"};
      setActiveDeal(updated);
      updateDeal && updateDeal(activeDeal.id, {status:"payment_released"});
      showEscrowToast("Payment released to the creator.");
      notifyOther("content_submitted",{fileName:"Payment released — funds on the way"});
    } catch(err) {
      showEscrowToast(err.message, "error");
    }
    setReleaseLoading(false);
  };

  const handleDisputeDeal = async () => {
    if(!activeDeal || !authUser) return;
    setDisputeLoading(true);
    try {
      const resp = await fetch(`${BRIDGN_API_URL}/api/stripe/dispute-deal`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ dealId: activeDeal.id, brandUserId: authUser.id, reason: disputeReason }),
      });
      const json = await resp.json();
      if(!resp.ok) throw new Error(json.error || "Server error");
      const updated = {...activeDeal, status:"payment_disputed"};
      setActiveDeal(updated);
      updateDeal && updateDeal(activeDeal.id, {status:"payment_disputed"});
      setShowDisputeModal(false);
      setDisputeReason("");
      showEscrowToast("Deal flagged — payment is on hold for admin review.");
    } catch(err) {
      showEscrowToast(err.message, "error");
    }
    setDisputeLoading(false);
  };

  // All hooks must be called before any conditional return (React Rules of Hooks).
  const DELIVERABLES = activeDeal ? (activeDeal.deliverables||"").split(",").map(d=>d.trim()).filter(Boolean) : [];

  // Initialize approved state from persisted data
  const [approved,setApproved] = useState(()=>{
    const saved = activeDeal?.approvedDeliverables;
    if(Array.isArray(saved) && saved.length === DELIVERABLES.length) return saved;
    return DELIVERABLES.map(()=>false);
  });

  // Sync approved from deal data when deal changes
  useEffect(()=>{
    if(!activeDeal) return;
    const dels = (activeDeal.deliverables||"").split(",").map(d=>d.trim()).filter(Boolean);
    const saved = activeDeal.approvedDeliverables;
    if(Array.isArray(saved) && saved.length === dels.length) {
      setApproved(saved);
    } else {
      setApproved(dels.map(()=>false));
    }
  },[activeDeal?.id]);

  // Persist approved changes to DB
  const updateApproved = (newApproved) => {
    setApproved(newApproved);
    syncDealFields({approved_deliverables: newApproved});
  };

  if(loading) return <SkeletonPage layout="deal-room"/>;

  // ── Deal List View (overview of all deals) ──
  if(dealView==="list" || !activeDeal) {
    const completedStatuses = ["Completed","payment_released"];
    const activeDeals = deals.filter(d=>!completedStatuses.includes(d.status));
    const completedDeals = deals.filter(d=>completedStatuses.includes(d.status));
    const selectDeal = (d) => { setActiveDeal(d); syncFromDeal(d); setDealView("room"); };
    return (
      <div className="fade-in">
        <div className="ph-row">
          <div>
            <div className="page-title">Deal Room</div>
            <div className="page-subtitle">Your partnership workspace. Click a deal to open it.</div>
          </div>
          <button className="btn btn-primary" onClick={()=>setPage("new-deal")}>+ New Deal</button>
        </div>

        {deals.length===0?(
          <div className="card" style={{padding:"48px 20px",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:600,marginBottom:8}}>No deals yet</div>
            <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.65,marginBottom:16,maxWidth:320,margin:"0 auto 16px"}}>
              Create your first deal to get started, or wait for an invite from {isBrand?"a creator":"a brand"}.
            </div>
            <button className="btn btn-primary btn-sm" onClick={()=>setPage("new-deal")}>Create a Deal</button>
          </div>
        ):(<>
          {activeDeals.length>0&&(
            <div style={{marginBottom:24}}>
              <div style={{fontSize:13,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Active ({activeDeals.length})</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {activeDeals.map(d=>{
                  const steps = [true,d.briefSubmitted,d.contractSigned,(d.contentFile||d.contentFiles?.length>0),d.approvedDeliverables?.length>0&&d.approvedDeliverables.every(Boolean),d.status==="payment_released"].filter(Boolean).length;
                  return (
                    <div key={d.id} className="card card-hover" style={{padding:"16px 18px",cursor:"pointer"}} onClick={()=>selectDeal(d)}>
                      <div style={{display:"flex",gap:14,alignItems:"center"}}>
                        <div style={{width:40,height:40,borderRadius:10,background:bc(d.ci),display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"white",flexShrink:0}}>{d.bi}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                            <span style={{fontSize:14,fontWeight:600}}>{isBrand?d.creatorName||"Creator":d.brand}</span>
                            <StatusBadge s={d.status}/>
                          </div>
                          <div style={{fontSize:12,color:"var(--text2)"}}>{d.campaignTitle} · {d.platform} · Due {d.deadline}</div>
                          <div style={{marginTop:6}}>
                            <div style={{height:3,background:"var(--surface2)",borderRadius:99,overflow:"hidden"}}>
                              <div style={{height:"100%",borderRadius:99,background:"var(--accent)",width:((steps/6)*100)+"%",transition:"width .3s"}}/>
                            </div>
                            <div style={{fontSize:10,color:"var(--text3)",marginTop:3}}>{steps} of 6 steps complete</div>
                          </div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontSize:18,fontWeight:400,fontFamily:"DM Serif Display,serif"}}>${d.amount.toLocaleString()}</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          {completedDeals.length>0&&(
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Completed ({completedDeals.length})</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {completedDeals.map(d=>(
                  <div key={d.id} className="card card-hover" style={{padding:"14px 16px",cursor:"pointer",opacity:.7}} onClick={()=>selectDeal(d)}>
                    <div style={{display:"flex",gap:12,alignItems:"center"}}>
                      <div style={{width:36,height:36,borderRadius:10,background:bc(d.ci),display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"white",flexShrink:0}}>{d.bi}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <span style={{fontSize:13,fontWeight:600}}>{isBrand?d.creatorName||"Creator":d.brand}</span>
                        <div style={{fontSize:11,color:"var(--text3)"}}>{d.campaignTitle} · ${d.amount.toLocaleString()}</div>
                      </div>
                      <StatusBadge s={d.status}/>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>)}
      </div>
    );
  }

  // ── Deal Room View (single deal, full workspace) ──
  if(!activeDeal) return null;
  const g=bg(activeDeal.ci);
  const sendMsg=()=>{
    if(!msgInput.trim()||!activeDeal||!authUser) return;
    const text=msgInput.trim();
    const tempId="temp-"+Date.now();
    const userName=authUser.user_metadata?.full_name||authUser.user_metadata?.company_name||authUser.email?.split("@")[0]||"";
    // Optimistic insert
    setMsgs(m=>[...m,{id:tempId,from:"me",text,time:"Just now",animate:false,senderRole:role,senderName:userName}]);
    setMsgInput("");
    // Persist to Supabase — Realtime will deduplicate via the id check
    supabase.from("deal_messages").insert({
      deal_id:String(activeDeal.id),
      sender_id:authUser.id,
      sender_role:role,
      sender_name:userName,
      body:text,
    }).then(({error})=>{
      if(error) console.error("[sendMsg]",error.message);
      else {
        // Only send email if last message email was more than 2 minutes ago
        const now = Date.now();
        if(now - lastMsgEmailRef.current > 120000) {
          lastMsgEmailRef.current = now;
          notifyOther("new_message",{messagePreview:text.slice(0,200)});
        }
      }
    });
  };
  // Compute live progress percentage from actual deal state
  const allDeliverablesApproved = DELIVERABLES.length>0 && approved.length>0 && approved.every(Boolean);
  const liveStepsDone = [true, briefSubmitted, contractSigned, contentUploaded,
    allDeliverablesApproved, activeDeal.status==="payment_released"].filter(Boolean).length;
  const pct = Math.round((liveStepsDone/6)*100);
  return (
    <div className="fade-in">
      {/* Deal switcher tabs */}
      {deals.length>1&&(
        <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:2}}>
          <button onClick={()=>{setDealView("list");setSelected&&setSelected(null);}} style={{padding:"7px 14px",borderRadius:99,border:"1px solid var(--border)",background:"var(--surface)",cursor:"pointer",fontSize:12,fontWeight:600,color:"var(--text2)",fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap",flexShrink:0}}>All Deals</button>
          {deals.map(d=>{
            const isActive = activeDeal?.id===d.id;
            return <button key={d.id} onClick={()=>{setActiveDeal(d);syncFromDeal(d);setDealView("room");}} style={{padding:"7px 14px",borderRadius:99,border:"1px solid "+(isActive?"var(--accent)":"var(--border)"),background:isActive?"var(--accent-light)":"var(--surface)",cursor:"pointer",fontSize:12,fontWeight:isActive?700:500,color:isActive?"var(--accent)":"var(--text2)",fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap",flexShrink:0,transition:"all .15s"}}>{d.campaignTitle||d.brand}</button>;
          })}
        </div>
      )}
      {deals.length===1&&<button onClick={()=>{setDealView("list");setSelected&&setSelected(null);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--text2)",fontFamily:"DM Sans,sans-serif",marginBottom:12,display:"flex",alignItems:"center",gap:4}}>&larr; All deals</button>}

      {/* Deal header */}
      <div style={{marginBottom:20}}>
        {editingTitle?(
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
            <input className="fi" style={{padding:"6px 12px",fontSize:"20px",fontFamily:"DM Serif Display,serif",fontWeight:400,flex:1,maxWidth:400}} value={editTitle} onChange={e=>setEditTitle(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveTitle();if(e.key==="Escape")setEditingTitle(false);}} autoFocus/>
            <button onClick={saveTitle} className="btn btn-primary btn-sm">Save</button>
            <button onClick={()=>setEditingTitle(false)} className="btn btn-secondary btn-sm">Cancel</button>
          </div>
        ):(
          <div className="page-title" style={{cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8}} onClick={()=>{setEditTitle(activeDeal.campaignTitle||"");setEditingTitle(true);}} title="Click to rename">
            {activeDeal.campaignTitle||"Untitled Deal"}
            <span style={{fontSize:14,color:"var(--text3)",fontFamily:"DM Sans,sans-serif",fontWeight:500}}>{ICONS.link(14)}</span>
          </div>
        )}
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,flexWrap:"wrap",fontSize:13,color:"var(--text2)"}}>
          <span style={{fontWeight:500}}>{isBrand?(activeDeal.creatorName||"Creator"):(activeDeal.brand||"Brand")}</span>
          <span style={{color:"var(--border)"}}>·</span>
          <span>{activeDeal.platform}</span>
          <span style={{color:"var(--border)"}}>·</span>
          <span style={{fontWeight:600,color:pct===100?"var(--green)":"var(--accent)"}}>{pct}% complete</span>
        </div>
        {/* Deadline bar */}
        <div style={{marginTop:12}}>
          {editingDeadline?(
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input className="fi" type="date" style={{padding:"8px 12px",fontSize:"13px",width:170}} value={editDeadline} onChange={e=>setEditDeadline(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveDeadline();if(e.key==="Escape")setEditingDeadline(false);}} autoFocus/>
              <button onClick={saveDeadline} className="btn btn-primary btn-sm">Save</button>
              <button onClick={()=>setEditingDeadline(false)} className="btn btn-secondary btn-sm">Cancel</button>
            </div>
          ):(
            <div onClick={()=>{setEditDeadline(activeDeal.deadline||"");setEditingDeadline(true);}} style={{display:"inline-flex",alignItems:"center",gap:8,padding:"8px 14px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,cursor:"pointer",transition:"border-color .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="var(--accent)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
              {ICONS.calendar(15)}
              <span style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{(()=>{try{const d=new Date(activeDeal.deadline+"T00:00:00");return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}catch{return activeDeal.deadline||"No deadline";}})()}</span>
              <span style={{fontSize:11,color:"var(--text3)",fontWeight:500}}>{(()=>{try{const d=new Date(activeDeal.deadline+"T00:00:00");const now=new Date();const diff=Math.ceil((d-now)/(1000*60*60*24));if(diff<0)return Math.abs(diff)+"d overdue";if(diff===0)return "Due today";return diff+"d left";}catch{return"";}})()}</span>
              <span style={{fontSize:11,color:"var(--accent)",fontWeight:500,marginLeft:2}}>Edit</span>
            </div>
          )}
        </div>
      </div>
      <div className="deal-room-grid" style={{display:"grid",gap:20,alignItems:"start"}}>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div className="card-lg" style={{overflow:"hidden"}}>
            <div style={{height:4,background:"linear-gradient(90deg,"+g[0]+","+g[1]+")"}}></div>
            <div style={{padding:"18px 22px"}}>
              <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
                <div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,"+g[0]+","+g[1]+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontWeight:800,color:"white",flexShrink:0}}>{activeDeal.bi}</div>
                <div style={{flex:1,minWidth:0}}><div style={{fontSize:"16px",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{activeDeal.brand}</div><div style={{fontSize:"13px",color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{activeDeal.campaignTitle} · {activeDeal.platform}</div></div>
                <div style={{display:"flex",gap:7,flexWrap:"wrap"}}><StatusBadge s={activeDeal.status}/>{activeDeal.escrow&&<EscrowBadge released={activeDeal.escrowReleased}/>}</div>
              </div>
              <div className="det-stats" style={{gridTemplateColumns:"repeat(3,1fr)",marginBottom:0}}>
                {[["$"+activeDeal.amount.toLocaleString(),"Deal Value"],[activeDeal.deadline,"Deadline"],[pct+"%","Complete"]].map(([v,l],i)=>(
                  <div key={i} className="det-stat" style={i===1?{cursor:"pointer"}:{}} onClick={i===1?()=>{setEditDeadline(activeDeal.deadline||"");setEditingDeadline(true);}:undefined} title={i===1?"Click to change deadline":""}><div className="det-stat-v" style={{color:i===0?g[0]:"var(--text)"}}><AnimNum value={v}/></div><div className="det-stat-l">{l}{i===1&&<span style={{marginLeft:4,fontSize:10,color:"var(--accent)"}}>edit</span>}</div></div>
                ))}
              </div>
            </div>
          </div>
          <div className="card-lg" style={{padding:"18px 22px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div style={{fontSize:"14px",fontWeight:700}}>Creative Brief</div>
              {briefSubmitted?(briefAcknowledged?<span className="badge badge-green">Acknowledged</span>:<span className="badge badge-yellow">Awaiting creator</span>):<span className="badge" style={{background:"var(--surface2)",color:"var(--text3)"}}>Not submitted</span>}
            </div>
            {isBrand ? (
              /* ── Brand side: upload file or paste link + comments ── */
              briefSubmitted ? (
                <div>
                  {/* Show what was submitted */}
                  {briefFile&&(
                    <div style={{display:"flex",gap:10,alignItems:"center",padding:"12px 14px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",marginBottom:10}}>
                      <span style={{fontSize:"20px"}}></span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:"13px",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{briefFile.name}</div>
                        <div style={{fontSize:"11px",color:"var(--text3)"}}>{(briefFile.size/1024).toFixed(0)} KB</div>
                      </div>
                    </div>
                  )}
                  {briefLink&&(
                    <div style={{display:"flex",gap:10,alignItems:"center",padding:"12px 14px",background:"var(--accent-light)",border:"1px solid rgba(91,138,245,.25)",borderRadius:"var(--radius-sm)",marginBottom:10}}>
                      <span style={{fontSize:"18px"}}></span>
                      <a href={briefLink} target="_blank" rel="noopener noreferrer" style={{flex:1,fontSize:"13px",color:"var(--accent)",textDecoration:"underline",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{briefLink}</a>
                    </div>
                  )}
                  {briefComments&&(
                    <div style={{background:"var(--bg)",borderRadius:"var(--radius)",border:"1px solid var(--border)",padding:"14px 16px",fontSize:"13px",color:"var(--text2)",lineHeight:1.7,marginBottom:10,whiteSpace:"pre-wrap"}}>
                      <div style={{fontSize:"11px",fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Notes</div>
                      {briefComments}
                    </div>
                  )}
                  {briefAcknowledged&&<div style={{padding:"8px 12px",background:"var(--green-bg)",border:"1px solid rgba(52,211,153,.3)",borderRadius:"var(--radius-sm)",fontSize:"12px",color:"var(--green)",fontWeight:600,marginBottom:10}}>✓ Creator has acknowledged the brief</div>}
                  <button onClick={()=>{setBriefSubmitted(false);syncDealFields({brief_submitted:false});}} className="btn btn-secondary btn-sm">Edit Brief</button>
                </div>
              ) : (
                <div>
                  <div style={{fontSize:"12px",color:"var(--text3)",marginBottom:12,lineHeight:1.5}}>Upload a brief document, paste a link, or both. Add any notes the creator should know.</div>

                  {/* File upload */}
                  <input ref={briefFileInputRef} type="file" accept=".pdf,.doc,.docx,.txt,.rtf,.pages,.ppt,.pptx,.key" onChange={handleBriefFileChange} style={{display:"none"}}/>
                  {briefFile?(
                    <div style={{display:"flex",gap:10,alignItems:"center",padding:"10px 14px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",marginBottom:10}}>
                      <span style={{fontSize:"18px"}}></span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:"13px",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{briefFile.name}</div>
                        <div style={{fontSize:"11px",color:"var(--text3)"}}>{(briefFile.size/1024).toFixed(0)} KB</div>
                      </div>
                      <button onClick={()=>setBriefFile(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"14px",color:"var(--text3)",padding:"2px 6px"}}>✕</button>
                    </div>
                  ):(
                    <div onClick={()=>!briefUploading&&briefFileInputRef.current?.click()} style={{border:"2px dashed var(--border)",borderRadius:"var(--radius)",padding:"16px",textAlign:"center",cursor:briefUploading?"default":"pointer",marginBottom:10,transition:"border-color .15s",opacity:briefUploading?.6:1}} onMouseEnter={e=>{if(!briefUploading)e.currentTarget.style.borderColor="var(--accent)";}} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
                      {briefUploading?<><div style={{fontSize:"18px",animation:"spin .9s linear infinite",display:"inline-block"}}>⟳</div><div style={{fontSize:"13px",marginTop:4}}>Uploading...</div></>:<><div style={{fontSize:"20px",marginBottom:4}}></div><div style={{fontSize:"13px",fontWeight:600}}>Upload Brief Document</div><div style={{fontSize:"11px",color:"var(--text3)",marginTop:2}}>PDF, DOC, DOCX, TXT, PPT</div></>}
                    </div>
                  )}

                  {/* Link */}
                  <div style={{marginBottom:10}}>
                    <label style={{fontSize:"12px",fontWeight:600,color:"var(--text3)",display:"block",marginBottom:4}}>Or paste a link</label>
                    <input className="fi" value={briefLink} onChange={e=>setBriefLink(e.target.value)} placeholder="Google Doc, Notion, Dropbox link…" style={{width:"100%",boxSizing:"border-box",padding:"9px 12px",fontSize:"13px"}}/>
                  </div>

                  {/* Comments */}
                  <div style={{marginBottom:14}}>
                    <label style={{fontSize:"12px",fontWeight:600,color:"var(--text3)",display:"block",marginBottom:4}}>Notes for the creator</label>
                    <textarea
                      value={briefComments}

          </div>
        </div>
      )}
      <ConfettiCanvas active={confettiFiring}/>
      {/* Brand walkthrough overlay */}
      {walkStep>=0&&walkStep<walkSteps.length&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:99998,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"var(--surface)",borderRadius:16,maxWidth:440,width:"100%",overflow:"hidden",border:"1px solid var(--border)",boxShadow:"var(--shadow-lg)"}}>
            <div style={{display:"flex",gap:4,padding:"16px 24px 0"}}>
              {walkSteps.map((_,i)=>(
                <div key={i} style={{flex:1,height:3,borderRadius:99,background:i<=walkStep?"var(--accent)":"var(--border)",transition:"background .2s"}}/>
              ))}
            </div>
            <div style={{padding:"20px 24px 24px"}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--accent)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:8}}>Step {walkStep+1} of {walkSteps.length}</div>
              <div style={{fontFamily:"DM Serif Display,serif",fontSize:20,fontWeight:400,marginBottom:10,lineHeight:1.25}}>{walkSteps[walkStep].title}</div>
              <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.65,marginBottom:24}}>{walkSteps[walkStep].desc}</div>
              <div style={{display:"flex",gap:8,justifyContent:"space-between"}}>
                <button onClick={dismissWalk} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--text3)",fontFamily:"DM Sans,sans-serif"}}>Skip</button>
                <div style={{display:"flex",gap:8}}>
                  {walkStep>0&&<button onClick={()=>setWalkStep(s=>s-1)} className="btn btn-secondary btn-sm">Back</button>}
                  {walkStep<walkSteps.length-1?(
                    <button onClick={()=>setWalkStep(s=>s+1)} className="btn btn-primary btn-sm">Next</button>
                  ):(
                    <button onClick={dismissWalk} className="btn btn-primary btn-sm">Get started</button>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function NewDealPage({setPage,onDealCreated,userName,authUser}) {
  const loading = useSkeleton();
  const [step,setStep] = useState(1);
  const [form,setForm] = useState(()=>{
    const base = {brandName:"",brandEmail:"",amount:"",upfrontPct:"50",platform:"Instagram",deadline:"",deliverables:"",notes:""};
    try { const pf=JSON.parse(localStorage.getItem("bridgn_prefill_deal")||"null"); if(pf){localStorage.removeItem("bridgn_prefill_deal"); base.brandName=pf.name||"";} } catch{}
    return base;
  });
  const [contractTypes,setContractTypes] = useState(["flat"]);
  const [sending,setSending] = useState(false);
  const [done,setDone] = useState(false);
  const [dealId] = useState(()=>String(Date.now()));
  const [copied,setCopied] = useState(false);
  const buildInviteLink = () => {
    try {
      const payload = btoa(encodeURIComponent(JSON.stringify({
        code: dealId,
        bridgnDealId: dealId,
        creatorName: userName,
        creatorUserId: authUser?.id||"",
        brandName: form.brandName,
        brandEmail: form.brandEmail,
        amount: parseInt(form.amount)||0,
        upfrontPct: parseInt(form.upfrontPct)||100,
        platform: form.platform,
        deliverables: form.deliverables||"",
        deadline: form.deadline||"TBD",
        campaignTitle: "External Deal — "+(form.brandName||"Brand"),
      })));
      return `${window.location.origin}?inv=${payload}`;
    } catch { return `${window.location.origin}?inv=${dealId}`; }
  };
  const inviteLink = buildInviteLink();
  const copyLink = () => {
    navigator.clipboard.writeText(inviteLink).catch(()=>{});
    setCopied(true);
    setTimeout(()=>setCopied(false),2000);
  };

        <div style={{fontWeight:600,color:"var(--text)",marginBottom:8}}>What happens next:</div>

          <div key={i} style={{display:"flex",gap:8,marginTop:6}}><span style={{color:"var(--green)",fontWeight:700,flexShrink:0}}>✓</span><span>{t}</span></div>

    </div>

      status:"pending", deadline:form.deadline||"TBD",

          <div style={{padding:"11px 14px",background:"var(--surface2)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",fontSize:"12px",color:"var(--text3)",marginBottom:16,display:"flex",gap:7}}>bridgn holds any pending escrow payments during a dispute. Resolution typically takes 3-5 business days.</div>

  );
}

// ─── CONTENT CALENDAR ─────────────────────────────────────────────────────────
function CalendarPage({deals=[],role,setPage,setSelected}) {
  const loading = useSkeleton();
  const [view,setView] = useState("month");
  const now = new Date();
  const [month,setMonth] = useState(now.getMonth());
  const [year,setYear] = useState(now.getFullYear());

  const prevMonth = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const nextMonth = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };
  const goToday = () => { setMonth(now.getMonth()); setYear(now.getFullYear()); };

  // Build events from deals
  const events = deals.filter(d=>d.deadline&&d.deadline!=="TBD").map(d=>{
    const dt = new Date(d.deadline+"T00:00:00");
    const diff = Math.ceil((dt - now)/(1000*60*60*24));
    return {
      date: dt, day: dt.getDate(), month: dt.getMonth(), year: dt.getFullYear(),
      label: d.campaignTitle || d.brand || "Deal",
      partner: role==="brand" ? (d.creatorName||"Creator") : (d.brand||"Brand"),
      platform: d.platform, amount: d.amount, status: d.status, diff, deal: d,
      color: diff<0?"var(--red)":diff<=3?"var(--yellow)":diff<=7?"var(--accent2)":"var(--accent)",
    };
  });

  // Calendar grid
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const prevDays = new Date(year,month,0).getDate();
  const cells = [];
  for(let i=0;i<firstDay;i++) cells.push({day:prevDays-firstDay+1+i,outside:true});
  for(let i=1;i<=daysInMonth;i++) cells.push({day:i,outside:false});
  const remaining = 42-cells.length;
  for(let i=1;i<=remaining;i++) cells.push({day:i,outside:true});

  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const todayDate = now.getDate(), todayMonth = now.getMonth(), todayYear = now.getFullYear();

  // Upcoming deadlines sorted
  const upcoming = [...events].sort((a,b)=>a.date-b.date);
  const activeUpcoming = upcoming.filter(e=>e.diff>=-1);
  const pastDue = upcoming.filter(e=>e.diff<-1&&!["payment_released","Completed"].includes(e.status));

  if(loading) return <SkeletonPage layout="calendar"/>;
  return (
    <div className="fade-in">
      <div className="ph-row">
        <div><div className="page-title">Calendar</div><div className="page-subtitle">All your deal deadlines in one view.</div></div>
        <div style={{display:"flex",gap:7}}>
          <button onClick={goToday} className="btn btn-secondary btn-sm">Today</button>
          {["month","list"].map(v=><button key={v} onClick={()=>setView(v)} className={"btn btn-sm "+(view===v?"btn-primary":"btn-secondary")}>{v==="month"?"Month":"List"}</button>)}
        </div>
      </div>

      {view==="month"&&(
        <>
          <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
            <button onClick={prevMonth} className="btn btn-secondary btn-sm" style={{width:32,padding:0,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            <span style={{fontFamily:"DM Serif Display,serif",fontSize:"17px",fontWeight:400,flex:1,textAlign:"center"}}>{monthNames[month]} {year}</span>
            <button onClick={nextMonth} className="btn btn-secondary btn-sm" style={{width:32,padding:0,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          </div>
          <div className="card-lg" style={{overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"var(--surface2)",borderBottom:"1px solid var(--border)"}}>
              {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} style={{padding:"9px",textAlign:"center",fontSize:"10px",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text3)"}}>{d}</div>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
              {cells.map((c,i)=>{
                const isToday = !c.outside && c.day===todayDate && month===todayMonth && year===todayYear;
                const dayEvents = c.outside ? [] : events.filter(e=>e.day===c.day&&e.month===month&&e.year===year);
                return (
                  <div key={i} style={{minHeight:72,padding:"5px",border:"1px solid var(--border)",background:isToday?"rgba(91,138,245,.06)":c.outside?"var(--surface2)":"var(--surface)",opacity:c.outside?.35:1}}>
                    <div style={{width:22,height:22,borderRadius:"50%",background:isToday?"var(--accent)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:2}}>
                      <span style={{fontSize:"11px",fontWeight:isToday?700:400,color:isToday?"white":"var(--text2)"}}>{c.day}</span>
                    </div>
                    {dayEvents.map((e,j)=><div key={j} onClick={()=>{setSelected&&setSelected(e.deal);setPage&&setPage("deal-room");}} style={{fontSize:"9px",fontWeight:600,padding:"2px 5px",borderRadius:4,background:e.color+"18",color:e.color,border:"1px solid "+e.color+"33",marginBottom:2,lineHeight:1.35,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",cursor:"pointer"}}>{e.label}</div>)}
                  </div>
                );
              })}
            </div>
          </div>
        </>
      )}

      {view==="list"&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {events.length===0?(
            <div className="card" style={{padding:"48px 20px",textAlign:"center"}}>
              <div style={{fontSize:15,fontWeight:600,marginBottom:8}}>No deadlines yet</div>
              <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.65,maxWidth:320,margin:"0 auto 16px"}}>Your content deadlines will appear here once you have active deals with deadlines set.</div>
              <button className="btn btn-primary btn-sm" onClick={()=>setPage&&setPage("new-deal")}>Create a Deal</button>
            </div>
          ):(
            <>
              {pastDue.length>0&&(
                <div style={{marginBottom:6}}>
                  <div style={{fontSize:12,fontWeight:700,color:"var(--red)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Overdue</div>
                  {pastDue.map((e,i)=>(
                    <div key={i} className="card" style={{padding:"13px 18px",display:"flex",gap:12,alignItems:"center",borderLeft:"3px solid var(--red)",marginBottom:6,cursor:"pointer"}} onClick={()=>{setSelected&&setSelected(e.deal);setPage&&setPage("deal-room");}}>
                      <div style={{width:42,height:42,borderRadius:10,background:"var(--red-bg)",border:"1px solid rgba(248,113,113,.3)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <div style={{fontSize:"15px",fontWeight:700,color:"var(--red)",lineHeight:1}}>{e.date.getDate()}</div>
                        <div style={{fontSize:"8px",color:"var(--red)",fontWeight:600}}>{monthNames[e.date.getMonth()].slice(0,3).toUpperCase()}</div>
                      </div>
                      <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600}}>{e.label}</div><div style={{fontSize:11,color:"var(--text2)",marginTop:2}}>{e.partner} · {e.platform}</div></div>
                      <span className="badge badge-red">{Math.abs(e.diff)}d overdue</span>
                    </div>
                  ))}
                </div>
              )}
              <div style={{fontSize:12,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Upcoming</div>
              {activeUpcoming.length===0&&<div className="card" style={{padding:"24px 18px",textAlign:"center",fontSize:13,color:"var(--text3)"}}>No upcoming deadlines</div>}
              {activeUpcoming.map((e,i)=>(
                <div key={i} className="card" style={{padding:"13px 18px",display:"flex",gap:12,alignItems:"center",borderLeft:"3px solid "+e.color,cursor:"pointer"}} onClick={()=>{setSelected&&setSelected(e.deal);setPage&&setPage("deal-room");}}>
                  <div style={{width:42,height:42,borderRadius:10,background:e.color+"18",border:"1px solid "+e.color+"33",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <div style={{fontSize:"15px",fontWeight:700,color:e.color,lineHeight:1}}>{e.date.getDate()}</div>
                    <div style={{fontSize:"8px",color:e.color,fontWeight:600}}>{monthNames[e.date.getMonth()].slice(0,3).toUpperCase()}</div>
                  </div>
                  <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600}}>{e.label}</div><div style={{fontSize:11,color:"var(--text2)",marginTop:2}}>{e.partner} · {e.platform} · ${e.amount?.toLocaleString()}</div></div>
                  <span className={"badge "+(e.diff<=0?"badge-red":e.diff<=3?"badge-yellow":e.diff<=7?"badge-orange":"badge-gray")}>{e.diff===0?"Today":e.diff===1?"Tomorrow":e.diff<0?Math.abs(e.diff)+"d overdue":e.diff+"d left"}</span>
                </div>
              ))}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ─── RATE CARD ────────────────────────────────────────────────────────────────
function RateCardPage({onRateCardFilled}) {
  const loading = useSkeleton();
  const [niche,setNiche] = useState("Lifestyle");
  const [ig,setIg] = useState({followers:"",eng:""});
  const [tt,setTt] = useState({followers:"",eng:""});
  const [yt,setYt] = useState({subscribers:"",views:""});
  const [hideInactive,setHideInactive] = useState(false);
  const [flaggedFilled,setFlaggedFilled] = useState(false);

  const nicheMult={Tech:1.4,Finance:1.4,Fashion:1.2,Beauty:1.15,Wellness:1.1,Gaming:0.9}[niche]||1.0;

  // per-platform rate calc
  const calcIG=()=>{
    const f=parseInt(ig.followers)||0, e=parseFloat(ig.eng)||0;
    if(!f||!e) return null;
    const b=(f/1000)*0.01*e*nicheMult;
    const tier=f<10000?"Nano":f<50000?"Micro":f<250000?"Mid-tier":f<1000000?"Macro":"Mega";
    return {
      active:true, tier,
      f, e,
      rates:[
        {type:"Feed Post",icon:"",low:Math.round(b*0.8*100)*10,high:Math.round(b*1.2*100)*10},
        {type:"Reel",icon:"",low:Math.round(b*1.0*100)*10,high:Math.round(b*1.6*100)*10},
        {type:"Stories (3×)",icon:"",low:Math.round(b*0.4*100)*10,high:Math.round(b*0.7*100)*10},
      ]
    };
  };
  const calcTT=()=>{
    const f=parseInt(tt.followers)||0, e=parseFloat(tt.eng)||0;
    if(!f||!e) return null;
    const b=(f/1000)*0.01*e*nicheMult*0.85; // TikTok CPM slightly lower
    const tier=f<10000?"Nano":f<50000?"Micro":f<250000?"Mid-tier":f<1000000?"Macro":"Mega";
    return {
      active:true, tier,
      f, e,
      rates:[
        {type:"Video",icon:"♪",low:Math.round(b*0.6*100)*10,high:Math.round(b*1.1*100)*10},
        {type:"Live Integration",icon:"",low:Math.round(b*0.4*100)*10,high:Math.round(b*0.8*100)*10},
        {type:"Duet / Stitch",icon:"",low:Math.round(b*0.35*100)*10,high:Math.round(b*0.65*100)*10},
      ]
    };
  };
  const calcYT=()=>{
    const s=parseInt(yt.subscribers)||0, v=parseInt(yt.views)||0;
    if(!s||!v) return null;
    const b=(v/1000)*nicheMult*2.2; // YouTube CPM premium
    const tier=s<10000?"Nano":s<50000?"Micro":s<250000?"Mid-tier":s<1000000?"Macro":"Mega";
    return {
      active:true, tier,
      f:s, extra:`${v.toLocaleString()} avg views`,
      rates:[
        {type:"Dedicated Video",icon:"",low:Math.round(b*1.8*100)*10,high:Math.round(b*3.2*100)*10},
        {type:"Mid-Roll Integration",icon:"▶",low:Math.round(b*0.9*100)*10,high:Math.round(b*1.6*100)*10},
        {type:"Shorts",icon:"",low:Math.round(b*0.3*100)*10,high:Math.round(b*0.6*100)*10},
      ]
    };
  };

  const igData=calcIG(), ttData=calcTT(), ytData=calcYT();
  const anyActive=igData||ttData||ytData;

  useEffect(()=>{
    if(anyActive&&!flaggedFilled){setFlaggedFilled(true);onRateCardFilled?.();}
  },[anyActive]);

  const tierColor=tier=>tier==="Nano"?"var(--text3)":tier==="Micro"?"var(--green)":tier==="Mid-tier"?"var(--accent)":tier==="Macro"?"var(--accent2)":"#f87171";

  const PlatformCard=({name,color,icon,data,inputs})=>{
    const isActive=!!data;
    if(hideInactive&&!isActive) return null;
    return (
      <div className="card-lg" style={{padding:0,overflow:"hidden",opacity:isActive?1:0.55}}>
        <div style={{padding:"14px 20px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:10,background:isActive?`linear-gradient(90deg,${color}18,transparent)`:"transparent"}}>
          <span style={{fontSize:"20px"}}>{icon}</span>
          <span style={{fontFamily:"DM Serif Display,serif",fontSize:"15px",fontWeight:400,color:isActive?color:"var(--text2)"}}>{name}</span>
          {isActive&&<span style={{marginLeft:"auto",fontSize:"11px",fontWeight:700,padding:"2px 9px",borderRadius:99,background:color+"22",color,border:`1px solid ${color}44`}}>{data.tier}</span>}

        <div style={{fontSize:"11px",color:"var(--text3)",flexShrink:0}}>Niche multiplier: <strong style={{color:"var(--text2)"}}>{nicheMult}×</strong></div>

      <div style={{display:"flex",flexDirection:"column",gap:16}}>

          inputs={<>
            <div className="fg" style={{margin:0}}><label className="fl">Followers</label><input className="fi" value={ig.followers} onChange={e=>setIg(p=>({...p,followers:e.target.value}))} placeholder="280,000"/></div>

          inputs={<>
            <div className="fg" style={{margin:0}}><label className="fl">Followers</label><input className="fi" value={tt.followers} onChange={e=>setTt(p=>({...p,followers:e.target.value}))} placeholder="150,000"/></div>
            <div className="fg" style={{margin:0}}><label className="fl">Engagement Rate (%)</label><input className="fi" value={tt.eng} onChange={e=>setTt(p=>({...p,eng:e.target.value}))} placeholder="8.4"/></div>
          </>}
        />
        <PlatformCard
          name="YouTube" icon="▶" color="#ff0000" data={ytData}
          inputs={<>
            <div className="fg" style={{margin:0}}><label className="fl">Subscribers</label><input className="fi" value={yt.subscribers} onChange={e=>setYt(p=>({...p,subscribers:e.target.value}))} placeholder="95,000"/></div>
            <div className="fg" style={{margin:0}}><label className="fl">Avg Views per Video</label><input className="fi" value={yt.views} onChange={e=>setYt(p=>({...p,views:e.target.value}))} placeholder="42,000"/></div>
          </>}
        />
      </div>

      {!anyActive&&(
        <div className="card" style={{padding:"32px 20px",textAlign:"center",marginTop:16}}>
          <div style={{fontSize:"30px",marginBottom:10}}></div>
          <div style={{fontSize:"14px",fontWeight:600,marginBottom:6}}>Enter your stats above</div>
          <div style={{fontSize:"12px",color:"var(--text2)"}}>Fill in at least one platform to generate suggested rates. You can add all three for a full picture.</div>
        </div>
      )}

      {anyActive&&(
        <div className="card-lg" style={{padding:"14px 20px",marginTop:16,display:"flex",gap:20,flexWrap:"wrap"}}>
          <div style={{fontSize:"12px",color:"var(--text3)",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",alignSelf:"center"}}>Cross-platform UGC</div>
          {[["UGC Package (no post)","",0.3,0.6],["Brand Ambassador (mo.)","",4.0,8.0]].map(([type,icon,lo,hi])=>{
            const bestBase=Math.max(
              igData?(parseInt(ig.followers)||0)/1000*0.01*(parseFloat(ig.eng)||0)*nicheMult:0,
              ttData?(parseInt(tt.followers)||0)/1000*0.01*(parseFloat(tt.eng)||0)*nicheMult*0.85:0,
              ytData?(parseInt(yt.views)||0)/1000*nicheMult*2.2:0
            );
            return (
              <div key={type} style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:220,padding:"9px 12px",background:"var(--surface2)",borderRadius:"var(--radius-sm)"}}>
                <span style={{fontSize:"16px"}}>{icon}</span>
                <div style={{flex:1,fontSize:"12px",fontWeight:600,color:"var(--text2)"}}>{type}</div>
                <div style={{fontSize:"14px",fontWeight:700,fontFamily:"DM Serif Display,serif",color:"var(--accent)"}}>${Math.round(bestBase*lo*100)*10 .toLocaleString()} – ${Math.round(bestBase*hi*100)*10 .toLocaleString()}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── INVOICES ─────────────────────────────────────────────────────────────────
function InvoicesPage({role}) {
  const loading = useSkeleton();
  const [modal,setModal] = useState(null);const [form,setForm] = useState({to:"",amount:"",dueDate:"",notes:""});const [sent,setSent] = useState(false);
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));const isBrand=role==="brand";
  const CINV=[];
  if(loading) return <SkeletonPage layout="list"/>;
  const BINV=[];
  const rows=isBrand?BINV:CINV;const totalPaid=rows.filter(i=>i.status==="Paid").reduce((a,b)=>a+b.amount,0);const pending=rows.filter(i=>i.status==="Pending"||i.status==="Due");
  return (
    <div className="fade-in">
      <div className="ph-row">
        <div><div className="page-title">{isBrand?"Payments":"Invoices"}</div><div className="page-subtitle">{isBrand?"Track and release payments to creators.":"Create and send invoices. Get paid through bridgn."}</div></div>
        {!isBrand&&<button className="btn btn-primary" onClick={()=>setModal("create")}>+ New Invoice</button>}
      </div>
      <div className="g3 section" style={{gap:12}}>
        {(isBrand?[["Total Paid","$"+totalPaid.toLocaleString(),""],["Pending","$"+pending.reduce((a,b)=>a+b.amount,0).toLocaleString(),""],["Avg Turnaround","3.2 days",""]]:[["Total Earned","$"+totalPaid.toLocaleString(),""],["Pending Payout","$"+pending.reduce((a,b)=>a+b.amount,0).toLocaleString(),""],["Sent",String(rows.length),""]]).map(([l,v,icon],i)=>(
          <div key={i} className="card" style={{padding:"14px 18px",display:"flex",gap:12,alignItems:"center"}}><span style={{fontSize:"24px"}}>{icon}</span><div><div style={{fontSize:"20px",fontWeight:700,fontFamily:"DM Serif Display,serif",lineHeight:1}}>{v}</div><div style={{fontSize:"10px",color:"var(--text3)",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginTop:3}}>{l}</div></div></div>
        ))}
      </div>
      <div className="card-lg" style={{overflow:"hidden"}}>
        <table className="tbl">
          <thead><tr><th>Invoice</th><th>{isBrand?"Creator":"Client"}</th><th>Campaign</th><th>Amount</th><th>Date</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {rows.length===0?(
              <tr><td colSpan={7} style={{textAlign:"center",padding:"40px 20px"}}><EmptySVG type="affiliate" size={100}/><div style={{fontSize:"13px",fontWeight:600,color:"var(--text2)",marginTop:4}}>No invoices yet</div></td></tr>
            ):rows.map(inv=>(
              <tr key={inv.id}>
                <td style={{fontWeight:600,color:"var(--accent)"}}>{inv.id}</td>
                <td>{isBrand?inv.from:inv.to}</td>
                <td style={{color:"var(--text2)"}}>{inv.campaign}</td>
                <td style={{fontWeight:700,fontFamily:"DM Serif Display,serif"}}>${inv.amount.toLocaleString()}</td>
                <td style={{color:"var(--text3)"}}>{inv.date}</td>
                <td><span className={"badge "+(inv.status==="Paid"?"badge-green":inv.status==="Pending"||inv.status==="Due"?"badge-yellow":"badge-gray")}>{inv.status}</span></td>
                <td>{isBrand&&inv.status==="Due"?<button className="btn btn-primary btn-sm">Release Payment</button>:!isBrand&&inv.status==="Pending"?<button className="btn btn-secondary btn-sm">Follow Up</button>:<button className="btn btn-secondary btn-sm">View</button>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {modal==="create"&&(
        <Modal onClose={()=>{setModal(null);setSent(false);}}>
          {!sent?(
            <div style={{padding:26}}>
              <div style={{fontFamily:"DM Serif Display,serif",fontSize:"23px",fontWeight:400,letterSpacing:"-.3px",marginBottom:16}}>Create Invoice</div>
              <div className="fg"><label className="fl">Bill To</label><input className="fi" value={form.to} onChange={e=>up("to",e.target.value)} placeholder="Brand name"/></div>
              <div className="frow"><div className="fg"><label className="fl">Amount ($)</label><input className="fi" type="number" value={form.amount} onChange={e=>up("amount",e.target.value)} placeholder="2500"/></div><div className="fg"><label className="fl">Due Date</label><input className="fi" type="date" value={form.dueDate} onChange={e=>up("dueDate",e.target.value)}/></div></div>
              <div className="fg"><label className="fl">Line Items / Notes</label><textarea className="fta" style={{minHeight:70}} value={form.notes} onChange={e=>up("notes",e.target.value)} placeholder="e.g. 2x Feed Posts, 1x Reel as per agreement..."></textarea></div>
              <div style={{padding:"10px 13px",background:"var(--surface2)",borderRadius:"var(--radius-sm)",fontSize:"12px",color:"var(--text3)",marginBottom:16,display:"flex",gap:6,border:"1px solid var(--border)"}}>bridgn charges a 2.9% processing fee on payments collected through the platform.</div>
              <div style={{display:"flex",gap:9}}><button onClick={()=>setSent(true)} className="btn btn-primary btn-lg" style={{flex:1}}>Send Invoice</button><button onClick={()=>setModal(null)} className="btn btn-secondary btn-lg">Cancel</button></div>
            </div>
          ):(
            <div style={{padding:26,textAlign:"center"}}><div style={{fontSize:"40px",marginBottom:12}}></div><div style={{fontFamily:"DM Serif Display,serif",fontSize:"23px",fontWeight:400,letterSpacing:"-.3px",marginBottom:8}}>Invoice Sent!</div><div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.7,marginBottom:18}}><strong>{form.to||"The brand"}</strong> has been emailed a payment link.</div><button onClick={()=>{setModal(null);setSent(false);}} className="btn btn-primary">Done</button></div>
          )}
        </Modal>
      )}
    </div>
  );
}

                  onClick={()=>verify(s.key)}
                  disabled={!local[s.key].trim()}
                  className="btn btn-secondary btn-sm"
                  style={{flexShrink:0,width:70,opacity:local[s.key].trim()?1:.45}}
                >Verify</button>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* Bio + Location */}
      <div className="card-lg" style={{padding:24,marginBottom:24}}>
        <div style={{fontSize:"14px",fontWeight:700,marginBottom:16}}>About You</div>
        <div className="fg"><label className="fl">Bio</label><textarea className="fta" value={local.bio} onChange={e=>up("bio",e.target.value)} placeholder="Tell brands what you do, your niche, your audience, and what makes you unique..." style={{minHeight:100}}/></div>
        <div className="fg" style={{marginBottom:0}}><label className="fl">Location</label><input className="fi" value={local.location} onChange={e=>up("location",e.target.value)} placeholder="e.g. Los Angeles, CA"/></div>
      </div>

      <button onClick={save} className="btn btn-primary btn-lg" style={{width:"100%"}}>Save Profile</button>
      {toast&&<Toast msg={toast.m} emoji={toast.e} onDone={()=>setToast(null)}/>}
    </div>
  );
}
