// ─── AFFILIATE MANAGER ────────────────────────────────────────────────────────
function AffiliateManagerPage({authUser,deals=[]}) {
  const loading = useSkeleton();
  const [tab,setTab] = useState("links");
  const [modal,setModal] = useState(false);
  const [convModal,setConvModal] = useState(null);
  const [convForm,setConvForm] = useState({code:"",value:"",notes:""});
  const [convSaving,setConvSaving] = useState(false);
  const [payModal,setPayModal] = useState(null);
  const [payNotes,setPayNotes] = useState("");
  const NL_INIT = {creator:"",campaign:"",url:"",rate:"10",type:"link",commType:"percentage",flatAmount:"",customCode:"",dealId:""};
  const [newLink,setNewLink] = useState(NL_INIT);
  const [copied,setCopied] = useState(null);
  const [links,setLinks] = useState([]);
  const [conversions,setConversions] = useState([]);
  const [payouts,setPayouts] = useState([]);
  const [saving,setSaving] = useState(false);
  const [convFilter,setConvFilter] = useState({creator:"",campaign:""});
  const [intTab,setIntTab] = useState("shopify");
  const [intCopied,setIntCopied] = useState(null);

  const genCode = () => {
    const c = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";
    let s = "";
    for(let i=0;i<8;i++) s += c[Math.floor(Math.random()*c.length)];
    return s;
  };
  const genSmartCode = (name,type) => {
    const slug = (name||"").replace(/[^a-zA-Z]/g,"").toUpperCase().slice(0,6);
    return type==="code" ? slug+(newLink.rate||"10") : slug+Math.floor(1000+Math.random()*9000);
  };

  // Load data from Supabase
  useEffect(()=>{
    if(!authUser) return;
    supabase.from("affiliate_links").select("*").eq("brand_id",authUser.id).order("created_at",{ascending:false}).then(({data})=>{if(data)setLinks(data);});
    supabase.from("affiliate_conversions").select("*").order("logged_at",{ascending:false}).then(({data})=>{if(data)setConversions(data);});
    supabase.from("affiliate_payouts").select("*").eq("brand_id",authUser.id).order("paid_at",{ascending:false}).then(({data})=>{if(data)setPayouts(data);});
  },[authUser]);

  // Realtime subscription on affiliate_links for live click counts
  useEffect(()=>{
    if(!authUser) return;
    const ch = supabase.channel("aff-links-rt").on("postgres_changes",{event:"UPDATE",schema:"public",table:"affiliate_links",filter:"brand_id=eq."+authUser.id},(payload)=>{
      setLinks(ls=>ls.map(l=>l.id===payload.new.id?{...l,...payload.new}:l));
    }).subscribe();
    return ()=>{supabase.removeChannel(ch);};
  },[authUser]);

  const totalClicks = links.reduce((s,a)=>s+(a.clicks||0),0);
  const totalConv = links.reduce((s,a)=>s+(a.conversions||0),0);
  const totalRev = links.reduce((s,a)=>s+(a.revenue||0),0);
  const totalComm = links.reduce((s,a)=>s+(a.commission_earned||0),0);
  const convRate = totalClicks>0?((totalConv/totalClicks)*100).toFixed(1):"0";
  const creators = deals.map(d=>d.creatorName).filter(Boolean);
  const uniqueCreators = [...new Set(creators)];
  const $ = c => (c/100).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});

  const copy = (a) => {
    const text = a.type==="code" ? a.code : "https://bridgn.com/r/"+a.code;
    navigator.clipboard.writeText(text).catch(()=>{});
    setCopied(a.code);
    setTimeout(()=>setCopied(null),2000);
  };

  const addLink = async () => {
    if(!newLink.creator||!authUser) return;
    setSaving(true);
    const code = newLink.type==="code"&&newLink.customCode.trim() ? newLink.customCode.trim().toUpperCase() : genSmartCode(newLink.creator,newLink.type);
    const {data,error} = await supabase.from("affiliate_links").insert({
      brand_id:authUser.id, code, type:newLink.type,
      creator_name:newLink.creator, campaign_name:newLink.campaign,
      destination_url:newLink.type==="link"?(newLink.url||null):null,
      commission_rate:parseInt(newLink.rate)||10, commission_type:newLink.commType,
      commission_flat_amount:newLink.commType==="flat"?Math.round((parseFloat(newLink.flatAmount)||0)*100):null,
      deal_id:newLink.dealId||null,
    }).select().single();
    if(error){console.error("[affiliate]",error.message);setSaving(false);return;}
    setLinks(l=>[data,...l]);setModal(false);setNewLink(NL_INIT);setSaving(false);
  };

  const logConversion = async () => {
    const code = convForm.code||convModal;
    if(!code) return;
    setConvSaving(true);
    try {
      const resp = await fetch(`${BRIDGN_API_URL}/api/affiliate/conversion`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code,conversionValue:parseFloat(convForm.value)||0,notes:convForm.notes})});
      if(resp.ok){
        const {link_totals,conversion}=await resp.json();
        setLinks(ls=>ls.map(l=>l.code===code?{...l,conversions:link_totals.conversions,revenue:link_totals.revenue_cents||link_totals.revenue,commission_earned:link_totals.commission_earned_cents||link_totals.commission}:l));
        if(conversion) setConversions(c=>[conversion,...c]);
      }
    }catch(e){console.error("[conversion]",e);}
    setConvSaving(false);setConvModal(null);setConvForm({code:"",value:"",notes:""});
  };

  const toggleActive = async (link) => {
    const v=!link.is_active;
    setLinks(ls=>ls.map(l=>l.id===link.id?{...l,is_active:v}:l));
    await supabase.from("affiliate_links").update({is_active:v}).eq("id",link.id);
  };

  const deleteLink = async (link) => {
    if(!confirm("Delete this link? This cannot be undone.")) return;
    setLinks(ls=>ls.filter(l=>l.id!==link.id));
    await supabase.from("affiliate_links").delete().eq("id",link.id);
  };

  const markPaid = async (creatorName,amount,codes) => {
    const {data} = await supabase.from("affiliate_payouts").insert({brand_id:authUser.id,creator_name:creatorName,amount,codes,notes:payNotes}).select().single();
    if(data) setPayouts(p=>[data,...p]);
    // Reset commission_earned on those links
    for(const code of codes) await supabase.from("affiliate_links").update({commission_earned:0}).eq("code",code);
    setLinks(ls=>ls.map(l=>codes.includes(l.code)?{...l,commission_earned:0}:l));
    setPayModal(null);setPayNotes("");
  };

  const exportCSV = () => {
    const rows = [["Date","Creator","Code","Value","Commission","Source"]];
    conversions.forEach(c=>{
      const link = links.find(l=>l.code===c.link_code);
      rows.push([new Date(c.logged_at).toLocaleDateString(),link?.creator_name||"",c.link_code,"$"+(c.conversion_value/100).toFixed(2),"$"+(c.commission_amount/100).toFixed(2),c.logged_by]);
    });
    const csv = rows.map(r=>r.join(",")).join("\n");
    const blob = new Blob([csv],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="bridgn-affiliate-report.csv";a.click();
  };

  // Payout grouping
  const owedByCreator = {};
  links.forEach(l=>{
    if((l.commission_earned||0)>0){
      if(!owedByCreator[l.creator_name]) owedByCreator[l.creator_name]={amount:0,codes:[]};
      owedByCreator[l.creator_name].amount += l.commission_earned;
      owedByCreator[l.creator_name].codes.push(l.code);
    }
  });

  // Recent click check (within 24h) — uses created_at on the link as proxy
  const now24 = Date.now()-86400000;

  if(loading) return <SkeletonPage layout="list"/>;

  const tabBtn = (k,l) => <button className={"filter-btn"+(tab===k?" active":"")} onClick={()=>setTab(k)} style={{fontSize:13}}>{l}</button>;

  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">Affiliate Manager</div><div className="page-subtitle">Links, promo codes, conversions and commissions.</div></div><button className="btn btn-primary" onClick={()=>setModal(true)}>+ Create New</button></div>

      {/* Tabs */}
      <div style={{display:"flex",gap:8,marginBottom:18}}>{tabBtn("links","Links & Codes")}{tabBtn("conversions","Conversions")}{tabBtn("payouts","Payouts")}</div>

      {/* ═══ LINKS & CODES TAB ═══ */}
      {tab==="links"&&(<>
        <div className="g4 section" style={{gap:12}}>
          {[{l:"Clicks",v:String(totalClicks)},{l:"Conversions",v:String(totalConv)},{l:"Revenue",v:"$"+$(totalRev)},{l:"Commissions",v:"$"+$(totalComm)}].map((s,i)=>(
            <StatCard key={i} label={s.l} value={s.v}/>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {links.length===0?(
            <div className="card" style={{padding:"40px 20px",textAlign:"center"}}><EmptySVG type="affiliate" size={110}/><div style={{fontSize:"13px",fontWeight:600,color:"var(--text2)",marginTop:4}}>No affiliate links yet — create one to start tracking.</div></div>
          ):links.map(a=>(
            <div key={a.id} className="card card-hover" style={{padding:"16px 18px",opacity:a.is_active===false?.5:1}}>
              <div style={{display:"flex",gap:14,alignItems:"flex-start",flexWrap:"wrap"}}>
                <div style={{width:36,height:36,borderRadius:10,background:bc(Math.abs((a.code||"").charCodeAt(0))%6),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:700,color:"white",flexShrink:0}}>{(a.creator_name||"?").split(" ").map(n=>n[0]).join("").slice(0,2)}</div>
                <div style={{flex:1,minWidth:180}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                    <span style={{fontSize:"14px",fontWeight:600}}>{a.creator_name}</span>
                    {a.campaign_name&&<span style={{fontSize:"11px",color:"var(--text3)"}}>· {a.campaign_name}</span>}
                    <span className={"badge badge-"+(a.type==="code"?"purple":"blue")} style={{fontSize:"10px"}}>{a.type==="code"?"Code":"Link"}</span>
                    {a.is_active===false&&<span className="badge" style={{fontSize:"10px",background:"var(--surface2)",color:"var(--text3)"}}>Paused</span>}
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
                    <code style={{background:"var(--surface2)",padding:"2px 8px",borderRadius:5,fontSize:"12px",fontWeight:700,color:"var(--accent)",letterSpacing:".03em"}}>{a.type==="code"?a.code:"bridgn.com/r/"+a.code}</code>
                    <button onClick={()=>copy(a)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"11px",color:copied===a.code?"var(--green)":"var(--accent)",fontWeight:600,fontFamily:"DM Sans,sans-serif"}}>{copied===a.code?"✓":"Copy"}</button>
                  </div>
                  <div style={{fontSize:"11px",color:"var(--text3)"}}>
                    {a.commission_type==="flat"?"Flat $"+((a.commission_flat_amount||0)/100).toFixed(2)+" each":a.commission_rate+"% commission"}
                    {a.destination_url&&<span> · <a href={a.destination_url} target="_blank" rel="noopener noreferrer" style={{color:"var(--accent)",textDecoration:"none"}}>{a.destination_url.replace(/^https?:\/\//,"").slice(0,35)}</a></span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:12,alignItems:"center",flexShrink:0,flexWrap:"wrap"}}>
                  <div style={{textAlign:"center",minWidth:40}}><div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><div style={{fontSize:"14px",fontWeight:700}}>{a.clicks||0}</div>{(a.clicks||0)>0&&<div style={{width:6,height:6,borderRadius:"50%",background:"var(--green)",animation:"pulse 2s infinite"}}/>}</div><div style={{fontSize:"10px",color:"var(--text3)"}}>Clicks</div></div>
                  <div style={{textAlign:"center",minWidth:40}}><div style={{fontSize:"14px",fontWeight:700,color:"var(--green)"}}>{a.conversions||0}</div><div style={{fontSize:"10px",color:"var(--text3)"}}>Conv.</div></div>
                  <div style={{textAlign:"center",minWidth:40}}><div style={{fontSize:"14px",fontWeight:700,fontFamily:"DM Serif Display,serif"}}>${$((a.revenue||0))}</div><div style={{fontSize:"10px",color:"var(--text3)"}}>Rev.</div></div>
                  <div style={{textAlign:"center",minWidth:40}}><div style={{fontSize:"14px",fontWeight:700,color:"var(--accent2)"}}>${$((a.commission_earned||0))}</div><div style={{fontSize:"10px",color:"var(--text3)"}}>Comm.</div></div>
                </div>
              </div>
              <div style={{display:"flex",gap:6,marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)",flexWrap:"wrap"}}>
                <button className="btn btn-secondary btn-sm" onClick={()=>{setConvModal(a.code);setConvForm({code:a.code,value:"",notes:""});}}>+ Conversion</button>
                <button className="btn btn-secondary btn-sm" onClick={()=>toggleActive(a)}>{a.is_active===false?"Activate":"Pause"}</button>
                <button className="btn btn-secondary btn-sm" style={{color:"var(--red)"}} onClick={()=>deleteLink(a)}>Delete</button>
              </div>
            </div>
          ))}
        </div>
      </>)}

      {/* ═══ CONVERSIONS TAB ═══ */}
      {tab==="conversions"&&(<>
        <div className="g3 section" style={{gap:12}}>
          {[{l:"Total Revenue",v:"$"+$(totalRev)},{l:"Commissions Owed",v:"$"+$(totalComm)},{l:"Conversion Rate",v:convRate+"%"}].map((s,i)=>(
            <StatCard key={i} label={s.l} value={s.v}/>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          <select className="fsel" style={{padding:"7px 12px",fontSize:"12px"}} value={convFilter.creator} onChange={e=>setConvFilter(f=>({...f,creator:e.target.value}))}>
            <option value="">All Creators</option>
            {[...new Set(links.map(l=>l.creator_name))].map(n=><option key={n} value={n}>{n}</option>)}
          </select>
          <select className="fsel" style={{padding:"7px 12px",fontSize:"12px"}} value={convFilter.campaign} onChange={e=>setConvFilter(f=>({...f,campaign:e.target.value}))}>
            <option value="">All Campaigns</option>
            {[...new Set(links.map(l=>l.campaign_name).filter(Boolean))].map(n=><option key={n} value={n}>{n}</option>)}
          </select>
          <button className="btn btn-secondary btn-sm" onClick={()=>{setConvModal("manual");setConvForm({code:links[0]?.code||"",value:"",notes:""});}}>+ Log Conversion</button>
          <button className="btn btn-secondary btn-sm" onClick={exportCSV}>Export CSV</button>
        </div>
        <div className="card-lg" style={{overflow:"hidden"}}>
          <table className="tbl">
            <thead><tr><th>Date</th><th>Creator</th><th>Code</th><th>Order Value</th><th>Commission</th><th>Source</th></tr></thead>
            <tbody>
              {conversions.filter(c=>{
                const link=links.find(l=>l.code===c.link_code);
                if(convFilter.creator&&link?.creator_name!==convFilter.creator) return false;
                if(convFilter.campaign&&link?.campaign_name!==convFilter.campaign) return false;
                return true;
              }).length===0?(
                <tr><td colSpan={6} style={{textAlign:"center",padding:"32px"}}><div style={{fontSize:"13px",color:"var(--text3)"}}>No conversions recorded yet.</div></td></tr>
              ):conversions.filter(c=>{
                const link=links.find(l=>l.code===c.link_code);
                if(convFilter.creator&&link?.creator_name!==convFilter.creator) return false;
                if(convFilter.campaign&&link?.campaign_name!==convFilter.campaign) return false;
                return true;
              }).map(c=>{
                const link=links.find(l=>l.code===c.link_code);
                return (
                  <tr key={c.id}>
                    <td style={{fontSize:"12px"}}>{new Date(c.logged_at).toLocaleDateString()}</td>
                    <td style={{fontWeight:500}}>{link?.creator_name||"—"}</td>
                    <td><code style={{fontSize:"11px",color:"var(--accent)"}}>{c.link_code}</code></td>
                    <td style={{fontWeight:700,fontFamily:"DM Serif Display,serif"}}>${(c.conversion_value/100).toFixed(2)}</td>
                    <td style={{fontWeight:700,color:"var(--accent2)"}}>${(c.commission_amount/100).toFixed(2)}</td>
                    <td><span className={"badge badge-"+(c.logged_by==="manual"?"blue":c.logged_by==="shopify"?"purple":"teal")} style={{fontSize:"10px"}}>{c.logged_by}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* ── Store Integration Setup ── */}
        {(()=>{
          const webhookUrl = "https://bridgn.onrender.com/api/affiliate/conversion";
          const hasWebhookConv = conversions.some(c=>c.logged_by==="webhook"||c.logged_by==="shopify");
          const copySnippet = (text,key) => {navigator.clipboard.writeText(text).catch(()=>{});setIntCopied(key);setTimeout(()=>setIntCopied(null),2500);};

          const shopifyScript = "<scr"+"ipt>\n  // bridgn affiliate tracking — paste in Shopify Additional Scripts\n  (function(){\n    try {\n      var code = Shopify.checkout.discountApplications?.[0]?.title || \"\";\n      if (!code) return;\n      fetch(\""+webhookUrl+"\", {\n        method: \"POST\",\n        headers: {\"Content-Type\": \"application/json\"},\n        body: JSON.stringify({\n          code: code,\n          order_value: Math.round(Shopify.checkout.totalPrice * 100),\n          order_id: Shopify.checkout.orderName || \"\",\n          customer_email: Shopify.checkout.email || \"\",\n          source: \"shopify\"\n        })\n      });\n    } catch(e) {}\n  })();\n<"+"/scr"+"ipt>";

          const wooSnippet = `// bridgn affiliate tracking — add to functions.php
add_action('woocommerce_thankyou', function($order_id) {
  $order = wc_get_order($order_id);
  $codes = $order->get_coupon_codes();
  if (empty($codes)) return;
  $body = json_encode([
    'code'           => $codes[0],
    'order_value'    => intval($order->get_total() * 100),
    'order_id'       => (string) $order_id,
    'customer_email' => $order->get_billing_email(),
    'source'         => 'webhook'
  ]);
  wp_remote_post('${webhookUrl}', [
    'headers' => ['Content-Type' => 'application/json'],
    'body'    => $body,
    'timeout' => 5,
  ]);
});`;

          const stepStyle = {display:"flex",gap:14,marginBottom:18};
          const numStyle = (n) => ({width:28,height:28,borderRadius:"50%",background:"var(--accent)",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:700,flexShrink:0});
          const codeBlock = (text,key) => (
            <div style={{position:"relative",marginTop:8}}>
              <pre style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"12px 14px",fontSize:"12px",color:"var(--accent)",lineHeight:1.6,overflow:"auto",whiteSpace:"pre-wrap",wordBreak:"break-all",maxHeight:200}}>{text}</pre>
              <button onClick={()=>copySnippet(text,key)} style={{position:"absolute",top:8,right:8,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:"11px",fontWeight:600,color:intCopied===key?"var(--green)":"var(--accent)",fontFamily:"DM Sans,sans-serif"}}>{intCopied===key?"✓ Copied":"Copy"}</button>
            </div>
          );

          return (
            <div className="card-lg" style={{padding:"22px 24px",marginTop:20}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{fontSize:"14px",fontWeight:700}}>Store Integration</div>
                  {hasWebhookConv&&<span className="badge badge-green" style={{fontSize:"10px"}}>Connected</span>}
                </div>
                <div style={{display:"flex",gap:6}}>
                  {[["shopify","Shopify"],["woo","WooCommerce"]].map(([k,l])=>(
                    <button key={k} className={"filter-btn"+(intTab===k?" active":"")} onClick={()=>setIntTab(k)} style={{fontSize:"11px",padding:"5px 10px"}}>{l}</button>
                  ))}
                </div>
              </div>

              {intTab==="shopify"&&(
                <div>
                  <div style={stepStyle}>
                    <div style={numStyle()}>1</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"13px",fontWeight:600,marginBottom:2}}>Open Shopify Webhooks</div>
                      <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.5}}>In your Shopify admin, go to <strong>Settings → Notifications → Webhooks</strong></div>
                    </div>
                  </div>
                  <div style={stepStyle}>
                    <div style={numStyle()}>2</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"13px",fontWeight:600,marginBottom:2}}>Create a Webhook</div>
                      <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.5}}>Click <strong>Create Webhook</strong>, choose <strong>Order Payment</strong> as the event, format <strong>JSON</strong></div>
                    </div>
                  </div>
                  <div style={stepStyle}>
                    <div style={numStyle()}>3</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"13px",fontWeight:600,marginBottom:2}}>Paste this webhook URL</div>
                      <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.5}}>Use this as the webhook endpoint:</div>
                      {codeBlock(webhookUrl,"webhook-url")}
                    </div>
                  </div>
                  <div style={stepStyle}>
                    <div style={numStyle()}>4</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"13px",fontWeight:600,marginBottom:2}}>Add tracking script</div>
                      <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.5}}>Go to <strong>Settings → Checkout → Order status page → Additional scripts</strong> and paste this:</div>
                      {codeBlock(shopifyScript,"shopify-script")}
                    </div>
                  </div>
                  <div style={stepStyle}>
                    <div style={numStyle()}>5</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"13px",fontWeight:600,marginBottom:2}}>Test it</div>
                      <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.5}}>Place a test order using one of your creator promo codes. If successful, a <span className="badge badge-green" style={{fontSize:"10px"}}>Connected</span> badge will appear here and the conversion will show in your table above.</div>
                    </div>
                  </div>
                </div>
              )}

              {intTab==="woo"&&(
                <div>
                  <div style={stepStyle}>
                    <div style={numStyle()}>1</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"13px",fontWeight:600,marginBottom:2}}>Open your theme's functions.php</div>
                      <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.5}}>In WordPress admin, go to <strong>Appearance → Theme Editor → functions.php</strong> (or use a code snippets plugin)</div>
                    </div>
                  </div>
                  <div style={stepStyle}>
                    <div style={numStyle()}>2</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"13px",fontWeight:600,marginBottom:2}}>Add this code snippet</div>
                      <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.5}}>Paste at the bottom of functions.php. This fires after every successful order and sends the coupon code + order value to bridgn:</div>
                      {codeBlock(wooSnippet,"woo-snippet")}
                    </div>
                  </div>
                  <div style={stepStyle}>
                    <div style={numStyle()}>3</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"13px",fontWeight:600,marginBottom:2}}>Create matching coupons in WooCommerce</div>
                      <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.5}}>Go to <strong>Marketing → Coupons</strong> and create coupons that match the promo codes you created in bridgn (e.g. SARAH10, MIKE20).</div>
                    </div>
                  </div>
                  <div style={stepStyle}>
                    <div style={numStyle()}>4</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"13px",fontWeight:600,marginBottom:2}}>Test it</div>
                      <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.5}}>Place a test order using one of your creator codes. The conversion will appear in your conversions table with source <span className="badge badge-teal" style={{fontSize:"10px"}}>webhook</span>.</div>
                    </div>
                  </div>
                </div>
              )}

              {!hasWebhookConv&&(
                <div style={{padding:"10px 14px",background:"rgba(240,160,80,.08)",border:"1px solid rgba(240,160,80,.2)",borderRadius:"var(--radius-sm)",fontSize:"12px",color:"var(--accent2)",marginTop:4}}>Waiting for first webhook conversion... Complete the setup above and place a test order.</div>
              )}
            </div>
          );
        })()}
      </>)}

      {/* ═══ PAYOUTS TAB ═══ */}
      {tab==="payouts"&&(<>
        <div style={{fontSize:"14px",fontWeight:700,marginBottom:14}}>Commissions Owed</div>
        {Object.keys(owedByCreator).length===0?(
          <div className="card" style={{padding:"32px 20px",textAlign:"center"}}><div style={{fontSize:"13px",color:"var(--text3)"}}>No outstanding commissions. All paid up.</div></div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
            {Object.entries(owedByCreator).map(([name,{amount,codes}])=>(
              <div key={name} className="card" style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:36,height:36,borderRadius:10,background:bc(Math.abs(name.charCodeAt(0))%6),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:700,color:"white",flexShrink:0}}>{name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:"14px",fontWeight:600}}>{name}</div>
                  <div style={{fontSize:"11px",color:"var(--text3)"}}>{codes.length} link{codes.length!==1?"s":""}</div>
                </div>
                <div style={{fontSize:"18px",fontWeight:400,fontFamily:"DM Serif Display,serif",color:"var(--accent2)",marginRight:12}}>${$(amount)}</div>
                <button className="btn btn-primary btn-sm" onClick={()=>setPayModal({name,amount,codes})}>Mark Paid</button>
              </div>
            ))}
          </div>
        )}
        <div style={{fontSize:"14px",fontWeight:700,marginBottom:14}}>Payment History</div>
        {payouts.length===0?(
          <div className="card" style={{padding:"32px 20px",textAlign:"center"}}><div style={{fontSize:"13px",color:"var(--text3)"}}>No payments recorded yet.</div></div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {payouts.map(p=>(
              <div key={p.id} className="card" style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:"16px"}}></span>
                <div style={{flex:1}}>
                  <div style={{fontSize:"13px",fontWeight:600}}>${$(p.amount)} paid to {p.creator_name}</div>
                  <div style={{fontSize:"11px",color:"var(--text3)"}}>{new Date(p.paid_at).toLocaleDateString()} · {(p.codes||[]).length} link{(p.codes||[]).length!==1?"s":""}{p.notes?" · "+p.notes:""}</div>
                </div>

      {/* ═══ CREATE MODAL ═══ */}

              <select className="fsel" value={newLink.dealId} onChange={e=>setNewLink(f=>({...f,dealId:e.target.value}))}>

              <div style={{fontSize:"11px",color:"var(--text3)",marginTop:4}}>{newLink.commType==="flat"?"$"+((parseFloat(newLink.flatAmount)||5))+"/conv":(newLink.rate||10)+"% commission"}{newLink.campaign?" · "+newLink.campaign:""}</div>

      {/* ═══ LOG CONVERSION MODAL ═══ */}

              <button onClick={()=>{setConvModal(null);setConvForm({code:"",value:"",notes:""});}} className="btn btn-secondary btn-lg">Cancel</button>

          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── CREATOR AFFILIATE PAGE ───────────────────────────────────────────────────
function AffiliateCreatorPage({authUser}) {
  const loading = useSkeleton();
  const [links,setLinks] = useState([]);
  const [copied,setCopied] = useState(null);
  const [qrCode,setQrCode] = useState(null); // {code, dataUrl}
  const [shareModal,setShareModal] = useState(null); // link object
  const [shareCopied,setShareCopied] = useState(null);

  useEffect(()=>{
    if(!authUser) return;
    // Load all links where creator_name matches this user's name
    const name = authUser.user_metadata?.full_name||authUser.user_metadata?.company_name||authUser.email?.split("@")[0]||"";
    if(!name) return;
    supabase.from("affiliate_links").select("*").eq("creator_name",name).eq("is_active",true).order("created_at",{ascending:false})
      .then(({data})=>{ if(data) setLinks(data); });
  },[authUser]);

  // Realtime
  useEffect(()=>{
    if(!links.length) return;
    const ch = supabase.channel("creator-aff-rt").on("postgres_changes",{event:"UPDATE",schema:"public",table:"affiliate_links"},(p)=>{
      setLinks(ls=>ls.map(l=>l.id===p.new.id?{...l,...p.new}:l));
    }).subscribe();
    return ()=>{supabase.removeChannel(ch);};
  },[links.length]);

  const totalClicks = links.reduce((s,a)=>s+(a.clicks||0),0);
  const totalComm = links.reduce((s,a)=>s+(a.commission_earned||0),0);
  const activeLinks = links.filter(a=>a.type==="link").length;
  const activeCodes = links.filter(a=>a.type==="code").length;

  const copy = (a) => {
    const text = a.type==="code"?a.code:"https://bridgn.com/r/"+a.code;
    navigator.clipboard.writeText(text).catch(()=>{});
    setCopied(a.code);setTimeout(()=>setCopied(null),2000);
  };

  const generateQR = async (a) => {
    const url = "https://bridgn.com/r/"+a.code;
    try {
      const dataUrl = await window.QRCode.toDataURL(url,{width:512,margin:2,color:{dark:"#5b8af5",light:"#0f1117"}});
      setQrCode({code:a.code, name:a.campaign_name||a.code, dataUrl});
    } catch(e) { console.error("[QR]",e); }
  };

  const downloadQR = () => {
    if(!qrCode) return;
    const a = document.createElement("a");
    a.href = qrCode.dataUrl;
    a.download = "bridgn-qr-"+qrCode.code+".png";
    a.click();
  };

  const shareText = (a, platform) => {
    const link = a.type==="code"?a.code:"bridgn.com/r/"+a.code;
    const campaign = a.campaign_name||"this brand";
    if(platform==="instagram") return `I partnered with ${campaign}! Use my ${a.type==="code"?"code":"link"} ${link} to get an exclusive deal. Link in bio! #ad #partner`;
    if(platform==="tiktok") return `POV: you get an exclusive deal from ${campaign} 👀 Use ${a.type==="code"?"code "+link:"the link in my bio"} #ad #partner #deal`;
    if(platform==="twitter") return `Excited to partner with ${campaign}! Use my ${a.type==="code"?"code":"link"}: ${link} #ad`;
    return link;
  };

  const copyShare = (text,key) => {
    navigator.clipboard.writeText(text).catch(()=>{});
    setShareCopied(key);setTimeout(()=>setShareCopied(null),2000);
  };

  // Simple 30-day bar chart data (simulated from click count — real would need daily aggregation)
  const barData = Array.from({length:30},(_,i)=>{
    const dayClicks = Math.max(0, Math.round(totalClicks/30 + (Math.random()-0.5)*totalClicks/15));
    return {day:i, clicks:totalClicks>0?dayClicks:0};
  });
  const maxBar = Math.max(1,...barData.map(d=>d.clicks));

  if(loading) return <SkeletonPage layout="list"/>;
  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">My Affiliate Links</div><div className="page-subtitle">Track your links, codes, and commissions across all deals.</div></div></div>

      <div className="g4 section" style={{gap:12}}>
        {[{l:"Total Clicks",v:String(totalClicks)},{l:"Commissions Earned",v:"$"+((totalComm)/100).toLocaleString()},{l:"Active Links",v:String(activeLinks)},{l:"Active Codes",v:String(activeCodes)}].map((s,i)=>(
          <StatCard key={i} label={s.l} value={s.v}/>
        ))}
      </div>

      {/* Click activity chart */}
      {totalClicks>0&&(
        <div className="card-lg" style={{padding:"18px 22px",marginBottom:18}}>
          <div style={{fontSize:"13px",fontWeight:700,marginBottom:12}}>Click Activity (30 days)</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:2,height:80}}>
            {barData.map((d,i)=>(
              <div key={i} style={{flex:1,background:d.clicks>0?"var(--accent)":"var(--surface2)",borderRadius:"2px 2px 0 0",height:Math.max(2,(d.clicks/maxBar)*100)+"%",transition:"height .3s",opacity:d.clicks>0?.7:.3}} title={d.clicks+" clicks"}/>
            ))}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
            <span style={{fontSize:"10px",color:"var(--text3)"}}>30 days ago</span>
            <span style={{fontSize:"10px",color:"var(--text3)"}}>Today</span>
          </div>
        </div>
      )}

      {/* Links and codes */}
      {links.length===0?(
        <div className="card" style={{padding:"40px 20px",textAlign:"center"}}>
          <div style={{fontSize:"28px",marginBottom:10}}></div>
          <div style={{fontSize:"14px",fontWeight:600,marginBottom:6}}>No affiliate links yet</div>
          <div style={{fontSize:"12px",color:"var(--text2)",lineHeight:1.65}}>When a brand creates a tracking link or promo code for you, it will appear here with live stats.</div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {links.map(a=>(
            <div key={a.id} className="card-lg" style={{padding:"18px 22px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                <span className={"badge badge-"+(a.type==="code"?"purple":"blue")} style={{fontSize:"10px"}}>{a.type==="code"?"Promo Code":"Tracking Link"}</span>
                <span style={{fontSize:"13px",fontWeight:600}}>{a.campaign_name||"Campaign"}</span>
                <span style={{fontSize:"11px",color:"var(--text3)"}}>· {a.commission_type==="flat"?"$"+((a.commission_flat_amount||0)/100).toFixed(2)+" each":(a.commission_rate||10)+"% commission"}</span>
              </div>

              {/* Big copyable display */}
              <div style={{display:"flex",gap:10,alignItems:"center",padding:"14px 16px",background:"linear-gradient(135deg,rgba(91,138,245,.08),rgba(167,139,250,.05))",border:"1.5px solid rgba(91,138,245,.2)",borderRadius:"var(--radius)",marginBottom:12}}>
                <code style={{fontSize:"18px",fontWeight:800,color:"var(--accent)",flex:1,letterSpacing:a.type==="code"?".06em":".01em",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.type==="code"?a.code:"bridgn.com/r/"+a.code}</code>
                <button onClick={()=>copy(a)} className="btn btn-primary btn-sm" style={{flexShrink:0,minWidth:80}}>{copied===a.code?"✓ Copied":"Copy"}</button>
              </div>

              {/* Stats */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
                <div style={{textAlign:"center",padding:"10px",background:"var(--surface2)",borderRadius:"var(--radius-sm)"}}><div style={{fontSize:"18px",fontWeight:700}}>{a.clicks||0}</div><div style={{fontSize:"10px",color:"var(--text3)"}}>Clicks</div></div>
                <div style={{textAlign:"center",padding:"10px",background:"var(--surface2)",borderRadius:"var(--radius-sm)"}}><div style={{fontSize:"18px",fontWeight:700,color:"var(--green)"}}>{a.conversions||0}</div><div style={{fontSize:"10px",color:"var(--text3)"}}>Sales</div></div>
                <div style={{textAlign:"center",padding:"10px",background:"var(--surface2)",borderRadius:"var(--radius-sm)"}}><div style={{fontSize:"18px",fontWeight:700,color:"var(--accent2)",fontFamily:"DM Serif Display,serif"}}>${((a.commission_earned||0)/100).toLocaleString()}</div><div style={{fontSize:"10px",color:"var(--text3)"}}>Earned</div></div>
              </div>

              {/* Action buttons */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {a.type==="link"&&<button className="btn btn-secondary btn-sm" onClick={()=>generateQR(a)}>QR Code</button>}
                <button className="btn btn-secondary btn-sm" onClick={()=>setShareModal(a)}>Share Captions</button>
              </div>

              {(a.clicks||0)>0&&(
                <div style={{marginTop:10,fontSize:"12px",color:"var(--text2)",lineHeight:1.5}}>Your {a.type==="code"?"code":"link"} has been clicked <strong>{a.clicks}</strong> time{a.clicks!==1?"s":""}{(a.conversions||0)>0?", resulting in <strong>"+a.conversions+"</strong> sale"+(a.conversions!==1?"s":""):""}.</div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Share tips */}
      <div className="card-lg" style={{padding:"18px 22px",marginTop:18}}>
        <div style={{fontSize:"13px",fontWeight:700,marginBottom:12}}>Share Tips</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[
            ["","Pin your link in your bio","Your bio link is the #1 traffic driver. Make it the first thing people see."],
            ["","Mention your code in the first 30 seconds","Viewers decide to stay or scroll within seconds. Lead with the value."],
            ["","Add it to your link-in-bio tool","Use Linktree, Stan, or Beacons to make your affiliate link easily accessible."],
            ["","Add a swipe-up or link sticker in Stories","Stories with direct links convert 2-3x better than bio-only."],
            ["","Reply to comments with your code","When people ask 'where did you get that?', drop your code in the reply."],
          ].map(([icon,title,desc],i)=>(
            <div key={i} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:i<4?"1px solid var(--border)":"none"}}>
              <span style={{fontSize:"16px",flexShrink:0}}>{icon}</span>
              <div><div style={{fontSize:"13px",fontWeight:600}}>{title}</div><div style={{fontSize:"11px",color:"var(--text3)",marginTop:2}}>{desc}</div></div>
            </div>
          ))}
        </div>
      </div>

      {/* QR Code Modal */}
      {qrCode&&(
        <Modal onClose={()=>setQrCode(null)}>
          <div style={{padding:26,textAlign:"center"}}>
            <div style={{fontFamily:"DM Serif Display,serif",fontSize:"20px",fontWeight:400,marginBottom:14}}>QR Code</div>
            <div style={{fontSize:"12px",color:"var(--text3)",marginBottom:16}}>{qrCode.name}</div>
            <img src={qrCode.dataUrl} style={{width:200,height:200,borderRadius:12,margin:"0 auto 16px",display:"block"}} alt="QR Code"/>
            <div style={{display:"flex",gap:9,justifyContent:"center"}}>
              <button onClick={downloadQR} className="btn btn-primary">Download PNG</button>
              <button onClick={()=>setQrCode(null)} className="btn btn-secondary">Close</button>
            </div>
          </div>
        </Modal>
      )}

      {/* Share Captions Modal */}
      {shareModal&&(
        <Modal onClose={()=>{setShareModal(null);setShareCopied(null);}}>
          <div style={{padding:26}}>
            <div style={{fontFamily:"DM Serif Display,serif",fontSize:"20px",fontWeight:400,marginBottom:14}}>Share Captions</div>
            <div style={{fontSize:"12px",color:"var(--text3)",marginBottom:16}}>Pre-written captions with your {shareModal.type==="code"?"code":"link"} embedded. Copy and customize.</div>
            {[["📸 Instagram","instagram"],["🎵 TikTok","tiktok"],["🐦 Twitter/X","twitter"]].map(([label,platform])=>{
              const text = shareText(shareModal,platform);
              const key = platform;
              return (
                <div key={platform} style={{marginBottom:14}}>
                  <div style={{fontSize:"12px",fontWeight:600,marginBottom:6}}>{label}</div>
                  <div style={{position:"relative"}}>
                    <div style={{padding:"10px 14px",background:"var(--surface2)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",fontSize:"13px",color:"var(--text2)",lineHeight:1.6,paddingRight:70}}>{text}</div>
                    <button onClick={()=>copyShare(text,key)} style={{position:"absolute",top:8,right:8,background:"none",border:"none",cursor:"pointer",fontSize:"11px",fontWeight:600,color:shareCopied===key?"var(--green)":"var(--accent)",fontFamily:"DM Sans,sans-serif"}}>{shareCopied===key?"✓ Copied":"Copy"}</button>
                  </div>
                </div>
              );
            })}
            <button onClick={()=>{setShareModal(null);setShareCopied(null);}} className="btn btn-secondary" style={{width:"100%",marginTop:4}}>Close</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── BRIEF BUILDER ────────────────────────────────────────────────────────────
function BriefBuilderPage() {

  const [template,setTemplate] = useState(null);const [fields,setFields] = useState({});const [sent,setSent] = useState(false);const [creator,setCreator] = useState("");const [preview,setPreview] = useState(false);
  const t=BRIEF_TEMPLATES.find(x=>x.id===template);
  if(loading) return <SkeletonPage layout="form"/>;
  if(sent) return (
    <div className="fade-in" style={{maxWidth:500,margin:"50px auto",textAlign:"center"}}>
      <div style={{fontSize:"48px",marginBottom:14}}></div>
      <div className="page-title" style={{marginBottom:8}}>Brief Sent!</div>
      <div style={{fontSize:"14px",color:"var(--text2)",lineHeight:1.7,marginBottom:20}}><strong>{creator||"The creator"}</strong> must read and acknowledge the brief before creating any content. You will be notified once they confirm.</div>
      <div style={{display:"flex",gap:9,justifyContent:"center"}}><button className="btn btn-primary" onClick={()=>{setSent(false);setTemplate(null);setFields({});setCreator("");}}>Create Another</button><button className="btn btn-secondary" onClick={()=>setSent(false)}>Back</button></div>
    </div>
  );
  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">Brief Builder</div><div className="page-subtitle">Send a structured brief that creators must acknowledge before starting.</div></div>{t&&<button className="btn btn-secondary" onClick={()=>setPreview(true)}>Preview</button>}</div>

// ─── ROI TRACKER ──────────────────────────────────────────────────────────────
function ROITrackerPage() {
  const loading = useSkeleton();

  const roiData=[];
  if(!roiData.length) return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">ROI Tracker</div><div className="page-subtitle">Measure the real return on every creator investment.</div></div></div>

          {l:"Avg ROI",v:avgROI+"%",c:"↑ vs industry avg 150%",cls:"stat-up",sc:"#a78bfa"},
          {l:"Net Profit",v:"$"+(totalRev-totalSpend).toLocaleString(),sc:"#34d399"}

                <td style={{fontWeight:600}}>${r.spend.toLocaleString()}</td>
                <td style={{fontWeight:700,fontFamily:"DM Serif Display,serif",color:"var(--green)"}}>${r.revenue.toLocaleString()}</td>
                <td><div style={{display:"flex",gap:7,alignItems:"center"}}><div style={{width:60,height:5,background:"var(--surface2)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",background:r.roi>300?"var(--green)":r.roi>100?"var(--accent)":"var(--accent2)",borderRadius:99,width:Math.min((r.roi/700)*100,100)+"%"}}></div></div><span style={{fontSize:"13px",fontWeight:700,color:r.roi>300?"var(--green)":r.roi>100?"var(--accent)":"var(--accent2)"}}>{r.roi}%</span></div></td>
                <td style={{color:"var(--text2)"}}>{r.clicks.toLocaleString()}</td>
                <td style={{color:"var(--text2)"}}>{r.conv.toLocaleString()}</td>
              </tr>

          </tbody>
        </table>

// ─── AI MATCH ─────────────────────────────────────────────────────────────────
function AIMatchPage({setPage,setSelected}) {
  const loading = useSkeleton();

  const run=()=>{if(!q.trim())return;setSearching(true);setResults(null);let mi=0;const t=setInterval(()=>{mi=(mi+1)%msgs.length;setLoadMsg(msgs[mi]);},700);setTimeout(()=>{clearInterval(t);setSearching(false);const scored=CREATORS.map(c=>({...c,matchScore:Math.floor(Math.random()*30)+70})).sort((a,b)=>b.matchScore-a.matchScore);setResults(scored);},3000);};
  if(loading) return <SkeletonPage layout="simple"/>;
  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">AI Match</div><div className="page-subtitle">Describe your campaign, and AI will find your best creator matches.</div></div></div>

        <textarea className="fta" style={{minHeight:80,marginBottom:12}} value={q} onChange={e=>setQ(e.target.value)} placeholder="e.g. Looking for a wellness creator with 100K+ followers on Instagram who posts authentic lifestyle content for a supplement launch..."></textarea>
        <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
          {["Wellness creator, 100K+ Instagram","Tech reviewer, YouTube, 500K+","Fashion micro-creator, TikTok","UGC creator for beauty brand"].map(ex=><button key={ex} onClick={()=>setQ(ex)} className="collab-chip" style={{cursor:"pointer",background:"var(--accent-light)",color:"var(--accent)",borderColor:"rgba(91,138,245,.3)"}}>{ex}</button>)}
        </div>
        <button onClick={run} disabled={!q.trim()||searching} className="btn btn-primary btn-lg">{searching?loadMsg:"Find My Matches"}</button>
      </div>
      {searching&&(
        <div style={{textAlign:"center",padding:"30px 0"}}>
          <div style={{fontSize:"32px",animation:"spin 1.2s linear infinite",display:"inline-block",marginBottom:12}}></div>
          <div style={{fontSize:"14px",color:"var(--accent)",fontWeight:600,animation:"pulse 1.2s infinite"}}>{loadMsg}</div>
        </div>
      )}
      {results&&(
        <div>
          <div style={{marginBottom:14,display:"flex",gap:10,alignItems:"center"}}>
            <span style={{fontSize:"14px",fontWeight:700}}>Top Matches</span>

          <div className="g3">

// ─── MESSAGES ─────────────────────────────────────────────────────────────────
function MessagesPage({setPage,demoMode}) {
  const loading = useSkeleton();
  const [threads,setThreads] = useState(()=>{
    if(!demoMode) return [];
    return DEMO_THREADS.map(t=>{
      const lastMsg = t.msgs[t.msgs.length-1];
      return {
        id:t.id,name:t.name,initials:t.initials,ci:t.gradIdx,
        msgs:t.msgs,
        lastMsg:lastMsg?.text||"",
        ts:lastMsg?.ts||Date.now(),
        unread:t.unread,
      };
    });
  });
  const [activeId,setActiveId] = useState(null);
  const [msgInput,setMsgInput] = useState("");
  const [newModal,setNewModal] = useState(false);
  const [newTarget,setNewTarget] = useState("");
  const [tick,setTick] = useState(0);
  const msgsEndRef = useRef(null);

  // Refresh relative timestamps every 30s
  useEffect(()=>{
    const id = setInterval(()=>setTick(t=>t+1),30000);
    return ()=>clearInterval(id);
  },[]);

  // Scroll to bottom when active thread's messages change
  useEffect(()=>{
    msgsEndRef.current?.scrollIntoView({behavior:"smooth"});
  },[activeId, threads.find(t=>t.id===activeId)?.msgs.length]);

  const relTime = ts => {
    const diff = Date.now()-ts;
    const s = Math.floor(diff/1000);
    const m = Math.floor(s/60);
    const h = Math.floor(m/60);
    const d = Math.floor(h/24);
    if(s<10) return "Just now";
    if(s<60) return s+"s ago";
    if(m<2) return "1 minute ago";
    if(m<60) return m+" minutes ago";
    if(h<2) return "1 hour ago";
    if(h<24) return h+" hours ago";
    if(d===1) return "Yesterday";
    if(d<7) return d+" days ago";
    return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric"});
  };

  const activeThread = threads.find(t=>t.id===activeId);

  const startConversation = () => {
    const name = newTarget.trim();
    if(!name) return;
    const isEmail = name.includes("@");
    const initials = isEmail
      ? name.split("@")[0].slice(0,2).toUpperCase()
      : name.split(" ").filter(Boolean).map(w=>w[0]).join("").slice(0,2).toUpperCase();
    const id = Date.now();
    const thread = {id,name,initials,ci:threads.length%6,lastMsg:"",ts:Date.now(),msgs:[],unread:0};
    setThreads(t=>[thread,...t]);
    setActiveId(id);
    setNewTarget("");
    setNewModal(false);
  };

  const sendMsg = () => {
    const text = msgInput.trim();
    if(!text||!activeId) return;
    const msg = {id:Date.now(),from:"me",text,ts:Date.now()};
    setThreads(t=>t.map(th=>th.id===activeId
      ?{...th,msgs:[...th.msgs,msg],lastMsg:text,ts:Date.now()}
      :th
    ));
    setMsgInput("");
  };

  if(loading) return <SkeletonPage layout="simple"/>;
  return (
    <div className="fade-in">
      <div className="ph-row">
        <div>
          <div className="page-title">Messages</div>
          <div className="page-subtitle">Direct conversations with brands and partners.</div>
        </div>
        <button className="btn btn-primary" onClick={()=>setNewModal(true)}>+ New Conversation</button>
      </div>

      {threads.length===0?(
        <div className="card" style={{padding:"56px 24px",textAlign:"center",maxWidth:480,margin:"0 auto"}}>
          <EmptySVG type="messages" size={136}/>
          <div style={{fontSize:"16px",fontWeight:700,marginBottom:10}}>No conversations yet</div>
          <div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.75,marginBottom:24}}>
            Start a direct conversation with a brand or partner. Messages from the Deal Room will also appear here.
          </div>
          <button className="btn btn-primary" onClick={()=>setNewModal(true)}>+ New Conversation</button>
        </div>
      ):(
        <div className="msg-page-grid" style={{display:"grid",gridTemplateColumns:"290px 1fr",height:"calc(100vh - 196px)",minHeight:440,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>

          {/* ── Thread list ── */}
          <div style={{borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"10px 12px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
              <input placeholder="Search conversations…" style={{width:"100%",boxSizing:"border-box",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"7px 11px",fontSize:"12px",color:"var(--text)",outline:"none",fontFamily:"DM Sans,sans-serif"}}/>
            </div>
            <div style={{flex:1,overflowY:"auto"}}>
              {threads.map(t=>{
                const isAct = t.id===activeId;
                return (
                  <div key={t.id} onClick={()=>setActiveId(t.id)}
                    style={{padding:"11px 13px",display:"flex",gap:10,alignItems:"flex-start",cursor:"pointer",borderBottom:"1px solid var(--border)",background:isAct?"var(--accent-light)":"transparent",transition:"background .1s",position:"relative"}}
                    onMouseEnter={e=>{if(!isAct)e.currentTarget.style.background="var(--surface2)";}}
                    onMouseLeave={e=>{if(!isAct)e.currentTarget.style.background="transparent";}}>
                    {isAct&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:"var(--accent)",borderRadius:"0 2px 2px 0"}}/>}
                    <div style={{width:38,height:38,borderRadius:11,background:bc(t.ci),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:700,color:"white",flexShrink:0}}>{t.initials}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:2}}>
                        <span style={{fontSize:"13px",fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:130}}>{t.name}</span>
                        <span style={{fontSize:"10px",color:"var(--text3)",flexShrink:0,marginLeft:6}}>{relTime(t.ts)}</span>
                      </div>
                      <div style={{fontSize:"11px",color:"var(--text3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.lastMsg||"No messages yet"}</div>
                    </div>
                    {t.unread>0&&<div style={{width:18,height:18,borderRadius:"50%",background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:700,color:"white",flexShrink:0,marginTop:2}}>{t.unread}</div>}
                  </div>
                );
              })}
            </div>
          </div>

          {/* ── Conversation ── */}
          {activeThread?(
            <div style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
              {/* Header */}
              <div style={{padding:"12px 18px",borderBottom:"1px solid var(--border)",display:"flex",gap:11,alignItems:"center",flexShrink:0}}>
                <div style={{width:36,height:36,borderRadius:10,background:bc(activeThread.ci),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:700,color:"white",flexShrink:0}}>{activeThread.initials}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:"14px",fontWeight:700,lineHeight:1.2}}>{activeThread.name}</div>
                  <div style={{fontSize:"11px",color:"var(--text3)",marginTop:1}}>Direct message</div>
                </div>
              </div>

              {/* Messages */}
              <div style={{flex:1,overflowY:"auto",padding:"18px 18px 10px",display:"flex",flexDirection:"column",gap:10}}>
                {activeThread.msgs.length===0&&(
                  <div style={{margin:"auto",textAlign:"center",color:"var(--text3)",fontSize:"13px",lineHeight:1.7}}>
                    <div style={{fontSize:"30px",marginBottom:8}}></div>
                    <div style={{fontWeight:600,color:"var(--text2)",marginBottom:4}}>Start the conversation</div>
                    <div>This is the beginning of your thread with<br/><strong style={{color:"var(--text)"}}>{activeThread.name}</strong></div>
                  </div>
                )}
                {activeThread.msgs.map((m,i,arr)=>{
                  const isMe = m.from==="me";
                  // Show timestamp after last message or after a gap > 2 min
                  const showTime = i===arr.length-1||(arr[i+1]?.ts-m.ts)>120000;
                  return (
                    <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:isMe?"flex-end":"flex-start",gap:2}}>
                      <div style={{
                        maxWidth:"72%",padding:"9px 14px",
                        borderRadius:isMe?"16px 16px 4px 16px":"16px 16px 16px 4px",
                        background:isMe?"linear-gradient(135deg,var(--accent),#7c3aed)":"var(--surface2)",
                        border:isMe?"none":"1px solid var(--border)",
                        fontSize:"13px",lineHeight:1.55,color:isMe?"white":"var(--text)",
                        wordBreak:"break-word",
                        boxShadow:isMe?"0 2px 10px rgba(91,138,245,.3)":"none",
                      }}>{m.text}</div>
                      {showTime&&<span style={{fontSize:"10px",color:"var(--text3)"}}>{relTime(m.ts)}</span>}
                    </div>
                  );
                })}
                {/* Typing indicator — visible while composing */}
                {msgInput.length>0&&(
                  <div style={{display:"flex",alignItems:"center",gap:4,padding:"9px 13px",borderRadius:"16px 16px 16px 4px",background:"var(--surface2)",border:"1px solid var(--border)",width:"fit-content",minWidth:52}}>
                    {[0,1,2].map(i=>(
                      <div key={i} style={{width:6,height:6,borderRadius:"50%",background:"var(--text3)",animation:`typingBounce .9s ease-in-out ${i*0.18}s infinite`}}/>
                    ))}
                  </div>
                )}
                <div ref={msgsEndRef}/>
              </div>

              {/* Input */}
              <div style={{padding:"10px 14px 12px",borderTop:"1px solid var(--border)",display:"flex",gap:9,alignItems:"flex-end",flexShrink:0}}>
                <textarea
                  value={msgInput}
                  onChange={e=>setMsgInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}}
                  placeholder={`Message ${activeThread.name}…`}
                  rows={1}
                  style={{flex:1,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:12,padding:"9px 13px",fontSize:"13px",color:"var(--text)",resize:"none",outline:"none",fontFamily:"DM Sans,sans-serif",lineHeight:1.55,maxHeight:112,overflowY:"auto",transition:"border-color .15s"}}
                  onFocus={e=>e.target.style.borderColor="var(--accent)"}
                  onBlur={e=>e.target.style.borderColor="var(--border)"}

                <button onClick={sendMsg} disabled={!msgInput.trim()}

                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                    <path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z" stroke={msgInput.trim()?"white":"var(--text3)"} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </button>
              </div>
            </div>
          ):(
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8,color:"var(--text3)"}}>
              <div style={{fontSize:"32px"}}></div>
              <div style={{fontSize:"13px",fontWeight:600,color:"var(--text2)"}}>Select a conversation</div>
              <div style={{fontSize:"12px"}}>or start a new one</div>
            </div>
          )}
        </div>
      )}

      {/* ── New Conversation modal ── */}
      {newModal&&(
        <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"rgba(4,6,15,.82)",backdropFilter:"blur(10px)"}} onClick={()=>setNewModal(false)}>
          <div style={{background:"var(--surface)",borderRadius:20,padding:"28px 28px 22px",width:"100%",maxWidth:400,boxShadow:"var(--shadow-lg)",animation:"modalIn .3s cubic-bezier(.16,1,.3,1) both"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontFamily:"DM Serif Display,serif",fontSize:"19px",fontWeight:400,letterSpacing:"-.2px",marginBottom:4}}>New Conversation</div>
            <div style={{fontSize:"13px",color:"var(--text2)",marginBottom:20}}>Enter a brand name or email address to start a new thread.</div>
            <div className="fg" style={{marginBottom:18}}>
              <label className="fl">Brand name or email</label>
              <input className="fi" autoFocus value={newTarget} onChange={e=>setNewTarget(e.target.value)} onKeyDown={e=>e.key==="Enter"&&startConversation()} placeholder="e.g. Nike or contact@nike.com"/>
            </div>
            <div style={{display:"flex",gap:9}}>
              <button onClick={startConversation} disabled={!newTarget.trim()} className="btn btn-primary btn-lg" style={{flex:1,opacity:newTarget.trim()?1:.45}}>Start Conversation</button>
              <button onClick={()=>{setNewModal(false);setNewTarget("");}} className="btn btn-secondary btn-lg">Cancel</button>

          </div>
        </div>
      )}
    </div>
  );

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
function NotificationsPage({setPage,authUser,demoMode}) {
  const loading = useSkeleton();
  const [notifs,setNotifs] = useState([]);
  const [filter,setFilter] = useState("All");

  // Load real notifications from Supabase (or demo data)
  useEffect(()=>{
    if(!authUser) return;
    if(demoMode) { setNotifs(DEMO_NOTIFICATIONS); return; }
    supabase.from("inbox_notifications").select("*").eq("user_id",authUser.id).order("created_at",{ascending:false}).limit(50)
      .then(({data})=>{ if(data) setNotifs(data); });
  },[authUser,demoMode]);

  const typeColors = {
    payment_held:"var(--teal)",payment_failed:"var(--red)",payment_released:"var(--green)",
    payout_received:"var(--green)",deal_disputed:"var(--red)",
    brief_submitted:"var(--accent)",contract_sent:"var(--accent)",contract_signed:"var(--green)",
    content_submitted:"var(--accent)",new_message:"var(--text2)",
  };

  const markRead = async (id) => {
    setNotifs(ns=>ns.map(n=>n.id===id?{...n,read_at:new Date().toISOString()}:n));
    await supabase.from("inbox_notifications").update({read_at:new Date().toISOString()}).eq("id",id);
  };

  const markAllRead = async () => {
    const unreadIds = notifs.filter(n=>!n.read_at).map(n=>n.id);
    setNotifs(ns=>ns.map(n=>({...n,read_at:n.read_at||new Date().toISOString()})));
    for(const id of unreadIds) await supabase.from("inbox_notifications").update({read_at:new Date().toISOString()}).eq("id",id);
  };

  const filtered = filter==="All"?notifs:filter==="Unread"?notifs.filter(n=>!n.read_at):notifs.filter(n=>n.read_at);
  const unreadCount = notifs.filter(n=>!n.read_at).length;

  if(loading) return <SkeletonPage layout="list"/>;
  return (
    <div className="fade-in">
      <div className="ph-row">
        <div>
          <div style={{display:"flex",gap:9,alignItems:"center"}}><div className="page-title">Notifications</div>{unreadCount>0&&<span className="badge badge-green">{unreadCount} new</span>}</div>
          <div className="page-subtitle">Stay on top of your deals and activity.</div>
        </div>
        {unreadCount>0&&<button className="btn btn-secondary btn-sm" onClick={markAllRead}>Mark all read</button>}
      </div>
      <div style={{display:"flex",gap:7,marginBottom:18}}>
        {["All","Unread","Read"].map(x=><button key={x} className={"filter-btn"+(filter===x?" active":"")} onClick={()=>setFilter(x)}>{x}</button>)}
      </div>
      {filtered.length===0?(
        <div className="card" style={{padding:"40px 20px",textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>No notifications yet</div>
          <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.65}}>When deals are updated, content is submitted, or payments come through — you'll see them here.</div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtered.map(n=>{
            const color = typeColors[n.type]||"var(--accent)";
            const isUnread = !n.read_at;
            const msg = n.payload?.message || n.type.replace(/_/g," ");
            const time = n.created_at ? dealRelTime(new Date(n.created_at)) : "";
            return (
              <div key={n.id} onClick={()=>{if(isUnread)markRead(n.id);setPage("deal-room");}} className="card card-hover" style={{padding:"14px 18px",display:"flex",gap:12,alignItems:"flex-start",opacity:isUnread?1:.6,cursor:"pointer",borderLeft:"3px solid "+(isUnread?color:"var(--border)")}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:isUnread?color:"transparent",flexShrink:0,marginTop:6}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontSize:13,fontWeight:isUnread?600:400,textTransform:"capitalize"}}>{n.type.replace(/_/g," ")}</span>
                    <span style={{fontSize:11,color:"var(--text3)",flexShrink:0}}>{time}</span>
                  </div>
                  <div style={{fontSize:12,color:"var(--text2)",lineHeight:1.5}}>{msg}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

  const [notifEmails,setNotifEmails] = useState([]);

  useEffect(()=>{
    if(!authUser || role!=="brand") return;
    supabase.from("brand_profiles").select("notification_emails").eq("user_id",authUser.id).maybeSingle()
      .then(({data})=>{ if(data?.notification_emails) setNotifEmails(data.notification_emails); });
  },[authUser]);

  const addNotifEmail = async () => {
    const email = newNotifEmail.trim().toLowerCase();
    if(!email || !email.includes("@")) return;
    if(notifEmails.includes(email)) { setNewNotifEmail(""); return; }
    setNotifEmailSaving(true);
    const updated = [...notifEmails, email];
    await supabase.from("brand_profiles").upsert({user_id:authUser.id, notification_emails:updated},{onConflict:"user_id"});
    setNotifEmails(updated);
    setNewNotifEmail("");
    setNotifEmailSaving(false);

    setNotifEmails(updated);

// ─── CARD TILT ────────────────────────────────────────────────────────────────
function useTiltEffect() {
  useEffect(()=>{
    const MAX = 6;
    let active = null;

    // Walk up from event target until we hit a card-hover or the body
    const nearest = el => {
      while(el && el !== document.body) {
        if(el.classList?.contains('card-hover')) return el;
        el = el.parentElement;
      }
      return null;
    };

    const tilt = (card, e) => {
      const r  = card.getBoundingClientRect();
      const x  = (e.clientX - r.left)  / r.width;   // 0 → 1 left→right
      const y  = (e.clientY - r.top)   / r.height;  // 0 → 1 top→bottom
      const rx = ((0.5 - y) * MAX * 2).toFixed(2);  // positive = top tilts toward viewer
      const ry = ((x - 0.5) * MAX * 2).toFixed(2);  // positive = right tilts toward viewer
      // Fast response while moving, slow spring on release (handled via CSS transition swap)
      card.style.transition =
        'box-shadow .22s, transform .08s linear, border-color .22s';
      card.style.setProperty('--rx', rx  + 'deg');
      card.style.setProperty('--ry', ry  + 'deg');
      card.style.setProperty('--tz', '10px');
      card.style.setProperty('--sx', (x * 100).toFixed(1) + '%');
      card.style.setProperty('--sy', (y * 100).toFixed(1) + '%');
      card.style.setProperty('--so', '1');
    };

    const reset = card => {
      // Restore CSS-class transition so the spring-back is smooth
      card.style.transition = '';
      card.style.setProperty('--rx', '0deg');
      card.style.setProperty('--ry', '0deg');
      card.style.setProperty('--tz', '0px');
      card.style.setProperty('--so', '0');
    };

    const onMove = e => {
      const card = nearest(e.target);
      if(!card) {
        if(active){ reset(active); active = null; }
        return;
      }
      if(active && active !== card) reset(active);
      active = card;
      tilt(card, e);
    };

    // Reset if pointer leaves the browser window entirely
    const onDocLeave = e => {
      if(!e.relatedTarget && active){ reset(active); active = null; }
    };

    document.addEventListener('mousemove',  onMove,     {passive:true});
    document.addEventListener('mouseleave', onDocLeave);
    return ()=>{
      document.removeEventListener('mousemove',  onMove);
      document.removeEventListener('mouseleave', onDocLeave);
      if(active) reset(active);
    };
  },[]);
}

function TiltEffect() { useTiltEffect(); return null; }

// ─── PARTICLE CANVAS ──────────────────────────────────────────────────────────
function ParticleCanvas() {
  const ref = useRef(null);
  useEffect(()=>{
    const canvas = ref.current;
    const ctx = canvas.getContext("2d");
    let W, H;

    const resize = () => {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    };
    resize();
    window.addEventListener("resize", resize);

    const mouse = {x:-9999, y:-9999};
    const onMove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
    window.addEventListener("mousemove", onMove, {passive:true});

    const COLS = ["rgba(91,138,245,0.4)","rgba(167,139,250,0.3)"];
    const COUNT = 60;
    const particles = Array.from({length:COUNT}, ()=>({
      x:  Math.random() * window.innerWidth,
      y:  Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
      r:  1 + Math.random(),
      col: COLS[Math.random() < 0.5 ? 0 : 1]
    }));

    let raf;
    const REPEL  = 120;
    const CONNECT = 100;

    const tick = () => {
      ctx.clearRect(0, 0, W, H);

      // ── update ──────────────────────────────────────────────────────────────
      for(const p of particles) {
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if(d < REPEL && d > 0) {
          const f = (1 - d / REPEL) * 0.22;
          p.vx += (dx / d) * f;
          p.vy += (dy / d) * f;
        }
        p.vx *= 0.97;
        p.vy *= 0.97;
        const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
        if(spd > 1.5) { p.vx = p.vx/spd*1.5; p.vy = p.vy/spd*1.5; }
        p.x = (p.x + p.vx + W) % W;
        p.y = (p.y + p.vy + H) % H;
      }

      // ── connection lines ─────────────────────────────────────────────────────
      ctx.lineWidth = 0.5;
      for(let i = 0; i < COUNT; i++) {
        const a = particles[i];
        for(let j = i + 1; j < COUNT; j++) {
          const b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if(d < CONNECT) {
            ctx.strokeStyle = `rgba(91,138,245,${((1 - d/CONNECT) * 0.12).toFixed(3)})`;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      // ── dots ─────────────────────────────────────────────────────────────────
      for(const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.col;
        ctx.fill();
      }

      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);

    return ()=>{
      cancelAnimationFrame(raf);
      window.removeEventListener("resize", resize);
      window.removeEventListener("mousemove", onMove);
    };
  }, []);

  return <canvas ref={ref} style={{position:"fixed",top:0,left:0,pointerEvents:"none",zIndex:-1}}/>;
}

// ─── CURSOR GLOW ──────────────────────────────────────────────────────────────
function CursorGlow() {
  const ref = useRef(null);
  useEffect(()=>{
    const el = ref.current;
    if(!el) return;
    const onMove = e => {
      el.style.transform = `translate(${e.clientX-150}px,${e.clientY-150}px)`;
    };
    window.addEventListener("mousemove", onMove, {passive:true});
    return () => window.removeEventListener("mousemove", onMove);
  }, []);
  return <div ref={ref} className="cursor-glow"/>;
}

// Scroll-reveal: fades in + slides up when element enters viewport
function useReveal(threshold=0.15) {
  const ref = useRef(null);
  const [visible,setVisible] = useState(false);
  useEffect(()=>{
    const el = ref.current;
    if(!el) return;
    const obs = new IntersectionObserver(([e])=>{if(e.isIntersecting){setVisible(true);obs.disconnect();}},{threshold});
    obs.observe(el);
    return ()=>obs.disconnect();
  },[]);
  return [ref,visible];
}
function Reveal({children,delay=0,style={}}) {
  const [ref,visible] = useReveal();
  return React.createElement("div",{ref,style:{...style,opacity:visible?1:0,transform:visible?"translateY(0)":"translateY(24px)",transition:`opacity .6s ease ${delay}s, transform .6s ease ${delay}s`}},children);
}
// Animated counter: counts up from 0 to target when visible
function AnimCounter({value,prefix="",suffix="",duration=1500}) {
  const [ref,visible] = useReveal(0.3);
  const [count,setCount] = useState(0);
  const numericVal = parseInt(String(value).replace(/[^0-9]/g,""))||0;
  useEffect(()=>{
    if(!visible) return;
    let start = 0;
    const step = numericVal / (duration/16);
    const timer = setInterval(()=>{
      start += step;
      if(start >= numericVal) { setCount(numericVal); clearInterval(timer); }
      else setCount(Math.floor(start));
    },16);
    return ()=>clearInterval(timer);
  },[visible]);
  return React.createElement("span",{ref},prefix+count.toLocaleString()+suffix);
}

function AuthScreen({onAuth,defaultMode,onBack}) {
  const [mode,setMode] = useState(defaultMode||"login");
  const [form,setForm] = useState({email:"",password:"",name:"",role:"creator",brands:""});
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState("");
  const [success,setSuccess] = useState("");
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));

  const handleLogin=async()=>{
    setError("");setLoading(true);
    const {data,error:e}=await supabase.auth.signInWithPassword({email:form.email,password:form.password});
    setLoading(false);
    if(e){setError(e.message);return;}
    onAuth(data.user);
  };

  const handleSignup=async()=>{
    setError("");setSuccess("");
    if(!form.name.trim()){setError(form.role==="brand"?"Please enter your company name.":form.role==="agency"?"Please enter your agency name.":"Please enter your name.");return;}
    if(form.password.length<6){setError("Password must be at least 6 characters.");return;}
    setLoading(true);
    const {data,error:e}=await supabase.auth.signUp({
      email:form.email,password:form.password,
      options:{data:form.role==="brand"?{company_name:form.name,role:"brand"}:form.role==="agency"?{company_name:form.name,role:"agency",...(form.brands.trim()?{brands_managed:form.brands.trim()}:{})}:{full_name:form.name,role:"creator"}}
    });
    setLoading(false);
    if(e){setError(e.message);return;}
    if(data.user&&data.user.identities&&data.user.identities.length===0){
      setError("An account with this email already exists. Please log in.");return;
    }
    setSuccess("Account created! Check your email to confirm your account, then log in.");
    setMode("login");
  };

  const handleReset=async()=>{
    setError("");setSuccess("");setLoading(true);
    const {error:e}=await supabase.auth.resetPasswordForEmail(form.email,{redirectTo:"https://bridgn.com"});
    setLoading(false);
    if(e){setError(e.message);return;}
    setSuccess("Password reset email sent. Check your inbox.");
  };

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:440,animation:"fadeIn .3s ease"}}>
        {onBack&&<button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--text2)",fontFamily:"DM Sans,sans-serif",marginBottom:20,display:"flex",alignItems:"center",gap:6}}>← Back to home</button>}
        <div style={{textAlign:"center",marginBottom:32}}>
          <img src="assets/logo-auth.svg" alt="bridgn" style={{height:64,marginBottom:8}}/>
          <div style={{fontSize:13,color:"var(--text3)"}}>The creator &amp; brand partnership platform</div>
        </div>
        <div className="card-lg" style={{padding:36,boxShadow:"var(--shadow-lg)"}}>
          {mode==="login"&&(
            <>
              <div style={{fontFamily:"DM Serif Display,serif",fontSize:26,fontWeight:400,marginBottom:6,letterSpacing:"-.3px"}}>Welcome back</div>
              <div style={{fontSize:13,color:"var(--text2)",marginBottom:24}}>Sign in to your bridgn account</div>
              {error&&<div style={{padding:"10px 14px",background:"var(--red-bg)",border:"1px solid rgba(248,113,113,.3)",borderRadius:"var(--radius-sm)",fontSize:13,color:"var(--red)",marginBottom:16}}>{error}</div>}
              {success&&<div style={{padding:"10px 14px",background:"var(--green-bg)",border:"1px solid rgba(52,211,153,.3)",borderRadius:"var(--radius-sm)",fontSize:13,color:"var(--green)",marginBottom:16}}>{success}</div>}
              <div className="fg"><label className="fl" htmlFor="login-email">Email</label><input className="fi" id="login-email" name="email" type="email" autoComplete="email" value={form.email} onChange={e=>up("email",e.target.value)} placeholder="you@example.com" onKeyDown={e=>e.key==="Enter"&&handleLogin()}/></div>
              <div className="fg"><label className="fl" htmlFor="login-password">Password</label><input className="fi" id="login-password" name="password" type="password" autoComplete="current-password" value={form.password} onChange={e=>up("password",e.target.value)} placeholder="Your password" onKeyDown={e=>e.key==="Enter"&&handleLogin()}/></div>
              <div style={{textAlign:"right",marginTop:-8,marginBottom:20}}><button onClick={()=>{setMode("reset");setError("");setSuccess("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--accent)",fontFamily:"DM Sans,sans-serif"}}>Forgot password?</button></div>
              <button onClick={handleLogin} disabled={loading||!form.email||!form.password} className="btn btn-primary btn-lg" style={{width:"100%",opacity:loading||!form.email||!form.password?.6:1}}>
                {loading?<span style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}><span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>⟳</span>Signing in...</span>:"Sign In"}
              </button>
              <div style={{textAlign:"center",marginTop:20,fontSize:13,color:"var(--text2)"}}>No account?<button onClick={()=>{setMode("signup");setError("");setSuccess("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--accent)",fontFamily:"DM Sans,sans-serif",marginLeft:6}}>Create one free</button></div>
            </>
          )}
          {mode==="signup"&&(
            <>
              <div style={{fontFamily:"DM Serif Display,serif",fontSize:26,fontWeight:400,marginBottom:6,letterSpacing:"-.3px"}}>Create your account</div>
              <div style={{fontSize:13,color:"var(--text2)",marginBottom:24}}>Join bridgn free — no credit card needed</div>
              {error&&<div style={{padding:"10px 14px",background:"var(--red-bg)",border:"1px solid rgba(248,113,113,.3)",borderRadius:"var(--radius-sm)",fontSize:13,color:"var(--red)",marginBottom:16}}>{error}</div>}
