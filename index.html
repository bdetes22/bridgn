  const [modal,setModal] = useState(false);const [step,setStep] = useState(1);const [form,setForm] = useState({title:"",platform:"Instagram",budget:"",type:"Paid",deadline:"",desc:"",deliverables:"",requirements:"",brief:""});const [briefTemplate,setBriefTemplate] = useState(null);const [created,setCreated] = useState(false);
  const [replyText,setReplyText] = useState({});  // keyed by question id
  const [replyOpen,setReplyOpen] = useState({});  // keyed by question id
  const [qExpanded,setQExpanded] = useState({});  // keyed by campaign id
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));

  // Flatten all questions across all campaigns for the brand inbox
  const allQuestions = Object.entries(campaignQuestions).flatMap(([cid,qs])=>
    qs.map(q=>({...q, campaignId: Number(cid), campaignTitle: CAMPAIGNS.find(c=>c.id===Number(cid))?.title||"Campaign #"+cid}))
  ).sort((a,b)=>b.id-a.id);

  const sendReply = (q) => {
    const text = (replyText[q.id]||"").trim();

      ...prev,

    setReplyText(r=>({...r,[q.id]:""}));

      {allQuestions.length>0&&(
        <div className="card-lg" style={{padding:0,overflow:"hidden",marginBottom:20}}>

          </div>
          <div style={{display:"flex",flexDirection:"column"}}>

              <div key={q.id} style={{padding:"14px 20px",borderBottom:i<allQuestions.length-1?"1px solid var(--border)":"none"}}>
                <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,var(--accent),var(--accent2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:800,color:"white",flexShrink:0}}>
                    {(q.creatorName||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{fontSize:"13px",fontWeight:600}}>{q.creatorName}</span>
                      <span style={{fontSize:"11px",padding:"1px 7px",borderRadius:99,background:"var(--surface2)",color:"var(--text3)",border:"1px solid var(--border)"}}>{q.campaignTitle}</span>
                      <span style={{fontSize:"10px",color:"var(--text3)",marginLeft:"auto"}}>{q.ts}</span>
                    </div>
                    <div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.55,marginBottom:8}}>{q.text}</div>
                    {q.reply?(
                      <div style={{padding:"8px 12px",background:"rgba(52,211,153,.06)",border:"1px solid rgba(52,211,153,.2)",borderRadius:"var(--radius-sm)",fontSize:"12px",color:"var(--text2)",lineHeight:1.5}}>
                        <span style={{fontWeight:700,color:"var(--green)"}}>✓ Replied: </span>{q.reply}

                      replyOpen[q.id]?(
                        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                          <textarea
                            className="fta"

                {step===1?<button onClick={()=>setStep(2)} disabled={!form.title} className="btn btn-primary btn-lg" style={{flex:1,opacity:form.title?1:.5}}>Continue</button>:<button onClick={()=>setCreated(true)} className="btn btn-primary btn-lg" style={{flex:1}}>Launch Campaign</button>}
                {step===2&&<button onClick={()=>setStep(1)} className="btn btn-secondary btn-lg">Back</button>}
              </div>
            </div>
          )}
        </Modal>
      )}
    </div>
  );
}

// ─── BRAND DEALS ──────────────────────────────────────────────────────────────
function BrandDealsPage({setPage,setSelected}) {
  const loading = useSkeleton();
  const [view,setView] = useState("table");
  const [f,setF] = useState("All");
  const [deals,setDeals] = useState([]);
  const statusToCol = s => s==="Pending"?"invited":s==="Active"?"inProgress":s==="Completed"?"completed":"invited";
  const [colMap,setColMap] = useState({});
  const [dragging,setDragging] = useState(null);
  const [dragOver,setDragOver] = useState(null);
  const [dropAnim,setDropAnim] = useState(null);

  const COLS = [
    {key:"invited",    label:"Invited",     color:"#a78bfa", bg:"rgba(167,139,250,.09)"},
    {key:"inProgress", label:"In Progress", color:"#5b8af5", bg:"rgba(91,138,245,.09)"},
    {key:"inReview",   label:"In Review",   color:"#f0a050", bg:"rgba(240,160,80,.09)"},
    {key:"completed",  label:"Completed",   color:"#34d399", bg:"rgba(52,211,153,.09)"},
  ];

  const handleDrop = colKey => {
    if(!dragging) return;
    setColMap(m=>({...m,[dragging]:colKey}));
    setDropAnim(dragging);
    setTimeout(()=>setDropAnim(null),450);
    setDragging(null);
    setDragOver(null);
  };

  const list = f==="All"?deals:deals.filter(d=>d.status===f);
  if(loading) return <SkeletonPage layout="list"/>;

  return (
    <div className="fade-in">
      <div className="ph-row">
        <div><div className="page-title">Deals Manager</div><div className="page-subtitle">All active and past creator partnerships.</div></div>
        <div style={{display:"flex",gap:7}}>
          {[["table","≡ Table"],["kanban","⊞ Kanban"]].map(([v,l])=>(
            <button key={v} className={"filter-btn"+(view===v?" active":"")} onClick={()=>setView(v)}>{l}</button>
          ))}
        </div>
      </div>

      {view==="table"&&(
        <>
          <div style={{display:"flex",gap:8,marginBottom:18}}>
            {["All","Active","Pending","Completed"].map(x=><button key={x} className={"filter-btn"+(f===x?" active":"")} onClick={()=>setF(x)}>{x}</button>)}
          </div>
          <div className="card-lg" style={{overflow:"hidden"}}>
            <table className="tbl">
              <thead><tr><th>Creator</th><th>Campaign</th><th>Platform</th><th>Amount</th><th>Source</th><th>Escrow</th><th>Status</th><th></th></tr></thead>
              <tbody>
                {list.length===0?(
                  <tr><td colSpan={8} style={{textAlign:"center",padding:"40px 20px"}}><EmptySVG type="branddeals" size={110}/><div style={{fontSize:"13px",fontWeight:600,color:"var(--text2)",marginTop:4}}>No deals yet — launch a campaign and invite creators to get started.</div></td></tr>
                ):list.map(d=>(
                  <tr key={d.id} style={{cursor:"pointer"}} onClick={()=>setPage("deal-room")}>
                    <td><div style={{display:"flex",gap:9,alignItems:"center"}}><div style={{width:28,height:28,borderRadius:"50%",background:bc(d.ci),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:700,color:"white",flexShrink:0}}>{d.ci2}</div><span style={{fontWeight:500}}>{d.creator}</span></div></td>
                    <td style={{color:"var(--text2)"}}>{d.campaign}</td>
                    <td><PlatformBadge p={d.platform}/></td>
                    <td style={{fontWeight:700,fontFamily:"Syne,sans-serif"}}>${d.amount.toLocaleString()}</td>
                    <td>{d.source==="external"?<ExtBadge/>:<span className="badge badge-blue" style={{fontSize:"11px"}}>bridgn</span>}</td>
                    <td>{d.escrow?<EscrowBadge released={false}/>:<span style={{fontSize:"11px",color:"var(--text3)"}}>—</span>}</td>
                    <td><StatusBadge s={d.status}/></td>
                    <td>
                      {d.status==="Active"?(
                        <button onClick={e=>{e.stopPropagation();setPage("deal-room");}} className="btn btn-primary btn-sm">Deal Room</button>
                      ):<button onClick={e=>{e.stopPropagation();}} className="btn btn-secondary btn-sm">View</button>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      {view==="kanban"&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,alignItems:"start"}}>
          {COLS.map(col=>{
            const colDeals = deals.filter(d=>colMap[d.id]===col.key);
            const isOver = dragOver===col.key;
            const isDraggingHere = isOver && dragging && !colDeals.find(d=>d.id===dragging);
            return (
              <div
                key={col.key}
                onDragOver={e=>{e.preventDefault();setDragOver(col.key);}}
                onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDragOver(null);}}
                onDrop={()=>handleDrop(col.key)}
                style={{
                  background:isOver?col.bg:"var(--surface)",
                  border:"1px solid "+(isOver?col.color+"55":"var(--border)"),
                  borderRadius:"var(--radius-lg)",
                  padding:"14px 11px 16px",
                  minHeight:300,
                  transition:"background 180ms,border-color 180ms,box-shadow 180ms",
                  boxShadow:isOver?"0 0 0 2px "+col.color+"28,var(--shadow)":"none",
                }}
              >
                {/* Column header */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:13,padding:"0 3px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:7,height:7,borderRadius:"50%",background:col.color,boxShadow:"0 0 7px "+col.color+"99",flexShrink:0}}/>
                    <span style={{fontSize:"12px",fontWeight:700,letterSpacing:".01em"}}>{col.label}</span>
                  </div>
                  <span style={{fontSize:"11px",fontWeight:700,color:col.color,background:col.bg,border:"1px solid "+col.color+"33",borderRadius:99,padding:"1px 9px"}}>{colDeals.length}</span>
                </div>

                {/* Drop target placeholder */}
                {isDraggingHere&&(
                  <div style={{height:68,border:"2px dashed "+col.color+"55",borderRadius:"var(--radius-sm)",marginBottom:9,display:"flex",alignItems:"center",justifyContent:"center",background:col.bg,transition:"all 150ms"}}>
                    <span style={{fontSize:"11px",color:col.color,fontWeight:600,opacity:.75}}>Drop here</span>
                  </div>
                )}

                {/* Cards */}
                <div style={{display:"flex",flexDirection:"column",gap:9}}>
                  {colDeals.map(d=>{
                    const isBeingDragged = dragging===d.id;
                    const isDropping = dropAnim===d.id;
                    return (
                      <div
                        key={d.id}
                        draggable
                        onDragStart={e=>{setDragging(d.id);e.dataTransfer.effectAllowed="move";}}
                        onDragEnd={()=>{setDragging(null);setDragOver(null);}}
                        onClick={()=>!dragging&&setPage("deal-room")}
                        style={{
                          background:"var(--surface2)",
                          border:"1px solid "+(isBeingDragged?col.color+"66":"var(--border)"),
                          borderRadius:"var(--radius)",
                          padding:"13px 13px 11px",
                          cursor:isBeingDragged?"grabbing":"grab",
                          opacity:isBeingDragged?0.35:1,
                          transform:isBeingDragged?"rotate(1.8deg) scale(1.03)":"none",
                          transition:"opacity 160ms,transform 160ms,box-shadow 180ms,border-color 160ms",
                          boxShadow:isBeingDragged?"var(--shadow-lg)":"var(--shadow-sm)",
                          animation:isDropping?"cardDrop 420ms cubic-bezier(.16,1,.3,1) both":"none",
                          userSelect:"none",
                          position:"relative",
                        }}
                      >
                        {/* 2×2 drag-handle dots */}
                        <div style={{position:"absolute",top:9,right:10,display:"flex",flexDirection:"column",gap:2.5,opacity:.2,pointerEvents:"none"}}>
                          {[0,1].map(r=>(
                            <div key={r} style={{display:"flex",gap:2.5}}>
                              {[0,1].map(c=><div key={c} style={{width:3,height:3,borderRadius:"50%",background:"var(--text)"}}/>)}
                            </div>
                          ))}
                        </div>

                        {/* Creator row */}
                        <div style={{display:"flex",gap:9,alignItems:"center",marginBottom:10}}>
                          <div style={{width:32,height:32,borderRadius:"50%",background:bc(d.ci),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:700,color:"white",flexShrink:0}}>{d.ci2}</div>
                          <div style={{minWidth:0,flex:1}}>
                            <div style={{fontSize:"13px",fontWeight:700,lineHeight:1.2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.creator}</div>
                            <div style={{fontSize:"11px",color:"var(--text3)",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.campaign}</div>
                          </div>
                        </div>

                        {/* Amount + platform */}
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                          <span style={{fontSize:"16px",fontWeight:800,fontFamily:"Syne,sans-serif"}}>${d.amount.toLocaleString()}</span>
                          <PlatformBadge p={d.platform}/>
                        </div>

                        {/* Badges */}
                        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                          {d.escrow&&<EscrowBadge released={false}/>}
                          {d.source==="external"?<ExtBadge/>:<span className="badge badge-blue" style={{fontSize:"10px"}}>bridgn</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Empty column state */}
                {colDeals.length===0&&!isDraggingHere&&(
                  <div style={{height:90,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:5,opacity:.28}}>
                    <div style={{fontSize:18,letterSpacing:6}}>· · ·</div>
                    <div style={{fontSize:"11px",fontWeight:500,color:"var(--text3)"}}>Empty</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── MESSAGES ─────────────────────────────────────────────────────────────────
function MessagesPage({setPage}) {
  const loading = useSkeleton();
  const [threads,setThreads] = useState([]);
  const [activeId,setActiveId] = useState(null);
  const [msgInput,setMsgInput] = useState("");
  const [newModal,setNewModal] = useState(false);
  const [newTarget,setNewTarget] = useState("");
  const [tick,setTick] = useState(0);
  const msgsEndRef = useRef(null);

  // Refresh relative timestamps every 30s
  useEffect(()=>{
    const id = setInterval(()=>setTick(t=>t+1),30000);
    return ()=>clearInterval(id);
  },[]);

  // Scroll to bottom when active thread's messages change
  useEffect(()=>{
    msgsEndRef.current?.scrollIntoView({behavior:"smooth"});
  },[activeId, threads.find(t=>t.id===activeId)?.msgs.length]);

  const relTime = ts => {
    const diff = Date.now()-ts;
    const s = Math.floor(diff/1000);
    const m = Math.floor(s/60);
    const h = Math.floor(m/60);
    const d = Math.floor(h/24);
    if(s<10) return "Just now";
    if(s<60) return s+"s ago";
    if(m<2) return "1 minute ago";
    if(m<60) return m+" minutes ago";
    if(h<2) return "1 hour ago";
    if(h<24) return h+" hours ago";
    if(d===1) return "Yesterday";
    if(d<7) return d+" days ago";
    return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric"});
  };

  const activeThread = threads.find(t=>t.id===activeId);

  const startConversation = () => {
    const name = newTarget.trim();
    if(!name) return;
    const isEmail = name.includes("@");
    const initials = isEmail
      ? name.split("@")[0].slice(0,2).toUpperCase()
      : name.split(" ").filter(Boolean).map(w=>w[0]).join("").slice(0,2).toUpperCase();
    const id = Date.now();
    const thread = {id,name,initials,ci:threads.length%6,lastMsg:"",ts:Date.now(),msgs:[],unread:0};
    setThreads(t=>[thread,...t]);
    setActiveId(id);
    setNewTarget("");
    setNewModal(false);
  };

  const sendMsg = () => {
    const text = msgInput.trim();
    if(!text||!activeId) return;
    const msg = {id:Date.now(),from:"me",text,ts:Date.now()};
    setThreads(t=>t.map(th=>th.id===activeId
      ?{...th,msgs:[...th.msgs,msg],lastMsg:text,ts:Date.now()}
      :th
    ));
    setMsgInput("");
  };

  if(loading) return <SkeletonPage layout="simple"/>;
  return (
    <div className="fade-in">
      <div className="ph-row">
        <div>
          <div className="page-title">Messages</div>
          <div className="page-subtitle">Direct conversations with brands and partners.</div>
        </div>
        <button className="btn btn-primary" onClick={()=>setNewModal(true)}>+ New Conversation</button>
      </div>

      {threads.length===0?(
        <div className="card" style={{padding:"56px 24px",textAlign:"center",maxWidth:480,margin:"0 auto"}}>
          <EmptySVG type="messages" size={136}/>
          <div style={{fontSize:"16px",fontWeight:700,marginBottom:10}}>No conversations yet</div>
          <div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.75,marginBottom:24}}>
            Start a direct conversation with a brand or partner. Messages from the Deal Room will also appear here.
          </div>
          <button className="btn btn-primary" onClick={()=>setNewModal(true)}>+ New Conversation</button>
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"290px 1fr",height:"calc(100vh - 196px)",minHeight:440,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>

          {/* ── Thread list ── */}
          <div style={{borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"10px 12px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
              <input placeholder="Search conversations…" style={{width:"100%",boxSizing:"border-box",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"7px 11px",fontSize:"12px",color:"var(--text)",outline:"none",fontFamily:"Space Grotesk,sans-serif"}}/>
            </div>
            <div style={{flex:1,overflowY:"auto"}}>
              {threads.map(t=>{
                const isAct = t.id===activeId;
                return (
                  <div key={t.id} onClick={()=>setActiveId(t.id)}
                    style={{padding:"11px 13px",display:"flex",gap:10,alignItems:"flex-start",cursor:"pointer",borderBottom:"1px solid var(--border)",background:isAct?"var(--accent-light)":"transparent",transition:"background .1s",position:"relative"}}
                    onMouseEnter={e=>{if(!isAct)e.currentTarget.style.background="var(--surface2)";}}
                    onMouseLeave={e=>{if(!isAct)e.currentTarget.style.background="transparent";}}>
                    {isAct&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:"var(--accent)",borderRadius:"0 2px 2px 0"}}/>}
                    <div style={{width:38,height:38,borderRadius:11,background:bc(t.ci),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:700,color:"white",flexShrink:0}}>{t.initials}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:2}}>
                        <span style={{fontSize:"13px",fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:130}}>{t.name}</span>
                        <span style={{fontSize:"10px",color:"var(--text3)",flexShrink:0,marginLeft:6}}>{relTime(t.ts)}</span>
                      </div>
                      <div style={{fontSize:"11px",color:"var(--text3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.lastMsg||"No messages yet"}</div>
                    </div>
                    {t.unread>0&&<div style={{width:18,height:18,borderRadius:"50%",background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:700,color:"white",flexShrink:0,marginTop:2}}>{t.unread}</div>}
                  </div>
                );
              })}
            </div>
          </div>

          {/* ── Conversation ── */}
          {activeThread?(
            <div style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
              {/* Header */}
              <div style={{padding:"12px 18px",borderBottom:"1px solid var(--border)",display:"flex",gap:11,alignItems:"center",flexShrink:0}}>
                <div style={{width:36,height:36,borderRadius:10,background:bc(activeThread.ci),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:700,color:"white",flexShrink:0}}>{activeThread.initials}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:"14px",fontWeight:700,lineHeight:1.2}}>{activeThread.name}</div>
                  <div style={{fontSize:"11px",color:"var(--text3)",marginTop:1}}>Direct message</div>
                </div>
              </div>

              {/* Messages */}
              <div style={{flex:1,overflowY:"auto",padding:"18px 18px 10px",display:"flex",flexDirection:"column",gap:10}}>
                {activeThread.msgs.length===0&&(
                  <div style={{margin:"auto",textAlign:"center",color:"var(--text3)",fontSize:"13px",lineHeight:1.7}}>
                    <div style={{fontSize:"30px",marginBottom:8}}>👋</div>
                    <div style={{fontWeight:600,color:"var(--text2)",marginBottom:4}}>Start the conversation</div>
                    <div>This is the beginning of your thread with<br/><strong style={{color:"var(--text)"}}>{activeThread.name}</strong></div>
                  </div>
                )}
                {activeThread.msgs.map((m,i,arr)=>{
                  const isMe = m.from==="me";
                  // Show timestamp after last message or after a gap > 2 min
                  const showTime = i===arr.length-1||(arr[i+1]?.ts-m.ts)>120000;
                  return (
                    <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:isMe?"flex-end":"flex-start",gap:2}}>
                      <div style={{
                        maxWidth:"72%",padding:"9px 14px",
                        borderRadius:isMe?"16px 16px 4px 16px":"16px 16px 16px 4px",
                        background:isMe?"linear-gradient(135deg,var(--accent),#7c3aed)":"var(--surface2)",
                        border:isMe?"none":"1px solid var(--border)",
                        fontSize:"13px",lineHeight:1.55,color:isMe?"white":"var(--text)",
                        wordBreak:"break-word",
                        boxShadow:isMe?"0 2px 10px rgba(91,138,245,.3)":"none",
                      }}>{m.text}</div>
                      {showTime&&<span style={{fontSize:"10px",color:"var(--text3)"}}>{relTime(m.ts)}</span>}
                    </div>
                  );
                })}
                {/* Typing indicator — visible while composing */}
                {msgInput.length>0&&(
                  <div style={{display:"flex",alignItems:"center",gap:4,padding:"9px 13px",borderRadius:"16px 16px 16px 4px",background:"var(--surface2)",border:"1px solid var(--border)",width:"fit-content",minWidth:52}}>

                      <div key={i} style={{width:6,height:6,borderRadius:"50%",background:"var(--text3)",animation:`typingBounce .9s ease-in-out ${i*0.18}s infinite`}}/>
                    ))}
                  </div>
                )}
                <div ref={msgsEndRef}/>

// ─── CARD TILT ────────────────────────────────────────────────────────────────
function useTiltEffect() {
  useEffect(()=>{
    const MAX = 6;
    let active = null;

    // Walk up from event target until we hit a card-hover or the body
    const nearest = el => {
      while(el && el !== document.body) {
        if(el.classList?.contains('card-hover')) return el;
        el = el.parentElement;
      }
      return null;
    };

    const tilt = (card, e) => {
      const r  = card.getBoundingClientRect();
      const x  = (e.clientX - r.left)  / r.width;   // 0 → 1 left→right
      const y  = (e.clientY - r.top)   / r.height;  // 0 → 1 top→bottom
      const rx = ((0.5 - y) * MAX * 2).toFixed(2);  // positive = top tilts toward viewer
      const ry = ((x - 0.5) * MAX * 2).toFixed(2);  // positive = right tilts toward viewer
      // Fast response while moving, slow spring on release (handled via CSS transition swap)
      card.style.transition =
        'box-shadow .22s, transform .08s linear, border-color .22s';
      card.style.setProperty('--rx', rx  + 'deg');
      card.style.setProperty('--ry', ry  + 'deg');
      card.style.setProperty('--tz', '10px');
      card.style.setProperty('--sx', (x * 100).toFixed(1) + '%');
      card.style.setProperty('--sy', (y * 100).toFixed(1) + '%');
      card.style.setProperty('--so', '1');
    };

    const reset = card => {
      // Restore CSS-class transition so the spring-back is smooth
      card.style.transition = '';
      card.style.setProperty('--rx', '0deg');
      card.style.setProperty('--ry', '0deg');
      card.style.setProperty('--tz', '0px');
      card.style.setProperty('--so', '0');
    };

    const onMove = e => {
      const card = nearest(e.target);
      if(!card) {
        if(active){ reset(active); active = null; }
        return;
      }
      if(active && active !== card) reset(active);
      active = card;
      tilt(card, e);
    };

    // Reset if pointer leaves the browser window entirely
    const onDocLeave = e => {
      if(!e.relatedTarget && active){ reset(active); active = null; }
    };

    document.addEventListener('mousemove',  onMove,     {passive:true});
    document.addEventListener('mouseleave', onDocLeave);
    return ()=>{
      document.removeEventListener('mousemove',  onMove);
      document.removeEventListener('mouseleave', onDocLeave);
      if(active) reset(active);
    };
  },[]);
}

function TiltEffect() { useTiltEffect(); return null; }

// ─── PARTICLE CANVAS ──────────────────────────────────────────────────────────
function ParticleCanvas() {
  const ref = useRef(null);
  useEffect(()=>{
    const canvas = ref.current;
    const ctx = canvas.getContext("2d");
    let W, H;

    const resize = () => {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    };
    resize();
    window.addEventListener("resize", resize);

    const mouse = {x:-9999, y:-9999};
    const onMove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
    window.addEventListener("mousemove", onMove, {passive:true});

    const COLS = ["rgba(91,138,245,0.4)","rgba(167,139,250,0.3)"];
    const COUNT = 60;
    const particles = Array.from({length:COUNT}, ()=>({
      x:  Math.random() * window.innerWidth,
      y:  Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
      r:  1 + Math.random(),
      col: COLS[Math.random() < 0.5 ? 0 : 1]
    }));

    let raf;
    const REPEL  = 120;
    const CONNECT = 100;

    const tick = () => {
      ctx.clearRect(0, 0, W, H);

      // ── update ──────────────────────────────────────────────────────────────
      for(const p of particles) {
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if(d < REPEL && d > 0) {
          const f = (1 - d / REPEL) * 0.22;
          p.vx += (dx / d) * f;
          p.vy += (dy / d) * f;
        }
        p.vx *= 0.97;
        p.vy *= 0.97;
        const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
        if(spd > 1.5) { p.vx = p.vx/spd*1.5; p.vy = p.vy/spd*1.5; }
        p.x = (p.x + p.vx + W) % W;
        p.y = (p.y + p.vy + H) % H;
      }

      // ── connection lines ─────────────────────────────────────────────────────
      ctx.lineWidth = 0.5;
      for(let i = 0; i < COUNT; i++) {
        const a = particles[i];
        for(let j = i + 1; j < COUNT; j++) {
          const b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if(d < CONNECT) {
            ctx.strokeStyle = `rgba(91,138,245,${((1 - d/CONNECT) * 0.12).toFixed(3)})`;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      // ── dots ─────────────────────────────────────────────────────────────────
      for(const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.col;
        ctx.fill();
      }

      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);

    return ()=>{
      cancelAnimationFrame(raf);
      window.removeEventListener("resize", resize);
      window.removeEventListener("mousemove", onMove);
    };
  }, []);

  return <canvas ref={ref} style={{position:"fixed",top:0,left:0,pointerEvents:"none",zIndex:-1}}/>;
}

// ─── CURSOR GLOW ──────────────────────────────────────────────────────────────
function CursorGlow() {
  const ref = useRef(null);
  useEffect(()=>{
    const el = ref.current;
    if(!el) return;
    const onMove = e => {
      el.style.transform = `translate(${e.clientX-150}px,${e.clientY-150}px)`;
    };
    window.addEventListener("mousemove", onMove, {passive:true});
    return () => window.removeEventListener("mousemove", onMove);
  }, []);
  return <div ref={ref} className="cursor-glow"/>;
}

              <div style={{fontFamily:"Syne,sans-serif",fontSize:26,fontWeight:800,marginBottom:6,letterSpacing:"-.3px"}}>Reset your password</div>
              <div style={{fontSize:13,color:"var(--text2)",marginBottom:24}}>Enter your email and we will send a reset link.</div>
              {error&&<div style={{padding:"10px 14px",background:"var(--red-bg)",border:"1px solid rgba(248,113,113,.3)",borderRadius:"var(--radius-sm)",fontSize:13,color:"var(--red)",marginBottom:16}}>{error}</div>}
              {success&&<div style={{padding:"10px 14px",background:"var(--green-bg)",border:"1px solid rgba(52,211,153,.3)",borderRadius:"var(--radius-sm)",fontSize:13,color:"var(--green)",marginBottom:16}}>{success}</div>}
              <div className="fg"><label className="fl">Email</label><input className="fi" type="email" value={form.email} onChange={e=>up("email",e.target.value)} placeholder="you@example.com"/></div>
              <button onClick={handleReset} disabled={loading||!form.email} className="btn btn-primary btn-lg" style={{width:"100%",opacity:loading||!form.email?.6:1}}>
                {loading?"Sending...":"Send Reset Link"}
              </button>
              <div style={{textAlign:"center",marginTop:20}}><button onClick={()=>{setMode("login");setError("");setSuccess("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--accent)",fontFamily:"Space Grotesk,sans-serif"}}>Back to sign in</button></div>
            </>
          )}
        </div>
        <div style={{textAlign:"center",marginTop:20,fontSize:12,color:"var(--text3)"}}>By signing up you agree to the bridgn Terms of Service and Privacy Policy.</div>
      </div>
    </div>
  );
}

// ─── MOBILE BOTTOM NAV ───────────────────────────────────────────────────────
function MobBottomNav({role, page, setPage}) {
  const IC = ({d,d2,filled,active}) => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
      style={{transition:"transform .2s cubic-bezier(.34,1.56,.64,1)",transform:active?"scale(1.08)":"scale(1)"}}>
      <path d={d} stroke={active?"var(--accent)":"var(--text3)"} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"
        fill={filled&&active?"rgba(91,138,245,.18)":"none"} style={{transition:"stroke .2s,fill .2s"}}/>
      {d2&&<path d={d2} stroke={active?"var(--accent)":"var(--text3)"} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" style={{transition:"stroke .2s"}}/>}
    </svg>
  );

  const creatorTabs = [
    {key:"dashboard", label:"Home",
      icon:(a)=><IC active={a} filled d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1H15v-6H9v6H4a1 1 0 0 1-1-1z"/>},
    {key:"deals", label:"Deals",
      icon:(a)=><IC active={a} filled
        d="M4 7h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1z"
        d2="M8 7V5a2 2 0 0 1 4 0v2M16 7V5a2 2 0 0 0-4 0v2M9 12h6"/>},
    {key:"messages", label:"Messages",
      icon:(a)=><IC active={a} filled d="M4 4h16a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H7l-4 3V5a1 1 0 0 1 1-1z"/>},
    {key:"calendar", label:"Calendar",
      icon:(a)=><IC active={a} filled
        d="M4 5h16a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"
        d2="M8 3v4M16 3v4M3 10h18"/>},
    {key:"public-profile", label:"Profile",
      icon:(a)=><IC active={a} filled
        d="M20 21v-1a7 7 0 0 0-7-7H11a7 7 0 0 0-7 7v1"
        d2="M12 13a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>},
  ];

  const brandTabs = [
    {key:"dashboard", label:"Home",
      icon:(a)=><IC active={a} filled d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1H15v-6H9v6H4a1 1 0 0 1-1-1z"/>},
    {key:"browse", label:"Browse",
      icon:(a)=><IC active={a} d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>},
    {key:"messages", label:"Messages",
      icon:(a)=><IC active={a} filled d="M4 4h16a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H7l-4 3V5a1 1 0 0 1 1-1z"/>},
    {key:"campaigns", label:"Campaigns",
      icon:(a)=><IC active={a} filled
        d="M3 8h18M3 12h18M3 16h12"
        d2="M19 14l3 2-3 2v-4z"/>},
    {key:"deals", label:"Deals",
      icon:(a)=><IC active={a} filled
        d="M4 7h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1z"
        d2="M8 7V5a2 2 0 0 1 4 0v2M16 7V5a2 2 0 0-4 0v2M9 12h6"/>},
  ];

  const tabs = role==="creator" ? creatorTabs : brandTabs;

  return (
    <nav className="mob-bottom-nav" style={{alignItems:"stretch"}}>
      {tabs.map(tab=>{
        const active = page===tab.key ||
          (tab.key==="dashboard" && page==="dashboard");
        return (
          <button key={tab.key} onClick={()=>setPage(tab.key)}
            style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",
                    justifyContent:"center",gap:3,border:"none",background:"none",
                    cursor:"pointer",padding:"4px 0 6px",position:"relative",
                    WebkitTapHighlightColor:"transparent"}}>
            {/* Glowing indicator pill */}
            {active&&(
              <span style={{
                position:"absolute",top:0,left:"50%",
                width:32,height:3,borderRadius:99,
                background:"var(--accent)",
                boxShadow:"0 0 6px var(--accent),0 0 14px rgba(91,138,245,.55),0 0 28px rgba(91,138,245,.25)",
                animation:"tabIndicator .28s cubic-bezier(.16,1,.3,1) both",
              }}/>
            )}
            <span key={active?"on":"off"} style={{animation:active?"tabIconPop .3s cubic-bezier(.34,1.56,.64,1) both":"none"}}>
              {tab.icon(active)}
            </span>
            <span style={{
              fontSize:"9.5px",fontWeight:active?700:500,
              letterSpacing:".04em",textTransform:"uppercase",
              color:active?"var(--accent)":"var(--text3)",
              transition:"color .2s",lineHeight:1,
            }}>{tab.label}</span>
          </button>
        );
      })}
    </nav>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [authUser,setAuthUser] = useState(null);
  const [authLoading,setAuthLoading] = useState(true);
  const [role,setRole] = useState("creator");
  const [page,setPage] = useState("dashboard");
  const [selected,setSelected] = useState(null);
  const [deals,setDeals] = useState([]);
  const [availStatus,setAvailStatus] = useState("open");
  const [mobSidebar,setMobSidebar] = useState(false);
  const [socialLinks,setSocialLinks] = useState({ig:"",tt:"",yt:"",tw:"",web:"",bio:"",location:""});
  const [campaignQuestions,setCampaignQuestions] = useState({});
  const [onboarding,setOnboarding] = useState({seen:false,steps:{analytics:false}});
  const [profileFlags,setProfileFlags] = useState({analyticsUploaded:false,rateCardFilled:false,availabilitySet:false});
  const [stripeConnected,setStripeConnected] = useState(()=>{
    try { return localStorage.getItem("bridgn_stripe_connected")==="1"; } catch { return false; }
  });
  const [darkMode,setDarkMode] = useState(true);

  useEffect(()=>{
    document.documentElement.classList.toggle("light",!darkMode);
  },[darkMode]);

  // Load/save onboarding state from localStorage once user is known
  useEffect(()=>{
    if(!authUser) return;
    try {
      const raw = localStorage.getItem("bridgn_ob_"+authUser.id);
      if(raw) setOnboarding(JSON.parse(raw));
    } catch {}
  },[authUser]);

  const updateOnboarding = upd => {
    setOnboarding(prev => {
      const next = {...prev,...upd,steps:{...prev.steps,...(upd.steps||{})}};
      try { localStorage.setItem("bridgn_ob_"+(authUser?.id||"guest"), JSON.stringify(next)); } catch {}
      return next;
    });
  };

  // Load social links from localStorage once user is known
  useEffect(()=>{
    if(!authUser) return;
    try {
      const raw = localStorage.getItem("bridgn_social_"+authUser.id);
      if(raw) setSocialLinks(JSON.parse(raw));
    } catch {}
  },[authUser]);

  // Persist social links to localStorage whenever saved
  const saveSocialLinks = links => {
    setSocialLinks(links);
    try { localStorage.setItem("bridgn_social_"+(authUser?.id||"guest"), JSON.stringify(links)); } catch {}
  };

  // Load profile flags from localStorage once user is known
  useEffect(()=>{
    if(!authUser) return;
    try {
      const raw = localStorage.getItem("bridgn_pf_"+authUser.id);
      if(raw) setProfileFlags(JSON.parse(raw));
    } catch {}
  },[authUser]);

  const updateProfileFlags = upd => {
    setProfileFlags(prev => {
      const next = {...prev,...upd};
      try { localStorage.setItem("bridgn_pf_"+(authUser?.id||"guest"), JSON.stringify(next)); } catch {}
      return next;
    });
  };

  // Detect return from Stripe onboarding (?stripe=connected)
  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const stripeParam = params.get("stripe");
    if(stripeParam === "connected") {
      setStripeConnected(true);
      try { localStorage.setItem("bridgn_stripe_connected","1"); } catch {}
      // Clean the query param from the URL without a page reload
      const clean = window.location.pathname;
      window.history.replaceState({},"",clean);
    }
  },[]);

  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      setAuthUser(session?.user||null);
      if(session?.user){
        const r=session.user.user_metadata?.role||"creator";
        setRole(r);
      }
      setAuthLoading(false);
    });
    const {data:{subscription}}=supabase.auth.onAuthStateChange((_event,session)=>{
      setAuthUser(session?.user||null);
      if(session?.user){
        const r=session.user.user_metadata?.role||"creator";
        setRole(r);
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  const handleSignOut=async()=>{
    await supabase.auth.signOut();
    setAuthUser(null);
    setPage("dashboard");
  };

  const addDeal    = d => setDeals(x=>[...x,d]);
  const updateDeal = (id,fields) => {
    setDeals(x=>x.map(d=>d.id===id?{...d,...fields}:d));
    // Sync status changes to Supabase
    if(fields.status) {
      fetch(`${BRIDGN_API_URL}/api/deals/status`, {
        method:"PUT", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({bridgnDealId:String(id), status:fields.status, userId:authUser?.id}),
      }).catch(e=>console.error("[updateDeal] DB sync failed:", e));
    }
  };

  // Load deals from Supabase when user authenticates or navigates to a deal page
  const loadDeals = React.useCallback(()=>{
    if(!authUser) return;
    fetch(`${BRIDGN_API_URL}/api/deals?userId=${authUser.id}`)
      .then(r=>r.ok?r.json():null)
      .then(data=>{
        if(data?.deals?.length) setDeals(data.deals);
      })
      .catch(e=>console.error("[loadDeals] Failed:", e));
  },[authUser]);

  useEffect(()=>{ loadDeals(); },[authUser]);

  // Reload deals when navigating to deal-related pages so fresh data shows
  useEffect(()=>{
    if(page==="deal-room"||page==="deals") loadDeals();
  },[page]);

  // Recover pending invite after email verification redirect.
  // The brand signed up on InviteWelcomeScreen, verified their email,
  // and got redirected back WITHOUT the ?inv= param. The invite context
  // was saved to localStorage before signup.
  useEffect(()=>{
    if(!authUser) return;
    let raw;
    try { raw = localStorage.getItem("bridgn_pending_invite"); } catch {}
    if(!raw) return;
    try { localStorage.removeItem("bridgn_pending_invite"); } catch {}
    const ctx = JSON.parse(raw);
    if(!ctx?.bridgnDealId && !ctx?.code) return;
    const dealId = ctx.bridgnDealId || ctx.code;
    // Join the deal in Supabase and navigate to the Deal Room
    fetch(`${BRIDGN_API_URL}/api/deals/join`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ bridgnDealId: dealId, brandUserId: authUser.id }),
    })
      .then(r=>r.ok?r.json():null)
      .then(data=>{
        if(data?.deal) {
          setRole("brand");
          setDeals([data.deal]);
          setSelected(data.deal);
          setPage("deal-room");
        }
      })
      .catch(e=>console.error("[pendingInvite] Join failed:", e));
  },[authUser]);

  // Parse invite context from URL query string once on mount
  const [inviteCtx] = useState(()=>{
    try {
      const params = new URLSearchParams(window.location.search);
      const inv = params.get("inv");
      if(inv) return JSON.parse(decodeURIComponent(atob(inv)));
    } catch {}
    return null;
  });

  const handleInviteAuth = async (user, ctx) => {
    const r = user.user_metadata?.role||"brand";
    setAuthUser(user);
    setRole(r);
    if(!ctx) return;

    // Build a local deal from the invite context (fallback)
    const localDeal = {
      id: ctx.bridgnDealId||String(Date.now()),
      brand: ctx.brandName||"Brand",
      bi: (ctx.brandName||"BR").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(),
      ci: 1,
      amount: ctx.amount||0,
      platform: ctx.platform||"Instagram",
      status: "Active",
      deadline: ctx.deadline||"TBD",
      deliverables: ctx.deliverables||"",
      progress: 0,
      source: "external",
      campaignTitle: ctx.campaignTitle||("Deal with "+(ctx.brandName||"Brand")),
      escrow: false,
      escrowReleased: false,
      creatorUserId: ctx.creatorUserId||"",
      creatorName: ctx.creatorName||"",
      _fromInvite: true,
    };

    // Try to join the deal in Supabase so both sides share the same record
    try {
      const resp = await fetch(`${BRIDGN_API_URL}/api/deals/join`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ bridgnDealId: localDeal.id, brandUserId: user.id }),
      });
      if(resp.ok) {
        const {deal} = await resp.json();
        setDeals([deal]);
        setSelected(deal);
        setPage("deal-room");
        return;
      }
    } catch(e) {
      console.error("[handleInviteAuth] DB join failed, using local deal:", e);
    }

    // Fallback: use the deal built from the invite link payload
    setDeals([localDeal]);
    setSelected(localDeal);
    setPage("deal-room");
  };

  if(authLoading) return (
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontFamily:"Syne,sans-serif",fontSize:40,fontWeight:800,letterSpacing:"-1px",background:"linear-gradient(135deg,var(--accent) 0%,#c084fc 48%,var(--accent2) 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>bridgn</div>
      <div style={{width:28,height:28,border:"2.5px solid var(--border)",borderTop:"2.5px solid var(--accent)",borderRadius:"50%",animation:"spin .8s linear infinite"}}></div>
    </div>
  );

  if(!authUser) {
    if(inviteCtx) return React.createElement(InviteWelcomeScreen,{inviteCtx,onAuth:handleInviteAuth});
    return React.createElement(AuthScreen,{onAuth:u=>{setAuthUser(u);const r=u.user_metadata?.role||"creator";setRole(r);}});
  }

  const userName = authUser.user_metadata?.full_name || authUser.email.split("@")[0];
  const userInitials = userName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();

  const render = () => {
    if(role==="creator") {
      switch(page) {
        case "dashboard":    return React.createElement(CreatorDashboard,{setPage,setSelected,deals,availStatus,setAvailStatus,userName,socialLinks,onboarding,updateOnboarding,profileFlags,stripeConnected,authUser});
        case "campaigns":    return React.createElement(CampaignsPage,{setPage,setSelected,campaignQuestions,setCampaignQuestions,userName});
        case "campaign-detail": return React.createElement(CampaignDetail,{campaign:selected,setPage});
        case "deals":        return React.createElement(CreatorDealsPage,{setPage,setSelected,deals});
        case "deal-room":    return React.createElement(DealRoomPage,{setPage,setSelected,deals,role,authUser,updateDeal});
        case "active-deal":  return React.createElement(ActiveDealPage,{deal:selected,setPage});
        case "new-deal":     return React.createElement(NewDealPage,{setPage,onDealCreated:addDeal,userName,authUser});
        case "dispute":      return React.createElement(DisputePage,{deal:selected,setPage});
        case "offer":        return React.createElement(OfferPage,{offer:selected,setPage});
        case "analytics":    return React.createElement(CreatorAnalyticsPage,{onAnalyticsUploaded:()=>updateProfileFlags({analyticsUploaded:true})});
        case "calendar":     return React.createElement(ContentCalendarPage,{deals});
        case "rate-card":    return React.createElement(RateCardPage,{onRateCardFilled:()=>updateProfileFlags({rateCardFilled:true})});
        case "media-kit":    return React.createElement(MediaKitPage,{userName,userInitials,socialLinks});
        case "invoices":     return React.createElement(InvoicesPage,{role});
        case "public-profile": return React.createElement(PublicProfilePage,{setPage,userName,userInitials,socialLinks,profilePct:PC_ITEMS.reduce((s,it)=>s+(({initials:true,bio:!!socialLinks.bio?.trim(),social:SOCIALS.some(x=>socialLinks[x.key]?.trim()),analytics:!!profileFlags.analyticsUploaded,ratecard:!!profileFlags.rateCardFilled,avail:!!profileFlags.availabilitySet})[it.key]?it.weight:0),0)});
        case "profile-settings": return React.createElement(ProfileSettingsPage,{socialLinks,setSocialLinks:saveSocialLinks,userName,userInitials});
        case "earnings":     return React.createElement(EarningsPage,{});
        case "contracts":    return React.createElement(ContractVaultPage,{});
        case "availability": return React.createElement(AvailabilityPage,{onAvailabilitySet:()=>updateProfileFlags({availabilitySet:true})});
        case "expenses":     return React.createElement(ExpensesPage,{});
        case "messages":     return React.createElement(MessagesPage,{setPage});
        case "notifications":return React.createElement(NotificationsPage,{setPage});
        case "settings":     return React.createElement(SettingsPage,{authUser,darkMode,setDarkMode,onSignOut:handleSignOut});
        default:             return React.createElement(CreatorDashboard,{setPage,setSelected,deals,availStatus,setAvailStatus,userName,profileFlags});
      }
    } else {
      switch(page) {
        case "dashboard":     return React.createElement(BrandDashboard,{setPage,setSelected});
        case "browse":        return React.createElement(BrowseCreatorsPage,{setPage});
        case "creator-profile": return React.createElement(CreatorProfilePage,{creator:selected,setPage});
        case "campaigns":     return React.createElement(BrandCampaignsPage,{setPage,setSelected,campaignQuestions,setCampaignQuestions});
        case "campaign-calendar": return React.createElement(CampaignCalendarPage,{});
        case "deals":         return React.createElement(BrandDealsPage,{setPage,setSelected});
        case "deal-room":     return React.createElement(DealRoomPage,{setPage,setSelected,deals,role,authUser,updateDeal});
        case "content-library": return React.createElement(ContentLibraryPage,{});
        case "affiliate":     return React.createElement(AffiliateManagerPage,{});
        case "brief-builder": return React.createElement(BriefBuilderPage,{});
        case "scorecards":    return React.createElement(CreatorScorecardsPage,{});
        case "team":          return React.createElement(TeamManagementPage,{});
        case "roi":           return React.createElement(ROITrackerPage,{});
        case "ai-match":      return React.createElement(AIMatchPage,{setPage,setSelected});
        case "shortlists":    return React.createElement(ShortlistsPage,{setPage,setSelected});
        case "invoices":      return React.createElement(InvoicesPage,{role});
        case "messages":      return React.createElement(MessagesPage,{setPage});
        case "notifications": return React.createElement(NotificationsPage,{setPage});
        case "profile-settings": return React.createElement(ProfileSettingsPage,{socialLinks,setSocialLinks:saveSocialLinks,userName,userInitials});
        case "settings":      return React.createElement(SettingsPage,{authUser,darkMode,setDarkMode,onSignOut:handleSignOut});
        default:              return React.createElement(BrandDashboard,{setPage,setSelected});
      }
    }
  };

  return (
    <div className="app-shell">
      <Navbar role={role} setPage={setPage} userInitials={userInitials} onSignOut={handleSignOut} onMenuToggle={()=>setMobSidebar(o=>!o)} darkMode={darkMode} setDarkMode={setDarkMode}/>
      <div className="main-layout">
        <div className={"sidebar-overlay"+(mobSidebar?" show":"")} onClick={()=>setMobSidebar(false)}/>
        <Sidebar role={role} page={page} setPage={setPage} userName={userName} userInitials={userInitials} mobOpen={mobSidebar} onClose={()=>setMobSidebar(false)}/>
        <main className="content-area">
          <div key={page} className="page-enter">
            {render()}
          </div>
        </main>
      </div>
      <MobBottomNav role={role} page={page} setPage={setPage}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(React.Fragment, null,
    React.createElement(TiltEffect),
    React.createElement(ParticleCanvas),
    React.createElement(CursorGlow),
    React.createElement(App)
  )
);
</script>
</body>
