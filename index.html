// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [authUser,setAuthUser] = useState(null);
  const [authLoading,setAuthLoading] = useState(true);
  const [role,setRole] = useState("creator");
  const [page,setPage] = useState("dashboard");
  const [selected,setSelected] = useState(null);
  const [deals,setDeals] = useState([]);
  const [availStatus,setAvailStatus] = useState("open");
  const [mobSidebar,setMobSidebar] = useState(false);
  const [cmdkOpen,setCmdkOpen] = useState(false);
  const [cmdkQuery,setCmdkQuery] = useState("");
  const [socialLinks,setSocialLinks] = useState({ig:"",tt:"",yt:"",tw:"",web:"",bio:"",location:""});
  const [campaignQuestions,setCampaignQuestions] = useState({});
  const [onboarding,setOnboarding] = useState({seen:false,steps:{analytics:false}});
  const [profileFlags,setProfileFlags] = useState({analyticsUploaded:false,rateCardFilled:false,availabilitySet:false});
  const [stripeConnected,setStripeConnected] = useState(false);
  const [darkMode,setDarkMode] = useState(false);
  const [sidebarCollapsed,setSidebarCollapsed] = useState(false);
  const [showAuth,setShowAuth] = useState(false);
  const [authMode,setAuthMode] = useState("signup");
  const [toast,setToast] = useState(null);
  const [demoMode] = useState(()=>{try{return new URLSearchParams(window.location.search).get("demo")==="true";}catch(e){return false;}});

  const showToast = (msg, type="success") => {
    setToast({msg,type});
    setTimeout(()=>setToast(null), 3500);
  };

  useEffect(()=>{
    document.documentElement.classList.toggle("light",!darkMode);
  },[darkMode]);

  // Cmd+K keyboard shortcut
  useEffect(()=>{
    const handler = (e) => {
      if((e.metaKey||e.ctrlKey)&&e.key==="k") {
        e.preventDefault();
        setCmdkOpen(o=>!o);
        setCmdkQuery("");
      }
      if(e.key==="Escape") setCmdkOpen(false);
    };
    window.addEventListener("keydown",handler);
    return ()=>window.removeEventListener("keydown",handler);
  },[]);

  // Load/save onboarding state from localStorage once user is known
  useEffect(()=>{
    if(!authUser) return;
    try {
      const raw = localStorage.getItem("bridgn_ob_"+authUser.id);
      if(raw) setOnboarding(JSON.parse(raw));
    } catch {}
  },[authUser]);

  const updateOnboarding = upd => {
    setOnboarding(prev => {
      const next = {...prev,...upd,steps:{...prev.steps,...(upd.steps||{})}};
      try { localStorage.setItem("bridgn_ob_"+(authUser?.id||"guest"), JSON.stringify(next)); } catch {}
      return next;
    });
  };

  // Load social links from localStorage once user is known
  useEffect(()=>{
    if(!authUser) return;
    try {
      const raw = localStorage.getItem("bridgn_social_"+authUser.id);
      if(raw) setSocialLinks(JSON.parse(raw));
    } catch {}
  },[authUser]);

  // Persist social links to localStorage whenever saved
  const saveSocialLinks = links => {
    setSocialLinks(links);
    try { localStorage.setItem("bridgn_social_"+(authUser?.id||"guest"), JSON.stringify(links)); } catch {}
  };

  // Load profile flags from localStorage once user is known
  useEffect(()=>{
    if(!authUser) return;
    try {
      const raw = localStorage.getItem("bridgn_pf_"+authUser.id);
      if(raw) setProfileFlags(JSON.parse(raw));
    } catch {}
  },[authUser]);

  const updateProfileFlags = upd => {
    setProfileFlags(prev => {
      const next = {...prev,...upd};
      try { localStorage.setItem("bridgn_pf_"+(authUser?.id||"guest"), JSON.stringify(next)); } catch {}
      return next;
    });
  };

  // Detect return from Stripe onboarding (?stripe=connected)
  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const stripeParam = params.get("stripe");
    if(stripeParam === "connected") {
      setStripeConnected(true);
      const clean = window.location.pathname;
      window.history.replaceState({},"",clean);
    }
  },[]);

  // Check real Stripe Connect status from Supabase on auth
  useEffect(()=>{
    if(!authUser) return;
    supabase.from("creator_profiles").select("stripe_account_id,stripe_onboarded_at").eq("user_id",authUser.id).maybeSingle().then(({data})=>{
      if(data?.stripe_account_id && data?.stripe_onboarded_at) setStripeConnected(true);
    });
  },[authUser]);

  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      setAuthUser(session?.user||null);
      if(session?.user){
        const r=session.user.user_metadata?.role||"creator";
        setRole(r);
      }
      setAuthLoading(false);
    });
    const {data:{subscription}}=supabase.auth.onAuthStateChange((_event,session)=>{
      setAuthUser(session?.user||null);
      if(session?.user){
        const r=session.user.user_metadata?.role||"creator";
        setRole(r);
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  const handleSignOut=async()=>{
    await supabase.auth.signOut();
    setAuthUser(null);
    setPage("dashboard");
  };

  const addDeal    = d => setDeals(x=>[...x,d]);
  const updateDeal = (id,fields) => {
    setDeals(x=>x.map(d=>d.id===id?{...d,...fields}:d));
    // Sync status changes to Supabase
    if(fields.status) {
      fetch(`${BRIDGN_API_URL}/api/deals/status`, {
        method:"PUT", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({bridgnDealId:String(id), status:fields.status, userId:authUser?.id}),
      }).catch(e=>console.error("[updateDeal] DB sync failed:", e));
    }
  };

  // Load deals from Supabase when user authenticates or navigates to a deal page
  const loadDeals = React.useCallback(()=>{
    if(!authUser || demoMode) return;
    fetch(`${BRIDGN_API_URL}/api/deals?userId=${authUser.id}`)
      .then(r=>r.ok?r.json():null)
      .then(data=>{
        if(data?.deals?.length) setDeals(data.deals);
      })
      .catch(e=>console.error("[loadDeals] Failed:", e));
  },[authUser,demoMode]);

  // Seed demo data when demo mode is active
  useEffect(()=>{
    if(demoMode && authUser) {
      setDeals(DEMO_DEALS.map(d=>({...d,creatorUserId:authUser.id})));
      setProfileFlags({analyticsUploaded:true,rateCardFilled:true,availabilitySet:true});
      setStripeConnected(true);
      setSocialLinks({ig:"creator.demo",tt:"creator.demo",yt:"",tw:"",web:"bridgn.com",bio:"Demo creator account — showcasing the bridgn platform",location:"Los Angeles, CA"});
    }
  },[demoMode,authUser]);

  useEffect(()=>{ loadDeals(); },[authUser]);

  // Reload deals when navigating to deal-related pages so fresh data shows
  useEffect(()=>{
    if(page==="dashboard"||page==="deal-room"||page==="deals"||page==="calendar"||page==="earnings"||page==="workspace"||page==="collaborators") loadDeals();
  },[page]);

  // Recover pending invite after email verification redirect.
  // The brand signed up on InviteWelcomeScreen, verified their email,
  // and got redirected back WITHOUT the ?inv= param. The invite context
  // was saved to localStorage before signup.
  useEffect(()=>{
    if(!authUser) return;
    let raw;
    try { raw = localStorage.getItem("bridgn_pending_invite"); } catch {}
    if(!raw) return;
    try { localStorage.removeItem("bridgn_pending_invite"); } catch {}
    const ctx = JSON.parse(raw);
    if(!ctx?.bridgnDealId && !ctx?.code) return;
    const dealId = ctx.bridgnDealId || ctx.code;
    // Join the deal in Supabase and navigate to the Deal Room
    const invitedByBrand = ctx.invitedBy === "brand";
    const joinBody = invitedByBrand
      ? { bridgnDealId: dealId, creatorUserId: authUser.id }
      : { bridgnDealId: dealId, brandUserId: authUser.id };
    fetch(`${BRIDGN_API_URL}/api/deals/join`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify(joinBody),
    })
      .then(r=>r.ok?r.json():null)
      .then(data=>{
        if(data?.deal) {
          setRole(invitedByBrand ? "creator" : "brand");
          setDeals([data.deal]);
          setSelected(data.deal);
          setPage("deal-room");
        }
      })
      .catch(e=>console.error("[pendingInvite] Join failed:", e));
  },[authUser]);

  // Parse invite context from URL query string once on mount
  const [inviteCtx] = useState(()=>{
    try {
      const params = new URLSearchParams(window.location.search);
      const inv = params.get("inv");
      if(inv) return JSON.parse(decodeURIComponent(atob(inv)));
    } catch {}
    return null;
  });

  // If user is already logged in and hits an invite link, auto-join the deal
  useEffect(()=>{
    if(!authUser || !inviteCtx) return;
    const dealId = inviteCtx.bridgnDealId || inviteCtx.code;
    if(!dealId) return;
    const invitedByBrand = inviteCtx.invitedBy === "brand";
    const joinBody = invitedByBrand
      ? { bridgnDealId: dealId, creatorUserId: authUser.id }
      : { bridgnDealId: dealId, brandUserId: authUser.id };
    fetch(`${BRIDGN_API_URL}/api/deals/join`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify(joinBody),
    })
      .then(r=>r.ok?r.json():null)
      .then(data=>{
        if(data?.deal) {
          setDeals(prev=>{
            const exists = prev.some(d=>d.id===data.deal.id);
            return exists ? prev.map(d=>d.id===data.deal.id?data.deal:d) : [...prev, data.deal];
          });
          setSelected(data.deal);
          setPage("deal-room");
        }
      })
      .catch(e=>console.error("[autoJoinInvite]", e))
      .finally(()=>{
        // Clean the URL so refreshing doesn't re-join
        window.history.replaceState({}, "", window.location.pathname);
      });
  },[authUser, inviteCtx]);

  const handleInviteAuth = async (user, ctx) => {
    const invitedByBrand = ctx?.invitedBy === "brand";
    const r = user.user_metadata?.role || (invitedByBrand ? "creator" : "brand");
    setAuthUser(user);
    setRole(r);
    if(!ctx) return;

    // Build a local deal from the invite context (fallback)
    const localDeal = {
      id: ctx.bridgnDealId||String(Date.now()),
      brand: ctx.brandName||"Brand",
      bi: (ctx.brandName||"BR").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(),
      ci: 1,
      amount: ctx.amount||0,
      platform: ctx.platform||"Instagram",
      status: "Active",
      deadline: ctx.deadline||"TBD",
      deliverables: ctx.deliverables||"",
      progress: 0,
      source: "external",
      campaignTitle: ctx.campaignTitle||("Deal with "+(ctx.brandName||"Brand")),
      escrow: false,
      escrowReleased: false,
      creatorUserId: invitedByBrand ? "" : (ctx.creatorUserId||""),
      creatorName: ctx.creatorName||"",
      brandUserId: invitedByBrand ? (ctx.brandUserId||"") : "",
      _fromInvite: true,
    };

    // Try to join the deal in Supabase so both sides share the same record
    try {
      const joinBody = invitedByBrand
        ? { bridgnDealId: localDeal.id, creatorUserId: user.id }
        : { bridgnDealId: localDeal.id, brandUserId: user.id };
      const resp = await fetch(`${BRIDGN_API_URL}/api/deals/join`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify(joinBody),
      });
      if(resp.ok) {
        const {deal} = await resp.json();
        setDeals([deal]);
        setSelected(deal);
        setPage("deal-room");
        return;
      }
    } catch(e) {
      console.error("[handleInviteAuth] DB join failed, using local deal:", e);
    }

    // Fallback: use the deal built from the invite link payload
    setDeals([localDeal]);
    setSelected(localDeal);
    setPage("deal-room");
  };

  if(authLoading) return (
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <img src="assets/logo-auth.svg" alt="bridgn" style={{height:60}}/>
      <div style={{width:28,height:28,border:"2.5px solid var(--border)",borderTop:"2.5px solid var(--accent)",borderRadius:"50%",animation:"spin .8s linear infinite"}}></div>
    </div>
  );

  if(!authUser) {
    if(inviteCtx) return React.createElement(InviteWelcomeScreen,{inviteCtx,onAuth:handleInviteAuth});
    if(!showAuth) return React.createElement(LandingPage,{
      onGetStarted:()=>{setAuthMode("signup");setShowAuth(true);},
      onLogin:()=>{setAuthMode("login");setShowAuth(true);},
    });
    return React.createElement(AuthScreen,{onAuth:u=>{setAuthUser(u);const r=u.user_metadata?.role||"creator";setRole(r);},defaultMode:authMode,onBack:()=>setShowAuth(false)});
  }

  const userName = authUser.user_metadata?.full_name || authUser.user_metadata?.company_name || authUser.email.split("@")[0];
  const userInitials = userName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();

  const render = () => {
    if(role==="creator") {
      switch(page) {
        case "dashboard":    return React.createElement(CreatorDashboard,{setPage,setSelected,deals,availStatus,setAvailStatus,userName,socialLinks,onboarding,updateOnboarding,profileFlags,stripeConnected,authUser});
        case "campaigns":    return React.createElement(CampaignsPage,{setPage,setSelected,campaignQuestions,setCampaignQuestions,userName});
        case "campaign-detail": return React.createElement(CampaignDetail,{campaign:selected,setPage});
        case "deals":        return React.createElement(CreatorDealsPage,{setPage,setSelected,deals});
        case "deal-room":    return React.createElement(DealRoomPage,{setPage,setSelected,deals,role,authUser,updateDeal,selected});
        case "active-deal":  return React.createElement(ActiveDealPage,{deal:selected,setPage});
        case "new-deal":     return React.createElement(NewDealPage,{setPage,onDealCreated:addDeal,userName,authUser});
        case "dispute":      return React.createElement(DisputePage,{deal:selected,setPage});
        case "offer":        return React.createElement(OfferPage,{offer:selected,setPage});
        case "analytics":    return React.createElement(CreatorAnalyticsPage,{onAnalyticsUploaded:()=>updateProfileFlags({analyticsUploaded:true})});
        case "calendar":     return React.createElement(CalendarPage,{deals,role,setPage,setSelected});
        case "workspace":    return React.createElement(WorkspacePage,{deals,authUser,setPage,setSelected});
        case "marketplace":  return React.createElement(MarketplaceCreatorPage,{setPage,setSelected,deals,addDeal,showToast});
        case "rate-card":    return React.createElement(RateCardPage,{onRateCardFilled:()=>updateProfileFlags({rateCardFilled:true})});
        case "media-kit":    return React.createElement(MediaKitPage,{userName,userInitials,socialLinks});
        case "invoices":     return React.createElement(InvoicesPage,{role});
        case "public-profile": return React.createElement(PublicProfilePage,{setPage,userName,userInitials,socialLinks,deals,demoMode,profilePct:PC_ITEMS.reduce((s,it)=>s+(({initials:true,bio:!!socialLinks.bio?.trim(),social:SOCIALS.some(x=>socialLinks[x.key]?.trim()),analytics:!!profileFlags.analyticsUploaded,ratecard:!!profileFlags.rateCardFilled,avail:!!profileFlags.availabilitySet})[it.key]?it.weight:0),0)});
        case "profile-settings": return React.createElement(ProfileSettingsPage,{socialLinks,setSocialLinks:saveSocialLinks,userName,userInitials});
        case "earnings":     return React.createElement(EarningsPage,{deals});
        case "collaborators": return React.createElement(CollaboratorsPage,{authUser,role,setPage,deals});
        case "my-affiliate": return React.createElement(AffiliateCreatorPage,{authUser});
        case "contracts":    return React.createElement(ContractVaultPage,{authUser,deals});
        case "availability": return React.createElement(AvailabilityPage,{onAvailabilitySet:()=>updateProfileFlags({availabilitySet:true})});
        case "expenses":     return React.createElement(ExpensesPage,{});
        case "messages":     return React.createElement(MessagesPage,{setPage,demoMode});
        case "notifications":return React.createElement(NotificationsPage,{setPage,authUser,demoMode});
        case "settings":     return React.createElement(SettingsPage,{authUser,darkMode,setDarkMode,onSignOut:handleSignOut,role});
        default:             return React.createElement(CreatorDashboard,{setPage,setSelected,deals,availStatus,setAvailStatus,userName,profileFlags});
      }
    } else {
      switch(page) {
        case "dashboard":     return React.createElement(BrandDashboard,{setPage,setSelected,deals,authUser});
        case "browse":        return React.createElement(BrowseCreatorsPage,{setPage});
        case "creator-profile": return React.createElement(CreatorProfilePage,{creator:selected,setPage});
        case "campaigns":     return React.createElement(BrandCampaignsPage,{setPage,setSelected,campaignQuestions,setCampaignQuestions});
        case "campaign-calendar": return React.createElement(CampaignCalendarPage,{});
        case "deals":         return React.createElement(BrandDealsPage,{setPage,setSelected,deals});
        case "deal-room":     return React.createElement(DealRoomPage,{setPage,setSelected,deals,role,authUser,updateDeal,selected});
        case "new-deal":      return React.createElement(BrandNewDealPage,{setPage,onDealCreated:addDeal,userName,authUser});
        case "calendar":      return React.createElement(CalendarPage,{deals,role,setPage,setSelected});
        case "marketplace":   return React.createElement(MarketplaceBrandPage,{setPage,setSelected,deals,addDeal,showToast,userName,authUser});
        case "creator-crm":   return React.createElement(CreatorCRMPage,{setPage,setSelected,deals,addDeal,showToast,userName,authUser});
        case "review-queue":  return React.createElement(ReviewQueuePage,{deals,setPage,setSelected,showToast});
        case "content-tracker": return React.createElement(ContentTrackerPage,{authUser,deals,demoMode});
        case "spending":      return React.createElement(SpendingDashboard,{deals});
        case "collaborators": return React.createElement(CollaboratorsPage,{authUser,role,setPage,deals});
        case "content-library": return React.createElement(ContentLibraryPage,{});
        case "affiliate":     return React.createElement(AffiliateManagerPage,{authUser,deals});
        case "brief-builder": return React.createElement(BriefBuilderPage,{});
        case "scorecards":    return React.createElement(CreatorScorecardsPage,{});
        case "team":          return React.createElement(TeamManagementPage,{});
        case "roi":           return React.createElement(ROITrackerPage,{});
        case "ai-match":      return React.createElement(AIMatchPage,{setPage,setSelected});
        case "shortlists":    return React.createElement(ShortlistsPage,{setPage,setSelected});
        case "invoices":      return React.createElement(InvoicesPage,{role});
        case "messages":      return React.createElement(MessagesPage,{setPage,demoMode});
        case "notifications": return React.createElement(NotificationsPage,{setPage,authUser,demoMode});
        case "settings":      return React.createElement(SettingsPage,{authUser,darkMode,setDarkMode,onSignOut:handleSignOut,role,socialLinks,setSocialLinks:saveSocialLinks,userName,userInitials});
        default:              return React.createElement(BrandDashboard,{setPage,setSelected,authUser});
      }
    }
  };

  return (
    <div className="app-shell">
      <Navbar role={role} setPage={setPage} userInitials={userInitials} onSignOut={handleSignOut} onMenuToggle={()=>setMobSidebar(o=>!o)} darkMode={darkMode} setDarkMode={setDarkMode}/>
      <div className="main-layout">
        <div className={"sidebar-overlay"+(mobSidebar?" show":"")} onClick={()=>setMobSidebar(false)}/>
        <Sidebar role={role} page={page} setPage={setPage} userName={userName} userInitials={userInitials} mobOpen={mobSidebar} onClose={()=>setMobSidebar(false)} collapsed={sidebarCollapsed} onToggleCollapse={()=>setSidebarCollapsed(c=>!c)} demoMode={demoMode}/>
        <main className="content-area">
          <div key={page} className="page-enter">
            {render()}
          </div>
        </main>
      </div>
      <MobBottomNav role={role} page={page} setPage={setPage}/>
      {toast&&<div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",padding:"12px 24px",borderRadius:99,fontSize:13,fontWeight:600,color:"white",background:toast.type==="error"?"var(--red)":"var(--green)",boxShadow:"0 4px 20px rgba(0,0,0,.15)",zIndex:9999,animation:"slideUp .25s ease",whiteSpace:"nowrap"}}>{toast.msg}</div>}
      {/* Cmd+K Quick Navigation */}
      {cmdkOpen&&(()=>{
        const allPages = role==="creator"?[
          {k:"dashboard",l:"Dashboard"},{k:"deal-room",l:"Deal Room"},
          {k:"new-deal",l:"New Deal"},{k:"contracts",l:"Contract Vault"},
          {k:"public-profile",l:"My Profile"},{k:"settings",l:"Settings"},
          ...(demoMode?[{k:"marketplace",l:"Marketplace"}]:[]),
        ]:[
          {k:"dashboard",l:"Dashboard"},{k:"deal-room",l:"Deal Room"},
          {k:"settings",l:"Settings"},
          ...(demoMode?[{k:"marketplace",l:"Marketplace"},{k:"creator-crm",l:"Creator CRM"}]:[]),
        ];
        const filtered = cmdkQuery?allPages.filter(p=>p.l.toLowerCase().includes(cmdkQuery.toLowerCase())):allPages;
        return (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:10000,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"20vh"}} onClick={()=>setCmdkOpen(false)}>
            <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,width:"100%",maxWidth:480,boxShadow:"0 20px 60px rgba(0,0,0,.2)",overflow:"hidden",animation:"fadeIn .15s ease"}}>
              <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:12,color:"var(--text3)",fontWeight:600}}>Go to</span>
                <input
                  autoFocus
                  value={cmdkQuery}
                  onChange={e=>setCmdkQuery(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&filtered.length){setPage(filtered[0].k);setCmdkOpen(false);}}}
                  placeholder="Search pages..."
                  style={{flex:1,border:"none",outline:"none",background:"none",color:"var(--text)",fontSize:14,fontFamily:"DM Sans,sans-serif"}}
                />
                <span style={{fontSize:10,color:"var(--text3)",background:"var(--surface2)",padding:"2px 6px",borderRadius:4,fontWeight:600}}>ESC</span>
              </div>
              <div style={{maxHeight:300,overflowY:"auto"}}>
                {filtered.map(p=>(
                  <button key={p.k} onClick={()=>{setPage(p.k);setCmdkOpen(false);}} style={{display:"block",width:"100%",textAlign:"left",padding:"10px 16px",border:"none",background:page===p.k?"var(--accent-light)":"none",cursor:"pointer",fontSize:13,fontWeight:page===p.k?600:400,color:page===p.k?"var(--accent)":"var(--text)",fontFamily:"DM Sans,sans-serif"}}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--surface2)"}
                    onMouseLeave={e=>e.currentTarget.style.background=page===p.k?"var(--accent-light)":"transparent"}
                  >{p.l}</button>
                ))}
                {filtered.length===0&&<div style={{padding:"20px 16px",textAlign:"center",fontSize:13,color:"var(--text3)"}}>No pages found</div>}
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(App)
);

// Register service worker for PWA
if("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
