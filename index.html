<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>bridgn – Creator & Brand Platform</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#1b2951"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="bridgn"/>
<link rel="apple-touch-icon" href="/assets/pwa-icon.png"/>
<meta name="description" content="The creator-brand partnership platform. Manage deals, contracts, payments, and content delivery in one place."/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.stripe.com/v3/"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{overflow-x:hidden;max-width:100vw;-webkit-overflow-scrolling:touch}
img,video,svg,canvas{max-width:100%;height:auto}
pre,code{overflow-wrap:break-word;word-break:break-all;max-width:100%}
#root{overflow-x:hidden}
:root{
  --bg:#060818;--surface:#13161f;--surface2:#191d2c;--border:#21273d;
  --text:#edf0f7;--text2:#8691b0;--text3:#4b5470;
  --accent:#1a7fa8;--accent-light:#0d2a38;--accent2:#f0a050;--accent2-light:#221608;
  --green:#34d399;--green-bg:#0a2619;--yellow:#fbbf24;--yellow-bg:#201b05;
  --red:#f87171;--red-bg:#270e0e;--purple:#a78bfa;--purple-bg:#181130;
  --teal:#0891b2;--teal-bg:#091d2a;
  --shadow-sm:0 1px 3px rgba(0,0,0,.55),0 1px 2px rgba(0,0,0,.3);
  --shadow:0 4px 24px rgba(0,0,0,.55),0 1px 6px rgba(0,0,0,.35);
  --shadow-lg:0 20px 60px rgba(0,0,0,.7),0 4px 20px rgba(0,0,0,.45);
  --radius:12px;--radius-sm:8px;--radius-lg:16px
}
html.light{
  --bg:#f5f3f0;--surface:#ffffff;--surface2:#f0ede8;--border:#e2ded8;
  --text:#0a1628;--text2:#4a5568;--text3:#8896a8;
  --accent:#1a7fa8;--accent-light:#e8f4f8;--accent2:#c4732a;--accent2-light:#fdf3e8;
  --green:#059669;--green-bg:#ecfdf5;--yellow:#a07200;--yellow-bg:#fdf7df;
  --red:#dc2626;--red-bg:#fef2f2;--purple:#6b4ec4;--purple-bg:#f3f0ff;
  --teal:#0e7490;--teal-bg:#e0f7fa;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow:0 2px 12px rgba(0,0,0,.06);
  --shadow-lg:0 8px 30px rgba(0,0,0,.08)
}
html.light body{background:var(--bg)}
html.light .navbar{background:var(--surface);border-bottom-color:var(--border)}
html.light .sidebar{background:var(--surface);border-right-color:var(--border)}
html.light .card,html.light .card-lg{background:var(--surface);border-color:var(--border)}
html.light .card-hover:hover{border-color:var(--accent);box-shadow:var(--shadow-sm)}
html.light .stat-card{background:var(--surface)}
html.light .tbl th{background:rgba(240,237,232,.92)}
html.light .role-toggle{background:rgba(0,0,0,.05)}
html.light .notif-dot{border-color:rgba(248,247,244,.9)}
html.light .nav-item.active{background:var(--accent-light);color:var(--accent)}
html.light .nav-item:hover{background:var(--surface2)}
html.light .pb-ig{background:#fde8f0;color:#b01050;border-color:rgba(176,16,80,.15)}
html.light .pb-yt{background:#fde8e8;color:#b80000;border-color:rgba(184,0,0,.15)}
html.light .pb-tt{background:#e4f9f2;color:#0a7248;border-color:rgba(10,114,72,.15)}
html.light .pb-tw{background:#e8f0fd;color:#1a4898;border-color:rgba(26,72,152,.15)}
html.light .skel{background:linear-gradient(90deg,rgba(0,0,0,.04) 25%,rgba(0,0,0,.08) 50%,rgba(0,0,0,.04) 75%);background-size:800px 100%}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
body::before,body::after{display:none}
#root{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
.app-shell{display:flex;flex-direction:column;min-height:100vh}
.main-layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 64px)}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);padding:10px 0 0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:width .2s ease}
.sidebar.collapsed{width:60px}
.sidebar.collapsed .sidebar-label{display:none}
.sidebar.collapsed .sidebar-divider{margin:8px 10px 4px}
.sidebar.collapsed .nav-item{justify-content:center;padding:9px 0;margin:1px 6px;width:calc(100% - 12px)}
.sidebar.collapsed .nav-item span:not(.nav-icon){display:none}
.sidebar.collapsed .nav-item .nav-icon{margin:0}
.sidebar-collapse-btn{display:flex;align-items:center;justify-content:center;width:100%;padding:10px 0;border:none;background:none;cursor:pointer;color:var(--text3);font-size:16px;border-top:1px solid var(--border)}
.content-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:32px 36px;background:var(--bg);max-width:100%}
.navbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:14px;position:sticky;top:0;z-index:100;flex-shrink:0}
.navbar::before,.navbar::after{display:none}
.nav-logo{height:24px;cursor:pointer;user-select:none}
html.light .nav-logo{content:url("assets/logo-dark.svg")}
.role-toggle{display:flex;background:rgba(0,0,0,.5);border-radius:var(--radius-sm);padding:3px;border:1px solid var(--border)}
.role-btn{padding:5px 16px;border-radius:7px;border:none;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;transition:all .18s;background:transparent;color:var(--text2)}
.role-btn.active{background:var(--surface2);color:var(--text);box-shadow:var(--shadow-sm)}
.nav-notif{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:15px;transition:all .18s}
.nav-notif:hover{border-color:var(--accent);background:var(--accent-light)}
.notif-dot{width:7px;height:7px;border-radius:50%;background:var(--red);position:absolute;top:7px;right:7px;border:2px solid var(--surface)}
.nav-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s}
.nav-avatar:hover{opacity:.85}
.sidebar-label{font-size:9px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);padding:0 18px;margin:6px 0 5px}
.sidebar-divider{height:1px;margin:10px 14px 4px;background:var(--border)}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:background .15s,color .15s;border:none;background:none;width:calc(100% - 16px);text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:600;border-left:2px solid var(--accent);padding-left:12px}
.nav-icon{width:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:inherit;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.sidebar-footer{margin-top:auto;padding:12px 8px 10px;border-top:1px solid var(--border)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;word-break:break-word}
.card-lg{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;word-break:break-word}
.card-hover{
  transition:box-shadow .22s,transform .55s cubic-bezier(.16,1,.3,1),border-color .22s;
  cursor:pointer;position:relative;
  transform:perspective(1000px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) translateZ(var(--tz,0px));
  will-change:transform}
.card-hover::before{content:"";position:absolute;inset:-1px;border-radius:inherit;background:linear-gradient(135deg,rgba(91,138,245,.4),rgba(167,139,250,.4));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .25s;pointer-events:none;z-index:1}
.card-hover::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:radial-gradient(circle at var(--sx,50%) var(--sy,50%),rgba(255,255,255,.1) 0%,transparent 65%);opacity:var(--so,0);transition:opacity .4s;z-index:1}
.card-hover{transition:border-color .15s,box-shadow .15s}
.card-hover:hover{border-color:var(--accent);box-shadow:var(--shadow-sm)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 19px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:600;transition:all .18s;white-space:nowrap;line-height:1;letter-spacing:.01em}
.btn:disabled{opacity:.45;cursor:default}
.btn-primary{background:var(--accent);color:white}
.btn-primary:hover:not(:disabled){opacity:.9}
.btn-primary:active:not(:disabled){transform:translateY(0);box-shadow:0 0 14px rgba(91,138,245,.35),0 0 28px rgba(91,138,245,.12),0 2px 10px rgba(91,138,245,.25)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover:not(:disabled){background:var(--border);border-color:var(--text3)}
.btn-outline{background:transparent;color:var(--accent);border:1px solid rgba(91,138,245,.35)}
.btn-outline:hover{background:var(--accent-light);border-color:var(--accent)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.btn-danger:hover:not(:disabled){background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.35)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.btn-success:hover:not(:disabled){background:rgba(52,211,153,.12)}
.btn-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.btn-teal{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(8,145,178,.2)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:7px;font-weight:500}
.btn-lg{padding:13px 28px;font-size:15px;border-radius:11px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.02em}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.15)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(251,191,36,.15)}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.15)}
.badge-blue{background:var(--accent-light);color:var(--accent);border:1px solid rgba(91,138,245,.18)}
.badge-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.badge-orange{background:var(--accent2-light);color:var(--accent2);border:1px solid rgba(240,160,80,.2)}
.live-dot{position:relative;display:inline-block;width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-right:5px}
.live-dot::after{content:"";position:absolute;inset:0;border-radius:50%;animation:livePulse 2s ease-out infinite}
.live-dot-green{background:var(--green);box-shadow:0 0 5px rgba(52,211,153,.6)}
.live-dot-green::after{background:var(--green)}
.live-dot-amber{background:var(--yellow);box-shadow:0 0 5px rgba(251,191,36,.5)}
.live-dot-amber::after{background:var(--yellow)}
.badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.18)}
.badge-teal{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(8,145,178,.18)}
.pb{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700}
.pb-ig{background:#3a1829;color:#f9a8d4;border:1px solid rgba(249,168,212,.12)}
.pb-yt{background:#2a0f0f;color:#fca5a5;border:1px solid rgba(252,165,165,.12)}
.pb-tt{background:#0b2a1c;color:#6ee7b7;border:1px solid rgba(110,231,183,.12)}
.pb-tw{background:#162050;color:#93c5fd;border:1px solid rgba(147,197,253,.12)}
.stat-card{padding:20px;position:relative;overflow:hidden}
.stat-card::before,.stat-card::after{display:none}
.stat-card .stat-icon{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;opacity:.9}
.stat-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.stat-value{font-size:26px;font-weight:400;font-family:"DM Serif Display",serif;line-height:1;letter-spacing:-.3px;color:var(--text)}
.stat-change{font-size:12px;margin-top:6px;font-weight:500;color:var(--text3)}
/* ── Welcome Banner ── */
.welcome-banner{border-radius:var(--radius-lg);padding:28px 28px 24px;position:relative;overflow:hidden;margin-bottom:24px}
.welcome-banner::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06);top:-60px;right:-40px}
.welcome-banner::after{content:'';position:absolute;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04);bottom:-50px;left:-30px}
.welcome-banner h1{font-family:"DM Serif Display",serif;font-size:26px;font-weight:400;color:#fff;margin:0 0 4px;position:relative;z-index:1}
.welcome-banner p{font-size:13px;color:rgba(255,255,255,.75);margin:0;position:relative;z-index:1}
/* ── Deal card left border by status ── */
.deal-card-active{border-left:3px solid var(--green)}
.deal-card-pending{border-left:3px solid var(--yellow,#fbbf24)}
.deal-card-completed{border-left:3px solid var(--text3)}
/* ── Step progress indicator ── */
.step-progress{display:flex;gap:4px;margin-top:8px}
.step-dot{height:4px;flex:1;border-radius:99px;transition:background .3s}
.step-dot.done{background:var(--accent)}
.step-dot.current{background:var(--green);animation:livePulse 2s ease-in-out infinite}
.step-dot.todo{background:var(--surface2)}
.stat-up{color:var(--green)}.stat-neutral{color:var(--text3)}
.page-title{font-family:"DM Serif Display",serif;font-size:32px;font-weight:400;color:var(--text);line-height:1.15;letter-spacing:-.3px}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:5px;line-height:1.5}
.ph-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:32px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.section{margin-bottom:30px}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.01em}
.section-link{font-size:12px;color:var(--accent2);cursor:pointer;font-weight:600;background:none;border:none;font-family:"DM Sans",sans-serif;letter-spacing:.02em;transition:color .15s}
.section-link:hover{color:#ffba70}
.deal-row{padding:14px 18px;display:flex;align-items:center;gap:14px}
.deal-row+.deal-row{border-top:1px solid rgba(33,39,61,.9)}
.deal-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:white;flex-shrink:0}
.deal-info{flex:1;min-width:0}
.deal-name{font-size:14px;font-weight:600;color:var(--text)}
.deal-sub{font-size:12px;color:var(--text2);margin-top:2px}
.cr-card{padding:22px;text-align:center}
.cr-av{width:58px;height:58px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:white;box-shadow:0 4px 14px rgba(0,0,0,.35)}
.cr-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:12px 0}
.cr-stat{background:var(--surface2);padding:11px 6px}
.cr-stat-v{font-size:17px;font-weight:700;color:var(--text);font-family:"DM Serif Display",serif;letter-spacing:-.2px}
.cr-stat-l{font-size:9px;color:var(--text3);font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
.search-input{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:"DM Sans",sans-serif;font-size:14px;background:var(--surface2);color:var(--text);outline:none;transition:border-color .18s,box-shadow .18s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,138,245,.12)}
.filter-btn{padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.det-banner{height:180px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;display:flex;align-items:flex-end;padding:22px;position:relative;overflow:hidden}
.det-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78),rgba(0,0,0,.08))}
.det-av{width:68px;height:68px;border-radius:50%;border:3px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;color:white;position:relative;z-index:1;box-shadow:0 4px 14px rgba(0,0,0,.35)}
.det-name-wrap{position:relative;z-index:1;margin-left:14px;flex:1}
.det-name{font-size:26px;font-weight:800;color:white;font-family:"DM Serif Display",serif;letter-spacing:-.3px}
.det-sub{font-size:13px;color:rgba(255,255,255,.68);margin-top:3px}
.det-body{padding:24px 28px}
.det-stats{display:grid;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:22px}
.det-stat{background:var(--surface2);padding:16px;text-align:center}
.det-stat-v{font-size:24px;font-weight:700;color:var(--text);font-family:"DM Serif Display",serif;letter-spacing:-.2px}
.det-stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:800;margin-top:4px}
.det-sec{margin-bottom:22px}
.det-sec-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:10px}
.fg{margin-bottom:18px}
.fl{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:7px;letter-spacing:.01em}
.fi{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:"DM Sans",sans-serif;font-size:14px;background:var(--surface2);color:var(--text);outline:none;transition:all .18s}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,138,245,.12)}
.fta{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:"DM Sans",sans-serif;font-size:14px;background:var(--surface2);color:var(--text);outline:none;transition:all .18s;resize:vertical;min-height:90px}
.fta:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,138,245,.12)}
.fsel{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:"DM Sans",sans-serif;font-size:14px;background:var(--surface2);color:var(--text);outline:none;cursor:pointer}
.deal-room-grid{grid-template-columns:1fr 360px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.prog-bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#7ba8ff)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:12px 18px;border-bottom:1px solid var(--border);background:rgba(10,11,18,.7)}

// ─── DEADLINE ALERT BANNER ───────────────────────────────────────────────────
function DeadlineAlertBanner({deals}) {
  const [now,setNow] = useState(()=>Date.now());
  useEffect(()=>{
    const id = setInterval(()=>setNow(Date.now()),1000);
    return ()=>clearInterval(id);
  },[]);

  const MONTHS={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const parseDeadline = str => {
    if(!str) return null;
    const [m,d] = str.trim().split(" ");
    if(!(m in MONTHS)||!d) return null;
    return new Date(new Date().getFullYear(), MONTHS[m], parseInt(d), 23, 59, 59, 999);
  };

  const fmtCountdown = ms => {
    if(ms<=0) return null;
    const totalSec = Math.floor(ms/1000);
    const h = Math.floor(totalSec/3600);
    const m = Math.floor((totalSec%3600)/60);
    const s = totalSec%60;
    if(h>=24){
      const days=Math.floor(h/24), rh=h%24;
      return `${days}d ${rh}h ${String(m).padStart(2,"0")}m`;
    }
    return `${String(h).padStart(2,"0")}h ${String(m).padStart(2,"0")}m ${String(s).padStart(2,"0")}s`;
  };

  const alerts = (deals||[])
    .filter(d=>d.status!=="Completed")
    .map(d=>{
      const dt = parseDeadline(d.deadline);
      if(!dt) return null;
      return {...d, ms: dt.getTime()-now};
    })
    .filter(Boolean)
    .filter(d=>d.ms <= 72*60*60*1000)
    .sort((a,b)=>a.ms-b.ms);

  if(!alerts.length) return null;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
      {alerts.map(al=>{
        const over = al.ms<=0;
        const col = over?"var(--red)":"var(--yellow)";
        const bg  = over?"rgba(248,113,113,.07)":"rgba(251,191,36,.06)";
        const bdr = over?"rgba(248,113,113,.22)":"rgba(251,191,36,.22)";
        const pill= over?"rgba(248,113,113,.12)":"rgba(251,191,36,.12)";
        const countdown = fmtCountdown(al.ms);
        return (
          <div key={al.id} style={{display:"flex",alignItems:"center",gap:13,padding:"11px 16px",background:bg,border:"1px solid "+bdr,borderLeft:"3px solid "+col,borderRadius:"var(--radius)",animation:over?"none":"deadlinePulse 2.6s ease-in-out infinite"}}>
            <span style={{fontSize:16,flexShrink:0,lineHeight:1}}>{over?"":"Warning:"}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:"13px",fontWeight:700,lineHeight:1.35}}>
                <span style={{color:col}}>{over?"Overdue — ":"Due soon — "}</span>
                <span style={{color:"var(--text)"}}>{al.brand}</span>
                {al.campaignTitle&&al.campaignTitle!=="Custom Deal"&&(
                  <span style={{color:"var(--text2)",fontWeight:500}}> · {al.campaignTitle}</span>
                )}
              </div>
              <div style={{fontSize:"11px",color:"var(--text3)",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{al.deliverables}</div>
            </div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"13px",fontWeight:700,color:col,background:pill,border:"1px solid "+bdr,borderRadius:7,padding:"5px 12px",flexShrink:0,letterSpacing:".03em",whiteSpace:"nowrap"}}>
              {over?"OVERDUE":countdown}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Toast({msg, emoji, type, duration=3000, onDone}) {
  const [out, setOut] = useState(false);

  // Infer type from message content when not explicitly passed
  const kind = type||(()=>{
    const m = String(msg);
    if(/✅|uploaded|saved|created|invited|success|added|sent/i.test(m)) return "success";
    if(/❌|error|failed|denied/i.test(m)) return "error";
    if(/removed|deleted|cancelled|⚠️/i.test(m)) return "warning";
    return "info";
  })();

  const palette = {success:"#34d399", error:"#f87171", warning:"#fbbf24", info:"#5b8af5"};
  const color = palette[kind]||palette.info;

  useEffect(()=>{
    // Gentle 880 Hz chime for success via Web Audio API
    if(kind==="success") {
      try {
        const ac = new (window.AudioContext||window.webkitAudioContext)();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.type = "sine";
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0, ac.currentTime);
        gain.gain.linearRampToValueAtTime(0.07, ac.currentTime+0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+0.2);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime+0.22);
      } catch(e) {}
    }
    // Begin exit animation before parent unmounts
    const t1 = setTimeout(()=>setOut(true), duration-380);
    // Signal parent to unmount
    const t2 = setTimeout(()=>onDone&&onDone(), duration);
    return ()=>{ clearTimeout(t1); clearTimeout(t2); };
  }, []);

  return (
    <div style={{
      position:"fixed", top:24, right:24, zIndex:9999,
      minWidth:288, maxWidth:360,
      background:"rgba(10,12,22,.88)",
      backdropFilter:"blur(20px) saturate(150%)",
      WebkitBackdropFilter:"blur(20px) saturate(150%)",
      border:"1px solid rgba(255,255,255,.09)",
      borderLeft:`3px solid ${color}`,
      borderRadius:14,
      padding:"14px 18px 18px",
      display:"flex", alignItems:"flex-start", gap:11,
      boxShadow:"0 8px 40px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.07)",
      fontFamily:'"DM Sans",sans-serif',
      pointerEvents:"none",
      overflow:"hidden",
      animation: out
        ? "toastOut .32s ease-in forwards"
        : "toastIn .38s cubic-bezier(.16,1,.3,1) forwards"
    }}>
      {emoji&&<span style={{fontSize:"18px",flexShrink:0,lineHeight:1.3,marginTop:1}}>{emoji}</span>}
      <span style={{fontSize:"14px",fontWeight:600,color:"var(--text)",lineHeight:1.45,flex:1}}>{msg}</span>
      {/* Draining progress bar */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:"rgba(255,255,255,.05)"}}>
        <div style={{
          height:"100%", background:color, opacity:.65,
          animation:`drainBar ${duration}ms linear forwards`
        }}/>
      </div>
    </div>
  );
}

function useCountUp(rawValue, duration=1500) {
  const parse = v => {
    const m = String(v).match(/^([^0-9]*)([0-9,]+(?:\.[0-9]+)?)(.*)$/);
    return m ? {pre:m[1], num:parseFloat(m[2].replace(/,/g,'')), suf:m[3]} : null;
  };
  const parsed = React.useMemo(()=>parse(rawValue),[rawValue]);
  // easeOutExpo: starts near full-speed, decelerates exponentially — much snappier than cubic
  const ease = t => t>=1 ? 1 : 1-Math.pow(2,-10*t);
  const fmt = (pre,n,suf) => pre+Math.round(n).toLocaleString()+suf;
  const [display, setDisplay] = useState(()=>parsed ? fmt(parsed.pre,0,parsed.suf) : rawValue);
  const raf = useRef(null);
  useEffect(()=>{
    if(raf.current) cancelAnimationFrame(raf.current);
    if(!parsed||parsed.num===0){setDisplay(rawValue);return;}
    const {pre,num,suf}=parsed;
    const start=performance.now();
    const tick=now=>{
      const t=Math.min((now-start)/duration,1);
      setDisplay(fmt(pre,num*ease(t),suf));
      if(t<1) raf.current=requestAnimationFrame(tick);
      else setDisplay(rawValue);
    };
    raf.current=requestAnimationFrame(tick);
    return ()=>{if(raf.current) cancelAnimationFrame(raf.current);};
  },[rawValue]);
  return display;
}

function StatSparkline({data, color="#5b8af5"}) {
  const pts = (data&&data.length>=2 ? data : [0,0,0,0,0,0,0]);
  const W=80, H=28;
  const max=Math.max(...pts,1), min=Math.min(...pts,0), range=max-min||1;
  const coords=pts.map((v,i)=>[
    parseFloat(((i/(pts.length-1))*W).toFixed(1)),
    parseFloat((H-((v-min)/range)*(H-8)-4).toFixed(1))
  ]);
  const line=coords.map((p,i)=>(i===0?"M":"L")+p[0]+","+p[1]).join(" ");
  const fill=line+" L"+W+","+H+" L0,"+H+" Z";
  const gid="spkg"+color.replace(/[^a-z0-9]/gi,"").slice(-8);
  return (
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:28,display:"block",marginTop:12,overflow:"visible"}}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.2"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>

// Renders text character by character at `speed` ms per char when animate=true.
// Falls back to plain text instantly when animate=false.
function TypewriterText({text, animate, speed=30}) {
  const [displayed, setDisplayed] = useState(animate ? "" : text);
  const timer = useRef(null);
  useEffect(() => {
    if (!animate) { setDisplayed(text); return; }
    setDisplayed("");
    let i = 0;
    const tick = () => {
      i++;
      setDisplayed(text.slice(0, i));
      if (i < text.length) timer.current = setTimeout(tick, speed);
    };
    timer.current = setTimeout(tick, speed);
    return () => clearTimeout(timer.current);
  }, [text, animate]);
  return <span>{displayed}</span>;
}

function useConfetti() {
  const [firing,setFiring] = useState(false);
  const timerRef = useRef(null);
  const fire = () => {
    setFiring(true);
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(()=>setFiring(false), 2700);
  };
  useEffect(()=>()=>clearTimeout(timerRef.current),[]);
  return [fire, firing];
}

function ConfettiCanvas({active}) {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);

  useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    if(!active){
      cancelAnimationFrame(rafRef.current);
      canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
      return;
    }
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');

    const COLORS = ['#5b8af5','#a78bfa','#f0a050','#34d399','#0891b2','#c084fc','#fbbf24','#60a5fa','#f472b6','#34d399'];

    const mkP = (ox,oy,spread,speedMult=1) => ({
      x: ox+(Math.random()-.5)*spread, y: oy,
      vx: (Math.random()-.5)*15*speedMult,
      vy: -(Math.random()*13+4)*speedMult,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      w: Math.random()*9+4, h: Math.random()*5+2,
      angle: Math.random()*Math.PI*2,
      spin: (Math.random()-.5)*.28,
      gravity: .27+Math.random()*.12,
      drag: .992,
      shape: Math.random()>.3?'rect':'dot',
    });

    let particles = [];
    const cx=canvas.width*.5, cy=canvas.height*.26;

    // Wave 1 — center burst
    for(let i=0;i<90;i++) particles.push(mkP(cx,cy,60));

    // Wave 2 — side cannons (220ms later)
    const t2=setTimeout(()=>{
      for(let i=0;i<55;i++) particles.push(mkP(canvas.width*.1,canvas.height*.35,30,1.1));
      for(let i=0;i<55;i++) particles.push(mkP(canvas.width*.9,canvas.height*.35,30,1.1));
    },220);

    const start=Date.now(), duration=2500;

    const draw=()=>{
      const elapsed=Date.now()-start;
      if(elapsed>duration){ ctx.clearRect(0,0,canvas.width,canvas.height); return; }
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const fadeAt=duration-700;
      const gA=elapsed>fadeAt?1-(elapsed-fadeAt)/700:1;
      particles.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=p.drag; p.angle+=p.spin;
        if(p.y>canvas.height+30||p.x<-30||p.x>canvas.width+30) return;
        ctx.save();
        ctx.globalAlpha=gA;
        ctx.fillStyle=p.color;
        ctx.translate(p.x,p.y);
        ctx.rotate(p.angle);
        if(p.shape==='rect'){
          ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        } else {
          ctx.beginPath(); ctx.arc(0,0,p.w/2.5,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
      });
      rafRef.current=requestAnimationFrame(draw);
    };
    rafRef.current=requestAnimationFrame(draw);
    return()=>{ clearTimeout(t2); cancelAnimationFrame(rafRef.current); };
  },[active]);

  return <canvas ref={canvasRef} style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9999,display:active?'block':'none'}}/>;
}

    {type:"deal",     icon:"", bg:"rgba(167,139,250,.15)", col:"var(--purple)",  msgs:["moved your deal to Review","accepted your content submission","requested a revision"]},

    {type:"view",     icon:"", bg:"rgba(251,191,36,.15)",  col:"var(--yellow)",  msgs:["viewed your profile","added you to a shortlist","saved your media kit"]},
    {type:"approved", icon:"✓", bg:"rgba(52,211,153,.12)",  col:"var(--green)",   msgs:["approved your content","gave your post a 5-star rating","signed the contract"]},
    {type:"offer",    icon:"", bg:"rgba(240,160,80,.15)",  col:"var(--accent2)", msgs:["sent you a partnership offer","invited you to their campaign","wants to discuss a collab"]},
  ];
  const BRANDS = [];
  const AMTS   = [500,800,1200,1500,2000,2500,3000];

  const mkItem = (secsAgo) => {
    const ev   = EVENTS[Math.floor(Math.random()*EVENTS.length)];
    const brand = BRANDS[Math.floor(Math.random()*BRANDS.length)];
    const msg   = ev.msgs[Math.floor(Math.random()*ev.msgs.length)]
      .replace("{amt}", "$"+AMTS[Math.floor(Math.random()*AMTS.length)].toLocaleString())
      .replace("#{num}", "#"+(Math.floor(Math.random()*900)+100));
    return { id:Date.now()+Math.random(), ev, brand, msg, ts:Date.now()-(secsAgo*1000) };
  };

  const [items,  setItems]  = useState(()=>[]);
  const [newest, setNewest] = useState(null);
  const [tick,   setTick]   = useState(0);

  // Tick timestamps every 30s
  useEffect(()=>{
    const id = setInterval(()=>setTick(t=>t+1), 30000);
    return ()=>clearInterval(id);
  },[]);

  // Schedule next event with random delay (8–18s)
  useEffect(()=>{
    if(!BRANDS.length) return;
    const delay = 8000 + Math.random()*10000;
    const id = setTimeout(()=>{
      const item = mkItem(0);
      setNewest(item.id);
      setItems(prev=>[item,...prev].slice(0,12));
      setTimeout(()=>setNewest(null), 700);
    }, delay);
    return ()=>clearTimeout(id);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  },[items.length]);

  const fmtTs = ts => {
    const s = Math.floor((Date.now()-ts)/1000);
    if(s < 5)    return "just now";
    if(s < 60)   return `${s}s ago`;
    if(s < 3600) return `${Math.floor(s/60)}m ago`;
    return `${Math.floor(s/3600)}h ago`;
  };

  return (
    <div className="section">

              display:"flex",gap:10,alignItems:"flex-start",
              animation:item.id===newest?"feedSlideIn 380ms cubic-bezier(.16,1,.3,1) both":"none",
              background:item.id===newest?"rgba(91,138,245,.04)":"transparent",

            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

  {key:"analytics", label:"Analytics uploaded",       weight:25, page:"analytics",        action:"Upload"},
  {key:"ratecard",  label:"Rate card filled in",      weight:15, page:"rate-card",        action:"Fill in"},

function ProfileCompletenessCard({pct, pcDone, setPage}) {
  const R = 42, C = 2 * Math.PI * R;
  const offset = C * (1 - pct / 100);
  const incomplete = PC_ITEMS.filter(it => !pcDone[it.key]);
  const isComplete = pct === 100;
  if (isComplete) return null;
  return (
    <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"20px 22px",marginBottom:20,position:"relative",overflow:"hidden"}}>
      {/* Subtle glow */}
      <div style={{position:"absolute",top:0,right:0,width:180,height:180,background:"radial-gradient(ellipse at top right,rgba(167,139,250,.12) 0%,transparent 70%)",pointerEvents:"none"}}/>
      <div style={{display:"flex",gap:20,alignItems:"flex-start",position:"relative"}}>
        {/* Ring */}
        <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
          <svg viewBox="0 0 104 104" width={96} height={96}>
            <defs>
              <linearGradient id="pcRing" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#5b8af5"/>
                <stop offset="100%" stopColor="#a78bfa"/>
              </linearGradient>
            </defs>
            <circle cx="52" cy="52" r={R} fill="none" stroke="var(--surface2)" strokeWidth="9"/>
            <circle cx="52" cy="52" r={R} fill="none" stroke="url(#pcRing)" strokeWidth="9"
              strokeLinecap="round"
              strokeDasharray={C}
              strokeDashoffset={offset}
              transform="rotate(-90 52 52)"
              style={{transition:"stroke-dashoffset .8s cubic-bezier(.16,1,.3,1)"}}
            />
            <text x="52" y="49" textAnchor="middle" dominantBaseline="middle"
              fill="var(--text)" fontSize="17" fontWeight="800" fontFamily="DM Serif Display,serif">{pct}%</text>
            <text x="52" y="64" textAnchor="middle" dominantBaseline="middle"
              fill="var(--text3)" fontSize="9" fontWeight="600" fontFamily="DM Sans,sans-serif" letterSpacing="0.5">COMPLETE</text>
          </svg>
        </div>
        {/* Content */}
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <span style={{fontFamily:"DM Serif Display,serif",fontSize:"15px",fontWeight:400}}>Profile Completeness</span>
          </div>
          <div style={{fontSize:"12px",color:"var(--text3)",marginBottom:12,lineHeight:1.5}}>Complete your profile so brands can discover and trust you.</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {incomplete.map(it=>(
              <div key={it.key} style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:"rgba(167,139,250,.6)",flexShrink:0}}/>
                <span style={{fontSize:"12px",color:"var(--text2)",flex:1}}>{it.label}</span>
                <span style={{fontSize:"11px",color:"var(--text3)",fontWeight:600,flexShrink:0}}>+{it.weight}%</span>
                <button onClick={()=>setPage(it.page)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"11px",color:"var(--accent)",fontWeight:700,fontFamily:"DM Sans,sans-serif",padding:"2px 0",flexShrink:0}}>{it.action} →</button>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function CreatorDashboard({setPage,setSelected,deals,availStatus,setAvailStatus,userName,socialLinks={},onboarding={},updateOnboarding,profileFlags={},stripeConnected,authUser}) {
  const loading = useSkeleton();
  const [showModal,setShowModal] = useState(false);

  // Compute step completion from real state
  const stepDone = {
    profile:   !!(socialLinks.bio?.trim()||socialLinks.location?.trim()),
    social:    SOCIALS.some(s=>socialLinks[s.key]?.trim()),
    analytics: !!onboarding.steps?.analytics,
    deal:      deals.length > 0,
  };
  const doneCount = Object.values(stepDone).filter(Boolean).length;
  const allDone = doneCount === 4;

  // Profile completeness
  const pcDone = {
    initials:  true,
    bio:       !!socialLinks.bio?.trim(),
    social:    SOCIALS.some(s=>socialLinks[s.key]?.trim()),
    analytics: !!profileFlags.analyticsUploaded,
    ratecard:  !!profileFlags.rateCardFilled,
    avail:     !!profileFlags.availabilitySet,
  };
  const profilePct = PC_ITEMS.reduce((sum,it)=>sum+(pcDone[it.key]?it.weight:0), 0);

  const handleStep = step => {
    if(step.key==="analytics") updateOnboarding&&updateOnboarding({steps:{analytics:true}});
    setShowModal(false);
    updateOnboarding&&updateOnboarding({seen:true});
    setPage(step.page);
  };
  const handleLetsGo = () => {
    setShowModal(false);
    updateOnboarding&&updateOnboarding({seen:true});
    setPage("profile-settings");
  };
  const handleDismiss = () => {
    setShowModal(false);
    updateOnboarding&&updateOnboarding({seen:true});
  };

  if(loading) return <SkeletonPage layout="dashboard"/>;
  const completedStatuses = ["payment_released","Completed"];
  const active = deals.filter(d=>!completedStatuses.includes(d.status));
  const pendingEscrow = deals.filter(d=>["payment_held","content_delivered","payment_processing"].includes(d.status));
  const escrowTotal = pendingEscrow.reduce((s,d)=>s+d.amount,0);
  const firstName = (userName||"there").split(" ")[0];
  const hour = new Date().getHours();
  const greeting = hour<12?"Good morning":hour<17?"Good afternoon":"Good evening";
  return (
    <div className="fade-in">
      {/* Welcome Banner */}
      <div className="welcome-banner" style={{background:"linear-gradient(135deg,#0f4c81,#1a7fa8)"}}>
        <h1>{greeting}, {firstName}</h1>
        <p>{active.length>0?`You have ${active.length} active deal${active.length>1?"s":""} and $${escrowTotal.toLocaleString()} in escrow.`:"Start your first deal and begin earning with brands."}</p>
        <button className="btn" onClick={()=>setPage("new-deal")} style={{marginTop:14,background:"rgba(255,255,255,.15)",color:"#fff",border:"1px solid rgba(255,255,255,.25)",backdropFilter:"blur(4px)",position:"relative",zIndex:1}}>+ New Deal</button>
      </div>

      {/* Stat cards with icons */}
      <div className="g3 section">
        <StatCard label="Active Deals" value={String(active.length)} icon={ICONS.trending(18)} iconBg="rgba(52,211,153,.15)"/>
        <StatCard label="In Escrow" value={"$"+escrowTotal.toLocaleString()} icon={ICONS.dollar(18)} iconBg="rgba(91,138,245,.15)"/>
        <StatCard label="Total Deals" value={String(deals.length)} icon={ICONS.handshake(18)} iconBg="rgba(167,139,250,.15)"/>
      </div>

      {/* Connect bank — only if not connected */}
      {!stripeConnected&&(
        <div className="card" style={{padding:"16px 18px",marginBottom:18,display:"flex",alignItems:"center",gap:12}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>Connect your bank account</div>
            <div style={{fontSize:12,color:"var(--text3)"}}>Set up payouts to receive payments from brand deals.</div>
          </div>
          <button className="btn btn-primary btn-sm" style={{flexShrink:0}} onClick={()=>{window.location.href=`${BRIDGN_API_URL}/api/stripe/onboard?userId=${authUser?.id||""}&email=${encodeURIComponent(authUser?.email||"")}`;}}>Connect Bank</button>
        </div>
      )}

      {/* Profile completeness — only if not 100% */}
      <ProfileCompletenessCard pct={profilePct} pcDone={pcDone} setPage={setPage}/>

      {/* Your deals */}
      <div style={{marginTop:8}}>
        <div className="section-hdr"><span className="section-title">Your Deals</span><button className="section-link" onClick={()=>setPage("deal-room")}>Deal Room</button></div>
        {deals.length===0?(
          <div className="card" style={{padding:"36px 20px",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:600,marginBottom:8}}>No deals yet</div>
            <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.65,marginBottom:16,maxWidth:320,margin:"0 auto 16px"}}>Create your first deal to start managing partnerships with brands.</div>
            <button className="btn btn-primary btn-sm" onClick={()=>setPage("new-deal")}>Create a Deal</button>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {active.map(d=>{
              const stepChecks = [true,d.briefSubmitted,d.contractSigned,(d.contentFile||d.contentFiles?.length>0),d.approvedDeliverables?.length>0&&d.approvedDeliverables.every(Boolean),d.status==="payment_released"];
              const doneSteps = stepChecks.filter(Boolean).length;
              const borderClass = (d.status==="Active"||d.status==="payment_held"||d.status==="content_delivered"||d.status==="content_submitted")?"deal-card-active":(d.status==="Pending"||d.status==="brief_submitted"||d.status==="contract_sent"||d.status==="payment_processing")?"deal-card-pending":"deal-card-completed";
              return (
                <div key={d.id} className={"card card-hover "+borderClass} style={{padding:"14px 16px",cursor:"pointer"}} onClick={()=>{setSelected(d);setPage("deal-room");}}>
                  <div style={{display:"flex",gap:12,alignItems:"center"}}>
                    <div style={{width:38,height:38,borderRadius:10,background:bc(d.ci),display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"white",flexShrink:0}}>{d.bi}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}><span style={{fontSize:14,fontWeight:600}}>{d.brand}</span><StatusBadge s={d.status}/></div>
                      <div style={{fontSize:12,color:"var(--text2)"}}>{d.campaignTitle} · {d.platform}</div>
                      <div className="step-progress">{stepChecks.map((s,i)=><div key={i} className={"step-dot "+(s?"done":i===doneSteps?"current":"todo")}/>)}</div>
                    </div>
                    <div style={{fontSize:16,fontWeight:400,fontFamily:"DM Serif Display,serif",flexShrink:0}}>${d.amount.toLocaleString()}</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Coming soon teaser */}
      <div style={{marginTop:24,padding:"20px 22px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <div style={{fontFamily:"DM Serif Display,serif",fontSize:16,fontWeight:400}}>Creator Discovery</div>
          <span style={{fontSize:10,fontWeight:700,color:"var(--accent)",background:"var(--accent-light)",border:"1px solid var(--accent)",borderRadius:99,padding:"2px 8px",letterSpacing:".04em"}}>COMING SOON</span>
        </div>
        <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.6}}>A swipeable feed where brands post campaigns and creators can browse, match, and apply — like discovering opportunities on TikTok, but for brand deals.</div>
      </div>
    </div>
  );
}

function CampaignsPage({setPage,setSelected,campaignQuestions={},setCampaignQuestions,userName}) {
  const loading = useSkeleton();
  const [liked,setLiked] = useState({});
  const [saved,setSaved] = useState({});
  const [expanded,setExpanded] = useState({});
  const [animating,setAnimating] = useState({});
  const [activeStory,setActiveStory] = useState(null);
  const [filterOpen,setFilterOpen] = useState(false);
  const [commentOpen,setCommentOpen] = useState(null); // campaign id or null
  const [questionText,setQuestionText] = useState("");
  const questionListRef = useRef(null);
  const lastTap = useRef({});

  const sendQuestion = () => {
    const text = questionText.trim();
    if (!text || !commentOpen) return;
    const q = {id: Date.now(), text, creatorName: userName||"You", ts: new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}), reply: null};
    setCampaignQuestions(prev => ({...prev, [commentOpen]: [...(prev[commentOpen]||[]), q]}));
    setQuestionText("");
    setTimeout(() => { if(questionListRef.current) questionListRef.current.scrollTop = questionListRef.current.scrollHeight; }, 80);
  };

  const STORY_BRANDS = [];
  const TIMES=["2h","4h","7h","12h","1d"];
  const PARTICLE_DIRS=[
    {tx:"-30px",ty:"-28px"},{tx:"0px",ty:"-38px"},{tx:"30px",ty:"-28px"},
    {tx:"38px",ty:"0px"},{tx:"30px",ty:"28px"},{tx:"0px",ty:"38px"},
    {tx:"-30px",ty:"28px"},{tx:"-38px",ty:"0px"},
  ];
  const PCOLORS=["#f87171","#fb923c","#facc15","#4ade80","#60a5fa","#c084fc","#f472b6","#34d399"];

  const triggerLike=(id,force=false)=>{
    const willLike=force?true:!liked[id];
    setLiked(l=>({...l,[id]:willLike}));
    if(willLike){
      setAnimating(a=>({...a,[id]:true}));
      setTimeout(()=>setAnimating(a=>({...a,[id]:false})),750);
    }
  };
  const handleImageTap=id=>{
    const now=Date.now();
    if(now-(lastTap.current[id]||0)<320) triggerLike(id,true);
    lastTap.current[id]=now;
  };

  if(loading) return <SkeletonPage layout="grid"/>;
  return (
    <div className="fade-in">
      <div className="ph-row">
        <div><div className="page-title">Campaign Feed</div><div className="page-subtitle">Opportunities matched to your profile.</div></div>

          <span style={{fontSize:"10px",color:"var(--text3)",whiteSpace:"nowrap"}}>For You</span>
        </div>
        {STORY_BRANDS.map((b,i)=>{
          const g=bg(b.ci);
          const isAct=activeStory===b.bi;
          return (
            <div key={i} onClick={()=>setActiveStory(s=>s===b.bi?null:b.bi)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,flexShrink:0,cursor:"pointer"}}>
              <div style={{width:60,height:60,borderRadius:99,padding:2,background:b.active?"linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)":"var(--border)",transition:"transform .15s",transform:isAct?"scale(1.08)":"scale(1)"}}>
                <div style={{width:"100%",height:"100%",borderRadius:99,background:`linear-gradient(135deg,${g[0]},${g[1]})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontWeight:800,color:"white",border:"2.5px solid var(--bg)"}}>{b.bi}</div>

      <div style={{display:"flex",flexDirection:"column",gap:0,maxWidth:620,margin:"0 auto"}}>

// ─── DEAL ROOM ────────────────────────────────────────────────────────────────
function dealRelTime(ts) {
  const now=Date.now(), d=ts instanceof Date?ts:new Date(ts), diff=now-d.getTime();
  if(diff<60000) return "Just now";
  if(diff<3600000) return Math.floor(diff/60000)+"m ago";
  if(diff<86400000) return Math.floor(diff/3600000)+"h ago";
  if(diff<172800000) return "Yesterday";
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
