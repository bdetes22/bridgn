<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Bridgn – Creator & Brand Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d16;--surface:#13161f;--surface2:#191d2c;--border:#21273d;
  --text:#edf0f7;--text2:#8691b0;--text3:#4b5470;
  --accent:#5b8af5;--accent-light:#131d3a;--accent2:#f0a050;--accent2-light:#221608;
  --green:#34d399;--green-bg:#0a2619;--yellow:#fbbf24;--yellow-bg:#201b05;
  --red:#f87171;--red-bg:#270e0e;--purple:#a78bfa;--purple-bg:#181130;
  --teal:#0891b2;--teal-bg:#091d2a;
  --shadow-sm:0 1px 3px rgba(0,0,0,.55),0 1px 2px rgba(0,0,0,.3);
  --shadow:0 4px 24px rgba(0,0,0,.55),0 1px 6px rgba(0,0,0,.35);
  --shadow-lg:0 20px 60px rgba(0,0,0,.7),0 4px 20px rgba(0,0,0,.45);
  --radius:14px;--radius-sm:9px;--radius-lg:20px
}
body{font-family:"Space Grotesk",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 8% 35%,rgba(91,138,245,.11) 0%,transparent 52%),
    radial-gradient(ellipse at 90% 8%,rgba(240,160,80,.09) 0%,transparent 46%),
    radial-gradient(ellipse at 55% 95%,rgba(167,139,250,.05) 0%,transparent 42%)}
#root{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
.app-shell{display:flex;flex-direction:column;min-height:100vh}
.main-layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 64px)}
.sidebar{width:240px;background:rgba(10,11,18,.97);border-right:1px solid var(--border);padding:10px 0 0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.content-area{flex:1;overflow-y:auto;padding:32px 36px;background:var(--bg);background-image:radial-gradient(circle,rgba(255,255,255,.022) 1px,transparent 1px);background-size:28px 28px}
.navbar{height:64px;background:rgba(10,11,18,.93);backdrop-filter:blur(20px) saturate(160%);border-bottom:1px solid var(--border);box-shadow:0 1px 0 rgba(240,160,80,.07),0 4px 24px rgba(0,0,0,.3);display:flex;align-items:center;padding:0 22px;gap:14px;position:sticky;top:0;z-index:100;flex-shrink:0}
.nav-logo{font-family:"Syne",sans-serif;font-size:25px;font-weight:800;letter-spacing:-.5px;margin-right:auto;cursor:pointer;user-select:none;background:linear-gradient(135deg,var(--accent) 0%,#c084fc 48%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.role-toggle{display:flex;background:rgba(0,0,0,.5);border-radius:var(--radius-sm);padding:3px;border:1px solid var(--border)}
.role-btn{padding:5px 16px;border-radius:7px;border:none;cursor:pointer;font-family:"Space Grotesk",sans-serif;font-size:13px;font-weight:500;transition:all .18s;background:transparent;color:var(--text2)}
.role-btn.active{background:var(--surface2);color:var(--text);box-shadow:var(--shadow-sm)}
.nav-notif{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:15px;transition:all .18s}
.nav-notif:hover{border-color:rgba(240,160,80,.4);background:rgba(240,160,80,.08)}
.notif-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);position:absolute;top:7px;right:7px;border:2px solid rgba(10,11,18,.9);box-shadow:0 0 8px rgba(240,160,80,.6)}
.nav-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#7b5bf6);display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 0 0 2px rgba(91,138,245,.25);transition:all .18s}
.nav-avatar:hover{box-shadow:0 0 0 3px rgba(91,138,245,.4),var(--shadow)}
.sidebar-label{font-size:9px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);padding:0 18px;margin:18px 0 5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .16s;border:none;background:none;width:calc(100% - 16px);text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text);transform:translateX(1px)}
.nav-item.active{background:linear-gradient(90deg,rgba(91,138,245,.18),rgba(91,138,245,.05));color:var(--accent);font-weight:600;border-left:2px solid var(--accent);padding-left:12px;box-shadow:inset 0 0 24px rgba(91,138,245,.04)}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:12px 8px 10px;border-top:1px solid var(--border)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm),inset 0 1px 0 rgba(255,255,255,.05)}
.card-lg{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.05)}
.card-hover{transition:box-shadow .22s,transform .22s,border-color .22s;cursor:pointer}
.card-hover:hover{box-shadow:var(--shadow-lg),0 0 0 1px rgba(91,138,245,.14);transform:translateY(-3px);border-color:rgba(91,138,245,.22)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 19px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:"Space Grotesk",sans-serif;font-size:14px;font-weight:600;transition:all .18s;white-space:nowrap;line-height:1;letter-spacing:.01em}
.btn:disabled{opacity:.45;cursor:default}
.btn-primary{background:linear-gradient(135deg,#6699ff,var(--accent));color:white;box-shadow:0 2px 14px rgba(91,138,245,.32),0 1px 3px rgba(0,0,0,.25)}
.btn-primary:hover:not(:disabled){background:linear-gradient(135deg,#78aaff,#6699ff);box-shadow:0 4px 22px rgba(91,138,245,.45),0 1px 4px rgba(0,0,0,.2);transform:translateY(-1px)}
.btn-primary:active:not(:disabled){transform:translateY(0);box-shadow:0 2px 10px rgba(91,138,245,.25)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover:not(:disabled){background:var(--border);border-color:var(--text3)}
.btn-outline{background:transparent;color:var(--accent);border:1px solid rgba(91,138,245,.35)}
.btn-outline:hover{background:var(--accent-light);border-color:var(--accent)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.btn-danger:hover:not(:disabled){background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.35)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.btn-success:hover:not(:disabled){background:rgba(52,211,153,.12)}
.btn-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.btn-teal{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(8,145,178,.2)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:7px;font-weight:500}
.btn-lg{padding:13px 28px;font-size:15px;border-radius:11px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.02em}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.15)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(251,191,36,.15)}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.15)}
.badge-blue{background:var(--accent-light);color:var(--accent);border:1px solid rgba(91,138,245,.18)}
.badge-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.badge-orange{background:var(--accent2-light);color:var(--accent2);border:1px solid rgba(240,160,80,.2)}
.badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.18)}
.badge-teal{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(8,145,178,.18)}
.pb{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700}
.pb-ig{background:#3a1829;color:#f9a8d4;border:1px solid rgba(249,168,212,.12)}
.pb-yt{background:#2a0f0f;color:#fca5a5;border:1px solid rgba(252,165,165,.12)}
.pb-tt{background:#0b2a1c;color:#6ee7b7;border:1px solid rgba(110,231,183,.12)}
.pb-tw{background:#162050;color:#93c5fd;border:1px solid rgba(147,197,253,.12)}
.stat-card{padding:24px;position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;top:-28px;right:-28px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(240,160,80,.12),transparent 68%);pointer-events:none}
.stat-card::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(240,160,80,.18),transparent);pointer-events:none}
.stat-label{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.stat-value{font-size:36px;font-weight:700;color:var(--text);font-family:"Syne",sans-serif;line-height:1;letter-spacing:-.5px}
.stat-change{font-size:12px;margin-top:7px;font-weight:500}
.stat-up{color:var(--green)}.stat-neutral{color:var(--text3)}
.page-title{font-family:"Syne",sans-serif;font-size:36px;font-weight:800;color:var(--text);line-height:1.1;letter-spacing:-.5px}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:5px;line-height:1.5}
.ph-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:32px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.section{margin-bottom:30px}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.01em}
.section-link{font-size:12px;color:var(--accent2);cursor:pointer;font-weight:600;background:none;border:none;font-family:"Space Grotesk",sans-serif;letter-spacing:.02em;transition:color .15s}
.section-link:hover{color:#ffba70}
.deal-row{padding:14px 18px;display:flex;align-items:center;gap:14px}
.deal-row+.deal-row{border-top:1px solid rgba(33,39,61,.9)}
.deal-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:white;flex-shrink:0}
.deal-info{flex:1;min-width:0}
.deal-name{font-size:14px;font-weight:600;color:var(--text)}
.deal-sub{font-size:12px;color:var(--text2);margin-top:2px}
.cr-card{padding:22px;text-align:center}
.cr-av{width:58px;height:58px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:white;box-shadow:0 4px 14px rgba(0,0,0,.35)}
.cr-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:12px 0}
.cr-stat{background:var(--surface2);padding:11px 6px}
.cr-stat-v{font-size:17px;font-weight:700;color:var(--text);font-family:"Syne",sans-serif;letter-spacing:-.2px}
.cr-stat-l{font-size:9px;color:var(--text3);font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
.search-input{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:"Space Grotesk",sans-serif;font-size:14px;background:var(--surface2);color:var(--text);outline:none;transition:border-color .18s,box-shadow .18s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,138,245,.12)}
.filter-btn{padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);font-family:"Space Grotesk",sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.det-banner{height:180px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;display:flex;align-items:flex-end;padding:22px;position:relative;overflow:hidden}
.det-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78),rgba(0,0,0,.08))}
.det-av{width:68px;height:68px;border-radius:50%;border:3px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;color:white;position:relative;z-index:1;box-shadow:0 4px 14px rgba(0,0,0,.35)}
.det-name-wrap{position:relative;z-index:1;margin-left:14px;flex:1}
.det-name{font-size:26px;font-weight:800;color:white;font-family:"Syne",sans-serif;letter-spacing:-.3px}
.det-sub{font-size:13px;color:rgba(255,255,255,.68);margin-top:3px}
.det-body{padding:24px 28px}
.det-stats{display:grid;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:22px}
.det-stat{background:var(--surface2);padding:16px;text-align:center}
.det-stat-v{font-size:24px;font-weight:700;color:var(--text);font-family:"Syne",sans-serif;letter-spacing:-.2px}
.det-stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:800;margin-top:4px}
.det-sec{margin-bottom:22px}
.det-sec-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:10px}
.fg{margin-bottom:18px}
.fl{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:7px;letter-spacing:.01em}
.fi{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:"Space Grotesk",sans-serif;font-size:14px;background:var(--surface2);color:var(--text);outline:none;transition:all .18s}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,138,245,.12)}
.fta{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:"Space Grotesk",sans-serif;font-size:14px;background:var(--surface2);color:var(--text);outline:none;transition:all .18s;resize:vertical;min-height:90px}
.fta:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,138,245,.12)}
.fsel{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:"Space Grotesk",sans-serif;font-size:14px;background:var(--surface2);color:var(--text);outline:none;cursor:pointer}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.prog-bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#7ba8ff)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:12px 18px;border-bottom:1px solid var(--border);background:rgba(10,11,18,.7)}
.tbl td{padding:13px 18px;border-bottom:1px solid rgba(33,39,61,.7);font-size:14px;color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(91,138,245,.03);transition:background .12s}
.collab-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;background:var(--surface2);border-radius:7px;font-size:12px;color:var(--text2);margin:3px;border:1px solid var(--border);transition:all .15s}
.collab-chip:hover{border-color:var(--accent);color:var(--accent)}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:20px 0}
.star-btn{background:none;border:none;cursor:pointer;font-size:21px;padding:2px;transition:transform .15s,filter .15s}
.star-btn:hover{transform:scale(1.25);filter:drop-shadow(0 0 5px rgba(240,160,80,.45))}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInScale{from{opacity:0;transform:translateY(6px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes amberGlow{0%,100%{box-shadow:0 0 0 0 rgba(240,160,80,0)}50%{box-shadow:0 0 18px rgba(240,160,80,.18)}}
.fade-in{animation:fadeInScale .3s cubic-bezier(.16,1,.3,1)}
.trust-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;background:linear-gradient(135deg,rgba(52,211,153,.12),rgba(8,145,178,.1));border:1px solid rgba(52,211,153,.22);border-radius:99px;font-size:11px;font-weight:700;color:var(--green)}
/* ── HAMBURGER (hidden on desktop) ── */
.nav-hamburger{display:none;flex-direction:column;justify-content:center;align-items:center;gap:5px;width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);cursor:pointer;flex-shrink:0}
.nav-hamburger span{display:block;width:16px;height:2px;background:var(--text2);border-radius:2px;transition:all .2s}
.sidebar-mob-header{display:none}
/* ── MOBILE OVERLAY ── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:299;backdrop-filter:blur(2px)}
.sidebar-overlay.show{display:block}
/* ── MOBILE BREAKPOINT ── */
@media(max-width:768px){
  .nav-hamburger{display:flex}
  .sidebar-mob-header{display:flex}
  .sidebar{position:fixed;top:0;left:0;height:100vh;z-index:300;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);width:268px;padding-top:0}
  .sidebar.mob-open{transform:translateX(0)}
  .main-layout{overflow:auto;height:calc(100vh - 64px)}
  .content-area{padding:18px 16px}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr}
  .frow{grid-template-columns:1fr}
  .ph-row{flex-wrap:wrap;gap:12px}
  .stat-value{font-size:26px}
  .page-title{font-size:28px}
  .det-body{padding:16px}
  table.tbl{display:block;overflow-x:auto;white-space:nowrap}
}
@media(max-width:480px){
  .g4,.g3{grid-template-columns:1fr}
  .navbar{padding:0 14px;gap:10px}
  .content-area{padding:14px}
}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const PALETTE = ["#5b8af5","#f0a050","#34d399","#a78bfa","#0891b2","#f87171"];
const GRADS = [["#0f4c81","#1e6bb8"],["#6d28d9","#c17c3a"],["#065f46","#0891b2"],["#9d174d","#c17c3a"],["#0369a1","#0f4c81"],["#be185d","#7c3aed"]];
const bc = i => PALETTE[i % PALETTE.length];
const bg = i => GRADS[i % GRADS.length];

const CAMPAIGNS = [

function PlatformBadge({p}) {
  const map = {Instagram:["pb pb-ig","📸"],YouTube:["pb pb-yt","▶"],TikTok:["pb pb-tt","♪"],Twitter:["pb pb-tw","𝕏"]};
  const [cls,icon] = map[p] || ["pb pb-ig","📸"];
  return React.createElement("span",{className:cls},icon+" "+p);
}

function StatusBadge({s}) {
  const cls = {Active:"badge badge-green",Pending:"badge badge-yellow",Completed:"badge badge-gray",Declined:"badge badge-red",Invited:"badge badge-blue",Expiring:"badge badge-orange",Expired:"badge badge-red",Draft:"badge badge-gray"};
  return React.createElement("span",{className:cls[s]||"badge badge-gray"},s);
}

function Modal({onClose,children,maxWidth=520}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24,backdropFilter:"blur(4px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="card-lg fade-in" style={{width:"100%",maxWidth,position:"relative",maxHeight:"90vh",overflowY:"auto"}}>
        <button onClick={onClose} style={{position:"absolute",top:14,right:14,width:28,height:28,borderRadius:6,border:"1px solid var(--border)",background:"var(--surface2)",cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1,color:"var(--text2)"}}>✕</button>
        {children}
      </div>
    </div>
  );
}

function Toast({msg,emoji}) {
  return (
    <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:"#1a1916",color:"white",borderRadius:12,padding:"11px 20px",fontSize:"14px",fontWeight:600,display:"flex",alignItems:"center",gap:8,zIndex:999,boxShadow:"var(--shadow-lg)",fontFamily:"Space Grotesk,sans-serif",pointerEvents:"none",animation:"fadeIn .18s ease",whiteSpace:"nowrap"}}>
      {emoji&&<span style={{fontSize:"16px"}}>{emoji}</span>}{msg}
    </div>
  );
}

function ExtBadge() {
  return <span style={{fontSize:"10px",background:"var(--accent-light)",color:"var(--accent)",padding:"2px 7px",borderRadius:99,fontWeight:700,flexShrink:0}}>External</span>;
}

function EscrowBadge({released}) {
  return <span style={{fontSize:"10px",background:released?"var(--green-bg)":"rgba(8,145,178,.12)",color:released?"var(--green)":"var(--teal)",padding:"2px 7px",borderRadius:99,fontWeight:700,flexShrink:0,border:"1px solid "+(released?"rgba(52,211,153,.3)":"rgba(8,145,178,.3)")}}>🔒 {released?"Paid":"Escrow"}</span>;
}

function TrustBadge({paidOnTime,total}) {
  if(!total||total<3) return null;
  const pct = Math.round((paidOnTime/total)*100);
  if(pct<90) return null;
  return <span className="trust-badge">✓ Pays on time {pct}%</span>;
}

function StarRating({value,onChange,readonly}) {
  return (
    <div style={{display:"flex",gap:2}}>
      {[1,2,3,4,5].map(n=>(
        <button key={n} onClick={()=>!readonly&&onChange&&onChange(n)} className="star-btn" style={{color:n<=value?"#fbbf24":"var(--border)",cursor:readonly?"default":"pointer"}}>{n<=value?"★":"☆"}</button>
      ))}
    </div>
  );
}

              <div className="fg"><label className="fl">Deliverables</label><input className="fi" value={form.deliverables} onChange={e=>up("deliverables",e.target.value)} placeholder="e.g. 2x Feed Posts, 1x Reel, 3x Stories"/></div>
              <div className="fg"><label className="fl">Notes (optional)</label><textarea className="fta" style={{minHeight:70}} value={form.notes} onChange={e=>up("notes",e.target.value)} placeholder="Any context about how this deal was negotiated..."></textarea></div>
            </>
          )}
          {step===2&&(
            <>
              <div style={{fontSize:"13px",color:"var(--text2)",marginBottom:18}}>Select all that apply. A combined agreement will be generated.</div>
              <div style={{display:"flex",flexDirection:"column",gap:9}}>
                {CONTRACT_TEMPLATES.map(t=>{
                  const sel=contractTypes.includes(t.id);
                  return (
                    <button key={t.id} onClick={()=>setContractTypes(p=>sel?p.filter(x=>x!==t.id):[...p,t.id])} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderRadius:"var(--radius)",border:"2px solid "+(sel?"var(--accent)":"var(--border)"),background:sel?"var(--accent-light)":"var(--surface)",cursor:"pointer",textAlign:"left"}}>
                      <div style={{width:18,height:18,borderRadius:5,border:"2px solid "+(sel?"var(--accent)":"var(--border)"),background:sel?"var(--accent)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{sel&&<span style={{color:"white",fontSize:"10px",fontWeight:700}}>✓</span>}</div>
                      <span style={{fontSize:"20px",flexShrink:0}}>{t.icon}</span>
                      <div style={{flex:1}}><div style={{fontSize:"13px",fontWeight:600,color:sel?"var(--accent)":"var(--text)"}}>{t.label}</div><div style={{fontSize:"12px",color:"var(--text3)",marginTop:1}}>{t.desc}</div></div>

                Hi there,<br/><br/>
                <strong>Jordan Davis</strong> has set up your partnership deal on Bridgn.<br/><br/>
                <strong>Deal summary:</strong><br/>
                Deliverables: {form.deliverables||"TBD"}<br/>
                Value: ${parseInt(form.amount||0).toLocaleString()} on {form.platform}<br/>
                Due: {form.deadline||"TBD"}<br/><br/>
                Click below to join — it takes less than a minute.
              </div>
            </>
          )}
          <div style={{display:"flex",gap:10,marginTop:22}}>
            <button className="btn btn-primary btn-lg" onClick={handleNext} disabled={step===2&&contractTypes.length===0||sending} style={{opacity:(step===2&&contractTypes.length===0)||sending?.5:1}}>

}

                        <div style={{display:"flex",gap:7}}><button onClick={()=>simulate(p)} style={{padding:"6px 12px",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",background:"var(--surface2)",fontFamily:"Space Grotesk,sans-serif",fontSize:"12px",cursor:"pointer",color:"var(--accent)"}}>Update</button><button onClick={()=>remove(p)} className="btn btn-danger btn-sm">Remove</button></div>
                      </div>
                    ):(
                      <div onClick={()=>!isUp&&simulate(p)} style={{border:"2px dashed var(--border)",borderRadius:"var(--radius)",padding:"22px",textAlign:"center",cursor:"pointer",background:"var(--bg)"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=g[0];}} onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";}}>

                      </div>
                    )}

                </div>
              </div>
            </div>
          );
        })}
      </div>
      {toast&&<Toast msg={toast}/>}

  );

}

// ─── RATE CARD ────────────────────────────────────────────────────────────────
function RateCardPage() {
  const [followers,setFollowers] = useState("");

  const [niche,setNiche] = useState("Lifestyle");
  const f=parseInt(followers)||0;const e=parseFloat(eng)||0;
  const hasData=f>0&&e>0;
  const mult={Tech:1.4,Finance:1.4,Fashion:1.2,Beauty:1.15,Wellness:1.1,Gaming:0.9}[niche]||1.0;
  const base=(f/1000)*0.01*e*mult;
  const rates=[["Instagram Feed Post","📸",0.8,1.2],["Instagram Reel","🎬",1.0,1.6],["Instagram Stories (3x)","📱",0.4,0.7],["TikTok Video","♪",0.6,1.1],["YouTube Integration","▶",2.0,3.5],["UGC Package (no post)","🎨",0.3,0.6],["Brand Ambassador (mo.)","🌟",4.0,8.0]].map(([type,icon,lo,hi])=>({type,icon,low:Math.round(base*lo*100)*10,high:Math.round(base*hi*100)*10}));
  const tier=f<10000?"Nano":f<50000?"Micro":f<250000?"Mid-tier":f<1000000?"Macro":"Mega";
  const tierColor=f<10000?"var(--text3)":f<50000?"var(--green)":f<250000?"var(--accent)":f<1000000?"var(--accent2)":"#f87171";
  return (
    <div className="fade-in">

        <div className="card-lg" style={{padding:24}}>
          <div className="fg"><label className="fl">Total Followers</label><input className="fi" value={followers} onChange={e=>setFollowers(e.target.value)} placeholder="280000"/></div>
          <div className="fg"><label className="fl">Avg Engagement Rate (%)</label><input className="fi" value={eng} onChange={e=>setEng(e.target.value)} placeholder="6.2"/></div>
          <div className="fg"><label className="fl">Primary Niche</label><select className="fsel" value={niche} onChange={e=>setNiche(e.target.value)}>{["Lifestyle","Wellness","Fashion","Beauty","Food","Tech","Finance","Gaming","Travel","Fitness","Education"].map(n=><option key={n}>{n}</option>)}</select></div>
          {hasData&&<div style={{padding:"13px 15px",background:"var(--surface2)",borderRadius:"var(--radius)",border:"1px solid var(--border)"}}>
            <div className="det-sec-title" style={{marginBottom:5}}>Your Tier</div>
            <div style={{fontSize:"20px",fontWeight:700,color:tierColor,fontFamily:"Syne,sans-serif"}}>{tier} Creator</div>
            <div style={{fontSize:"12px",color:"var(--text2)",marginTop:3}}>{f.toLocaleString()} followers · {eng}% engagement</div>
          </div>}
        </div>
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <span style={{fontSize:"14px",fontWeight:700}}>Suggested Rates</span>
            {hasData&&<button className="btn btn-secondary btn-sm">Download PDF</button>}
          </div>
          {hasData?(
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {rates.map((r,i)=>(
                <div key={i} className="card" style={{padding:"14px 18px",display:"flex",gap:12,alignItems:"center"}}>
                  <span style={{fontSize:"20px",flexShrink:0}}>{r.icon}</span>
                  <div style={{flex:1}}><div style={{fontSize:"13px",fontWeight:600}}>{r.type}</div><div style={{height:3,background:"var(--surface2)",borderRadius:99,overflow:"hidden",width:140,marginTop:7}}><div style={{height:"100%",borderRadius:99,background:"linear-gradient(90deg,var(--accent),var(--accent2))",width:((i+1)/rates.length*80+20)+"%"}}></div></div></div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:"15px",fontWeight:700,fontFamily:"Syne,sans-serif",color:"var(--accent)"}}>${r.low.toLocaleString()} – ${r.high.toLocaleString()}</div><div style={{fontSize:"10px",color:"var(--text3)",marginTop:2}}>per deliverable</div></div>
                </div>
              ))}
            </div>
          ):(
            <div className="card" style={{padding:"28px 20px",textAlign:"center"}}><div style={{fontSize:"28px",marginBottom:10}}>💲</div><div style={{fontSize:"14px",fontWeight:600,marginBottom:6}}>Enter your stats to see rates</div><div style={{fontSize:"12px",color:"var(--text2)"}}>Add your follower count and engagement rate on the left to generate suggested rates.</div></div>
          )}
        </div>
      </div>
    </div>
  );
}

          )}

  );

// ─── AVAILABILITY ─────────────────────────────────────────────────────────────
function AvailabilityPage() {
  const [status,setStatus] = useState("open");
  const [blocked,setBlocked] = useState([]);
  const [booked,setBooked] = useState([]);
  const days = Array.from({length:30},(_,i)=>i+1);
  const toggle=(d)=>{
    if(booked.includes(d)) return;
    if(blocked.includes(d)){setBlocked(b=>b.filter(x=>x!==d));}
    else{setBlocked(b=>[...b,d]);}
  };
  const getStatus=d=>{if(booked.includes(d))return "booked";if(blocked.includes(d))return "blocked";return "open";};
  const openDays=days.filter(d=>getStatus(d)==="open").length;
  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">Availability</div><div className="page-subtitle">Let brands know when you are open to new work. Click days to block or unblock.</div></div></div>
      <div className="g3 section" style={{gap:12}}>
        {[["Open Days",String(openDays),"var(--green)"],["Blocked",String(blocked.length),"var(--red)"],["Booked",String(booked.length),"var(--accent2)"]].map(([l,v,col],i)=>(
          <div key={i} className="card" style={{padding:"14px 18px",display:"flex",gap:12,alignItems:"center"}}>
            <div style={{width:12,height:12,borderRadius:"50%",background:col,flexShrink:0}}></div>
            <div><div style={{fontSize:"20px",fontWeight:700,fontFamily:"Syne,sans-serif",lineHeight:1,color:col}}>{v}</div><div style={{fontSize:"11px",color:"var(--text3)",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginTop:3}}>{l}</div></div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:16,marginBottom:18,flexWrap:"wrap"}}>
        {[["open","Open","var(--green)"],["blocked","Blocked","var(--red)"],["booked","Booked","var(--accent2)"]].map(([s,l,col])=>(
          <div key={s} style={{display:"flex",gap:7,alignItems:"center"}}><div style={{width:14,height:14,borderRadius:4,background:s==="open"?"rgba(52,211,153,.15)":s==="blocked"?"rgba(248,113,113,.15)":"rgba(240,160,80,.15)",border:"1.5px solid "+col}}></div><span style={{fontSize:"12px",color:"var(--text2)",fontWeight:500}}>{l}</span></div>
        ))}
        <div style={{fontSize:"12px",color:"var(--text3)",marginLeft:"auto"}}>Click open days to block · Click blocked days to unblock</div>
      </div>
      <div className="card-lg" style={{overflow:"hidden",marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 18px",borderBottom:"1px solid var(--border)"}}>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button className="btn btn-secondary btn-sm">‹</button>
            <span style={{fontFamily:"Syne,sans-serif",fontSize:"16px",fontWeight:700}}>April 2025</span>
            <button className="btn btn-secondary btn-sm">›</button>
          </div>
          <button className="btn btn-secondary btn-sm" onClick={()=>setBlocked([])}>Clear All Blocked</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"var(--surface2)",borderBottom:"1px solid var(--border)"}}>
          {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} style={{padding:"9px",textAlign:"center",fontSize:"10px",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text3)"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {[0,1].map(i=><div key={"e"+i} style={{minHeight:66,border:"1px solid var(--border)",background:"var(--surface)"}}></div>)}

            const st=getStatus(d);

            return (
              <div key={d} onClick={()=>toggle(d)} style={{minHeight:66,padding:"10px",border:"1px solid "+bc2,background:bg2,cursor:st==="booked"?"default":"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}} onMouseEnter={e=>{if(st!=="booked")e.currentTarget.style.background=st==="open"?"rgba(91,138,245,.05)":"";}} onMouseLeave={e=>{e.currentTarget.style.background=bg2;}}>
                <span style={{fontSize:"13px",fontWeight:600,color:col}}>{d}</span>

          })}
          {[0,1,2,3,4].map(i=><div key={"f"+i} style={{minHeight:66,border:"1px solid var(--border)",background:"var(--surface)",opacity:.4}}></div>)}
        </div>

    </div>
  );
}

                </>

                <>

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:16}}>
                    {BRIEF_TEMPLATES.map(t=><button key={t.id} onClick={()=>setBriefTemplate(t.id)} style={{padding:"11px 13px",borderRadius:"var(--radius)",border:"2px solid "+(briefTemplate===t.id?"var(--accent)":"var(--border)"),background:briefTemplate===t.id?"var(--accent-light)":"var(--surface)",cursor:"pointer",textAlign:"left",display:"flex",gap:9,alignItems:"center"}}><span style={{fontSize:"18px"}}>{t.icon}</span><div><div style={{fontSize:"12px",fontWeight:600,color:briefTemplate===t.id?"var(--accent)":"var(--text)"}}>{t.label}</div></div></button>)}
                  </div>

                </>

            </div>
          )}

      )}
    </div>
  );
}

// ─── ROI TRACKER ──────────────────────────────────────────────────────────────
function ROITrackerPage() {
  const roiData=[];
  if(!roiData.length) return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">ROI Tracker</div><div className="page-subtitle">Measure the real return on every creator investment.</div></div></div>
      <div className="card" style={{padding:"56px 24px",textAlign:"center",maxWidth:480,margin:"0 auto"}}>
        <div style={{fontSize:"40px",marginBottom:16}}>📈</div>
        <div style={{fontSize:"16px",fontWeight:700,marginBottom:10}}>No ROI data yet</div>
        <div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.75}}>Once you have completed deals, your spend, revenue, and ROI by creator will appear here.</div>
      </div>
    </div>
  );
  const totalSpend=roiData.reduce((s,r)=>s+r.spend,0);const totalRev=roiData.reduce((s,r)=>s+r.revenue,0);const avgROI=Math.round(roiData.reduce((s,r)=>s+r.roi,0)/roiData.length);
  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">ROI Tracker</div><div className="page-subtitle">Measure the real return on every creator investment.</div></div></div>
      <div className="g4 section" style={{gap:12}}>
        {[["Total Spend","$"+totalSpend.toLocaleString()],["Total Revenue","$"+totalRev.toLocaleString()],["Avg ROI",avgROI+"%"],["Net Profit","$"+(totalRev-totalSpend).toLocaleString()]].map(([l,v],i)=>(
          <div key={i} className="card stat-card"><div className="stat-label">{l}</div><div className="stat-value">{v}</div>{i===2&&<div className="stat-change stat-up">↑ vs industry avg 150%</div>}</div>
        ))}
      </div>
      <div className="card-lg" style={{overflow:"hidden"}}>
        <table className="tbl">
          <thead><tr><th>Creator</th><th>Campaign</th><th>Platform</th><th>Spend</th><th>Revenue</th><th>ROI</th><th>Clicks</th><th>Conv.</th></tr></thead>
          <tbody>
            {[...roiData].sort((a,b)=>b.roi-a.roi).map((r,i)=>(
              <tr key={i}>

              <div style={{fontFamily:"Syne,sans-serif",fontSize:26,fontWeight:800,marginBottom:6,letterSpacing:"-.3px"}}>Reset your password</div>
              <div style={{fontSize:13,color:"var(--text2)",marginBottom:24}}>Enter your email and we will send a reset link.</div>
              {error&&<div style={{padding:"10px 14px",background:"var(--red-bg)",border:"1px solid rgba(248,113,113,.3)",borderRadius:"var(--radius-sm)",fontSize:13,color:"var(--red)",marginBottom:16}}>{error}</div>}
              {success&&<div style={{padding:"10px 14px",background:"var(--green-bg)",border:"1px solid rgba(52,211,153,.3)",borderRadius:"var(--radius-sm)",fontSize:13,color:"var(--green)",marginBottom:16}}>{success}</div>}
              <div className="fg"><label className="fl">Email</label><input className="fi" type="email" value={form.email} onChange={e=>up("email",e.target.value)} placeholder="you@example.com"/></div>
              <button onClick={handleReset} disabled={loading||!form.email} className="btn btn-primary btn-lg" style={{width:"100%",opacity:loading||!form.email?.6:1}}>
                {loading?"Sending...":"Send Reset Link"}
              </button>
              <div style={{textAlign:"center",marginTop:20}}><button onClick={()=>{setMode("login");setError("");setSuccess("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--accent)",fontFamily:"Space Grotesk,sans-serif"}}>Back to sign in</button></div>
            </>
          )}
        </div>
        <div style={{textAlign:"center",marginTop:20,fontSize:12,color:"var(--text3)"}}>By signing up you agree to the Bridgn Terms of Service and Privacy Policy.</div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [authUser,setAuthUser] = useState(null);
  const [authLoading,setAuthLoading] = useState(true);
  const [role,setRole] = useState("creator");
  const [page,setPage] = useState("dashboard");
  const [selected,setSelected] = useState(null);
  const [deals,setDeals] = useState([]);
  const [availStatus,setAvailStatus] = useState("open");
  const [mobSidebar,setMobSidebar] = useState(false);

  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      setAuthUser(session?.user||null);
      if(session?.user){
        const r=session.user.user_metadata?.role||"creator";
        setRole(r);
      }
      setAuthLoading(false);
    });
    const {data:{subscription}}=supabase.auth.onAuthStateChange((_event,session)=>{
      setAuthUser(session?.user||null);
      if(session?.user){
        const r=session.user.user_metadata?.role||"creator";
        setRole(r);
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  const handleSignOut=async()=>{
    await supabase.auth.signOut();
    setAuthUser(null);
    setPage("dashboard");
  };

  const addDeal = d => setDeals(x=>[...x,d]);

  if(authLoading) return (
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontFamily:"Syne,sans-serif",fontSize:40,fontWeight:800,letterSpacing:"-1px",background:"linear-gradient(135deg,var(--accent) 0%,#c084fc 48%,var(--accent2) 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>Bridgn</div>
      <div style={{width:28,height:28,border:"2.5px solid var(--border)",borderTop:"2.5px solid var(--accent)",borderRadius:"50%",animation:"spin .8s linear infinite"}}></div>
    </div>
  );

  if(!authUser) return React.createElement(AuthScreen,{onAuth:u=>{setAuthUser(u);const r=u.user_metadata?.role||"creator";setRole(r);}});

  const userName = authUser.user_metadata?.full_name || authUser.email.split("@")[0];
  const userInitials = userName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();

  const render = () => {
    if(role==="creator") {
      switch(page) {
        case "dashboard":    return React.createElement(CreatorDashboard,{setPage,setSelected,deals,availStatus,setAvailStatus,userName});
        case "campaigns":    return React.createElement(CampaignsPage,{setPage,setSelected});
        case "campaign-detail": return React.createElement(CampaignDetail,{campaign:selected,setPage});
        case "deals":        return React.createElement(CreatorDealsPage,{setPage,setSelected,deals});
        case "deal-room":    return React.createElement(DealRoomPage,{setPage,setSelected,deals});
        case "active-deal":  return React.createElement(ActiveDealPage,{deal:selected,setPage});
        case "new-deal":     return React.createElement(NewDealPage,{setPage,onDealCreated:addDeal});
        case "dispute":      return React.createElement(DisputePage,{deal:selected,setPage});
        case "offer":        return React.createElement(OfferPage,{offer:selected,setPage});
        case "analytics":    return React.createElement(CreatorAnalyticsPage,{});
        case "calendar":     return React.createElement(ContentCalendarPage,{deals});
        case "rate-card":    return React.createElement(RateCardPage,{});
        case "media-kit":    return React.createElement(MediaKitPage,{userName,userInitials});
        case "invoices":     return React.createElement(InvoicesPage,{role});
        case "public-profile": return React.createElement(PublicProfilePage,{setPage,userName,userInitials});
        case "earnings":     return React.createElement(EarningsPage,{});
        case "contracts":    return React.createElement(ContractVaultPage,{});
        case "availability": return React.createElement(AvailabilityPage,{});
        case "expenses":     return React.createElement(ExpensesPage,{});
        case "messages":     return React.createElement(MessagesPage,{setPage});
        case "notifications":return React.createElement(NotificationsPage,{setPage});
        default:             return React.createElement(CreatorDashboard,{setPage,setSelected,deals,availStatus,setAvailStatus,userName});
      }
    } else {
      switch(page) {
        case "dashboard":     return React.createElement(BrandDashboard,{setPage,setSelected});
        case "browse":        return React.createElement(BrowseCreatorsPage,{setPage,setSelected});
        case "creator-profile": return React.createElement(CreatorProfilePage,{creator:selected,setPage});
        case "campaigns":     return React.createElement(BrandCampaignsPage,{setPage,setSelected});
        case "campaign-calendar": return React.createElement(CampaignCalendarPage,{});
        case "deals":         return React.createElement(BrandDealsPage,{setPage,setSelected});
        case "deal-room":     return React.createElement(DealRoomPage,{setPage,setSelected,deals});
        case "content-library": return React.createElement(ContentLibraryPage,{});
        case "affiliate":     return React.createElement(AffiliateManagerPage,{});
        case "brief-builder": return React.createElement(BriefBuilderPage,{});
        case "scorecards":    return React.createElement(CreatorScorecardsPage,{});
        case "team":          return React.createElement(TeamManagementPage,{});
        case "roi":           return React.createElement(ROITrackerPage,{});
        case "ai-match":      return React.createElement(AIMatchPage,{setPage,setSelected});
        case "shortlists":    return React.createElement(ShortlistsPage,{setPage,setSelected});
        case "invoices":      return React.createElement(InvoicesPage,{role});
        case "messages":      return React.createElement(MessagesPage,{setPage});
        case "notifications": return React.createElement(NotificationsPage,{setPage});
        default:              return React.createElement(BrandDashboard,{setPage,setSelected});
      }
    }
  };

  return (
    <div className="app-shell">
      <Navbar role={role} setPage={setPage} userInitials={userInitials} onSignOut={handleSignOut} onMenuToggle={()=>setMobSidebar(o=>!o)}/>
      <div className="main-layout">
        <div className={"sidebar-overlay"+(mobSidebar?" show":"")} onClick={()=>setMobSidebar(false)}/>
        <Sidebar role={role} page={page} setPage={setPage} userName={userName} userInitials={userInitials} mobOpen={mobSidebar} onClose={()=>setMobSidebar(false)}/>
        <main className="content-area">
          {render()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
