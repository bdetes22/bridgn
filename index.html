<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Bridgn – Creator & Brand Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;transition:background-color 300ms ease,color 300ms ease,border-color 300ms ease,box-shadow 300ms ease}
:root{
  --bg:#060818;--surface:#13161f;--surface2:#191d2c;--border:#21273d;
  --text:#edf0f7;--text2:#8691b0;--text3:#4b5470;
  --accent:#5b8af5;--accent-light:#131d3a;--accent2:#f0a050;--accent2-light:#221608;
  --green:#34d399;--green-bg:#0a2619;--yellow:#fbbf24;--yellow-bg:#201b05;
  --red:#f87171;--red-bg:#270e0e;--purple:#a78bfa;--purple-bg:#181130;
  --teal:#0891b2;--teal-bg:#091d2a;
  --shadow-sm:0 1px 3px rgba(0,0,0,.55),0 1px 2px rgba(0,0,0,.3);
  --shadow:0 4px 24px rgba(0,0,0,.55),0 1px 6px rgba(0,0,0,.35);
  --shadow-lg:0 20px 60px rgba(0,0,0,.7),0 4px 20px rgba(0,0,0,.45);
  --radius:14px;--radius-sm:9px;--radius-lg:20px
}
html.light{
  --bg:#f8f7f4;--surface:#ffffff;--surface2:#f0ede8;--border:#e0dbd3;
  --text:#1a1a2e;--text2:#5a5a7a;--text3:#9898b8;
  --accent:#4a7ae8;--accent-light:#eaeffd;--accent2:#c4732a;--accent2-light:#fdf3e8;
  --green:#188f5e;--green-bg:#e4f9f2;--yellow:#a07200;--yellow-bg:#fdf7df;
  --red:#c23535;--red-bg:#fde8e8;--purple:#6b4ec4;--purple-bg:#eeebff;
  --teal:#0568a0;--teal-bg:#e0f3ff;
  --shadow-sm:0 1px 4px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 24px rgba(0,0,0,.07),0 1px 6px rgba(0,0,0,.04);
  --shadow-lg:0 20px 60px rgba(0,0,0,.1),0 4px 20px rgba(0,0,0,.07)
}
html.light body{background:#f8f7f4;background-image:none}
html.light body::before,html.light body::after{opacity:0}
html.light .navbar{background:rgba(248,247,244,.94);border-bottom-color:var(--border)}
html.light .navbar::after{opacity:0}
html.light .navbar::before{background:linear-gradient(90deg,transparent,rgba(74,122,232,.4),rgba(108,79,196,.4),rgba(74,122,232,.4),transparent)}
html.light .sidebar{background:linear-gradient(180deg,rgba(255,255,255,.97),rgba(248,247,244,.99));border-right-color:var(--border)}
html.light .sidebar-divider{background:linear-gradient(90deg,transparent,rgba(74,122,232,.15),rgba(108,79,196,.1),transparent)}
html.light .content-area{background-image:radial-gradient(circle,rgba(0,0,0,.03) 1px,transparent 1px)}
html.light .card,html.light .card-lg{background:rgba(255,255,255,.88);border-color:#e8e4de}
html.light .card-hover:hover{box-shadow:0 12px 40px rgba(0,0,0,.09),0 2px 10px rgba(0,0,0,.05)}
html.light .stat-card{background:rgba(255,255,255,.72)}
html.light .stat-value{background:linear-gradient(180deg,#1a1a2e 0%,rgba(26,26,46,.65) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
html.light .tbl th{background:rgba(240,237,232,.92)}
html.light .role-toggle{background:rgba(0,0,0,.05)}
html.light .notif-dot{border-color:rgba(248,247,244,.9)}
html.light .nav-item.active{background:linear-gradient(90deg,rgba(74,122,232,.1),rgba(74,122,232,.06),rgba(74,122,232,.01))}
html.light .nav-item:hover{background:rgba(74,122,232,.06)}
html.light .pb-ig{background:#fde8f0;color:#b01050;border-color:rgba(176,16,80,.15)}
html.light .pb-yt{background:#fde8e8;color:#b80000;border-color:rgba(184,0,0,.15)}
html.light .pb-tt{background:#e4f9f2;color:#0a7248;border-color:rgba(10,114,72,.15)}
html.light .pb-tw{background:#e8f0fd;color:#1a4898;border-color:rgba(26,72,152,.15)}
html.light .skel{background:linear-gradient(90deg,rgba(0,0,0,.04) 25%,rgba(0,0,0,.08) 50%,rgba(0,0,0,.04) 75%);background-size:800px 100%}
body{font-family:"Space Grotesk",sans-serif;background:linear-gradient(180deg,#060818 0%,#0a0f1e 100%);background-attachment:fixed;color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:-10%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 18% 32%,rgba(91,138,245,.08) 0%,transparent 55%),
    radial-gradient(ellipse at 78% 12%,rgba(167,139,250,.06) 0%,transparent 50%);
  animation:nebulaA 28s ease-in-out infinite}
body::after{content:"";position:fixed;inset:-10%;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 52% 88%,rgba(14,165,201,.05) 0%,transparent 48%);
  animation:nebulaB 22s ease-in-out infinite}
#root{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
.app-shell{display:flex;flex-direction:column;min-height:100vh}
.main-layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 64px)}
.sidebar{width:240px;background:linear-gradient(180deg,rgba(10,11,18,.82) 0%,rgba(7,9,15,.88) 100%);backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);border-right:1px solid rgba(255,255,255,.06);padding:10px 0 0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.content-area{flex:1;overflow-y:auto;padding:32px 36px;background:transparent;background-image:radial-gradient(circle,rgba(255,255,255,.022) 1px,transparent 1px);background-size:28px 28px}
.navbar{height:64px;background:rgba(10,11,18,.93);backdrop-filter:blur(20px) saturate(160%);border-bottom:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.3);display:flex;align-items:center;padding:0 22px;gap:14px;position:sticky;top:0;z-index:100;flex-shrink:0}
.navbar::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(91,138,245,.7) 30%,rgba(167,139,250,.8) 50%,rgba(91,138,245,.7) 70%,transparent 100%);pointer-events:none}
.navbar::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(255,255,255,.03) 1px,rgba(255,255,255,.03) 2px);pointer-events:none;z-index:0}
.nav-logo{font-family:"Syne",sans-serif;font-size:25px;font-weight:800;letter-spacing:-.5px;margin-right:auto;cursor:pointer;user-select:none;background:linear-gradient(135deg,var(--accent) 0%,#c084fc 48%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 12px rgba(91,138,245,.55)) drop-shadow(0 0 28px rgba(91,138,245,.2))}
.role-toggle{display:flex;background:rgba(0,0,0,.5);border-radius:var(--radius-sm);padding:3px;border:1px solid var(--border)}
.role-btn{padding:5px 16px;border-radius:7px;border:none;cursor:pointer;font-family:"Space Grotesk",sans-serif;font-size:13px;font-weight:500;transition:all .18s;background:transparent;color:var(--text2)}
.role-btn.active{background:var(--surface2);color:var(--text);box-shadow:var(--shadow-sm)}
.nav-notif{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:15px;transition:all .18s}
.nav-notif:hover{border-color:rgba(240,160,80,.4);background:rgba(240,160,80,.08)}
.notif-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);position:absolute;top:7px;right:7px;border:2px solid rgba(10,11,18,.9);box-shadow:0 0 8px rgba(240,160,80,.6)}
.nav-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#7b5bf6);display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 0 0 2px rgba(91,138,245,.25);transition:all .18s}
.nav-avatar:hover{box-shadow:0 0 0 3px rgba(91,138,245,.4),var(--shadow)}
.sidebar-label{font-size:9px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);padding:0 18px;margin:6px 0 5px}
.sidebar-divider{height:1px;margin:10px 14px 4px;background:linear-gradient(90deg,transparent,rgba(91,138,245,.22),rgba(167,139,250,.16),transparent)}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .18s;border:none;background:none;width:calc(100% - 16px);text-align:left;position:relative;overflow:hidden}
.nav-item::after{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.06) 50%,transparent 100%);transform:translateX(-100%);pointer-events:none;border-radius:inherit}
.nav-item:hover::after{animation:navShimmer .4s ease-out forwards}
.nav-item:hover{background:rgba(91,138,245,.07);color:var(--text);transform:translateX(1px);box-shadow:inset 0 0 20px rgba(91,138,245,.05),0 0 0 1px rgba(91,138,245,.08)}
.nav-item.active{background:linear-gradient(90deg,rgba(14,165,201,.16),rgba(91,138,245,.12),rgba(91,138,245,.03));color:var(--accent);font-weight:600;border-left:2px solid var(--accent);padding-left:12px;box-shadow:-4px 0 12px rgba(91,138,245,.3),inset 0 0 24px rgba(91,138,245,.06),inset 0 1px 0 rgba(14,165,201,.12)}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:12px 8px 10px;border-top:1px solid var(--border)}
.card{background:rgba(255,255,255,.03);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 4px 24px rgba(0,0,0,.3)}
.card-lg{background:rgba(255,255,255,.03);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-lg);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 4px 24px rgba(0,0,0,.3)}
.card-hover{
  transition:box-shadow .22s,transform .55s cubic-bezier(.16,1,.3,1),border-color .22s;
  cursor:pointer;position:relative;
  transform:perspective(1000px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) translateZ(var(--tz,0px));
  will-change:transform}
.card-hover::before{content:"";position:absolute;inset:-1px;border-radius:inherit;background:linear-gradient(135deg,rgba(91,138,245,.4),rgba(167,139,250,.4));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .25s;pointer-events:none;z-index:1}
.card-hover::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:radial-gradient(circle at var(--sx,50%) var(--sy,50%),rgba(255,255,255,.1) 0%,transparent 65%);opacity:var(--so,0);transition:opacity .4s;z-index:1}
.card-hover:hover{box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 24px 64px rgba(0,0,0,.6),0 4px 20px rgba(0,0,0,.35)}
.card-hover:hover::before{opacity:1}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 19px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:"Space Grotesk",sans-serif;font-size:14px;font-weight:600;transition:all .18s;white-space:nowrap;line-height:1;letter-spacing:.01em}
.btn:disabled{opacity:.45;cursor:default}
.btn-primary{background:linear-gradient(135deg,#6699ff,var(--accent));color:white;box-shadow:0 0 20px rgba(91,138,245,.4),0 0 40px rgba(91,138,245,.15),0 2px 14px rgba(91,138,245,.32),0 1px 3px rgba(0,0,0,.25)}
.btn-primary:hover:not(:disabled){background:linear-gradient(135deg,#78aaff,#6699ff);box-shadow:0 0 28px rgba(91,138,245,.6),0 0 60px rgba(91,138,245,.25),0 4px 22px rgba(91,138,245,.45),0 1px 4px rgba(0,0,0,.2);transform:translateY(-1px)}
.btn-primary:active:not(:disabled){transform:translateY(0);box-shadow:0 0 14px rgba(91,138,245,.35),0 0 28px rgba(91,138,245,.12),0 2px 10px rgba(91,138,245,.25)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover:not(:disabled){background:var(--border);border-color:var(--text3)}
.btn-outline{background:transparent;color:var(--accent);border:1px solid rgba(91,138,245,.35)}
.btn-outline:hover{background:var(--accent-light);border-color:var(--accent)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.btn-danger:hover:not(:disabled){background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.35)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.btn-success:hover:not(:disabled){background:rgba(52,211,153,.12)}
.btn-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.btn-teal{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(8,145,178,.2)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:7px;font-weight:500}
.btn-lg{padding:13px 28px;font-size:15px;border-radius:11px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.02em}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.15)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(251,191,36,.15)}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.15)}
.badge-blue{background:var(--accent-light);color:var(--accent);border:1px solid rgba(91,138,245,.18)}
.badge-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.badge-orange{background:var(--accent2-light);color:var(--accent2);border:1px solid rgba(240,160,80,.2)}
.live-dot{position:relative;display:inline-block;width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-right:5px}
.live-dot::after{content:"";position:absolute;inset:0;border-radius:50%;animation:livePulse 2s ease-out infinite}
.live-dot-green{background:var(--green);box-shadow:0 0 5px rgba(52,211,153,.6)}
.live-dot-green::after{background:var(--green)}
.live-dot-amber{background:var(--yellow);box-shadow:0 0 5px rgba(251,191,36,.5)}
.live-dot-amber::after{background:var(--yellow)}
.badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.18)}
.badge-teal{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(8,145,178,.18)}
.pb{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700}
.pb-ig{background:#3a1829;color:#f9a8d4;border:1px solid rgba(249,168,212,.12)}
.pb-yt{background:#2a0f0f;color:#fca5a5;border:1px solid rgba(252,165,165,.12)}
.pb-tt{background:#0b2a1c;color:#6ee7b7;border:1px solid rgba(110,231,183,.12)}
.pb-tw{background:#162050;color:#93c5fd;border:1px solid rgba(147,197,253,.12)}
.stat-card{padding:24px;position:relative;overflow:hidden;background:rgba(255,255,255,.055)}
.stat-card::before{content:"";position:absolute;top:-28px;right:-28px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(240,160,80,.12),transparent 68%);pointer-events:none}
.stat-card::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(240,160,80,.18),transparent);pointer-events:none}
.stat-label{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.stat-value{font-size:36px;font-weight:700;font-family:"Syne",sans-serif;line-height:1;letter-spacing:-.5px;background:linear-gradient(180deg,#ffffff 0%,rgba(255,255,255,.7) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-change{font-size:12px;margin-top:7px;font-weight:500}
.stat-up{color:var(--green)}.stat-neutral{color:var(--text3)}
.page-title{font-family:"Syne",sans-serif;font-size:36px;font-weight:800;color:var(--text);line-height:1.1;letter-spacing:-.5px}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:5px;line-height:1.5}
.ph-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:32px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.section{margin-bottom:30px}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.01em}
.section-link{font-size:12px;color:var(--accent2);cursor:pointer;font-weight:600;background:none;border:none;font-family:"Space Grotesk",sans-serif;letter-spacing:.02em;transition:color .15s}
.section-link:hover{color:#ffba70}
.deal-row{padding:14px 18px;display:flex;align-items:center;gap:14px}
.deal-row+.deal-row{border-top:1px solid rgba(33,39,61,.9)}
.deal-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:white;flex-shrink:0}
.deal-info{flex:1;min-width:0}
.deal-name{font-size:14px;font-weight:600;color:var(--text)}
.deal-sub{font-size:12px;color:var(--text2);margin-top:2px}
.cr-card{padding:22px;text-align:center}
.cr-av{width:58px;height:58px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:white;box-shadow:0 4px 14px rgba(0,0,0,.35)}
.cr-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:12px 0}
.cr-stat{background:var(--surface2);padding:11px 6px}
.cr-stat-v{font-size:17px;font-weight:700;color:var(--text);font-family:"Syne",sans-serif;letter-spacing:-.2px}
.cr-stat-l{font-size:9px;color:var(--text3);font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
.search-input{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:"Space Grotesk",sans-serif;font-size:14px;background:var(--surface2);color:var(--text);outline:none;transition:border-color .18s,box-shadow .18s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,138,245,.12)}
.filter-btn{padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);font-family:"Space Grotesk",sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.det-banner{height:180px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;display:flex;align-items:flex-end;padding:22px;position:relative;overflow:hidden}
.det-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78),rgba(0,0,0,.08))}
.det-av{width:68px;height:68px;border-radius:50%;border:3px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;color:white;position:relative;z-index:1;box-shadow:0 4px 14px rgba(0,0,0,.35)}
.det-name-wrap{position:relative;z-index:1;margin-left:14px;flex:1}
.det-name{font-size:26px;font-weight:800;color:white;font-family:"Syne",sans-serif;letter-spacing:-.3px}
.det-sub{font-size:13px;color:rgba(255,255,255,.68);margin-top:3px}
.det-body{padding:24px 28px}
.det-stats{display:grid;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:22px}
.det-stat{background:var(--surface2);padding:16px;text-align:center}
.det-stat-v{font-size:24px;font-weight:700;color:var(--text);font-family:"Syne",sans-serif;letter-spacing:-.2px}

// ─── DEADLINE ALERT BANNER ───────────────────────────────────────────────────
function DeadlineAlertBanner({deals}) {
  const [now,setNow] = useState(()=>Date.now());
  useEffect(()=>{
    const id = setInterval(()=>setNow(Date.now()),1000);
    return ()=>clearInterval(id);
  },[]);

  const MONTHS={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const parseDeadline = str => {
    if(!str) return null;
    const [m,d] = str.trim().split(" ");
    if(!(m in MONTHS)||!d) return null;
    return new Date(new Date().getFullYear(), MONTHS[m], parseInt(d), 23, 59, 59, 999);
  };

  const fmtCountdown = ms => {
    if(ms<=0) return null;
    const totalSec = Math.floor(ms/1000);
    const h = Math.floor(totalSec/3600);
    const m = Math.floor((totalSec%3600)/60);
    const s = totalSec%60;
    if(h>=24){
      const days=Math.floor(h/24), rh=h%24;
      return `${days}d ${rh}h ${String(m).padStart(2,"0")}m`;
    }
    return `${String(h).padStart(2,"0")}h ${String(m).padStart(2,"0")}m ${String(s).padStart(2,"0")}s`;
  };

  const alerts = (deals||[])
    .filter(d=>d.status!=="Completed")
    .map(d=>{
      const dt = parseDeadline(d.deadline);
      if(!dt) return null;
      return {...d, ms: dt.getTime()-now};
    })
    .filter(Boolean)
    .filter(d=>d.ms <= 72*60*60*1000)
    .sort((a,b)=>a.ms-b.ms);

  if(!alerts.length) return null;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
      {alerts.map(al=>{
        const over = al.ms<=0;
        const col = over?"var(--red)":"var(--yellow)";
        const bg  = over?"rgba(248,113,113,.07)":"rgba(251,191,36,.06)";
        const bdr = over?"rgba(248,113,113,.22)":"rgba(251,191,36,.22)";
        const pill= over?"rgba(248,113,113,.12)":"rgba(251,191,36,.12)";
        const countdown = fmtCountdown(al.ms);
        return (
          <div key={al.id} style={{display:"flex",alignItems:"center",gap:13,padding:"11px 16px",background:bg,border:"1px solid "+bdr,borderLeft:"3px solid "+col,borderRadius:"var(--radius)",animation:over?"none":"deadlinePulse 2.6s ease-in-out infinite"}}>
            <span style={{fontSize:16,flexShrink:0,lineHeight:1}}>{over?"🔴":"⚠️"}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:"13px",fontWeight:700,lineHeight:1.35}}>
                <span style={{color:col}}>{over?"Overdue — ":"Due soon — "}</span>
                <span style={{color:"var(--text)"}}>{al.brand}</span>
                {al.campaignTitle&&al.campaignTitle!=="Custom Deal"&&(
                  <span style={{color:"var(--text2)",fontWeight:500}}> · {al.campaignTitle}</span>
                )}
              </div>
              <div style={{fontSize:"11px",color:"var(--text3)",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{al.deliverables}</div>
            </div>
            <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:"13px",fontWeight:700,color:col,background:pill,border:"1px solid "+bdr,borderRadius:7,padding:"5px 12px",flexShrink:0,letterSpacing:".03em",whiteSpace:"nowrap"}}>
              {over?"OVERDUE":countdown}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Toast({msg, emoji, type, duration=3000, onDone}) {
  const [out, setOut] = useState(false);

  // Infer type from message content when not explicitly passed
  const kind = type||(()=>{
    const m = String(msg);
    if(/✅|uploaded|saved|created|invited|success|added|sent/i.test(m)) return "success";
    if(/❌|error|failed|denied/i.test(m)) return "error";
    if(/removed|deleted|cancelled|⚠️/i.test(m)) return "warning";
    return "info";
  })();

  const palette = {success:"#34d399", error:"#f87171", warning:"#fbbf24", info:"#5b8af5"};
  const color = palette[kind]||palette.info;

  useEffect(()=>{
    // Gentle 880 Hz chime for success via Web Audio API
    if(kind==="success") {
      try {
        const ac = new (window.AudioContext||window.webkitAudioContext)();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.type = "sine";
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0, ac.currentTime);
        gain.gain.linearRampToValueAtTime(0.07, ac.currentTime+0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+0.2);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime+0.22);
      } catch(e) {}
    }
    // Begin exit animation before parent unmounts
    const t1 = setTimeout(()=>setOut(true), duration-380);
    // Signal parent to unmount
    const t2 = setTimeout(()=>onDone&&onDone(), duration);
    return ()=>{ clearTimeout(t1); clearTimeout(t2); };
  }, []);

  return (
    <div style={{
      position:"fixed", top:24, right:24, zIndex:9999,
      minWidth:288, maxWidth:360,
      background:"rgba(10,12,22,.88)",
      backdropFilter:"blur(20px) saturate(150%)",
      WebkitBackdropFilter:"blur(20px) saturate(150%)",
      border:"1px solid rgba(255,255,255,.09)",
      borderLeft:`3px solid ${color}`,
      borderRadius:14,
      padding:"14px 18px 18px",
      display:"flex", alignItems:"flex-start", gap:11,
      boxShadow:"0 8px 40px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.07)",
      fontFamily:'"Space Grotesk",sans-serif',
      pointerEvents:"none",
      overflow:"hidden",
      animation: out
        ? "toastOut .32s ease-in forwards"
        : "toastIn .38s cubic-bezier(.16,1,.3,1) forwards"
    }}>
      {emoji&&<span style={{fontSize:"18px",flexShrink:0,lineHeight:1.3,marginTop:1}}>{emoji}</span>}
      <span style={{fontSize:"14px",fontWeight:600,color:"var(--text)",lineHeight:1.45,flex:1}}>{msg}</span>
      {/* Draining progress bar */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:"rgba(255,255,255,.05)"}}>
        <div style={{
          height:"100%", background:color, opacity:.65,
          animation:`drainBar ${duration}ms linear forwards`
        }}/>
      </div>
    </div>
  );
}

// ─── STAT CARD UTILITIES ──────────────────────────────────────────────────────
function useCountUp(rawValue, duration=1500) {
  const parse = v => {
    const m = String(v).match(/^([^0-9]*)([0-9,]+(?:\.[0-9]+)?)(.*)$/);
    return m ? {pre:m[1], num:parseFloat(m[2].replace(/,/g,'')), suf:m[3]} : null;
  };
  const parsed = React.useMemo(()=>parse(rawValue),[rawValue]);
  // easeOutExpo: starts near full-speed, decelerates exponentially — much snappier than cubic
  const ease = t => t>=1 ? 1 : 1-Math.pow(2,-10*t);
  const fmt = (pre,n,suf) => pre+Math.round(n).toLocaleString()+suf;
  const [display, setDisplay] = useState(()=>parsed ? fmt(parsed.pre,0,parsed.suf) : rawValue);
  const raf = useRef(null);
  useEffect(()=>{
    if(raf.current) cancelAnimationFrame(raf.current);
    if(!parsed||parsed.num===0){setDisplay(rawValue);return;}
    const {pre,num,suf}=parsed;
    const start=performance.now();
    const tick=now=>{
      const t=Math.min((now-start)/duration,1);
      setDisplay(fmt(pre,num*ease(t),suf));
      if(t<1) raf.current=requestAnimationFrame(tick);
      else setDisplay(rawValue);
    };
    raf.current=requestAnimationFrame(tick);
    return ()=>{if(raf.current) cancelAnimationFrame(raf.current);};
  },[rawValue]);
  return display;
}

function StatSparkline({data, color="#5b8af5"}) {
  const pts = (data&&data.length>=2 ? data : [0,0,0,0,0,0,0]);
  const W=80, H=28;
  const max=Math.max(...pts,1), min=Math.min(...pts,0), range=max-min||1;
  const coords=pts.map((v,i)=>[
    parseFloat(((i/(pts.length-1))*W).toFixed(1)),
    parseFloat((H-((v-min)/range)*(H-8)-4).toFixed(1))
  ]);
  const line=coords.map((p,i)=>(i===0?"M":"L")+p[0]+","+p[1]).join(" ");
  const fill=line+" L"+W+","+H+" L0,"+H+" Z";
  const gid="spkg"+color.replace(/[^a-z0-9]/gi,"").slice(-8);
  return (
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:28,display:"block",marginTop:12,overflow:"visible"}}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.2"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={fill} fill={"url(#"+gid+")"}/>
      <path d={line} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

// Renders text character by character at `speed` ms per char when animate=true.
// Falls back to plain text instantly when animate=false.
function TypewriterText({text, animate, speed=30}) {
  const [displayed, setDisplayed] = useState(animate ? "" : text);
  const timer = useRef(null);
  useEffect(() => {
    if (!animate) { setDisplayed(text); return; }
    setDisplayed("");
    let i = 0;
    const tick = () => {
      i++;
      setDisplayed(text.slice(0, i));
      if (i < text.length) timer.current = setTimeout(tick, speed);
    };
    timer.current = setTimeout(tick, speed);
    return () => clearTimeout(timer.current);
  }, [text, animate]);
  return <span>{displayed}</span>;
}

function useConfetti() {
  const [firing,setFiring] = useState(false);
  const timerRef = useRef(null);
  const fire = () => {
    setFiring(true);
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(()=>setFiring(false), 2700);
  };
  useEffect(()=>()=>clearTimeout(timerRef.current),[]);
  return [fire, firing];
}

function ConfettiCanvas({active}) {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);

  useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    if(!active){
      cancelAnimationFrame(rafRef.current);
      canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
      return;
    }
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');

    const COLORS = ['#5b8af5','#a78bfa','#f0a050','#34d399','#0891b2','#c084fc','#fbbf24','#60a5fa','#f472b6','#34d399'];

    const mkP = (ox,oy,spread,speedMult=1) => ({
      x: ox+(Math.random()-.5)*spread, y: oy,
      vx: (Math.random()-.5)*15*speedMult,
      vy: -(Math.random()*13+4)*speedMult,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      w: Math.random()*9+4, h: Math.random()*5+2,
      angle: Math.random()*Math.PI*2,
      spin: (Math.random()-.5)*.28,
      gravity: .27+Math.random()*.12,
      drag: .992,
      shape: Math.random()>.3?'rect':'dot',
    });

    let particles = [];
    const cx=canvas.width*.5, cy=canvas.height*.26;

    // Wave 1 — center burst
    for(let i=0;i<90;i++) particles.push(mkP(cx,cy,60));

    // Wave 2 — side cannons (220ms later)
    const t2=setTimeout(()=>{
      for(let i=0;i<55;i++) particles.push(mkP(canvas.width*.1,canvas.height*.35,30,1.1));
      for(let i=0;i<55;i++) particles.push(mkP(canvas.width*.9,canvas.height*.35,30,1.1));
    },220);

    const start=Date.now(), duration=2500;

    const draw=()=>{
      const elapsed=Date.now()-start;
      if(elapsed>duration){ ctx.clearRect(0,0,canvas.width,canvas.height); return; }
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const fadeAt=duration-700;
      const gA=elapsed>fadeAt?1-(elapsed-fadeAt)/700:1;
      particles.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=p.drag; p.angle+=p.spin;
        if(p.y>canvas.height+30||p.x<-30||p.x>canvas.width+30) return;
        ctx.save();
        ctx.globalAlpha=gA;
        ctx.fillStyle=p.color;
        ctx.translate(p.x,p.y);
        ctx.rotate(p.angle);
        if(p.shape==='rect'){
          ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        } else {
          ctx.beginPath(); ctx.arc(0,0,p.w/2.5,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
      });
      rafRef.current=requestAnimationFrame(draw);
    };
    rafRef.current=requestAnimationFrame(draw);
    return()=>{ clearTimeout(t2); cancelAnimationFrame(rafRef.current); };
  },[active]);

  return <canvas ref={canvasRef} style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9999,display:active?'block':'none'}}/>;
}

                    <div style={{flex:1,minWidth:0}}>

              <button onClick={handleDismiss} className="btn btn-secondary btn-lg">Dismiss</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function CampaignsPage({setPage,setSelected,campaignQuestions={},setCampaignQuestions,userName}) {
  const loading = useSkeleton();
  const [liked,setLiked] = useState({});
  const [saved,setSaved] = useState({});
  const [expanded,setExpanded] = useState({});
  const [animating,setAnimating] = useState({});
  const [activeStory,setActiveStory] = useState(null);
  const [filterOpen,setFilterOpen] = useState(false);
  const [commentOpen,setCommentOpen] = useState(null); // campaign id or null
  const [questionText,setQuestionText] = useState("");
  const questionListRef = useRef(null);
  const lastTap = useRef({});

  const sendQuestion = () => {
    const text = questionText.trim();
    if (!text || !commentOpen) return;
    const q = {id: Date.now(), text, creatorName: userName||"You", ts: new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}), reply: null};
    setCampaignQuestions(prev => ({...prev, [commentOpen]: [...(prev[commentOpen]||[]), q]}));
    setQuestionText("");
    setTimeout(() => { if(questionListRef.current) questionListRef.current.scrollTop = questionListRef.current.scrollHeight; }, 80);
  };

  const STORY_BRANDS = [
    {bi:"HH",ci:0,brand:"Halo Health",active:true},
    {bi:"NT",ci:1,brand:"NovaTech",active:true},
    {bi:"VS",ci:2,brand:"Vestir",active:false},
    {bi:"CU",ci:3,brand:"Culine",active:true},
    {bi:"TC",ci:4,brand:"TrailCo",active:false},
    {bi:"LX",ci:5,brand:"Luxara",active:true},
    {bi:"GF",ci:0,brand:"GlowFit",active:false},
    {bi:"AP",ci:1,brand:"Apex",active:true},
  ];
  const TIMES=["2h","4h","7h","12h","1d"];
  const PARTICLE_DIRS=[
    {tx:"-30px",ty:"-28px"},{tx:"0px",ty:"-38px"},{tx:"30px",ty:"-28px"},
    {tx:"38px",ty:"0px"},{tx:"30px",ty:"28px"},{tx:"0px",ty:"38px"},
    {tx:"-30px",ty:"28px"},{tx:"-38px",ty:"0px"},
  ];
  const PCOLORS=["#f87171","#fb923c","#facc15","#4ade80","#60a5fa","#c084fc","#f472b6","#34d399"];

  const triggerLike=(id,force=false)=>{
    const willLike=force?true:!liked[id];
    setLiked(l=>({...l,[id]:willLike}));
    if(willLike){
      setAnimating(a=>({...a,[id]:true}));
      setTimeout(()=>setAnimating(a=>({...a,[id]:false})),750);
    }
  };
  const handleImageTap=id=>{
    const now=Date.now();
    if(now-(lastTap.current[id]||0)<320) triggerLike(id,true);
    lastTap.current[id]=now;

    <div className="fade-in">
      <div className="ph-row">
        <div><div className="page-title">Campaign Feed</div><div className="page-subtitle">Opportunities matched to your profile.</div></div>

          <button onClick={()=>setFilterOpen(f=>!f)} className="btn btn-secondary btn-sm" style={{display:"flex",alignItems:"center",gap:5}}>🎛 Filter</button>
        </div>
      </div>

      {/* Stories row */}
      <div className="no-scrollbar" style={{display:"flex",gap:14,overflowX:"auto",padding:"4px 2px 18px",marginBottom:2}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,flexShrink:0,cursor:"pointer"}} onClick={()=>setActiveStory(null)}>
          <div style={{width:58,height:58,borderRadius:99,background:"var(--surface2)",border:"2px dashed var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:0}}>✦</div>
          <span style={{fontSize:"10px",color:"var(--text3)",whiteSpace:"nowrap"}}>For You</span>

                <div style={{width:"100%",height:"100%",borderRadius:99,background:`linear-gradient(135deg,${g[0]},${g[1]})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontWeight:800,color:"white",border:"2.5px solid var(--bg)"}}>{b.bi}</div>
              </div>
              <span style={{fontSize:"10px",color:b.active?"var(--text)":"var(--text3)",maxWidth:62,textAlign:"center",lineHeight:1.2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:b.active?600:400}}>{b.brand}</span>

                    </button>

                    ))}
                  </div>

                  {/* Comment */}
                  <button onClick={()=>setCommentOpen(c.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"6px 8px",display:"flex",alignItems:"center",gap:5,borderRadius:8}}>
                    <span style={{fontSize:"21px",lineHeight:1}}>💬</span>
                    <span style={{fontSize:"13px",color:(campaignQuestions[c.id]||[]).length>0?"var(--accent)":"var(--text2)",fontWeight:600,fontFamily:"Space Grotesk,sans-serif"}}>{(campaignQuestions[c.id]||[]).length||commentCount}</span>

                {/* Description with see more */}

                  <div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.65,...(!isExpanded?{display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical",overflow:"hidden"}:{})}}>{c.desc}</div>
                  {!isExpanded&&c.desc.length>100&&(
                    <button onClick={()=>setExpanded(e=>({...e,[c.id]:true}))} style={{background:"none",border:"none",cursor:"pointer",fontSize:"13px",color:"var(--text3)",fontFamily:"Space Grotesk,sans-serif",padding:0,marginTop:1}}>see more</button>
                  )}
                </div>

                {/* Badges */}
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:12}}>

                  <span style={{fontSize:"11px",padding:"3px 9px",borderRadius:99,background:"var(--surface2)",color:"var(--text3)",border:"1px solid var(--border)",fontWeight:500}}>{c.payment}</span>
                </div>

                {/* Requirements footer */}
                <div style={{fontSize:"11px",color:"var(--text3)",borderTop:"1px solid var(--border)",paddingTop:10,paddingBottom:10,lineHeight:1.6}}>

                </div>
              </div>
            </div>

        })}
        <div style={{textAlign:"center",padding:"10px 0 30px",fontSize:"12px",color:"var(--text3)"}}>You're all caught up · <button onClick={()=>setPage("public-profile")} style={{background:"none",border:"none",cursor:"pointer",color:"var(--accent)",fontFamily:"Space Grotesk,sans-serif",fontSize:"12px",fontWeight:600}}>Update your profile to get more matches</button></div>
      </div>

      {/* Comment panel */}
      {commentOpen!==null&&(()=>{
        const campaign = CAMPAIGNS.find(c=>c.id===commentOpen);
        const questions = campaignQuestions[commentOpen]||[];
        return (
          <>
            <div onClick={()=>{setCommentOpen(null);setQuestionText("");}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:400,backdropFilter:"blur(3px)"}}/>
            <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:401,display:"flex",flexDirection:"column",maxHeight:"72vh",animation:"slideUp .32s cubic-bezier(.16,1,.3,1) both",background:"var(--surface)",borderTop:"1px solid var(--border)",borderRadius:"18px 18px 0 0",boxShadow:"0 -8px 40px rgba(0,0,0,.4)"}}>
              {/* Drag handle */}
              <div style={{flexShrink:0,padding:"10px 0 2px",display:"flex",justifyContent:"center"}}>
                <div style={{width:36,height:4,borderRadius:2,background:"var(--border)"}}/>
              </div>
              {/* Header */}
              <div style={{flexShrink:0,padding:"10px 18px 12px",borderBottom:"1px solid var(--border)"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <div style={{flex:1,fontSize:"15px",fontWeight:700,fontFamily:"Syne,sans-serif"}}>{campaign?.title}</div>
                  <button onClick={()=>{setCommentOpen(null);setQuestionText("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:"18px",color:"var(--text3)",lineHeight:1,padding:"2px 4px"}}>✕</button>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"rgba(91,138,245,.07)",border:"1px solid rgba(91,138,245,.18)",borderRadius:"var(--radius-sm)"}}>
                  <span style={{fontSize:"13px"}}>🔒</span>
                  <span style={{fontSize:"12px",color:"var(--text2)",lineHeight:1.45}}>Questions are <strong>private</strong> — only the brand can see these.</span>
                </div>
              </div>
              {/* Questions list */}
              <div ref={questionListRef} style={{flex:1,overflowY:"auto",padding:"14px 18px",display:"flex",flexDirection:"column",gap:14}}>
                {questions.length===0?(
                  <div style={{textAlign:"center",padding:"28px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
                    <div style={{fontSize:"32px"}}>💬</div>
                    <div style={{fontSize:"14px",fontWeight:600}}>No questions yet</div>
                    <div style={{fontSize:"12px",color:"var(--text3)",maxWidth:260,lineHeight:1.6}}>Ask the brand anything about deliverables, payment, timeline, or creative direction.</div>
                  </div>
                ):questions.map(q=>(
                  <div key={q.id} style={{display:"flex",flexDirection:"column",gap:8}}>
                    {/* Creator bubble — right aligned */}
                    <div style={{display:"flex",justifyContent:"flex-end"}}>
                      <div style={{maxWidth:"78%"}}>
                        <div style={{padding:"10px 14px",borderRadius:"18px 18px 4px 18px",background:"var(--accent)",color:"white",fontSize:"13px",lineHeight:1.55}}>{q.text}</div>
                        <div style={{fontSize:"10px",color:"var(--text3)",marginTop:4,textAlign:"right"}}>{q.ts}</div>
                      </div>
                    </div>
                    {/* Brand reply — left aligned */}
                    {q.reply&&(
                      <div style={{display:"flex",justifyContent:"flex-start"}}>
                        <div style={{maxWidth:"78%"}}>
                          <div style={{fontSize:"10px",color:"var(--text3)",marginBottom:3,fontWeight:600}}>{campaign?.brand} replied</div>
                          <div style={{padding:"10px 14px",borderRadius:"18px 18px 18px 4px",background:"var(--surface2)",border:"1px solid var(--border)",fontSize:"13px",color:"var(--text)",lineHeight:1.55}}>{q.reply}</div>
                        </div>
                      </div>
                    )}
                    {!q.reply&&<div style={{fontSize:"10px",color:"var(--text3)",textAlign:"right",marginTop:-4}}>Awaiting reply</div>}
                  </div>
                ))}
              </div>
              {/* Input */}
              <div style={{flexShrink:0,padding:"10px 14px 16px",borderTop:"1px solid var(--border)",display:"flex",gap:9,alignItems:"flex-end",background:"var(--surface)"}}>
                <textarea
                  className="fta"
                  style={{flex:1,margin:0,minHeight:42,maxHeight:110,resize:"none",fontSize:"13px",padding:"10px 13px",lineHeight:1.5}}
                  value={questionText}
                  onChange={e=>setQuestionText(e.target.value)}
                  placeholder="Ask the brand a question..."
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendQuestion();}}}
                />
                <button
                  onClick={sendQuestion}
                  disabled={!questionText.trim()}
                  className="btn btn-primary"
                  style={{flexShrink:0,height:42,opacity:questionText.trim()?1:.45,transition:"opacity .12s"}}
                >Send</button>
              </div>
            </div>
          </>
        );
      })()}
    </div>
  );
}

// ─── NEW DEAL ─────────────────────────────────────────────────────────────────
function NewDealPage({setPage,onDealCreated,userName}) {
  const loading = useSkeleton();
  const [step,setStep] = useState(1);
  const [form,setForm] = useState({brandName:"",brandEmail:"",amount:"",platform:"Instagram",deadline:"",deliverables:"",notes:""});
  const [contractTypes,setContractTypes] = useState(["flat"]);
  const [sending,setSending] = useState(false);
  const [done,setDone] = useState(false);
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));
  if(loading) return <SkeletonPage layout="form"/>;
  if(done) return (
    <div className="fade-in" style={{maxWidth:520,margin:"50px auto",textAlign:"center"}}>
      <div style={{width:68,height:68,borderRadius:20,background:"var(--green-bg)",border:"1.5px solid rgba(52,211,153,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"30px",margin:"0 auto 18px"}}>🎉</div>
      <div className="page-title" style={{marginBottom:8}}>Deal Created!</div>
      <div style={{fontSize:"14px",color:"var(--text2)",lineHeight:1.7,marginBottom:20}}>Your deal with <strong>{form.brandName}</strong> is live. An invitation has been sent to <strong>{form.brandEmail}</strong>.</div>
      <div style={{background:"var(--surface2)",borderRadius:"var(--radius)",padding:"14px 18px",fontSize:"13px",color:"var(--text2)",marginBottom:22,border:"1px solid var(--border)",textAlign:"left"}}>
        <div style={{fontWeight:600,color:"var(--text)",marginBottom:8}}>What happens next:</div>
        {["Brand receives invite email with a secure link","They join Bridgn and see the Deal Room","Manage deliverables, messaging, and payment from here","Funds protected in escrow until content is approved"].map((t,i)=>(
          <div key={i} style={{display:"flex",gap:8,marginTop:6}}><span style={{color:"var(--green)",fontWeight:700,flexShrink:0}}>✓</span><span>{t}</span></div>
        ))}
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"center"}}>
        <button className="btn btn-primary" onClick={()=>setPage("deals")}>View My Deals</button>
        <button className="btn btn-secondary" onClick={()=>{setDone(false);setStep(1);setForm({brandName:"",brandEmail:"",amount:"",platform:"Instagram",deadline:"",deliverables:"",notes:""});setContractTypes(["flat"]);}}>Create Another</button>
      </div>
    </div>
  );
  const handleNext=()=>{
    if(step<3){setStep(s=>s+1);return;}
    setSending(true);
    setTimeout(()=>{
      onDealCreated({id:Date.now(),brand:form.brandName,bi:form.brandName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(),ci:Math.floor(Math.random()*6),amount:parseInt(form.amount)||0,platform:form.platform,status:"Pending",deadline:form.deadline||"TBD",deliverables:form.deliverables,progress:0,source:"external",campaignTitle:"External Deal — "+form.brandName,escrow:false,escrowReleased:false});
      setSending(false);setDone(true);
    },1200);
  };
  return (
    <div className="fade-in">
      <button className="btn btn-secondary btn-sm" style={{marginBottom:18}} onClick={()=>step>1?setStep(s=>s-1):setPage("deals")}>Back</button>
      <div className="ph-row"><div><div className="page-title">Create External Deal</div><div className="page-subtitle">Manage any brand deal you negotiated outside Bridgn.</div></div></div>
      <div style={{display:"flex",alignItems:"center",gap:0,marginBottom:28,maxWidth:480}}>
        {[["Deal Details","📋"],["Contract Type","📝"],["Invite Brand","✉️"]].map(([label,icon],i)=>{
          const sn=i+1;const isDone=step>sn;const isAct=step===sn;
          return (
            <React.Fragment key={i}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{width:34,height:34,borderRadius:"50%",border:"2px solid "+(isDone?"var(--green)":isAct?"var(--accent)":"var(--border)"),background:isDone?"var(--green-bg)":isAct?"var(--accent-light)":"var(--surface)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:700,color:isDone?"var(--green)":isAct?"var(--accent)":"var(--text3)"}}>{isDone?"✓":icon}</div>
                <div style={{fontSize:"11px",fontWeight:500,color:isAct?"var(--accent)":isDone?"var(--green)":"var(--text3)",whiteSpace:"nowrap"}}>{label}</div>
              </div>
              {i<2&&<div style={{flex:1,height:2,background:step>sn?"var(--green)":"var(--border)",margin:"0 6px",marginBottom:18}}></div>}
            </React.Fragment>
          );
        })}
      </div>
      <div style={{maxWidth:620}}>
        <div className="card-lg" style={{padding:28}}>
          {step===1&&(
            <>
              <div className="frow"><div className="fg"><label className="fl">Brand Name</label><input className="fi" value={form.brandName} onChange={e=>up("brandName",e.target.value)} placeholder="e.g. Nike, GlowUp Co."/></div><div className="fg"><label className="fl">Brand Email</label><input className="fi" type="email" value={form.brandEmail} onChange={e=>up("brandEmail",e.target.value)} placeholder="contact@brand.com"/></div></div>
              <div className="frow"><div className="fg"><label className="fl">Agreed Amount ($)</label><input className="fi" type="number" value={form.amount} onChange={e=>up("amount",e.target.value)} placeholder="2500"/></div><div className="fg"><label className="fl">Platform</label><select className="fsel" value={form.platform} onChange={e=>up("platform",e.target.value)}><option>Instagram</option><option>TikTok</option><option>YouTube</option><option>Twitter</option><option>Multiple</option></select></div></div>
              <div className="fg"><label className="fl">Submission Deadline</label><input className="fi" type="date" value={form.deadline} onChange={e=>up("deadline",e.target.value)}/></div>
              <div className="fg"><label className="fl">Deliverables</label><input className="fi" value={form.deliverables} onChange={e=>up("deliverables",e.target.value)} placeholder="e.g. 2x Feed Posts, 1x Reel, 3x Stories"/></div>
              <div className="fg"><label className="fl">Notes (optional)</label><textarea className="fta" style={{minHeight:70}} value={form.notes} onChange={e=>up("notes",e.target.value)} placeholder="Any context about how this deal was negotiated..."></textarea></div>
            </>
          )}
          {step===2&&(
            <>
              <div style={{fontSize:"13px",color:"var(--text2)",marginBottom:18}}>Select all that apply. A combined agreement will be generated.</div>
              <div style={{display:"flex",flexDirection:"column",gap:9}}>
                {CONTRACT_TEMPLATES.map(t=>{
                  const sel=contractTypes.includes(t.id);
                  return (
                    <button key={t.id} onClick={()=>setContractTypes(p=>sel?p.filter(x=>x!==t.id):[...p,t.id])} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderRadius:"var(--radius)",border:"2px solid "+(sel?"var(--accent)":"var(--border)"),background:sel?"var(--accent-light)":"var(--surface)",cursor:"pointer",textAlign:"left"}}>
                      <div style={{width:18,height:18,borderRadius:5,border:"2px solid "+(sel?"var(--accent)":"var(--border)"),background:sel?"var(--accent)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{sel&&<span style={{color:"white",fontSize:"10px",fontWeight:700}}>✓</span>}</div>
                      <span style={{fontSize:"20px",flexShrink:0}}>{t.icon}</span>
                      <div style={{flex:1}}><div style={{fontSize:"13px",fontWeight:600,color:sel?"var(--accent)":"var(--text)"}}>{t.label}</div><div style={{fontSize:"12px",color:"var(--text3)",marginTop:1}}>{t.desc}</div></div>
                    </button>
                  );
                })}
              </div>
            </>
          )}

// ─── RATE CARD ────────────────────────────────────────────────────────────────
function RateCardPage() {
  const loading = useSkeleton();
  const [niche,setNiche] = useState("Lifestyle");
  const [ig,setIg] = useState({followers:"",eng:""});
  const [tt,setTt] = useState({followers:"",eng:""});
  const [yt,setYt] = useState({subscribers:"",views:""});
  const [hideInactive,setHideInactive] = useState(false);

  const nicheMult={Tech:1.4,Finance:1.4,Fashion:1.2,Beauty:1.15,Wellness:1.1,Gaming:0.9}[niche]||1.0;

  // per-platform rate calc
  const calcIG=()=>{
    const f=parseInt(ig.followers)||0, e=parseFloat(ig.eng)||0;
    if(!f||!e) return null;
    const b=(f/1000)*0.01*e*nicheMult;
    const tier=f<10000?"Nano":f<50000?"Micro":f<250000?"Mid-tier":f<1000000?"Macro":"Mega";
    return {
      active:true, tier,
      f, e,
      rates:[
        {type:"Feed Post",icon:"📸",low:Math.round(b*0.8*100)*10,high:Math.round(b*1.2*100)*10},
        {type:"Reel",icon:"🎬",low:Math.round(b*1.0*100)*10,high:Math.round(b*1.6*100)*10},
        {type:"Stories (3×)",icon:"📱",low:Math.round(b*0.4*100)*10,high:Math.round(b*0.7*100)*10},
      ]
    };
  };
  const calcTT=()=>{
    const f=parseInt(tt.followers)||0, e=parseFloat(tt.eng)||0;
    if(!f||!e) return null;
    const b=(f/1000)*0.01*e*nicheMult*0.85; // TikTok CPM slightly lower
    const tier=f<10000?"Nano":f<50000?"Micro":f<250000?"Mid-tier":f<1000000?"Macro":"Mega";
    return {
      active:true, tier,
      f, e,
      rates:[
        {type:"Video",icon:"♪",low:Math.round(b*0.6*100)*10,high:Math.round(b*1.1*100)*10},
        {type:"Live Integration",icon:"🔴",low:Math.round(b*0.4*100)*10,high:Math.round(b*0.8*100)*10},
        {type:"Duet / Stitch",icon:"🔀",low:Math.round(b*0.35*100)*10,high:Math.round(b*0.65*100)*10},
      ]
    };
  };
  const calcYT=()=>{
    const s=parseInt(yt.subscribers)||0, v=parseInt(yt.views)||0;
    if(!s||!v) return null;
    const b=(v/1000)*nicheMult*2.2; // YouTube CPM premium
    const tier=s<10000?"Nano":s<50000?"Micro":s<250000?"Mid-tier":s<1000000?"Macro":"Mega";
    return {
      active:true, tier,
      f:s, extra:`${v.toLocaleString()} avg views`,
      rates:[
        {type:"Dedicated Video",icon:"🎥",low:Math.round(b*1.8*100)*10,high:Math.round(b*3.2*100)*10},
        {type:"Mid-Roll Integration",icon:"▶",low:Math.round(b*0.9*100)*10,high:Math.round(b*1.6*100)*10},
        {type:"Shorts",icon:"⚡",low:Math.round(b*0.3*100)*10,high:Math.round(b*0.6*100)*10},
      ]
    };
  };

  const igData=calcIG(), ttData=calcTT(), ytData=calcYT();
  const anyActive=igData||ttData||ytData;

  const tierColor=tier=>tier==="Nano"?"var(--text3)":tier==="Micro"?"var(--green)":tier==="Mid-tier"?"var(--accent)":tier==="Macro"?"var(--accent2)":"#f87171";

  const PlatformCard=({name,color,icon,data,inputs})=>{
    const isActive=!!data;
    if(hideInactive&&!isActive) return null;
    return (
      <div className="card-lg" style={{padding:0,overflow:"hidden",opacity:isActive?1:0.55}}>
        <div style={{padding:"14px 20px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:10,background:isActive?`linear-gradient(90deg,${color}18,transparent)`:"transparent"}}>
          <span style={{fontSize:"20px"}}>{icon}</span>
          <span style={{fontFamily:"Syne,sans-serif",fontSize:"15px",fontWeight:800,color:isActive?color:"var(--text2)"}}>{name}</span>

      <div style={{display:"flex",flexDirection:"column",gap:16}}>

          inputs={<>
            <div className="fg" style={{margin:0}}><label className="fl">Followers</label><input className="fi" value={ig.followers} onChange={e=>setIg(p=>({...p,followers:e.target.value}))} placeholder="280,000"/></div>

          inputs={<>
            <div className="fg" style={{margin:0}}><label className="fl">Followers</label><input className="fi" value={tt.followers} onChange={e=>setTt(p=>({...p,followers:e.target.value}))} placeholder="150,000"/></div>
            <div className="fg" style={{margin:0}}><label className="fl">Engagement Rate (%)</label><input className="fi" value={tt.eng} onChange={e=>setTt(p=>({...p,eng:e.target.value}))} placeholder="8.4"/></div>
          </>}
        />
        <PlatformCard
          name="YouTube" icon="▶" color="#ff0000" data={ytData}
          inputs={<>
            <div className="fg" style={{margin:0}}><label className="fl">Subscribers</label><input className="fi" value={yt.subscribers} onChange={e=>setYt(p=>({...p,subscribers:e.target.value}))} placeholder="95,000"/></div>
            <div className="fg" style={{margin:0}}><label className="fl">Avg Views per Video</label><input className="fi" value={yt.views} onChange={e=>setYt(p=>({...p,views:e.target.value}))} placeholder="42,000"/></div>
          </>}
        />
      </div>

      {!anyActive&&(
        <div className="card" style={{padding:"32px 20px",textAlign:"center",marginTop:16}}>
          <div style={{fontSize:"30px",marginBottom:10}}>💲</div>
          <div style={{fontSize:"14px",fontWeight:600,marginBottom:6}}>Enter your stats above</div>
          <div style={{fontSize:"12px",color:"var(--text2)"}}>Fill in at least one platform to generate suggested rates. You can add all three for a full picture.</div>
        </div>
      )}

      {anyActive&&(
        <div className="card-lg" style={{padding:"14px 20px",marginTop:16,display:"flex",gap:20,flexWrap:"wrap"}}>
          <div style={{fontSize:"12px",color:"var(--text3)",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",alignSelf:"center"}}>Cross-platform UGC</div>
          {[["UGC Package (no post)","🎨",0.3,0.6],["Brand Ambassador (mo.)","🌟",4.0,8.0]].map(([type,icon,lo,hi])=>{
            const bestBase=Math.max(
              igData?(parseInt(ig.followers)||0)/1000*0.01*(parseFloat(ig.eng)||0)*nicheMult:0,
              ttData?(parseInt(tt.followers)||0)/1000*0.01*(parseFloat(tt.eng)||0)*nicheMult*0.85:0,
              ytData?(parseInt(yt.views)||0)/1000*nicheMult*2.2:0
            );
            return (
              <div key={type} style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:220,padding:"9px 12px",background:"var(--surface2)",borderRadius:"var(--radius-sm)"}}>
                <span style={{fontSize:"16px"}}>{icon}</span>
                <div style={{flex:1,fontSize:"12px",fontWeight:600,color:"var(--text2)"}}>{type}</div>
                <div style={{fontSize:"14px",fontWeight:700,fontFamily:"Syne,sans-serif",color:"var(--accent)"}}>${Math.round(bestBase*lo*100)*10 .toLocaleString()} – ${Math.round(bestBase*hi*100)*10 .toLocaleString()}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── INVOICES ─────────────────────────────────────────────────────────────────
function InvoicesPage({role}) {
  const loading = useSkeleton();
  const [modal,setModal] = useState(null);const [form,setForm] = useState({to:"",amount:"",dueDate:"",notes:""});const [sent,setSent] = useState(false);
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));const isBrand=role==="brand";
  const CINV=[];
  if(loading) return <SkeletonPage layout="list"/>;
  const BINV=[];
  const rows=isBrand?BINV:CINV;const totalPaid=rows.filter(i=>i.status==="Paid").reduce((a,b)=>a+b.amount,0);const pending=rows.filter(i=>i.status==="Pending"||i.status==="Due");
  return (
    <div className="fade-in">
      <div className="ph-row">
        <div><div className="page-title">{isBrand?"Payments":"Invoices"}</div><div className="page-subtitle">{isBrand?"Track and release payments to creators.":"Create and send invoices. Get paid through Bridgn."}</div></div>
        {!isBrand&&<button className="btn btn-primary" onClick={()=>setModal("create")}>+ New Invoice</button>}
      </div>
      <div className="g3 section" style={{gap:12}}>
        {(isBrand?[["Total Paid","$"+totalPaid.toLocaleString(),"💸"],["Pending","$"+pending.reduce((a,b)=>a+b.amount,0).toLocaleString(),"⏳"],["Avg Turnaround","3.2 days","⚡"]]:[["Total Earned","$"+totalPaid.toLocaleString(),"💰"],["Pending Payout","$"+pending.reduce((a,b)=>a+b.amount,0).toLocaleString(),"⏳"],["Sent",String(rows.length),"🧾"]]).map(([l,v,icon],i)=>(
          <div key={i} className="card" style={{padding:"14px 18px",display:"flex",gap:12,alignItems:"center"}}><span style={{fontSize:"24px"}}>{icon}</span><div><div style={{fontSize:"20px",fontWeight:700,fontFamily:"Syne,sans-serif",lineHeight:1}}>{v}</div><div style={{fontSize:"10px",color:"var(--text3)",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginTop:3}}>{l}</div></div></div>
        ))}
      </div>
      <div className="card-lg" style={{overflow:"hidden"}}>
        <table className="tbl">
          <thead><tr><th>Invoice</th><th>{isBrand?"Creator":"Client"}</th><th>Campaign</th><th>Amount</th><th>Date</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {rows.length===0?(
              <tr><td colSpan={7} style={{textAlign:"center",padding:"28px",color:"var(--text3)",fontSize:"13px"}}>No invoices yet</td></tr>
            ):rows.map(inv=>(
              <tr key={inv.id}>
                <td style={{fontWeight:600,color:"var(--accent)"}}>{inv.id}</td>
                <td>{isBrand?inv.from:inv.to}</td>
                <td style={{color:"var(--text2)"}}>{inv.campaign}</td>
                <td style={{fontWeight:700,fontFamily:"Syne,sans-serif"}}>${inv.amount.toLocaleString()}</td>
                <td style={{color:"var(--text3)"}}>{inv.date}</td>
                <td><span className={"badge "+(inv.status==="Paid"?"badge-green":inv.status==="Pending"||inv.status==="Due"?"badge-yellow":"badge-gray")}>{inv.status}</span></td>
                <td>{isBrand&&inv.status==="Due"?<button className="btn btn-primary btn-sm">Release Payment</button>:!isBrand&&inv.status==="Pending"?<button className="btn btn-secondary btn-sm">Follow Up</button>:<button className="btn btn-secondary btn-sm">View</button>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {modal==="create"&&(
        <Modal onClose={()=>{setModal(null);setSent(false);}}>
          {!sent?(
            <div style={{padding:26}}>
              <div style={{fontFamily:"Syne,sans-serif",fontSize:"23px",fontWeight:800,letterSpacing:"-.3px",marginBottom:16}}>Create Invoice</div>
              <div className="fg"><label className="fl">Bill To</label><input className="fi" value={form.to} onChange={e=>up("to",e.target.value)} placeholder="Brand name"/></div>
              <div className="frow"><div className="fg"><label className="fl">Amount ($)</label><input className="fi" type="number" value={form.amount} onChange={e=>up("amount",e.target.value)} placeholder="2500"/></div><div className="fg"><label className="fl">Due Date</label><input className="fi" type="date" value={form.dueDate} onChange={e=>up("dueDate",e.target.value)}/></div></div>
              <div className="fg"><label className="fl">Line Items / Notes</label><textarea className="fta" style={{minHeight:70}} value={form.notes} onChange={e=>up("notes",e.target.value)} placeholder="e.g. 2x Feed Posts, 1x Reel as per agreement..."></textarea></div>
              <div style={{padding:"10px 13px",background:"var(--surface2)",borderRadius:"var(--radius-sm)",fontSize:"12px",color:"var(--text3)",marginBottom:16,display:"flex",gap:6,border:"1px solid var(--border)"}}>💡 Bridgn charges a 2.9% processing fee on payments collected through the platform.</div>
              <div style={{display:"flex",gap:9}}><button onClick={()=>setSent(true)} className="btn btn-primary btn-lg" style={{flex:1}}>Send Invoice</button><button onClick={()=>setModal(null)} className="btn btn-secondary btn-lg">Cancel</button></div>
            </div>
          ):(
            <div style={{padding:26,textAlign:"center"}}><div style={{fontSize:"40px",marginBottom:12}}>🧾</div><div style={{fontFamily:"Syne,sans-serif",fontSize:"23px",fontWeight:800,letterSpacing:"-.3px",marginBottom:8}}>Invoice Sent!</div><div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.7,marginBottom:18}}><strong>{form.to||"The brand"}</strong> has been emailed a payment link.</div><button onClick={()=>{setModal(null);setSent(false);}} className="btn btn-primary">Done</button></div>
          )}
        </Modal>
      )}
    </div>
  );
}

                  <span style={{color:"var(--green)",fontWeight:700,fontSize:13}}>✓ Saved</span>
                </div>
              ):(
                <button
                  onClick={()=>verify(s.key)}
                  disabled={!local[s.key].trim()}
                  className="btn btn-secondary btn-sm"
                  style={{flexShrink:0,width:70,opacity:local[s.key].trim()?1:.45}}
                >Verify</button>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* Bio + Location */}
      <div className="card-lg" style={{padding:24,marginBottom:24}}>
        <div style={{fontSize:"14px",fontWeight:700,marginBottom:16}}>About You</div>
        <div className="fg"><label className="fl">Bio</label><textarea className="fta" value={local.bio} onChange={e=>up("bio",e.target.value)} placeholder="Tell brands what you do, your niche, your audience, and what makes you unique..." style={{minHeight:100}}/></div>
        <div className="fg" style={{marginBottom:0}}><label className="fl">Location</label><input className="fi" value={local.location} onChange={e=>up("location",e.target.value)} placeholder="e.g. Los Angeles, CA"/></div>
      </div>

      <button onClick={save} className="btn btn-primary btn-lg" style={{width:"100%"}}>Save Profile</button>
      {toast&&<Toast msg={toast.m} emoji={toast.e} onDone={()=>setToast(null)}/>}
    </div>
  );
}

// ─── EARNINGS & P&L ──────────────────────────────────────────────────────────
function EarningsPage() {
  const loading = useSkeleton();
  const [goal,setGoal] = useState(()=>{try{const g=parseInt(localStorage.getItem("bridgn_earnings_goal"));return g>0?g:0;}catch{return 0;}});
  const [editGoal,setEditGoal] = useState(false);
  const [goalInput,setGoalInput] = useState("");
  const [fireConfetti,confettiFiring] = useConfetti();
  const firedRef = useRef(false);

  const earningsMonthly = EARNINGS_MONTHLY;
  const earningsByBrand = EARNINGS_BY_BRAND;
  const currentMonth = earningsMonthly[earningsMonthly.length-1];
  const current = currentMonth.amount;
  const pct = goal>0 ? current/goal : 0;
  const done = pct>=1;

  useEffect(()=>{
    if(goal>0 && done && !firedRef.current){
      firedRef.current = true;
      fireConfetti();
    }
  },[goal,done]);

  if(loading) return <SkeletonPage layout="analytics"/>;

  const saveGoal = () => {
    const v = parseInt((goalInput||"").replace(/[^0-9]/g,""))||0;
    if(v>0){
      setGoal(v);
      try{localStorage.setItem("bridgn_earnings_goal",String(v));}catch{}
      firedRef.current = false;
    }
    setEditGoal(false);
    setGoalInput("");
  };

  const maxAmt = Math.max(...earningsMonthly.map(e=>e.amount));
  const ytd = earningsMonthly.reduce((s,e)=>s+e.amount,0);
  const avg = Math.round(ytd/earningsMonthly.length);
  const best = earningsByBrand.reduce((a,b)=>a.amount>b.amount?a:b);

  // SVG ring geometry
  const R=54, CX=64, circ=2*Math.PI*R;
  const dashOffset = circ*(1-Math.min(pct,1));

  return (
    <div className="fade-in">
      <ConfettiCanvas active={confettiFiring}/>

      {/* ── Monthly Goal Card ───────────────────────────────── */}
      <div className="card-lg" style={{padding:"26px 28px",marginBottom:26,position:"relative",overflow:"hidden"}}>
        {/* subtle background glow */}
        {done&&<div style={{position:"absolute",top:-40,right:-40,width:200,height:200,borderRadius:"50%",background:"radial-gradient(circle,rgba(52,211,153,.12),transparent 70%)",pointerEvents:"none"}}/>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
          <div>
            <div style={{fontSize:"14px",fontWeight:700,color:"var(--text)"}}>Monthly Goal</div>
            <div style={{fontSize:"12px",color:"var(--text2)",marginTop:2}}>{currentMonth.month} earnings tracking</div>
          </div>
          {!editGoal&&(
            <button className="btn btn-secondary btn-sm" onClick={()=>{setEditGoal(true);setGoalInput(goal?String(goal):"");}}>
              {goal?"Edit Goal":"Set Goal"}
            </button>
          )}
        </div>

        <div style={{display:"flex",gap:36,alignItems:"center",flexWrap:"wrap"}}>
          {/* Progress ring */}
          <div style={{position:"relative",width:148,height:148,flexShrink:0}}>
            <svg width={148} height={148} style={{transform:"rotate(-90deg)"}}>
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stopColor="#5b8af5"/>
                  <stop offset="55%" stopColor="#a78bfa"/>
                  <stop offset="100%" stopColor="#c084fc"/>
                </linearGradient>
                <filter id="ringGlow">
                  <feGaussianBlur stdDeviation="3" result="blur"/>
                  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
              </defs>
              {/* Track */}
              <circle cx={CX+10} cy={CX+10} r={R} fill="none" stroke="var(--surface2)" strokeWidth={11}/>
              {/* Progress arc */}
              {goal>0&&(
                <circle
                  cx={CX+10} cy={CX+10} r={R}
                  fill="none"
                  stroke={done?"#34d399":"url(#ringGrad)"}
                  strokeWidth={11}
                  strokeLinecap="round"
                  strokeDasharray={circ}
                  strokeDashoffset={dashOffset}
                  filter={done?"url(#ringGlow)":undefined}
                  style={{transition:"stroke-dashoffset .75s cubic-bezier(.16,1,.3,1),stroke .4s ease"}}
                />
              )}
            </svg>
            {/* Center label */}
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
              {goal>0 ? (
                <>
                  <div style={{fontSize:done?"20px":"26px",fontWeight:800,fontFamily:"Syne,sans-serif",lineHeight:1,color:done?"var(--green)":"var(--text)",transition:"color .4s"}}>
                    {done?"🎉":Math.round(Math.min(pct,1)*100)+"%"}
                  </div>
                  {!done&&<div style={{fontSize:"10px",color:"var(--text3)",marginTop:4,fontWeight:600,letterSpacing:".04em"}}>OF GOAL</div>}
                </>
              ):(
                <div style={{fontSize:"11px",color:"var(--text3)",textAlign:"center",padding:"0 16px",lineHeight:1.45}}>No goal set</div>
              )}
            </div>
          </div>

          {/* Right panel */}
          <div style={{flex:1,minWidth:200}}>
            {editGoal ? (
              <div>
                <div style={{fontSize:"12px",fontWeight:600,color:"var(--text2)",marginBottom:10}}>Set your target for {currentMonth.month}</div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <div style={{position:"relative",flex:1}}>
                    <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"var(--text2)",fontWeight:700,fontSize:15,pointerEvents:"none"}}>$</span>
                    <input className="fi" style={{paddingLeft:24}} type="number" placeholder="e.g. 15000" value={goalInput} onChange={e=>setGoalInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveGoal()} autoFocus/>
                  </div>
                  <button className="btn btn-primary btn-sm" onClick={saveGoal}>Save</button>
                  <button className="btn btn-secondary btn-sm" onClick={()=>setEditGoal(false)}>Cancel</button>
                </div>
                {goal>0&&<div style={{fontSize:"11px",color:"var(--text3)",marginTop:8}}>Current goal: ${goal.toLocaleString()}</div>}
              </div>
            ) : goal>0 ? (
              <div style={{display:"flex",flexDirection:"column",gap:16}}>
                <div style={{display:"flex",gap:28,flexWrap:"wrap"}}>
                  <div>
                    <div style={{fontSize:"10px",fontWeight:800,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>Earned ({currentMonth.month})</div>
                    <div style={{fontSize:"30px",fontWeight:800,fontFamily:"Syne,sans-serif",color:"var(--accent)",lineHeight:1}}>${current.toLocaleString()}</div>
                  </div>
                  <div>
                    <div style={{fontSize:"10px",fontWeight:800,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>Target</div>
                    <div style={{fontSize:"30px",fontWeight:800,fontFamily:"Syne,sans-serif",color:"var(--text)",lineHeight:1}}>${goal.toLocaleString()}</div>
                  </div>
                </div>
                {done ? (
                  <div style={{display:"inline-flex",alignItems:"center",gap:8,padding:"10px 16px",background:"var(--green-bg)",border:"1px solid rgba(52,211,153,.25)",borderRadius:"var(--radius-sm)"}}>
                    <span style={{fontSize:16}}>🎉</span>
                    <span style={{fontSize:"13px",fontWeight:700,color:"var(--green)"}}>Goal reached! You crushed it this month.</span>
                  </div>
                ) : (
                  <div>
                    <div style={{fontSize:"10px",fontWeight:800,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>Still needed</div>
                    <div style={{fontSize:"22px",fontWeight:700,fontFamily:"Syne,sans-serif",color:"var(--accent2)"}}>${(goal-current).toLocaleString()}</div>
                    <div style={{marginTop:10,height:5,background:"var(--surface2)",borderRadius:99,overflow:"hidden",maxWidth:280}}>
                      <div style={{height:"100%",width:(Math.min(pct,1)*100)+"%",background:"linear-gradient(90deg,var(--accent),#a78bfa)",borderRadius:99,transition:"width .75s cubic-bezier(.16,1,.3,1)"}}/>
                    </div>
                  </div>
                )}
              </div>
            ) : (
              <div>
                <div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.65,marginBottom:14}}>Set a monthly income target and watch your progress fill up in real time. Hit your goal and we'll celebrate with you. 🎉</div>
                <button className="btn btn-primary btn-sm" onClick={()=>{setEditGoal(true);setGoalInput("");}}>Set a goal →</button>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ── Page header + stats ─────────────────────────────── */}
      <div className="ph-row"><div><div className="page-title">Earnings & P&L</div><div className="page-subtitle">Your income, brand performance, and business health at a glance.</div></div><button className="btn btn-secondary">Export CSV</button></div>
      <div className="g4 section" style={{gap:12}}>
        {[
          {l:"YTD Earnings",v:"$"+ytd.toLocaleString(),spk:earningsMonthly.map(m=>m.amount),sc:"#34d399"},
          {l:"Monthly Avg",v:"$"+avg.toLocaleString(),spk:earningsMonthly.map(m=>m.amount)},
          {l:"Best Brand",v:best.brand,spk:earningsByBrand.map(b=>b.amount),vs:{fontSize:"18px",WebkitTextFillColor:"rgba(255,255,255,.85)"}},
          {l:"Deals Closed",v:String(earningsByBrand.reduce((s,b)=>s+b.deals,0)),spk:earningsByBrand.map(b=>b.deals)}
        ].map((s,i)=>(
          <StatCard key={i} label={s.l} value={s.v} sparkData={s.spk} sparkColor={s.sc} valueStyle={s.vs}/>
        ))}
      </div>
      <div className="g2" style={{gap:20,alignItems:"start"}}>
        <div>
          <div className="section">
            <div className="section-hdr"><span className="section-title">Monthly Revenue</span><span style={{fontSize:"12px",color:"var(--text3)"}}>Last 6 months</span></div>
            <div className="card-lg" style={{padding:"20px 22px"}}>
              <div style={{display:"flex",alignItems:"flex-end",gap:10,height:140}}>
                {earningsMonthly.map((m,i)=>{
                  const h=Math.round((m.amount/maxAmt)*120);const isLast=i===earningsMonthly.length-1;
                  return (
                    <div key={m.month} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                      <div style={{fontSize:"10px",color:isLast?"var(--accent)":"var(--text3)",fontWeight:isLast?700:400}}>${(m.amount/1000).toFixed(1)}k</div>
                      <div style={{width:"100%",borderRadius:"5px 5px 0 0",background:isLast?"linear-gradient(180deg,var(--accent),#3d6bc9)":"var(--surface2)",height:h,transition:"height .4s",border:"1px solid "+(isLast?"rgba(91,138,245,.3)":"var(--border)")}}></div>
                      <div style={{fontSize:"11px",color:isLast?"var(--accent)":"var(--text3)",fontWeight:isLast?700:400}}>{m.month}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
          <div className="section">
            <div className="section-hdr"><span className="section-title">By Brand</span></div>
            <div className="card-lg" style={{overflow:"hidden"}}>
              {earningsByBrand.map((b,i)=>(
                <div key={i} className="deal-row" style={i>0?{borderTop:"1px solid var(--border)"}:{}}>

                  <div style={{fontWeight:700,fontFamily:"Syne,sans-serif",fontSize:"16px"}}>${b.amount.toLocaleString()}</div>

          </div>

        <div>
          <div className="section">
            <div className="section-hdr"><span className="section-title">Best Performing Deals</span></div>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>

                  <div style={{fontSize:"15px",fontWeight:700,fontFamily:"Syne,sans-serif",color:"var(--accent)"}}>{val}</div>
                </div>

            <div className="section-hdr"><span className="section-title">Quick Insights</span></div>

              {[["📈","Month over month growth","+38% in March"],["💡","Fastest growing niche","Wellness paying 1.4x average"],["⚡","Avg days to payment","4.2 days after approval"],["🏆","Top earning platform","Instagram (68% of revenue)"]].map(([icon,label,val],i,arr)=>(

      </div>
    </div>
  );
