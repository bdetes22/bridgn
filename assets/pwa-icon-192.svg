<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2951"/>
      <stop offset="100%" stop-color="#2d4a8a"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ab4f8"/>
      <stop offset="100%" stop-color="#5b8af5"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <!-- Bridge arches -->
  <g transform="translate(96,105) scale(0.09)" fill="none" stroke="url(#bridge)" stroke-width="48" stroke-linecap="round">
    <path d="M-700,0 Q-700,-320 -350,-320 Q0,-320 0,0"/>
    <path d="M0,0 Q0,-320 350,-320 Q700,-320 700,0"/>
  </g>
  <!-- Road -->
  <rect x="24" y="108" width="144" height="6" rx="3" fill="url(#bridge)" opacity="0.9"/>
  <!-- bridgn text -->
  <text x="96" y="152" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="28" font-weight="800" fill="white" letter-spacing="1">bridgn</text>
</svg>
