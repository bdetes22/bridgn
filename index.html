// ─── EARNINGS & P&L ──────────────────────────────────────────────────────────
function EarningsPage({deals=[]}) {
  const loading = useSkeleton();
  const [goal,setGoal] = useState(()=>{try{const g=parseInt(localStorage.getItem("bridgn_earnings_goal"));return g>0?g:0;}catch{return 0;}});
  const [editGoal,setEditGoal] = useState(false);
  const [goalInput,setGoalInput] = useState("");
  const [fireConfetti,confettiFiring] = useConfetti();
  const firedRef = useRef(false);

  // Compute earnings from real deals
  const paidDeals = deals.filter(d=>["payment_held","payment_released","content_delivered","payment_processing"].includes(d.status));
  const releasedDeals = deals.filter(d=>d.status==="payment_released");

  // Group by month
  const monthMap = {};
  paidDeals.forEach(d=>{
    const monthKey = d.deadline && d.deadline!=="TBD" ? (()=>{try{const dt=new Date(d.deadline+"T00:00:00");return dt.toLocaleDateString("en-US",{month:"short",year:"numeric"});}catch{return "Unknown";}})() : "Unknown";
    if(!monthMap[monthKey]) monthMap[monthKey]={month:monthKey,amount:0};
    monthMap[monthKey].amount += d.amount||0;
  });
  const earningsMonthly = Object.values(monthMap).slice(-6);

  // Group by brand
  const brandMap = {};
  paidDeals.forEach(d=>{
    const brand = d.brand||"Unknown";
    if(!brandMap[brand]) brandMap[brand]={brand,bi:(brand||"BR").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(),ci:Math.abs(brand.length)%6,amount:0,deals:0};
    brandMap[brand].amount += d.amount||0;
    brandMap[brand].deals += 1;
  });
  const earningsByBrand = Object.values(brandMap).sort((a,b)=>b.amount-a.amount).map(b=>({...b,avgDeal:b.deals?Math.round(b.amount/b.deals):0}));

  const hasEarnings = paidDeals.length > 0;
  const now = new Date();
  const currentMonthLabel = now.toLocaleDateString("en-US",{month:"short",year:"numeric"});
  const currentMonthDeals = paidDeals.filter(d=>{try{const dt=new Date(d.deadline+"T00:00:00");return dt.getMonth()===now.getMonth()&&dt.getFullYear()===now.getFullYear();}catch{return false;}});
  const current = currentMonthDeals.reduce((s,d)=>s+(d.amount||0),0);
  const pct = goal>0 ? current/goal : 0;
  const done = pct>=1;

  useEffect(()=>{
    if(goal>0 && done && !firedRef.current){
      firedRef.current = true;
      fireConfetti();
    }
  },[goal,done]);

  if(loading) return <SkeletonPage layout="analytics"/>;

  const saveGoal = () => {
    const v = parseInt((goalInput||"").replace(/[^0-9]/g,""))||0;
    if(v>0){
      setGoal(v);
      try{localStorage.setItem("bridgn_earnings_goal",String(v));}catch{}
      firedRef.current = false;
    }
    setEditGoal(false);
    setGoalInput("");
  };

  const maxAmt = earningsMonthly.length ? Math.max(...earningsMonthly.map(e=>e.amount)) : 0;
  const ytd = earningsMonthly.reduce((s,e)=>s+e.amount,0);
  const avg = earningsMonthly.length ? Math.round(ytd/earningsMonthly.length) : 0;
  const best = earningsByBrand.length ? earningsByBrand.reduce((a,b)=>a.amount>b.amount?a:b) : {brand:"—",amount:0};

  // SVG ring geometry
  const R=54, CX=64, circ=2*Math.PI*R;
  const dashOffset = circ*(1-Math.min(pct,1));

  return (
    <div className="fade-in">
      <ConfettiCanvas active={confettiFiring}/>

      {/* ── Monthly Goal Card ───────────────────────────────── */}
      <div className="card-lg" style={{padding:"26px 28px",marginBottom:26,position:"relative",overflow:"hidden"}}>
        {/* subtle background glow */}
        {done&&<div style={{position:"absolute",top:-40,right:-40,width:200,height:200,borderRadius:"50%",background:"radial-gradient(circle,rgba(52,211,153,.12),transparent 70%)",pointerEvents:"none"}}/>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
          <div>
            <div style={{fontSize:"14px",fontWeight:700,color:"var(--text)"}}>Monthly Goal</div>
            <div style={{fontSize:"12px",color:"var(--text2)",marginTop:2}}>{currentMonthLabel+" earnings tracking"}</div>
          </div>
          {!editGoal&&(
            <button className="btn btn-secondary btn-sm" onClick={()=>{setEditGoal(true);setGoalInput(goal?String(goal):"");}}>
              {goal?"Edit Goal":"Set Goal"}
            </button>
          )}
        </div>

        <div style={{display:"flex",gap:36,alignItems:"center",flexWrap:"wrap"}}>
          {/* Progress ring */}
          <div style={{position:"relative",width:148,height:148,flexShrink:0}}>
            <svg width={148} height={148} style={{transform:"rotate(-90deg)"}}>
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stopColor="#5b8af5"/>
                  <stop offset="55%" stopColor="#a78bfa"/>
                  <stop offset="100%" stopColor="#c084fc"/>
                </linearGradient>
                <filter id="ringGlow">
                  <feGaussianBlur stdDeviation="3" result="blur"/>
                  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
              </defs>
              {/* Track */}
              <circle cx={CX+10} cy={CX+10} r={R} fill="none" stroke="var(--surface2)" strokeWidth={11}/>
              {/* Progress arc */}
              {goal>0&&(
                <circle
                  cx={CX+10} cy={CX+10} r={R}
                  fill="none"
                  stroke={done?"#34d399":"url(#ringGrad)"}
                  strokeWidth={11}
                  strokeLinecap="round"
                  strokeDasharray={circ}
                  strokeDashoffset={dashOffset}
                  filter={done?"url(#ringGlow)":undefined}
                  style={{transition:"stroke-dashoffset .75s cubic-bezier(.16,1,.3,1),stroke .4s ease"}}
                />
              )}
            </svg>
            {/* Center label */}
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
              {goal>0 ? (
                <>
                  <div style={{fontSize:done?"20px":"26px",fontWeight:400,fontFamily:"DM Serif Display,serif",lineHeight:1,color:done?"var(--green)":"var(--text)",transition:"color .4s"}}>
                    {done?"100%":Math.round(Math.min(pct,1)*100)+"%"}
                  </div>
                  {!done&&<div style={{fontSize:"10px",color:"var(--text3)",marginTop:4,fontWeight:600,letterSpacing:".04em"}}>OF GOAL</div>}
                </>
              ):(
                <div style={{fontSize:"11px",color:"var(--text3)",textAlign:"center",padding:"0 16px",lineHeight:1.45}}>No goal set</div>
              )}
            </div>
          </div>

          {/* Right panel */}
          <div style={{flex:1,minWidth:200}}>
            {editGoal ? (
              <div>
                <div style={{fontSize:"12px",fontWeight:600,color:"var(--text2)",marginBottom:10}}>Set your target for {currentMonthLabel}</div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <div style={{position:"relative",flex:1}}>
                    <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"var(--text2)",fontWeight:700,fontSize:15,pointerEvents:"none"}}>$</span>

// ─── COLLABORATORS ───────────────────────────────────────────────────────────
function CollaboratorsPage({authUser,role,setPage,deals=[]}) {
  const loading = useSkeleton();
  const [collaborators,setCollaborators] = useState([]);
  const [loadingCollabs,setLoadingCollabs] = useState(true);

  useEffect(()=>{
    if(!authUser?.id) return;
    fetch(`${BRIDGN_API_URL}/api/deals/collaborators?userId=${authUser.id}`)
      .then(r=>r.json())
      .then(d=>setCollaborators(d.collaborators||[]))
      .catch(()=>{})
      .finally(()=>setLoadingCollabs(false));
  },[authUser?.id]);

  if(loading) return <SkeletonPage layout="list"/>;

  const handleNewDeal = (collab) => {
    // Store pre-fill data for the deal form
    localStorage.setItem("bridgn_prefill_deal", JSON.stringify({
      name: collab.name,
      userId: collab.userId,
    }));
    setPage("new-deal");
  };

  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">Collaborators</div><div className="page-subtitle">People you've worked with on completed deals.</div></div></div>
      {loadingCollabs?(
        <div style={{textAlign:"center",padding:"60px 0",color:"var(--text3)"}}>
          <div style={{fontSize:"16px",animation:"spin .9s linear infinite",display:"inline-block",marginBottom:8}}>⟳</div>
          <div style={{fontSize:"13px"}}>Loading collaborators...</div>
        </div>
      ):collaborators.length===0?(
        <div className="card-lg" style={{padding:"60px 28px",textAlign:"center"}}>
          <div style={{fontSize:"40px",marginBottom:12}}>🤝</div>
          <div style={{fontSize:"15px",fontWeight:600,color:"var(--text)",marginBottom:6}}>No collaborators yet</div>
          <div style={{fontSize:"13px",color:"var(--text3)",lineHeight:1.6,maxWidth:380,margin:"0 auto"}}>Complete your first deal and your partners will appear here. You'll be able to quickly send them new deals.</div>
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
          {collaborators.map(c=>{
            const ci = Math.abs(c.name.length)%6;
            const g = bg(ci);
            return (
              <div key={c.userId} className="card card-hover" style={{padding:"18px 20px"}}>
                <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
                  <div style={{width:42,height:42,borderRadius:12,background:`linear-gradient(135deg,${g[0]},${g[1]})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontWeight:700,color:"white",flexShrink:0}}>{c.initials}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:"14px",fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                    <div style={{fontSize:"11px",color:"var(--text3)",marginTop:2}}>{c.dealCount} deal{c.dealCount!==1?"s":""} completed</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,justifyContent:"space-between",alignItems:"center",paddingTop:10,borderTop:"1px solid var(--border)"}}>
                  <div style={{fontSize:"11px",color:"var(--text3)"}}>
                    ${c.totalAmount.toLocaleString()} total · Last: {c.lastDealDate?new Date(c.lastDealDate).toLocaleDateString("en-US",{month:"short",year:"numeric"}):"—"}
                  </div>
                  <button className="btn btn-primary btn-sm" onClick={()=>handleNewDeal(c)}>New Deal</button>

// ─── CONTRACT VAULT ───────────────────────────────────────────────────────────
function ContractVaultPage({authUser,deals=[]}) {
  const loading = useSkeleton();
  const [previewFile,setPreviewFile] = useState(null);

  // Build contract list from real deal data
  const contracts = deals.filter(d=>d.contractFile||d.signedFile||d.contractSent).map(d=>({
    id:d.id,
    brand:d.brand||"Brand",
    creatorName:d.creatorName||"Creator",
    campaign:d.campaignTitle||"Deal",
    amount:d.amount||0,
    contractFile:d.contractFile,
    signedFile:d.signedFile,
    contractSigned:d.contractSigned,
    contractSignedAt:d.contractSignedAt,
    contractLink:d.contractLink,
    status:d.contractSigned?"Signed":"Pending",
  }));

  const previewUrl = (url) => {
    if(!url) return url;
    const ext = (url.split("?")[0].split(".").pop()||"").toLowerCase();
    if(["pdf","png","jpg","jpeg","gif","webp","svg"].includes(ext)) return url;
    return "https://docs.google.com/gview?url="+encodeURIComponent(url)+"&embedded=true";
  };

  if(loading) return <SkeletonPage layout="list"/>;
  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">Contract Vault</div><div className="page-subtitle">All contracts from your deals in one place.</div></div></div>

      <div className="g2 section" style={{gap:12}}>
        <div className="card" style={{padding:"14px 18px",display:"flex",gap:12,alignItems:"center"}}><span className="badge badge-green" style={{fontSize:16,padding:"6px 10px"}}>{contracts.filter(c=>c.status==="Signed").length}</span><div style={{fontSize:13,fontWeight:600}}>Signed</div></div>
        <div className="card" style={{padding:"14px 18px",display:"flex",gap:12,alignItems:"center"}}><span className="badge badge-yellow" style={{fontSize:16,padding:"6px 10px"}}>{contracts.filter(c=>c.status==="Pending").length}</span><div style={{fontSize:13,fontWeight:600}}>Pending</div></div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {contracts.length===0?(
          <div className="card" style={{padding:"40px 20px",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>No contracts yet</div>
            <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.65}}>When a brand sends you a contract in the Deal Room, it will appear here.</div>
          </div>
        ):contracts.map(c=>(
          <div key={c.id} className="card" style={{padding:"16px 18px",borderLeft:"3px solid "+(c.status==="Signed"?"var(--green)":"var(--yellow)")}}>
            <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
                  <span style={{fontSize:14,fontWeight:600}}>{c.brand}</span>
                  <span className={"badge "+(c.status==="Signed"?"badge-green":"badge-yellow")} style={{fontSize:11}}>{c.status}</span>
                </div>
                <div style={{fontSize:12,color:"var(--text2)"}}>{c.campaign} · ${c.amount.toLocaleString()}</div>
                {c.contractSignedAt&&<div style={{fontSize:11,color:"var(--text3)",marginTop:3}}>Signed {new Date(c.contractSignedAt).toLocaleDateString()}</div>}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {/* Original contract from brand */}
              {c.contractFile&&(
                <div style={{display:"flex",gap:8,alignItems:"center",padding:"10px 12px",background:"var(--surface2)",borderRadius:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.contractFile.name}</div>
                    <div style={{fontSize:11,color:"var(--text3)"}}>Original from brand</div>
                  </div>
                  <button onClick={()=>setPreviewFile({name:c.contractFile.name,url:c.contractFile.dataUrl})} className="btn btn-secondary btn-sm" style={{fontSize:11,flexShrink:0}}>Preview</button>
                  <button onClick={()=>{fetch(c.contractFile.dataUrl).then(r=>r.blob()).then(b=>{const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=c.contractFile.name;a.click();URL.revokeObjectURL(a.href);});}} className="btn btn-secondary btn-sm" style={{fontSize:11,flexShrink:0}}>Download</button>
                </div>
              )}
              {/* Signed copy from creator */}
              {c.signedFile&&(
                <div style={{display:"flex",gap:8,alignItems:"center",padding:"10px 12px",background:"var(--green-bg)",borderRadius:8,border:"1px solid rgba(5,150,105,.15)"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,color:"var(--green)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.signedFile.name}</div>
                    <div style={{fontSize:11,color:"var(--green)",opacity:.7}}>Signed copy</div>
                  </div>
                  <button onClick={()=>setPreviewFile({name:c.signedFile.name,url:c.signedFile.dataUrl})} className="btn btn-secondary btn-sm" style={{fontSize:11,flexShrink:0}}>Preview</button>
                  <button onClick={()=>{fetch(c.signedFile.dataUrl).then(r=>r.blob()).then(b=>{const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=c.signedFile.name;a.click();URL.revokeObjectURL(a.href);});}} className="btn btn-secondary btn-sm" style={{fontSize:11,flexShrink:0}}>Download</button>

          </div>

      {/* Preview modal */}
      {previewFile&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:99999,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setPreviewFile(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface)",borderRadius:12,width:"100%",maxWidth:700,height:"80vh",display:"flex",flexDirection:"column",boxShadow:"var(--shadow-lg)",overflow:"hidden",border:"1px solid var(--border)"}}>
            <div style={{padding:"10px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,marginRight:12}}>{previewFile.name}</div>
              <div style={{display:"flex",gap:8,flexShrink:0}}>
                <button onClick={()=>{fetch(previewFile.url).then(r=>r.blob()).then(b=>{const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=previewFile.name;a.click();URL.revokeObjectURL(a.href);});}} className="btn btn-secondary btn-sm">Download</button>
                <button onClick={()=>setPreviewFile(null)} className="btn btn-secondary btn-sm">Close</button>
              </div>
            </div>
            <iframe src={previewUrl(previewFile.url)} style={{flex:1,width:"100%",border:"none",background:"white"}} title="Preview"/>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── AVAILABILITY ─────────────────────────────────────────────────────────────
function AvailabilityPage({onAvailabilitySet}) {
  const loading = useSkeleton();
  const [status,setStatus] = useState("open");
  const [blocked,setBlocked] = useState([]);
  const [booked,setBooked] = useState([]);
  const [flaggedSet,setFlaggedSet] = useState(false);
  const days = Array.from({length:30},(_,i)=>i+1);
  const toggle=(d)=>{
    if(booked.includes(d)) return;
    if(blocked.includes(d)){setBlocked(b=>b.filter(x=>x!==d));}
    else{
      setBlocked(b=>[...b,d]);
      if(!flaggedSet){setFlaggedSet(true);onAvailabilitySet?.();}
    }
  };
  const getStatus=d=>{if(booked.includes(d))return "booked";if(blocked.includes(d))return "blocked";return "open";};
  const openDays=days.filter(d=>getStatus(d)==="open").length;
  if(loading) return <SkeletonPage layout="calendar"/>;
  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">Availability</div><div className="page-subtitle">Let brands know when you are open to new work. Click days to block or unblock.</div></div></div>
      <div className="g3 section" style={{gap:12}}>
        {[["Open Days",String(openDays),"var(--green)"],["Blocked",String(blocked.length),"var(--red)"],["Booked",String(booked.length),"var(--accent2)"]].map(([l,v,col],i)=>(
          <div key={i} className="card" style={{padding:"14px 18px",display:"flex",gap:12,alignItems:"center"}}>
            <div style={{width:12,height:12,borderRadius:"50%",background:col,flexShrink:0}}></div>
            <div><div style={{fontSize:"20px",fontWeight:700,fontFamily:"DM Serif Display,serif",lineHeight:1,color:col}}>{v}</div><div style={{fontSize:"11px",color:"var(--text3)",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginTop:3}}>{l}</div></div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:16,marginBottom:18,flexWrap:"wrap"}}>
        {[["open","Open","var(--green)"],["blocked","Blocked","var(--red)"],["booked","Booked","var(--accent2)"]].map(([s,l,col])=>(
          <div key={s} style={{display:"flex",gap:7,alignItems:"center"}}><div style={{width:14,height:14,borderRadius:4,background:s==="open"?"rgba(52,211,153,.15)":s==="blocked"?"rgba(248,113,113,.15)":"rgba(240,160,80,.15)",border:"1.5px solid "+col}}></div><span style={{fontSize:"12px",color:"var(--text2)",fontWeight:500}}>{l}</span></div>
        ))}
        <div style={{fontSize:"12px",color:"var(--text3)",marginLeft:"auto"}}>Click open days to block · Click blocked days to unblock</div>
      </div>
      <div className="card-lg" style={{overflow:"hidden",marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 18px",borderBottom:"1px solid var(--border)"}}>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button className="btn btn-secondary btn-sm">‹</button>
            <span style={{fontFamily:"DM Serif Display,serif",fontSize:"16px",fontWeight:700}}>April 2025</span>
            <button className="btn btn-secondary btn-sm">›</button>
          </div>
          <button className="btn btn-secondary btn-sm" onClick={()=>setBlocked([])}>Clear All Blocked</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"var(--surface2)",borderBottom:"1px solid var(--border)"}}>
          {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} style={{padding:"9px",textAlign:"center",fontSize:"10px",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text3)"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {[0,1].map(i=><div key={"e"+i} style={{minHeight:66,border:"1px solid var(--border)",background:"var(--surface)"}}></div>)}
          {days.map(d=>{
            const st=getStatus(d);
            const bg2=st==="open"?"var(--surface)":st==="blocked"?"rgba(248,113,113,.06)":"rgba(240,160,80,.08)";
            const bc2=st==="open"?"var(--border)":st==="blocked"?"rgba(248,113,113,.3)":"rgba(240,160,80,.3)";
            const col=st==="open"?"var(--text2)":st==="blocked"?"var(--red)":"var(--accent2)";
            return (
              <div key={d} onClick={()=>toggle(d)} style={{minHeight:66,padding:"10px",border:"1px solid "+bc2,background:bg2,cursor:st==="booked"?"default":"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}} onMouseEnter={e=>{if(st!=="booked")e.currentTarget.style.background=st==="open"?"rgba(91,138,245,.05)":"";}} onMouseLeave={e=>{e.currentTarget.style.background=bg2;}}>
                <span style={{fontSize:"13px",fontWeight:600,color:col}}>{d}</span>
                {st==="booked"&&<span style={{fontSize:"8px",fontWeight:700,color:"var(--accent2)",textTransform:"uppercase"}}>Booked</span>}
                {st==="blocked"&&<span style={{fontSize:"8px",fontWeight:700,color:"var(--red)",textTransform:"uppercase"}}>Blocked</span>}
              </div>
            );
          })}
          {[0,1,2,3,4].map(i=><div key={"f"+i} style={{minHeight:66,border:"1px solid var(--border)",background:"var(--surface)",opacity:.4}}></div>)}
        </div>
      </div>
      <div style={{background:"var(--accent-light)",border:"1px solid rgba(91,138,245,.3)",borderRadius:"var(--radius)",padding:"12px 16px",fontSize:"12px",color:"var(--accent)"}}>Brands viewing your profile can see your open availability. Booked days show a deal from bridgn is confirmed — blocked days show you marked yourself unavailable.</div>
    </div>
  );
}

// ─── EXPENSES & TAX ───────────────────────────────────────────────────────────
function ExpensesPage() {
  const loading = useSkeleton();
  const [expenses,setExpenses] = useState([]);const [modal,setModal] = useState(false);const [form,setForm] = useState({desc:"",amount:"",date:"",category:"Production",deductible:true});
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));
  const CATEGORIES=["Production","Equipment","Software","Travel","Wardrobe","Meals","Education","Marketing"];
  const deductible=expenses.filter(e=>e.deductible).reduce((s,e)=>s+e.amount,0);
  const nonDeductible=expenses.filter(e=>!e.deductible).reduce((s,e)=>s+e.amount,0);
  const total=deductible+nonDeductible;
  const estimatedTax=Math.round(deductible*0.25);
  const byCat={};expenses.forEach(e=>{if(e.deductible)byCat[e.category]=(byCat[e.category]||0)+e.amount;});
  const addExpense=()=>{setExpenses(x=>[...x,{id:Date.now(),desc:form.desc,amount:parseFloat(form.amount)||0,date:form.date||new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),category:form.category,deductible:form.deductible}]);setModal(false);setForm({desc:"",amount:"",date:"",category:"Production",deductible:true});};
  if(loading) return <SkeletonPage layout="list"/>;
  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">Expenses & Tax</div><div className="page-subtitle">Track business expenses and estimate your tax obligations.</div></div><button className="btn btn-primary" onClick={()=>setModal(true)}>+ Add Expense</button></div>
      <div className="g4 section" style={{gap:12}}>
        {[
          {l:"Total Expenses",v:"$"+total.toLocaleString()},
          {l:"Deductible",v:"$"+deductible.toLocaleString(),sc:"#34d399"},
          {l:"Non-Deductible",v:"$"+nonDeductible.toLocaleString(),sc:"#f87171"},
          {l:"Est. Tax Savings",v:"$"+estimatedTax.toLocaleString(),sc:"#a78bfa"}
        ].map((s,i)=>(
          <StatCard key={i} label={s.l} value={s.v} sparkColor={s.sc}/>
        ))}
      </div>
      <div className="g2" style={{gap:20,alignItems:"start"}}>
        <div>
          <div className="section-hdr" style={{marginBottom:12}}><span className="section-title">All Expenses</span><button className="btn btn-secondary btn-sm">Export CSV</button></div>
          <div className="card-lg" style={{overflow:"hidden"}}>
            <table className="tbl">
              <thead><tr><th>Description</th><th>Category</th><th>Amount</th><th>Date</th><th>Deductible</th></tr></thead>
              <tbody>
                {expenses.length===0?(
                  <tr><td colSpan={5} style={{textAlign:"center",padding:"40px 20px"}}><EmptySVG type="earnings" size={100}/><div style={{fontSize:"13px",fontWeight:600,color:"var(--text2)",marginTop:4}}>No expenses yet — add your first one above.</div></td></tr>
                ):expenses.map(e=>(
                  <tr key={e.id}>
                    <td style={{fontWeight:500}}>{e.desc}</td>
                    <td><span className="badge badge-gray" style={{fontSize:"11px"}}>{e.category}</span></td>
                    <td style={{fontWeight:700,fontFamily:"DM Serif Display,serif"}}>${e.amount.toLocaleString()}</td>
                    <td style={{color:"var(--text3)"}}>{e.date}</td>
                    <td><span className={"badge "+(e.deductible?"badge-green":"badge-gray")} style={{fontSize:"11px"}}>{e.deductible?"Yes":"No"}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        <div>
          <div className="section">
            <div className="section-title" style={{marginBottom:12}}>By Category</div>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt],i)=>(
                <div key={i} className="card" style={{padding:"12px 15px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}><span style={{fontSize:"13px",fontWeight:600}}>{cat}</span><span style={{fontSize:"13px",fontWeight:700,color:"var(--accent)"}}>${amt.toLocaleString()}</span></div>
                  <div style={{height:5,background:"var(--surface2)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",background:"var(--accent)",borderRadius:99,width:(amt/deductible*100)+"%"}}></div></div>
                </div>
              ))}
            </div>
          </div>
          <div className="card-lg" style={{padding:"16px 18px"}}>
            <div style={{fontSize:"13px",fontWeight:700,marginBottom:12}}>Tax Estimate</div>
            {[["Total Revenue","$0"],["Business Expenses","- $"+deductible.toLocaleString()],["Net Income","$0"],["Est. Tax (25%)","$"+estimatedTax.toLocaleString()]].map(([l,v],i,arr)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<arr.length-1?"1px solid var(--border)":"none",fontWeight:i===arr.length-1?700:400,color:i===arr.length-1?"var(--accent2)":"var(--text)"}}>
                <span style={{fontSize:"13px",color:"var(--text2)"}}>{l}</span><span style={{fontSize:"13px"}}>{v}</span>
              </div>
            ))}
            <div style={{marginTop:12,padding:"10px 12px",background:"var(--green-bg)",border:"1px solid rgba(52,211,153,.3)",borderRadius:"var(--radius-sm)",fontSize:"12px",color:"var(--green)"}}>Tracking expenses saves an estimated <strong>${estimatedTax.toLocaleString()}</strong> in taxes this year.</div>
          </div>
        </div>
      </div>
      {modal&&(
        <Modal onClose={()=>setModal(false)}>
          <div style={{padding:26}}>
            <div style={{fontFamily:"DM Serif Display,serif",fontSize:"23px",fontWeight:400,letterSpacing:"-.3px",marginBottom:16}}>Add Expense</div>
            <div className="fg"><label className="fl">Description</label><input className="fi" value={form.desc} onChange={e=>up("desc",e.target.value)} placeholder="e.g. Studio rental for brand shoot"/></div>
            <div className="frow"><div className="fg"><label className="fl">Amount ($)</label><input className="fi" type="number" value={form.amount} onChange={e=>up("amount",e.target.value)} placeholder="250"/></div><div className="fg"><label className="fl">Date</label><input className="fi" type="date" value={form.date} onChange={e=>up("date",e.target.value)}/></div></div>
            <div className="fg"><label className="fl">Category</label><select className="fsel" value={form.category} onChange={e=>up("category",e.target.value)}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></div>
            <label style={{display:"flex",gap:9,marginBottom:18,cursor:"pointer",fontSize:"13px",fontWeight:500,alignItems:"center"}}><input type="checkbox" checked={form.deductible} onChange={e=>up("deductible",e.target.checked)} style={{width:15,height:15,accentColor:"var(--accent)"}}/>This is a deductible business expense</label>
            <div style={{display:"flex",gap:9}}><button onClick={addExpense} className="btn btn-primary btn-lg" style={{flex:1}}>Add Expense</button><button onClick={()=>setModal(false)} className="btn btn-secondary btn-lg">Cancel</button></div>
          </div>
        </Modal>
      )}
    </div>
  );
}

    {id:"dce-3",creator_name:"Aisha Patel",platform:"Instagram",post_url:"https://instagram.com/reel/bytebrew-morning",date_posted:"2026-04-18",caption:"My cozy morning routine starts with @bytebrew",views:67000,likes:5600,comments:198,shares:890,clicks:320,conversions:28,revenue_cents:75000,notes:"Reel outperformed stories significantly",campaign_title:"Morning Routine Collab"},
    {id:"dce-4",creator_name:"Lily Torres",platform:"Instagram",post_url:"https://instagram.com/p/pulsewear-30day",date_posted:"2026-04-10",caption:"Day 30 complete! My @pulsewear fitness journey results",views:94000,likes:7100,comments:456,shares:1800,clicks:670,conversions:89,revenue_cents:250000,notes:"Best conversion rate across all campaigns",campaign_title:"30-Day Challenge"},

    {id:"dce-6",creator_name:"Sofia Rodriguez",platform:"Instagram",post_url:"https://instagram.com/p/riviera-lookbook",date_posted:"2026-04-25",caption:"Summer lookbook ft. @rivieraswimwear new collection",views:78000,likes:6300,comments:267,shares:950,clicks:540,conversions:42,revenue_cents:280000,notes:"Carousel performed better than reel",campaign_title:"Summer Lookbook"},
    {id:"dce-7",creator_name:"Devon Harper",platform:"TikTok",post_url:"https://tiktok.com/@devoncooks/video/cloudnine-taste",date_posted:"2026-04-15",caption:"Trying EVERY @cloudninesnacks protein bar flavor",views:312000,likes:18700,comments:1240,shares:4500,clicks:1800,conversions:95,revenue_cents:60000,notes:"Went semi-viral, great brand exposure",campaign_title:"Taste Test Reaction"},
  ];
  const [entries,setEntries] = useState([]);
  const [showAdd,setShowAdd] = useState(false);
  const [editId,setEditId] = useState(null);
  const [form,setForm] = useState({creatorName:"",platform:"Instagram",postUrl:"",datePosted:"",caption:"",views:"",likes:"",comments:"",shares:"",clicks:"",conversions:"",revenue:"",notes:"",campaignTitle:"",dealId:""});
  const [filter,setFilter] = useState({creator:"All",platform:"All"});
  const [sort,setSort] = useState("date");
  const up = (k,v)=>setForm(f=>({...f,[k]:v}));

  useEffect(()=>{
    if(!authUser) return;
    if(demoMode) { setEntries(DEMO_CONTENT); return; }
    fetch(`${BRIDGN_API_URL}/api/content?userId=${authUser.id}`)
      .then(r=>r.ok?r.json():null)
      .then(data=>{ if(data?.entries) setEntries(data.entries); })
      .catch(e=>console.error("[content]",e));
  },[authUser,demoMode]);

  const resetForm = () => setForm({creatorName:"",platform:"Instagram",postUrl:"",datePosted:"",caption:"",views:"",likes:"",comments:"",shares:"",clicks:"",conversions:"",revenue:"",notes:"",campaignTitle:"",dealId:""});

  const handleSave = async () => {
    if(!form.postUrl.trim()&&!form.creatorName.trim()) return;
    if(editId) {
      const fields = {
        creator_name:form.creatorName, platform:form.platform, post_url:form.postUrl,
        date_posted:form.datePosted||null, caption:form.caption,
        views:parseInt(form.views)||0, likes:parseInt(form.likes)||0, comments:parseInt(form.comments)||0,
        shares:parseInt(form.shares)||0, clicks:parseInt(form.clicks)||0, conversions:parseInt(form.conversions)||0,
        revenue_cents:Math.round((parseFloat(form.revenue)||0)*100), notes:form.notes, campaign_title:form.campaignTitle,
      };
      const resp = await fetch(`${BRIDGN_API_URL}/api/content/${editId}`, {method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:authUser.id,fields})});
      if(resp.ok){ const {entry}=await resp.json(); setEntries(prev=>prev.map(e=>e.id===editId?entry:e)); }
    } else {
      const resp = await fetch(`${BRIDGN_API_URL}/api/content`, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:authUser.id,entry:form})});
      if(resp.ok){ const {entry}=await resp.json(); setEntries(prev=>[entry,...prev]); }
    }
    resetForm(); setShowAdd(false); setEditId(null);
  };

  const handleDelete = async (id) => {
    await fetch(`${BRIDGN_API_URL}/api/content/${id}?userId=${authUser.id}`,{method:"DELETE"});
    setEntries(prev=>prev.filter(e=>e.id!==id));
  };

  const startEdit = (e) => {
    setForm({creatorName:e.creator_name||"",platform:e.platform||"Instagram",postUrl:e.post_url||"",datePosted:e.date_posted||"",caption:e.caption||"",views:String(e.views||""),likes:String(e.likes||""),comments:String(e.comments||""),shares:String(e.shares||""),clicks:String(e.clicks||""),conversions:String(e.conversions||""),revenue:String((e.revenue_cents||0)/100),notes:e.notes||"",campaignTitle:e.campaign_title||"",dealId:e.deal_id||""});
    setEditId(e.id); setShowAdd(true);
  };

  // Stats
  const totalViews = entries.reduce((s,e)=>s+(e.views||0),0);
  const totalLikes = entries.reduce((s,e)=>s+(e.likes||0),0);
  const totalComments = entries.reduce((s,e)=>s+(e.comments||0),0);
  const totalClicks = entries.reduce((s,e)=>s+(e.clicks||0),0);
  const avgEngagement = totalViews>0?((totalLikes+totalComments)/totalViews*100).toFixed(1):0;
  const bestPost = entries.length?entries.reduce((a,b)=>(b.views||0)>(a.views||0)?b:a):null;

  // Filters
  const creators = [...new Set(entries.map(e=>e.creator_name).filter(Boolean))];
  const platforms = [...new Set(entries.map(e=>e.platform).filter(Boolean))];
  let filtered = entries;
  if(filter.creator!=="All") filtered = filtered.filter(e=>e.creator_name===filter.creator);
  if(filter.platform!=="All") filtered = filtered.filter(e=>e.platform===filter.platform);
  if(sort==="views") filtered = [...filtered].sort((a,b)=>(b.views||0)-(a.views||0));
  if(sort==="engagement") filtered = [...filtered].sort((a,b)=>((b.likes||0)+(b.comments||0))-((a.likes||0)+(a.comments||0)));
  if(sort==="date") filtered = [...filtered].sort((a,b)=>new Date(b.date_posted||0)-new Date(a.date_posted||0));
  if(sort==="clicks") filtered = [...filtered].sort((a,b)=>(b.clicks||0)-(a.clicks||0));

  if(loading) return <SkeletonPage layout="list"/>;
  return (
    <div className="fade-in">
      <div className="ph-row">
        <div><div className="page-title">Content Tracker</div><div className="page-subtitle">Track performance across all your creator content.</div></div>
        <button className="btn btn-primary" onClick={()=>{resetForm();setEditId(null);setShowAdd(true);}}>+ Add Content</button>
      </div>

      {/* Stats */}
      <div className="g4 section" style={{gap:12}}>
        {[
          {l:"Total Views",v:totalViews.toLocaleString()},
          {l:"Engagement Rate",v:avgEngagement+"%"},
          {l:"Total Clicks",v:totalClicks.toLocaleString()},
          {l:"Posts Tracked",v:String(entries.length)},
        ].map((s,i)=><StatCard key={i} label={s.l} value={s.v}/>)}
      </div>

      {/* Filters + sort */}
      {entries.length>0&&(
        <div className="card" style={{padding:"12px 16px",marginBottom:16,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:12,color:"var(--text3)",fontWeight:600}}>Filter:</span>
          <select className="fsel" style={{flex:"1 1 auto",minWidth:0,padding:"6px 10px",fontSize:12}} value={filter.creator} onChange={e=>setFilter(p=>({...p,creator:e.target.value}))}><option value="All">All Creators</option>{creators.map(c=><option key={c}>{c}</option>)}</select>
          <select className="fsel" style={{flex:"1 1 auto",minWidth:0,padding:"6px 10px",fontSize:12}} value={filter.platform} onChange={e=>setFilter(p=>({...p,platform:e.target.value}))}><option value="All">All Platforms</option>{platforms.map(p=><option key={p}>{p}</option>)}</select>
          <select className="fsel" style={{flex:"1 1 auto",minWidth:0,padding:"6px 10px",fontSize:12}} value={sort} onChange={e=>setSort(e.target.value)}><option value="date">Newest</option><option value="views">Most Views</option><option value="engagement">Most Engagement</option><option value="clicks">Most Clicks</option></select>
        </div>
      )}

      {/* Entries list */}
      {entries.length===0&&!showAdd?(
        <div className="card" style={{padding:"48px 24px",textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:600,marginBottom:8}}>No content tracked yet</div>
          <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.65,maxWidth:360,margin:"0 auto 16px"}}>Start adding links to your creator content and track views, engagement, clicks, and ROI over time.</div>
          <button className="btn btn-primary btn-sm" onClick={()=>{resetForm();setShowAdd(true);}}>Add Your First Post</button>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtered.map(e=>{
            const eng = (e.views||0)>0?(((e.likes||0)+(e.comments||0))/(e.views||1)*100).toFixed(1):0;
            return (
              <div key={e.id} className="card" style={{padding:"16px 18px"}}>
                <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                  <div style={{width:42,height:42,borderRadius:10,background:bc(Math.abs((e.creator_name||"").length)%6),display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"white",flexShrink:0}}>{(e.creator_name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                      <span style={{fontSize:14,fontWeight:600}}>{e.creator_name||"Creator"}</span>
                      <span className="badge badge-blue" style={{fontSize:10}}>{e.platform}</span>
                      {e.campaign_title&&<span style={{fontSize:11,color:"var(--text3)"}}>{e.campaign_title}</span>}
                    </div>
                    {e.post_url&&<a href={e.post_url} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:"var(--accent)",textDecoration:"none",display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:6}}>{e.post_url}</a>}
                    <div style={{display:"flex",gap:16,flexWrap:"wrap",fontSize:12}}>
                      {(e.views||0)>0&&<span><strong>{(e.views||0).toLocaleString()}</strong> <span style={{color:"var(--text3)"}}>views</span></span>}
                      {(e.likes||0)>0&&<span><strong>{(e.likes||0).toLocaleString()}</strong> <span style={{color:"var(--text3)"}}>likes</span></span>}
                      {(e.comments||0)>0&&<span><strong>{(e.comments||0).toLocaleString()}</strong> <span style={{color:"var(--text3)"}}>comments</span></span>}
                      {(e.shares||0)>0&&<span><strong>{(e.shares||0).toLocaleString()}</strong> <span style={{color:"var(--text3)"}}>shares</span></span>}
                      {(e.clicks||0)>0&&<span><strong>{(e.clicks||0).toLocaleString()}</strong> <span style={{color:"var(--text3)"}}>clicks</span></span>}
                      {eng>0&&<span style={{color:"var(--green)",fontWeight:600}}>{eng}% eng</span>}
                    </div>
                    {e.date_posted&&<div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>{new Date(e.date_posted+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>}
                  </div>
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <button onClick={()=>startEdit(e)} className="btn btn-secondary btn-sm" style={{fontSize:11,padding:"5px 10px"}}>Edit</button>
                    <button onClick={()=>handleDelete(e.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--text3)",padding:"4px"}}>✕</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Add/Edit Modal */}
      {showAdd&&(
        <Modal onClose={()=>{setShowAdd(false);setEditId(null);resetForm();}}>

// ─── SPENDING DASHBOARD (brand) ─────────────────────────────────────────────
function SpendingDashboard({deals=[]}) {
  const loading = useSkeleton();
  const paidDeals = deals.filter(d=>["payment_held","payment_released","content_delivered","payment_processing"].includes(d.status));
  const releasedDeals = deals.filter(d=>d.status==="payment_released");
  const escrowDeals = deals.filter(d=>["payment_held","content_delivered"].includes(d.status));

  const totalSpent = paidDeals.reduce((s,d)=>s+(d.amount||0),0);
  const escrowTotal = escrowDeals.reduce((s,d)=>s+(d.amount||0),0);
  const releasedTotal = releasedDeals.reduce((s,d)=>s+(d.amount||0),0);
  const avgDeal = paidDeals.length?Math.round(totalSpent/paidDeals.length):0;

  // By creator
  const creatorMap = {};
  paidDeals.forEach(d=>{
    const name = d.creatorName||"Unknown";
    if(!creatorMap[name]) creatorMap[name]={name,bi:name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(),ci:Math.abs(name.length)%6,amount:0,deals:0};
    creatorMap[name].amount+=d.amount||0;
    creatorMap[name].deals+=1;
  });
  const byCreator = Object.values(creatorMap).sort((a,b)=>b.amount-a.amount);

  // By platform
  const platMap = {};
  paidDeals.forEach(d=>{
    const p = d.platform||"Other";
    platMap[p] = (platMap[p]||0)+(d.amount||0);
  });
  const byPlatform = Object.entries(platMap).sort((a,b)=>b[1]-a[1]);
  const maxPlat = byPlatform.length?byPlatform[0][1]:1;

  // Monthly
  const monthMap = {};
  paidDeals.forEach(d=>{
    try {
      const dt = d.deadline&&d.deadline!=="TBD"?new Date(d.deadline+"T00:00:00"):new Date();
      const key = dt.toLocaleDateString("en-US",{month:"short",year:"numeric"});
      monthMap[key]=(monthMap[key]||0)+(d.amount||0);
    } catch{}
  });
  const monthly = Object.entries(monthMap).slice(-6);
  const maxMonth = monthly.length?Math.max(...monthly.map(m=>m[1])):1;

  if(loading) return <SkeletonPage layout="analytics"/>;
  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">Spending</div><div className="page-subtitle">Your creator partnership spending at a glance.</div></div></div>

        </div>

          <div className="g2" style={{gap:20,alignItems:"start"}}>
            <div>

                      {monthly.map(([m,amt],i)=>{
                        const h=Math.round((amt/maxMonth)*120);const isLast=i===monthly.length-1;

// ─── BRIDGN SCORE ────────────────────────────────────────────────────────────
function calcBridgnScore(c) {
  // 1. Profile completeness (0–25): analytics uploaded + location + multi-platform
  let completeness = 0;
  if(c.analyticsUpdated) completeness += 15;
  if(c.loc)              completeness += 5;
  if(c.platforms && c.platforms.length > 1) completeness += 5;

  // 2. Analytics freshness (0–25): recency of last analytics upload
  let freshness = 0;
  const age = c.analyticsAge;
  if(age != null){
    if(age <= 7)       freshness = 25;
    else if(age <= 14) freshness = 22;
    else if(age <= 30) freshness = 18;
    else if(age <= 60) freshness = 12;
    else if(age <= 90) freshness = 6;
    else               freshness = 2;
  }

  // 3. Deal volume (0–25): completed partnerships
  const d = c.totalDeals || 0;
  const dealScore = d>=15?25 : d>=11?22 : d>=6?18 : d>=3?12 : d>=1?5 : 0;

  // 4. Brand rating (0–25): average star rating scaled
  const ratingScore = Math.round((parseFloat(c.rating)||0)/5*25);

  const total = Math.min(100, completeness+freshness+dealScore+ratingScore);
  return {
    total,
    breakdown:[
      {label:"Profile completeness", score:completeness, max:25, desc:c.analyticsUpdated?"Analytics on file":"No analytics uploaded"},
      {label:"Analytics freshness",  score:freshness,    max:25, desc:age==null?"Never uploaded":age+"d since last upload"},
      {label:"Completed deals",      score:dealScore,    max:25, desc:d+" deal"+(d===1?"":"s")+" completed"},
      {label:"Brand rating",         score:ratingScore,  max:25, desc:(c.rating||"—")+"★ average rating"},
    ]
  };
}

function BridgnScoreBadge({score, breakdown}) {
  const [showTip,setShowTip] = useState(false);
  const [tipPos,setTipPos]   = useState({top:0,left:0});
  const ref = useRef(null);

  const DIM=80, R=31, SW=7.5;
  const circ = 2*Math.PI*R;
  const offset = circ*(1-score/100);

  const col = (() => {
    if(score<=50){
      const t=score/50;
      return `rgb(${Math.round(248+(251-248)*t)},${Math.round(113+(191-113)*t)},${Math.round(113+(36-113)*t)})`;
    }
    const t=(score-50)/50;
    return `rgb(${Math.round(251+(52-251)*t)},${Math.round(191+(211-191)*t)},${Math.round(36+(153-36)*t)})`;
  })();

  const onEnter = () => {
    if(ref.current){
      const rect = ref.current.getBoundingClientRect();
      setTipPos({top:rect.bottom+10, left:Math.max(8, rect.right-240)});

      <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:13}}>
        <span style={{fontSize:"13px",fontWeight:400,fontFamily:"DM Serif Display,serif",color:"var(--text)"}}>bridgn Score</span>
        <span style={{fontSize:"22px",fontWeight:400,fontFamily:"DM Serif Display,serif",color:col,marginLeft:"auto",lineHeight:1}}>{score}</span>
        <span style={{fontSize:"11px",color:"var(--text3)"}}>/ 100</span>
      </div>
      {breakdown.map((b,i)=>{
        const pct = b.score/b.max;
        const bCol = pct>=.8?"var(--green)":pct>=.4?"var(--accent2)":"var(--red)";
        return (
          <div key={i} style={{marginBottom:i<breakdown.length-1?11:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:4}}>
              <div>
                <div style={{fontSize:"11px",fontWeight:600,color:"var(--text)",lineHeight:1.2}}>{b.label}</div>
                <div style={{fontSize:"10px",color:"var(--text3)",marginTop:1}}>{b.desc}</div>
              </div>
              <span style={{fontSize:"12px",fontWeight:700,color:bCol,marginLeft:8,flexShrink:0}}>{b.score}<span style={{fontWeight:400,color:"var(--text3)"}}>/{b.max}</span></span>
            </div>
            <div style={{height:3,background:"var(--surface2)",borderRadius:99,overflow:"hidden"}}>
              <div style={{height:"100%",width:(pct*100)+"%",background:bCol,borderRadius:99,transition:"width .5s cubic-bezier(.16,1,.3,1)"}}/>
            </div>

        );
      })}
      <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid var(--border)",fontSize:"10px",color:"var(--text3)",lineHeight:1.6}}>
        Composite of profile completeness, analytics freshness, deal history, and brand ratings. Encourages creators to stay active.
      </div>
    </div>
  );

  return (
    <div ref={ref} style={{display:"inline-flex",flexDirection:"column",alignItems:"center",cursor:"default"}} onMouseEnter={onEnter} onMouseLeave={()=>setShowTip(false)}>
      <div style={{position:"relative",width:DIM,height:DIM,background:"rgba(0,0,0,.38)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",borderRadius:"50%",border:"1px solid rgba(255,255,255,.12)",boxShadow:"0 4px 16px rgba(0,0,0,.35)"}}>
        <svg width={DIM} height={DIM} style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}}>
          <defs>
            <filter id="sGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2.5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <circle cx={DIM/2} cy={DIM/2} r={R} fill="none" stroke="rgba(255,255,255,.1)" strokeWidth={SW}/>
          <circle cx={DIM/2} cy={DIM/2} r={R} fill="none" stroke={col} strokeWidth={SW} strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset} filter="url(#sGlow)" style={{transition:"stroke-dashoffset .7s cubic-bezier(.16,1,.3,1),stroke .4s ease"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
          <div style={{fontSize:"20px",fontWeight:400,fontFamily:"DM Serif Display,serif",lineHeight:1,color:col}}>{score}</div>
          <div style={{fontSize:"7.5px",fontWeight:800,color:"rgba(255,255,255,.45)",letterSpacing:".12em",marginTop:2}}>SCORE</div>
        </div>
      </div>
      <div style={{fontSize:"9px",fontWeight:700,color:"rgba(255,255,255,.55)",marginTop:5,letterSpacing:".04em",whiteSpace:"nowrap"}}>bridgn Score ⓘ</div>
      {showTip && ReactDOM.createPortal(tipContent, document.body)}
    </div>
  );
}

// ─── BRAND CAMPAIGNS ─────────────────────────────────────────────────────────
function BrandCampaignsPage({setPage,setSelected,campaignQuestions={},setCampaignQuestions}) {
  const loading = useSkeleton();

  const [modal,setModal] = useState(false);const [step,setStep] = useState(1);const [form,setForm] = useState({title:"",platform:"Instagram",budget:"",type:"Paid",deadline:"",desc:"",deliverables:"",requirements:"",brief:""});const [briefTemplate,setBriefTemplate] = useState(null);const [created,setCreated] = useState(false);
  const [replyText,setReplyText] = useState({});  // keyed by question id
  const [replyOpen,setReplyOpen] = useState({});  // keyed by question id
  const [qExpanded,setQExpanded] = useState({});  // keyed by campaign id
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));

  // Flatten all questions across all campaigns for the brand inbox
  const allQuestions = Object.entries(campaignQuestions).flatMap(([cid,qs])=>
    qs.map(q=>({...q, campaignId: Number(cid), campaignTitle: CAMPAIGNS.find(c=>c.id===Number(cid))?.title||"Campaign #"+cid}))
  ).sort((a,b)=>b.id-a.id);

  const sendReply = (q) => {
    const text = (replyText[q.id]||"").trim();
    if(!text) return;
    setCampaignQuestions(prev => ({
      ...prev,
      [q.campaignId]: (prev[q.campaignId]||[]).map(item => item.id===q.id ? {...item, reply:text} : item)
    }));
    setReplyText(r=>({...r,[q.id]:""}));
    setReplyOpen(r=>({...r,[q.id]:false}));
  };
  if(loading) return <SkeletonPage layout="grid"/>;
  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">Campaigns</div><div className="page-subtitle">Manage and launch your influencer campaigns.</div></div><button className="btn btn-primary" onClick={()=>{setModal(true);setStep(1);setCreated(false);}}>+ New Campaign</button></div>
      {/* Creator Questions Inbox */}
      {allQuestions.length>0&&(
        <div className="card-lg" style={{padding:0,overflow:"hidden",marginBottom:20}}>
          <div style={{padding:"14px 20px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:10}}>

            <span style={{fontSize:"14px",fontWeight:700,flex:1}}>Creator Questions</span>

          </div>
          <div style={{display:"flex",flexDirection:"column"}}>
            {allQuestions.map((q,i)=>(
              <div key={q.id} style={{padding:"14px 20px",borderBottom:i<allQuestions.length-1?"1px solid var(--border)":"none"}}>
                <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,var(--accent),var(--accent2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:800,color:"white",flexShrink:0}}>
                    {(q.creatorName||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{fontSize:"13px",fontWeight:600}}>{q.creatorName}</span>
                      <span style={{fontSize:"11px",padding:"1px 7px",borderRadius:99,background:"var(--surface2)",color:"var(--text3)",border:"1px solid var(--border)"}}>{q.campaignTitle}</span>
                      <span style={{fontSize:"10px",color:"var(--text3)",marginLeft:"auto"}}>{q.ts}</span>
                    </div>
                    <div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.55,marginBottom:8}}>{q.text}</div>
                    {q.reply?(
                      <div style={{padding:"8px 12px",background:"rgba(52,211,153,.06)",border:"1px solid rgba(52,211,153,.2)",borderRadius:"var(--radius-sm)",fontSize:"12px",color:"var(--text2)",lineHeight:1.5}}>
                        <span style={{fontWeight:700,color:"var(--green)"}}>✓ Replied: </span>{q.reply}

                    ):(
                      replyOpen[q.id]?(
                        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                          <textarea
