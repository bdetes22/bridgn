<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2951"/>
      <stop offset="100%" stop-color="#2d4a8a"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ab4f8"/>
      <stop offset="100%" stop-color="#5b8af5"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background for maskable (no rounded corners — OS handles masking) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Bridge arches — centered in safe zone (inner 80%) -->
  <g transform="translate(256,250) scale(0.2)" fill="none" stroke="url(#bridge)" stroke-width="48" stroke-linecap="round">
    <path d="M-700,0 Q-700,-320 -350,-320 Q0,-320 0,0"/>
    <path d="M0,0 Q0,-320 350,-320 Q700,-320 700,0"/>
  </g>
  <!-- Road -->
  <rect x="96" y="258" width="320" height="10" rx="5" fill="url(#bridge)" opacity="0.9"/>
  <!-- bridgn text -->
  <text x="256" y="365" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="2">bridgn</text>
</svg>
