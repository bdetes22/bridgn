<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>bridgn – Creator & Brand Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.stripe.com/v3/"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;transition:background-color 300ms ease,color 300ms ease,border-color 300ms ease,box-shadow 300ms ease}
:root{
  --bg:#060818;--surface:#13161f;--surface2:#191d2c;--border:#21273d;
  --text:#edf0f7;--text2:#8691b0;--text3:#4b5470;
  --accent:#5b8af5;--accent-light:#131d3a;--accent2:#f0a050;--accent2-light:#221608;
  --green:#34d399;--green-bg:#0a2619;--yellow:#fbbf24;--yellow-bg:#201b05;
  --red:#f87171;--red-bg:#270e0e;--purple:#a78bfa;--purple-bg:#181130;
  --teal:#0891b2;--teal-bg:#091d2a;
  --shadow-sm:0 1px 3px rgba(0,0,0,.55),0 1px 2px rgba(0,0,0,.3);
  --shadow:0 4px 24px rgba(0,0,0,.55),0 1px 6px rgba(0,0,0,.35);
  --shadow-lg:0 20px 60px rgba(0,0,0,.7),0 4px 20px rgba(0,0,0,.45);
  --radius:14px;--radius-sm:9px;--radius-lg:20px
}
html.light{
  --bg:#f8f7f4;--surface:#ffffff;--surface2:#f0ede8;--border:#e0dbd3;
  --text:#1a1a2e;--text2:#5a5a7a;--text3:#9898b8;
  --accent:#4a7ae8;--accent-light:#eaeffd;--accent2:#c4732a;--accent2-light:#fdf3e8;
  --green:#188f5e;--green-bg:#e4f9f2;--yellow:#a07200;--yellow-bg:#fdf7df;
  --red:#c23535;--red-bg:#fde8e8;--purple:#6b4ec4;--purple-bg:#eeebff;
  --teal:#0568a0;--teal-bg:#e0f3ff;
  --shadow-sm:0 1px 4px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 24px rgba(0,0,0,.07),0 1px 6px rgba(0,0,0,.04);
  --shadow-lg:0 20px 60px rgba(0,0,0,.1),0 4px 20px rgba(0,0,0,.07)
}
html.light body{background:#f8f7f4;background-image:none}
html.light body::before,html.light body::after{opacity:0}
html.light .navbar{background:rgba(248,247,244,.94);border-bottom-color:var(--border)}
html.light .navbar::after{opacity:0}
html.light .navbar::before{background:linear-gradient(90deg,transparent,rgba(74,122,232,.4),rgba(108,79,196,.4),rgba(74,122,232,.4),transparent)}
html.light .sidebar{background:linear-gradient(180deg,rgba(255,255,255,.97),rgba(248,247,244,.99));border-right-color:var(--border)}
html.light .sidebar-divider{background:linear-gradient(90deg,transparent,rgba(74,122,232,.15),rgba(108,79,196,.1),transparent)}
html.light .content-area{background-image:radial-gradient(circle,rgba(0,0,0,.03) 1px,transparent 1px)}
html.light .card,html.light .card-lg{background:rgba(255,255,255,.88);border-color:#e8e4de}
html.light .card-hover:hover{box-shadow:0 12px 40px rgba(0,0,0,.09),0 2px 10px rgba(0,0,0,.05)}
html.light .stat-card{background:rgba(255,255,255,.72)}
html.light .stat-value{background:linear-gradient(180deg,#1a1a2e 0%,rgba(26,26,46,.65) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
html.light .tbl th{background:rgba(240,237,232,.92)}
html.light .role-toggle{background:rgba(0,0,0,.05)}
html.light .notif-dot{border-color:rgba(248,247,244,.9)}
html.light .nav-item.active{background:linear-gradient(90deg,rgba(74,122,232,.1),rgba(74,122,232,.06),rgba(74,122,232,.01))}
html.light .nav-item:hover{background:rgba(74,122,232,.06)}
html.light .pb-ig{background:#fde8f0;color:#b01050;border-color:rgba(176,16,80,.15)}
html.light .pb-yt{background:#fde8e8;color:#b80000;border-color:rgba(184,0,0,.15)}
html.light .pb-tt{background:#e4f9f2;color:#0a7248;border-color:rgba(10,114,72,.15)}
html.light .pb-tw{background:#e8f0fd;color:#1a4898;border-color:rgba(26,72,152,.15)}
html.light .skel{background:linear-gradient(90deg,rgba(0,0,0,.04) 25%,rgba(0,0,0,.08) 50%,rgba(0,0,0,.04) 75%);background-size:800px 100%}
body{font-family:"Space Grotesk",sans-serif;background:linear-gradient(180deg,#060818 0%,#0a0f1e 100%);background-attachment:fixed;color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:-10%;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 18% 32%,rgba(91,138,245,.08) 0%,transparent 55%),
    radial-gradient(ellipse at 78% 12%,rgba(167,139,250,.06) 0%,transparent 50%);
  animation:nebulaA 28s ease-in-out infinite}
body::after{content:"";position:fixed;inset:-10%;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 52% 88%,rgba(14,165,201,.05) 0%,transparent 48%);
  animation:nebulaB 22s ease-in-out infinite}
#root{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
.app-shell{display:flex;flex-direction:column;min-height:100vh}
.main-layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 64px)}
.sidebar{width:240px;background:linear-gradient(180deg,rgba(10,11,18,.82) 0%,rgba(7,9,15,.88) 100%);backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);border-right:1px solid rgba(255,255,255,.06);padding:10px 0 0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.content-area{flex:1;overflow-y:auto;padding:32px 36px;background:transparent;background-image:radial-gradient(circle,rgba(255,255,255,.022) 1px,transparent 1px);background-size:28px 28px}
.navbar{height:64px;background:rgba(10,11,18,.93);backdrop-filter:blur(20px) saturate(160%);border-bottom:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.3);display:flex;align-items:center;padding:0 22px;gap:14px;position:sticky;top:0;z-index:100;flex-shrink:0}
.navbar::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(91,138,245,.7) 30%,rgba(167,139,250,.8) 50%,rgba(91,138,245,.7) 70%,transparent 100%);pointer-events:none}
.navbar::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(255,255,255,.03) 1px,rgba(255,255,255,.03) 2px);pointer-events:none;z-index:0}
.nav-logo{font-family:"Syne",sans-serif;font-size:25px;font-weight:800;letter-spacing:-.5px;margin-right:auto;cursor:pointer;user-select:none;background:linear-gradient(135deg,var(--accent) 0%,#c084fc 48%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 12px rgba(91,138,245,.55)) drop-shadow(0 0 28px rgba(91,138,245,.2))}
.role-toggle{display:flex;background:rgba(0,0,0,.5);border-radius:var(--radius-sm);padding:3px;border:1px solid var(--border)}
.role-btn{padding:5px 16px;border-radius:7px;border:none;cursor:pointer;font-family:"Space Grotesk",sans-serif;font-size:13px;font-weight:500;transition:all .18s;background:transparent;color:var(--text2)}
.role-btn.active{background:var(--surface2);color:var(--text);box-shadow:var(--shadow-sm)}
.nav-notif{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:15px;transition:all .18s}
.nav-notif:hover{border-color:rgba(240,160,80,.4);background:rgba(240,160,80,.08)}
.notif-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);position:absolute;top:7px;right:7px;border:2px solid rgba(10,11,18,.9);box-shadow:0 0 8px rgba(240,160,80,.6)}
.nav-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#7b5bf6);display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 0 0 2px rgba(91,138,245,.25);transition:all .18s}
.nav-avatar:hover{box-shadow:0 0 0 3px rgba(91,138,245,.4),var(--shadow)}
.sidebar-label{font-size:9px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);padding:0 18px;margin:6px 0 5px}
.sidebar-divider{height:1px;margin:10px 14px 4px;background:linear-gradient(90deg,transparent,rgba(91,138,245,.22),rgba(167,139,250,.16),transparent)}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .18s;border:none;background:none;width:calc(100% - 16px);text-align:left;position:relative;overflow:hidden}
.nav-item::after{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.06) 50%,transparent 100%);transform:translateX(-100%);pointer-events:none;border-radius:inherit}
.nav-item:hover::after{animation:navShimmer .4s ease-out forwards}
.nav-item:hover{background:rgba(91,138,245,.07);color:var(--text);transform:translateX(1px);box-shadow:inset 0 0 20px rgba(91,138,245,.05),0 0 0 1px rgba(91,138,245,.08)}
.nav-item.active{background:linear-gradient(90deg,rgba(14,165,201,.16),rgba(91,138,245,.12),rgba(91,138,245,.03));color:var(--accent);font-weight:600;border-left:2px solid var(--accent);padding-left:12px;box-shadow:-4px 0 12px rgba(91,138,245,.3),inset 0 0 24px rgba(91,138,245,.06),inset 0 1px 0 rgba(14,165,201,.12)}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:12px 8px 10px;border-top:1px solid var(--border)}
.card{background:rgba(255,255,255,.03);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 4px 24px rgba(0,0,0,.3)}
.card-lg{background:rgba(255,255,255,.03);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-lg);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 4px 24px rgba(0,0,0,.3)}
.card-hover{
  transition:box-shadow .22s,transform .55s cubic-bezier(.16,1,.3,1),border-color .22s;
  cursor:pointer;position:relative;
  transform:perspective(1000px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) translateZ(var(--tz,0px));
  will-change:transform}
.card-hover::before{content:"";position:absolute;inset:-1px;border-radius:inherit;background:linear-gradient(135deg,rgba(91,138,245,.4),rgba(167,139,250,.4));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .25s;pointer-events:none;z-index:1}
.card-hover::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:radial-gradient(circle at var(--sx,50%) var(--sy,50%),rgba(255,255,255,.1) 0%,transparent 65%);opacity:var(--so,0);transition:opacity .4s;z-index:1}
.card-hover:hover{box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 24px 64px rgba(0,0,0,.6),0 4px 20px rgba(0,0,0,.35)}
.card-hover:hover::before{opacity:1}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 19px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:"Space Grotesk",sans-serif;font-size:14px;font-weight:600;transition:all .18s;white-space:nowrap;line-height:1;letter-spacing:.01em}
.btn:disabled{opacity:.45;cursor:default}
.btn-primary{background:linear-gradient(135deg,#6699ff,var(--accent));color:white;box-shadow:0 0 20px rgba(91,138,245,.4),0 0 40px rgba(91,138,245,.15),0 2px 14px rgba(91,138,245,.32),0 1px 3px rgba(0,0,0,.25)}
.btn-primary:hover:not(:disabled){background:linear-gradient(135deg,#78aaff,#6699ff);box-shadow:0 0 28px rgba(91,138,245,.6),0 0 60px rgba(91,138,245,.25),0 4px 22px rgba(91,138,245,.45),0 1px 4px rgba(0,0,0,.2);transform:translateY(-1px)}
.btn-primary:active:not(:disabled){transform:translateY(0);box-shadow:0 0 14px rgba(91,138,245,.35),0 0 28px rgba(91,138,245,.12),0 2px 10px rgba(91,138,245,.25)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover:not(:disabled){background:var(--border);border-color:var(--text3)}
.btn-outline{background:transparent;color:var(--accent);border:1px solid rgba(91,138,245,.35)}
.btn-outline:hover{background:var(--accent-light);border-color:var(--accent)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.btn-danger:hover:not(:disabled){background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.35)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.btn-success:hover:not(:disabled){background:rgba(52,211,153,.12)}
.btn-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.btn-teal{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(8,145,178,.2)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:7px;font-weight:500}
.btn-lg{padding:13px 28px;font-size:15px;border-radius:11px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.02em}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.15)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(251,191,36,.15)}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.15)}
.badge-blue{background:var(--accent-light);color:var(--accent);border:1px solid rgba(91,138,245,.18)}
.badge-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.badge-orange{background:var(--accent2-light);color:var(--accent2);border:1px solid rgba(240,160,80,.2)}
.live-dot{position:relative;display:inline-block;width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-right:5px}
.live-dot::after{content:"";position:absolute;inset:0;border-radius:50%;animation:livePulse 2s ease-out infinite}
.live-dot-green{background:var(--green);box-shadow:0 0 5px rgba(52,211,153,.6)}
.live-dot-green::after{background:var(--green)}
.live-dot-amber{background:var(--yellow);box-shadow:0 0 5px rgba(251,191,36,.5)}
.live-dot-amber::after{background:var(--yellow)}
.badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.18)}
.badge-teal{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(8,145,178,.18)}
.pb{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700}
.pb-ig{background:#3a1829;color:#f9a8d4;border:1px solid rgba(249,168,212,.12)}
.pb-yt{background:#2a0f0f;color:#fca5a5;border:1px solid rgba(252,165,165,.12)}
.pb-tt{background:#0b2a1c;color:#6ee7b7;border:1px solid rgba(110,231,183,.12)}
.pb-tw{background:#162050;color:#93c5fd;border:1px solid rgba(147,197,253,.12)}
.stat-card{padding:24px;position:relative;overflow:hidden;background:rgba(255,255,255,.055)}
.stat-card::before{content:"";position:absolute;top:-28px;right:-28px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(240,160,80,.12),transparent 68%);pointer-events:none}
.stat-card::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(240,160,80,.18),transparent);pointer-events:none}
.stat-label{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.stat-value{font-size:36px;font-weight:700;font-family:"Syne",sans-serif;line-height:1;letter-spacing:-.5px;background:linear-gradient(180deg,#ffffff 0%,rgba(255,255,255,.7) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-change{font-size:12px;margin-top:7px;font-weight:500}
.stat-up{color:var(--green)}.stat-neutral{color:var(--text3)}
.page-title{font-family:"Syne",sans-serif;font-size:36px;font-weight:800;color:var(--text);line-height:1.1;letter-spacing:-.5px}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:5px;line-height:1.5}
.ph-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:32px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.section{margin-bottom:30px}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.01em}
.section-link{font-size:12px;color:var(--accent2);cursor:pointer;font-weight:600;background:none;border:none;font-family:"Space Grotesk",sans-serif;letter-spacing:.02em;transition:color .15s}
.section-link:hover{color:#ffba70}
.deal-row{padding:14px 18px;display:flex;align-items:center;gap:14px}
.deal-row+.deal-row{border-top:1px solid rgba(33,39,61,.9)}
.deal-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:white;flex-shrink:0}
.deal-info{flex:1;min-width:0}
.deal-name{font-size:14px;font-weight:600;color:var(--text)}
.deal-sub{font-size:12px;color:var(--text2);margin-top:2px}
.cr-card{padding:22px;text-align:center}
.cr-av{width:58px;height:58px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:white;box-shadow:0 4px 14px rgba(0,0,0,.35)}
.cr-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:12px 0}
.cr-stat{background:var(--surface2);padding:11px 6px}
.cr-stat-v{font-size:17px;font-weight:700;color:var(--text);font-family:"Syne",sans-serif;letter-spacing:-.2px}
.cr-stat-l{font-size:9px;color:var(--text3);font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
.search-input{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:"Space Grotesk",sans-serif;font-size:14px;background:var(--surface2);color:var(--text);outline:none;transition:border-color .18s,box-shadow .18s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,138,245,.12)}
.filter-btn{padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);font-family:"Space Grotesk",sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.det-banner{height:180px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;display:flex;align-items:flex-end;padding:22px;position:relative;overflow:hidden}
.det-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78),rgba(0,0,0,.08))}
.det-av{width:68px;height:68px;border-radius:50%;border:3px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;color:white;position:relative;z-index:1;box-shadow:0 4px 14px rgba(0,0,0,.35)}
.det-name-wrap{position:relative;z-index:1;margin-left:14px;flex:1}
.det-name{font-size:26px;font-weight:800;color:white;font-family:"Syne",sans-serif;letter-spacing:-.3px}
.det-sub{font-size:13px;color:rgba(255,255,255,.68);margin-top:3px}
.det-body{padding:24px 28px}
.det-stats{display:grid;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:22px}
.det-stat{background:var(--surface2);padding:16px;text-align:center}
.det-stat-v{font-size:24px;font-weight:700;color:var(--text);font-family:"Syne",sans-serif;letter-spacing:-.2px}

// ─── DEADLINE ALERT BANNER ───────────────────────────────────────────────────
function DeadlineAlertBanner({deals}) {
  const [now,setNow] = useState(()=>Date.now());
  useEffect(()=>{
    const id = setInterval(()=>setNow(Date.now()),1000);
    return ()=>clearInterval(id);
  },[]);

  const MONTHS={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const parseDeadline = str => {
    if(!str) return null;
    const [m,d] = str.trim().split(" ");
    if(!(m in MONTHS)||!d) return null;
    return new Date(new Date().getFullYear(), MONTHS[m], parseInt(d), 23, 59, 59, 999);
  };

  const fmtCountdown = ms => {
    if(ms<=0) return null;
    const totalSec = Math.floor(ms/1000);
    const h = Math.floor(totalSec/3600);
    const m = Math.floor((totalSec%3600)/60);
    const s = totalSec%60;
    if(h>=24){
      const days=Math.floor(h/24), rh=h%24;
      return `${days}d ${rh}h ${String(m).padStart(2,"0")}m`;
    }
    return `${String(h).padStart(2,"0")}h ${String(m).padStart(2,"0")}m ${String(s).padStart(2,"0")}s`;
  };

  const alerts = (deals||[])
    .filter(d=>d.status!=="Completed")
    .map(d=>{
      const dt = parseDeadline(d.deadline);
      if(!dt) return null;
      return {...d, ms: dt.getTime()-now};
    })
    .filter(Boolean)
    .filter(d=>d.ms <= 72*60*60*1000)
    .sort((a,b)=>a.ms-b.ms);

  if(!alerts.length) return null;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
      {alerts.map(al=>{
        const over = al.ms<=0;
        const col = over?"var(--red)":"var(--yellow)";
        const bg  = over?"rgba(248,113,113,.07)":"rgba(251,191,36,.06)";
        const bdr = over?"rgba(248,113,113,.22)":"rgba(251,191,36,.22)";
        const pill= over?"rgba(248,113,113,.12)":"rgba(251,191,36,.12)";
        const countdown = fmtCountdown(al.ms);
        return (
          <div key={al.id} style={{display:"flex",alignItems:"center",gap:13,padding:"11px 16px",background:bg,border:"1px solid "+bdr,borderLeft:"3px solid "+col,borderRadius:"var(--radius)",animation:over?"none":"deadlinePulse 2.6s ease-in-out infinite"}}>
            <span style={{fontSize:16,flexShrink:0,lineHeight:1}}>{over?"🔴":"⚠️"}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:"13px",fontWeight:700,lineHeight:1.35}}>
                <span style={{color:col}}>{over?"Overdue — ":"Due soon — "}</span>
                <span style={{color:"var(--text)"}}>{al.brand}</span>
                {al.campaignTitle&&al.campaignTitle!=="Custom Deal"&&(
                  <span style={{color:"var(--text2)",fontWeight:500}}> · {al.campaignTitle}</span>
                )}
              </div>
              <div style={{fontSize:"11px",color:"var(--text3)",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{al.deliverables}</div>
            </div>
            <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:"13px",fontWeight:700,color:col,background:pill,border:"1px solid "+bdr,borderRadius:7,padding:"5px 12px",flexShrink:0,letterSpacing:".03em",whiteSpace:"nowrap"}}>
              {over?"OVERDUE":countdown}
            </div>
          </div>
        );
      })}
    </div>
  );
}

          transform="rotate(-2 59 40)"/>

// ─── SHARED COMPONENTS ────────────────────────────────────────────────────────
function PlatformBadge({p}) {
  const map = {Instagram:["pb pb-ig","📸"],YouTube:["pb pb-yt","▶"],TikTok:["pb pb-tt","♪"],Twitter:["pb pb-tw","𝕏"]};
  const [cls,icon] = map[p] || ["pb pb-ig","📸"];
  return React.createElement("span",{className:cls},icon+" "+p);
}

function StatusBadge({s}) {
  const cls = {Active:"badge badge-green",Pending:"badge badge-yellow",Completed:"badge badge-gray",Declined:"badge badge-red",Invited:"badge badge-blue",Expiring:"badge badge-orange",Expired:"badge badge-red",Draft:"badge badge-gray"};
  const dot = s==="Active"?"live-dot live-dot-green":s==="Pending"?"live-dot live-dot-amber":null;
  return (
    <span className={cls[s]||"badge badge-gray"}>
      {dot&&<span className={dot}/>}
      {s}
    </span>
  );
}

function Modal({onClose,children,maxWidth=520}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 24px 24px",backdropFilter:"blur(4px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="card-lg fade-in" style={{width:"100%",maxWidth,position:"relative",maxHeight:"90vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <button onClick={onClose} style={{position:"absolute",top:14,right:14,width:28,height:28,borderRadius:6,border:"1px solid var(--border)",background:"var(--surface2)",cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2,color:"var(--text2)",flexShrink:0}}>✕</button>
        <div style={{overflowY:"auto",flex:1}}>
          {children}
        </div>
      </div>
    </div>
  );
}

function Toast({msg, emoji, type, duration=3000, onDone}) {
  const [out, setOut] = useState(false);

  // Infer type from message content when not explicitly passed
  const kind = type||(()=>{
    const m = String(msg);
    if(/✅|uploaded|saved|created|invited|success|added|sent/i.test(m)) return "success";
    if(/❌|error|failed|denied/i.test(m)) return "error";
    if(/removed|deleted|cancelled|⚠️/i.test(m)) return "warning";
    return "info";
  })();

  const palette = {success:"#34d399", error:"#f87171", warning:"#fbbf24", info:"#5b8af5"};
  const color = palette[kind]||palette.info;

  useEffect(()=>{
    // Gentle 880 Hz chime for success via Web Audio API
    if(kind==="success") {
      try {
        const ac = new (window.AudioContext||window.webkitAudioContext)();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.type = "sine";
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0, ac.currentTime);
        gain.gain.linearRampToValueAtTime(0.07, ac.currentTime+0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+0.2);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime+0.22);
      } catch(e) {}
    }
    // Begin exit animation before parent unmounts
    const t1 = setTimeout(()=>setOut(true), duration-380);
    // Signal parent to unmount
    const t2 = setTimeout(()=>onDone&&onDone(), duration);
    return ()=>{ clearTimeout(t1); clearTimeout(t2); };
  }, []);

  return (
    <div style={{
      position:"fixed", top:24, right:24, zIndex:9999,
      minWidth:288, maxWidth:360,
      background:"rgba(10,12,22,.88)",
      backdropFilter:"blur(20px) saturate(150%)",
      WebkitBackdropFilter:"blur(20px) saturate(150%)",
      border:"1px solid rgba(255,255,255,.09)",
      borderLeft:`3px solid ${color}`,
      borderRadius:14,
      padding:"14px 18px 18px",
      display:"flex", alignItems:"flex-start", gap:11,
      boxShadow:"0 8px 40px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.07)",
      fontFamily:'"Space Grotesk",sans-serif',
      pointerEvents:"none",
      overflow:"hidden",
      animation: out
        ? "toastOut .32s ease-in forwards"
        : "toastIn .38s cubic-bezier(.16,1,.3,1) forwards"
    }}>
      {emoji&&<span style={{fontSize:"18px",flexShrink:0,lineHeight:1.3,marginTop:1}}>{emoji}</span>}

      {/* Draining progress bar */}

// ─── STAT CARD UTILITIES ──────────────────────────────────────────────────────
function useCountUp(rawValue, duration=1500) {
  const parse = v => {
    const m = String(v).match(/^([^0-9]*)([0-9,]+(?:\.[0-9]+)?)(.*)$/);
    return m ? {pre:m[1], num:parseFloat(m[2].replace(/,/g,'')), suf:m[3]} : null;
  };
  const parsed = React.useMemo(()=>parse(rawValue),[rawValue]);
  // easeOutExpo: starts near full-speed, decelerates exponentially — much snappier than cubic
  const ease = t => t>=1 ? 1 : 1-Math.pow(2,-10*t);
  const fmt = (pre,n,suf) => pre+Math.round(n).toLocaleString()+suf;
  const [display, setDisplay] = useState(()=>parsed ? fmt(parsed.pre,0,parsed.suf) : rawValue);
  const raf = useRef(null);
  useEffect(()=>{
    if(raf.current) cancelAnimationFrame(raf.current);
    if(!parsed||parsed.num===0){setDisplay(rawValue);return;}
    const {pre,num,suf}=parsed;
    const start=performance.now();
    const tick=now=>{
      const t=Math.min((now-start)/duration,1);
      setDisplay(fmt(pre,num*ease(t),suf));
      if(t<1) raf.current=requestAnimationFrame(tick);
      else setDisplay(rawValue);
    };
    raf.current=requestAnimationFrame(tick);
    return ()=>{if(raf.current) cancelAnimationFrame(raf.current);};
  },[rawValue]);
  return display;
}

function StatSparkline({data, color="#5b8af5"}) {
  const pts = (data&&data.length>=2 ? data : [0,0,0,0,0,0,0]);
  const W=80, H=28;
  const max=Math.max(...pts,1), min=Math.min(...pts,0), range=max-min||1;
  const coords=pts.map((v,i)=>[
    parseFloat(((i/(pts.length-1))*W).toFixed(1)),
    parseFloat((H-((v-min)/range)*(H-8)-4).toFixed(1))
  ]);
  const line=coords.map((p,i)=>(i===0?"M":"L")+p[0]+","+p[1]).join(" ");
  const fill=line+" L"+W+","+H+" L0,"+H+" Z";
  const gid="spkg"+color.replace(/[^a-z0-9]/gi,"").slice(-8);
  return (
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:28,display:"block",marginTop:12,overflow:"visible"}}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.2"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={fill} fill={"url(#"+gid+")"}/>
      <path d={line} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

// Renders text character by character at `speed` ms per char when animate=true.
// Falls back to plain text instantly when animate=false.
function TypewriterText({text, animate, speed=30}) {
  const [displayed, setDisplayed] = useState(animate ? "" : text);
  const timer = useRef(null);
  useEffect(() => {
    if (!animate) { setDisplayed(text); return; }
    setDisplayed("");
    let i = 0;
    const tick = () => {
      i++;
      setDisplayed(text.slice(0, i));
      if (i < text.length) timer.current = setTimeout(tick, speed);
    };
    timer.current = setTimeout(tick, speed);
    return () => clearTimeout(timer.current);
  }, [text, animate]);
  return <span>{displayed}</span>;
}

// ── CONFETTI SYSTEM ───────────────────────────────────────────────────────────
function useConfetti() {
  const [firing,setFiring] = useState(false);
  const timerRef = useRef(null);
  const fire = () => {
    setFiring(true);
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(()=>setFiring(false), 2700);
  };
  useEffect(()=>()=>clearTimeout(timerRef.current),[]);
  return [fire, firing];
}

function ConfettiCanvas({active}) {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);

  useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    if(!active){
      cancelAnimationFrame(rafRef.current);
      canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
      return;
    }
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');

    const COLORS = ['#5b8af5','#a78bfa','#f0a050','#34d399','#0891b2','#c084fc','#fbbf24','#60a5fa','#f472b6','#34d399'];

    const mkP = (ox,oy,spread,speedMult=1) => ({
      x: ox+(Math.random()-.5)*spread, y: oy,
      vx: (Math.random()-.5)*15*speedMult,
      vy: -(Math.random()*13+4)*speedMult,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      w: Math.random()*9+4, h: Math.random()*5+2,
      angle: Math.random()*Math.PI*2,
      spin: (Math.random()-.5)*.28,
      gravity: .27+Math.random()*.12,
      drag: .992,
      shape: Math.random()>.3?'rect':'dot',
    });

    let particles = [];
    const cx=canvas.width*.5, cy=canvas.height*.26;

    // Wave 1 — center burst
    for(let i=0;i<90;i++) particles.push(mkP(cx,cy,60));

    // Wave 2 — side cannons (220ms later)
    const t2=setTimeout(()=>{
      for(let i=0;i<55;i++) particles.push(mkP(canvas.width*.1,canvas.height*.35,30,1.1));
      for(let i=0;i<55;i++) particles.push(mkP(canvas.width*.9,canvas.height*.35,30,1.1));
    },220);

    const start=Date.now(), duration=2500;

    const draw=()=>{
      const elapsed=Date.now()-start;
      if(elapsed>duration){ ctx.clearRect(0,0,canvas.width,canvas.height); return; }
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const fadeAt=duration-700;
      const gA=elapsed>fadeAt?1-(elapsed-fadeAt)/700:1;
      particles.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=p.drag; p.angle+=p.spin;
        if(p.y>canvas.height+30||p.x<-30||p.x>canvas.width+30) return;
        ctx.save();
        ctx.globalAlpha=gA;
        ctx.fillStyle=p.color;
        ctx.translate(p.x,p.y);
        ctx.rotate(p.angle);
        if(p.shape==='rect'){
          ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        } else {
          ctx.beginPath(); ctx.arc(0,0,p.w/2.5,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
      });
      rafRef.current=requestAnimationFrame(draw);
    };
    rafRef.current=requestAnimationFrame(draw);
    return()=>{ clearTimeout(t2); cancelAnimationFrame(rafRef.current); };
  },[active]);

  return <canvas ref={canvasRef} style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9999,display:active?'block':'none'}}/>;
}

function ActivityFeed() {
  const EVENTS = [
    {type:"message",  icon:"💬", bg:"rgba(91,138,245,.15)",  col:"var(--accent)",  msgs:["sent you a new message","replied to your brief question","updated the campaign details"]},
    {type:"deal",     icon:"📋", bg:"rgba(167,139,250,.15)", col:"var(--purple)",  msgs:["moved your deal to Review","accepted your content submission","requested a revision"]},
    {type:"payment",  icon:"💸", bg:"rgba(52,211,153,.15)",  col:"var(--green)",   msgs:["released payment of ${amt}","marked invoice #{num} as paid","funded escrow for your deal"]},
    {type:"view",     icon:"👁️", bg:"rgba(251,191,36,.15)",  col:"var(--yellow)",  msgs:["viewed your profile","added you to a shortlist","saved your media kit"]},
    {type:"approved", icon:"✅", bg:"rgba(52,211,153,.12)",  col:"var(--green)",   msgs:["approved your content","gave your post a 5-star rating","signed the contract"]},
    {type:"offer",    icon:"🎯", bg:"rgba(240,160,80,.15)",  col:"var(--accent2)", msgs:["sent you a partnership offer","invited you to their campaign","wants to discuss a collab"]},
  ];
  const BRANDS = [];
  const AMTS   = [500,800,1200,1500,2000,2500,3000];

  const mkItem = (secsAgo) => {
    const ev   = EVENTS[Math.floor(Math.random()*EVENTS.length)];
    const brand = BRANDS[Math.floor(Math.random()*BRANDS.length)];
    const msg   = ev.msgs[Math.floor(Math.random()*ev.msgs.length)]
      .replace("{amt}", "$"+AMTS[Math.floor(Math.random()*AMTS.length)].toLocaleString())
      .replace("#{num}", "#"+(Math.floor(Math.random()*900)+100));
    return { id:Date.now()+Math.random(), ev, brand, msg, ts:Date.now()-(secsAgo*1000) };
  };

  const [items,  setItems]  = useState(()=>[]);
  const [newest, setNewest] = useState(null);
  const [tick,   setTick]   = useState(0);

  // Tick timestamps every 30s
  useEffect(()=>{
    const id = setInterval(()=>setTick(t=>t+1), 30000);
    return ()=>clearInterval(id);
  },[]);

  // Schedule next event with random delay (8–18s)
  useEffect(()=>{
    if(!BRANDS.length) return;
    const delay = 8000 + Math.random()*10000;
    const id = setTimeout(()=>{
      const item = mkItem(0);
      setNewest(item.id);
      setItems(prev=>[item,...prev].slice(0,12));
      setTimeout(()=>setNewest(null), 700);
    }, delay);
    return ()=>clearTimeout(id);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  },[items.length]);

  const fmtTs = ts => {
    const s = Math.floor((Date.now()-ts)/1000);
    if(s < 5)    return "just now";
    if(s < 60)   return `${s}s ago`;
    if(s < 3600) return `${Math.floor(s/60)}m ago`;
    return `${Math.floor(s/3600)}h ago`;
  };

  return (
    <div className="section">
      <div className="section-hdr" style={{alignItems:"center"}}>
        <span className="section-title">Activity</span>
        <span style={{display:"flex",alignItems:"center",gap:5,fontSize:"11px",color:"var(--green)",fontWeight:600}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:"var(--green)",display:"inline-block",animation:"liveDot 2.2s ease-in-out infinite"}}/>
          LIVE
        </span>
      </div>
      <div className="card-lg" style={{padding:0,overflow:"hidden"}}>
        {items.map((item,i)=>(
          <div key={item.id}
            style={{
              padding:"11px 14px",
              borderBottom:i<items.length-1?"1px solid var(--border)":"none",
              display:"flex",gap:10,alignItems:"flex-start",
              animation:item.id===newest?"feedSlideIn 380ms cubic-bezier(.16,1,.3,1) both":"none",
              background:item.id===newest?"rgba(91,138,245,.04)":"transparent",
              transition:"background .8s ease",
            }}>
            <div style={{width:32,height:32,borderRadius:"50%",background:item.ev.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flexShrink:0,marginTop:1}}>
              {item.ev.icon}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:"12px",lineHeight:1.5,color:"var(--text)"}}>
                <span style={{fontWeight:700,color:item.ev.col}}>{item.brand}</span>{" "}{item.msg}
              </div>
              <div style={{fontSize:"11px",color:"var(--text3)",marginTop:2}}>{fmtTs(item.ts)}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

                    <div style={{position:"relative",flexShrink:0}}>

                    <div style={{flex:1,minWidth:0}}>

              <button onClick={handleDismiss} className="btn btn-secondary btn-lg">Dismiss</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── CAMPAIGN FEED ────────────────────────────────────────────────────────────
function CampaignsPage({setPage,setSelected,campaignQuestions={},setCampaignQuestions,userName}) {
  const loading = useSkeleton();
  const [liked,setLiked] = useState({});
  const [saved,setSaved] = useState({});
  const [expanded,setExpanded] = useState({});
  const [animating,setAnimating] = useState({});
  const [activeStory,setActiveStory] = useState(null);
  const [filterOpen,setFilterOpen] = useState(false);
  const [commentOpen,setCommentOpen] = useState(null); // campaign id or null
  const [questionText,setQuestionText] = useState("");
  const questionListRef = useRef(null);
  const lastTap = useRef({});

  const sendQuestion = () => {
    const text = questionText.trim();
    if (!text || !commentOpen) return;
    const q = {id: Date.now(), text, creatorName: userName||"You", ts: new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}), reply: null};
    setCampaignQuestions(prev => ({...prev, [commentOpen]: [...(prev[commentOpen]||[]), q]}));
    setQuestionText("");
    setTimeout(() => { if(questionListRef.current) questionListRef.current.scrollTop = questionListRef.current.scrollHeight; }, 80);
  };

  const STORY_BRANDS = [];
  const TIMES=["2h","4h","7h","12h","1d"];
  const PARTICLE_DIRS=[
    {tx:"-30px",ty:"-28px"},{tx:"0px",ty:"-38px"},{tx:"30px",ty:"-28px"},
    {tx:"38px",ty:"0px"},{tx:"30px",ty:"28px"},{tx:"0px",ty:"38px"},
    {tx:"-30px",ty:"28px"},{tx:"-38px",ty:"0px"},
  ];
  const PCOLORS=["#f87171","#fb923c","#facc15","#4ade80","#60a5fa","#c084fc","#f472b6","#34d399"];

  const triggerLike=(id,force=false)=>{
    const willLike=force?true:!liked[id];
    setLiked(l=>({...l,[id]:willLike}));
    if(willLike){
      setAnimating(a=>({...a,[id]:true}));
      setTimeout(()=>setAnimating(a=>({...a,[id]:false})),750);
    }
  };
  const handleImageTap=id=>{
    const now=Date.now();
    if(now-(lastTap.current[id]||0)<320) triggerLike(id,true);
    lastTap.current[id]=now;
  };

  if(loading) return <SkeletonPage layout="grid"/>;
  return (
    <div className="fade-in">
      <div className="ph-row">
        <div><div className="page-title">Campaign Feed</div><div className="page-subtitle">Opportunities matched to your profile.</div></div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setFilterOpen(f=>!f)} className="btn btn-secondary btn-sm" style={{display:"flex",alignItems:"center",gap:5}}>🎛 Filter</button>
        </div>
      </div>

      {/* Stories row */}
      <div className="no-scrollbar" style={{display:"flex",gap:14,overflowX:"auto",padding:"4px 2px 18px",marginBottom:2}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,flexShrink:0,cursor:"pointer"}} onClick={()=>setActiveStory(null)}>
          <div style={{width:58,height:58,borderRadius:99,background:"var(--surface2)",border:"2px dashed var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:0}}>✦</div>
          <span style={{fontSize:"10px",color:"var(--text3)",whiteSpace:"nowrap"}}>For You</span>
        </div>
        {STORY_BRANDS.map((b,i)=>{
          const g=bg(b.ci);
          const isAct=activeStory===b.bi;
          return (
            <div key={i} onClick={()=>setActiveStory(s=>s===b.bi?null:b.bi)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,flexShrink:0,cursor:"pointer"}}>
              <div style={{width:60,height:60,borderRadius:99,padding:2,background:b.active?"linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)":"var(--border)",transition:"transform .15s",transform:isAct?"scale(1.08)":"scale(1)"}}>
                <div style={{width:"100%",height:"100%",borderRadius:99,background:`linear-gradient(135deg,${g[0]},${g[1]})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontWeight:800,color:"white",border:"2.5px solid var(--bg)"}}>{b.bi}</div>
              </div>
              <span style={{fontSize:"10px",color:b.active?"var(--text)":"var(--text3)",maxWidth:62,textAlign:"center",lineHeight:1.2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:b.active?600:400}}>{b.brand}</span>
            </div>
          );
        })}
      </div>

      {/* Feed */}
      <div style={{display:"flex",flexDirection:"column",gap:0,maxWidth:620,margin:"0 auto"}}>
        {CAMPAIGNS.map((c,idx)=>{
          const g=bg(c.ci);
          const isLiked=!!liked[c.id];
          const isSaved=!!saved[c.id];
          const isExpanded=!!expanded[c.id];
          const isAnim=!!animating[c.id];
          const likeBase=12+c.id*7;
          const commentCount=3+c.id;
          return (
            <div key={c.id} style={{background:"var(--surface)",borderRadius:"var(--radius-lg)",overflow:"hidden",marginBottom:20,border:"1px solid var(--border)",boxShadow:"0 2px 16px rgba(0,0,0,.18)"}}>

              {/* Image area */}
              <div onClick={()=>handleImageTap(c.id)} style={{height:210,background:`linear-gradient(135deg,${g[0]} 0%,${g[1]} 100%)`,position:"relative",cursor:"pointer",userSelect:"none",WebkitUserSelect:"none"}}>
                {/* Depth overlays */}
                <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,rgba(0,0,0,.52) 0%,transparent 42%,rgba(0,0,0,.45) 100%)"}}/>
                <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(ellipse at 25% 25%,rgba(255,255,255,.09) 0%,transparent 55%),radial-gradient(ellipse at 75% 75%,rgba(0,0,0,.15) 0%,transparent 50%)"}}/>
                {/* Grid texture */}
                <div style={{position:"absolute",inset:0,backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.03) 39px,rgba(255,255,255,.03) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.03) 39px,rgba(255,255,255,.03) 40px)"}}/>

                {/* Brand header */}
                <div style={{position:"absolute",top:0,left:0,right:0,padding:"13px 14px",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:40,height:40,borderRadius:99,padding:2,background:c.verified?"linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366)":"rgba(255,255,255,.25)",flexShrink:0}}>
                    <div style={{width:"100%",height:"100%",borderRadius:99,background:`linear-gradient(135deg,${g[0]},${g[1]})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:800,color:"white",border:"2px solid var(--bg)"}}>{c.bi}</div>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:"13px",fontWeight:700,color:"white",textShadow:"0 1px 4px rgba(0,0,0,.4)"}}>{c.brand}</span>
                      {c.verified&&<span style={{fontSize:"12px",color:"#60a5fa",lineHeight:1,textShadow:"0 1px 4px rgba(0,0,0,.5)"}}>✓</span>}
                    </div>

// ─── DEAL ROOM ────────────────────────────────────────────────────────────────
function dealRelTime(ts) {
  const now=Date.now(), d=ts instanceof Date?ts:new Date(ts), diff=now-d.getTime();
  if(diff<60000) return "Just now";
  if(diff<3600000) return Math.floor(diff/60000)+"m ago";
  if(diff<86400000) return Math.floor(diff/3600000)+"h ago";
  if(diff<172800000) return "Yesterday";
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

function DealRoomPage({setPage,setSelected,deals,role,authUser,updateDeal}) {
  const loading = useSkeleton();
  const [fireConfetti,confettiFiring] = useConfetti();
  const [activeDeal,setActiveDeal] = useState(deals.find(d=>d.status==="Active")||deals.find(d=>d.status!=="Completed")||deals[0]);

  // Keep activeDeal in sync when deals array changes (loaded from DB, refreshed, etc.)
  useEffect(()=>{
    if(!deals.length) return;
    if(activeDeal) {
      // Find the same deal in the updated array and merge fresh data
      const fresh = deals.find(d=>String(d.id)===String(activeDeal.id));
      if(fresh) { setActiveDeal(fresh); syncFromDeal(fresh); }
    } else {
      const found = deals.find(d=>d.status==="Active")||deals.find(d=>d.status!=="Completed")||deals[0];
      if(found) setActiveDeal(found);
    }
  },[deals]);

  const [msgInput,setMsgInput] = useState("");
  const [msgs,setMsgs] = useState([]);
  const msgEndRef = React.useRef(null);

  // Load existing messages + subscribe to new ones via Supabase Realtime
  useEffect(()=>{
    const dealId = activeDeal?.id;
    if(!dealId) return;

    // 1. Fetch existing messages
    supabase
      .from("deal_messages")
      .select("*")
      .eq("deal_id", String(dealId))
      .order("created_at", {ascending:true})
      .then(({data})=>{
        if(data) setMsgs(data.map(r=>({
          id:r.id, from:r.sender_id===authUser?.id?"me":"them",
          senderName:r.sender_name||"", senderRole:r.sender_role,
          text:r.body, time:dealRelTime(new Date(r.created_at)),
        })));
      });

    // 2. Subscribe to INSERT events on this deal's messages
    const channel = supabase
      .channel("deal-msgs-"+dealId)
      .on("postgres_changes",
        {event:"INSERT", schema:"public", table:"deal_messages", filter:"deal_id=eq."+dealId},
        (payload)=>{
          const r = payload.new;
          // Skip messages from ourselves — the optimistic insert already shows them
          if(r.sender_id === authUser?.id) return;
          setMsgs(prev=>{
            if(prev.some(m=>m.id===r.id)) return prev;
            return [...prev, {
              id:r.id, from:"them",
              senderName:r.sender_name||"", senderRole:r.sender_role,
              text:r.body, time:dealRelTime(new Date(r.created_at)), animate:true,
            }];
          });
        }
      )
      .subscribe();

    return ()=>{ supabase.removeChannel(channel); };
  },[activeDeal?.id, authUser?.id]);

  // Auto-scroll to bottom when new messages arrive
  useEffect(()=>{
    msgEndRef.current?.scrollIntoView({behavior:"smooth"});
  },[msgs.length]);
  // Brief state — initialized from deal (loaded from DB)
  const [briefFile,setBriefFile] = useState(activeDeal?.briefFile||null);
  const [briefLink,setBriefLink] = useState(activeDeal?.briefLink||"");
  const [briefComments,setBriefComments] = useState(activeDeal?.briefComments||"");
  const [briefSubmitted,setBriefSubmitted] = useState(!!activeDeal?.briefSubmitted);
  const [briefAcknowledged,setBriefAcknowledged] = useState(!!activeDeal?.briefAcknowledged);

  const [briefUploading,setBriefUploading] = useState(false);
  const handleBriefFileChange = async (e) => {
    const file = e.target.files?.[0];
    if(!file || !activeDeal) return;
    setBriefUploading(true);
    try {
      const path = `deals/${activeDeal.id}/brief/${Date.now()}_${file.name}`;
      const {data,error} = await supabase.storage.from("deal-files").upload(path, file, {upsert:true});
      if(error) throw error;
      const {data:urlData} = supabase.storage.from("deal-files").getPublicUrl(path);
      setBriefFile({name:file.name, size:file.size, dataUrl:urlData.publicUrl});
    } catch(err) {
      console.error("[briefUpload]", err);
      // Fallback to dataUrl for small files
      const reader = new FileReader();
      reader.onload = () => setBriefFile({name:file.name, size:file.size, dataUrl:reader.result});
      reader.readAsDataURL(file);
    }
    setBriefUploading(false);
  };
  const briefFileInputRef = React.useRef(null);

  // Contract state — initialized from deal
  const [contractFile,setContractFile] = useState(activeDeal?.contractFile||null);
  const [contractLink,setContractLink] = useState(activeDeal?.contractLink||"");
  const [contractNotes,setContractNotes] = useState(activeDeal?.contractNotes||"");
  const [contractSent,setContractSent] = useState(!!activeDeal?.contractSent);
  const [contractSigned,setContractSigned] = useState(!!activeDeal?.contractSigned);
  const [contractSignedAt,setContractSignedAt] = useState(activeDeal?.contractSignedAt||null);
  const [signedFile,setSignedFile] = useState(activeDeal?.signedFile||null);
  const [signedFileUploading,setSignedFileUploading] = useState(false);
  const signedFileInputRef = React.useRef(null);

  const handleSignedFileUpload = async (e) => {
    const file = e.target.files?.[0];
    if(!file || !activeDeal) return;
    setSignedFileUploading(true);
    try {
      const path = `deals/${activeDeal.id}/signed/${Date.now()}_${file.name}`;
      const {error} = await supabase.storage.from("deal-files").upload(path, file, {upsert:true});
      if(error) throw error;
      const {data:urlData} = supabase.storage.from("deal-files").getPublicUrl(path);
      const sf = {name:file.name, size:file.size, dataUrl:urlData.publicUrl};
      setSignedFile(sf);
      syncDealFields({signed_file_name:sf.name, signed_file_data:sf.dataUrl});
    } catch(err) {
      console.error("[signedFileUpload]", err);
    }
    setSignedFileUploading(false);
  };

  const [contractUploading,setContractUploading] = useState(false);
  const handleContractFileChange = async (e) => {
    const file = e.target.files?.[0];
    if(!file || !activeDeal) return;
    setContractUploading(true);
    try {
      const path = `deals/${activeDeal.id}/contract/${Date.now()}_${file.name}`;
      const {data,error} = await supabase.storage.from("deal-files").upload(path, file, {upsert:true});
      if(error) throw error;
      const {data:urlData} = supabase.storage.from("deal-files").getPublicUrl(path);
      setContractFile({name:file.name, size:file.size, dataUrl:urlData.publicUrl});
    } catch(err) {
      console.error("[contractUpload]", err);
      const reader = new FileReader();
      reader.onload = () => setContractFile({name:file.name, size:file.size, dataUrl:reader.result});
      reader.readAsDataURL(file);
    }
    setContractUploading(false);
  };
  const contractFileInputRef = React.useRef(null);

  // Pause polling briefly after a local write so the poll doesn't overwrite with stale data
  const pollPaused = React.useRef(false);
  const pausePoll = () => { pollPaused.current = true; setTimeout(()=>{ pollPaused.current = false; }, 8000); };

  // Sync brief/contract state to Supabase and update App-level deals
  const syncDealFields = (fields) => {
    if(!activeDeal?.id) return;
    pausePoll();
    fetch(`${BRIDGN_API_URL}/api/deals/update`, {
      method:"PUT", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({bridgnDealId:String(activeDeal.id), userId:authUser?.id, fields}),
    })
    .then(r=>r.ok?r.json():null)
    .then(data=>{
      if(data?.deal) {
        // Update the App-level deals array so the data persists across navigation
        updateDeal && updateDeal(activeDeal.id, data.deal);
        setActiveDeal(prev=>({...prev, ...data.deal}));
      }
    })
    .catch(e=>console.error("[syncDealFields]",e));
  };

  // Sync local brief/contract state from deal data
  const syncFromDeal = (deal) => {
    if(!deal) return;
    setBriefFile(deal.briefFile||null);
    setBriefLink(deal.briefLink||"");
    setBriefComments(deal.briefComments||"");
    setBriefSubmitted(!!deal.briefSubmitted);
    setBriefAcknowledged(!!deal.briefAcknowledged);
    setContractFile(deal.contractFile||null);
    setContractLink(deal.contractLink||"");
    setContractNotes(deal.contractNotes||"");
    setContractSent(!!deal.contractSent);
    setContractSigned(!!deal.contractSigned);
    setContractSignedAt(deal.contractSignedAt||null);
    setSignedFile(deal.signedFile||null);
  };

  // Re-sync when activeDeal changes (switching deals or initial load)
  useEffect(()=>{ syncFromDeal(activeDeal); },[activeDeal?.id]);

  // Poll for deal updates every 5 seconds so both sides see changes live
  // (brief submitted, contract sent, acknowledged, signed, etc.)
  useEffect(()=>{
    const dealId = activeDeal?.id;
    if(!dealId || !authUser) return;
    const poll = setInterval(()=>{
      if(pollPaused.current) return;
      fetch(`${BRIDGN_API_URL}/api/deals?userId=${authUser.id}`)
        .then(r=>r.ok?r.json():null)
        .then(data=>{
          const fresh = data?.deals?.find(d=>d.id===String(dealId));
          if(!fresh) return;
          // Update activeDeal + local state if something changed
          setActiveDeal(prev=>{
            if(!prev) return fresh;
            if(prev.briefSubmitted!==fresh.briefSubmitted || prev.briefAcknowledged!==fresh.briefAcknowledged ||
               prev.contractSent!==fresh.contractSent || prev.contractSigned!==fresh.contractSigned ||
               prev.status!==fresh.status) {
              syncFromDeal(fresh);
              return fresh;
            }
            return prev;
          });
        })
        .catch(()=>{});
    }, 5000);
    return ()=>clearInterval(poll);
  },[activeDeal?.id, authUser?.id]);

  const [contentUploaded,setContentUploaded] = useState(false);
  const [uploadingContent,setUploadingContent] = useState(false);
  const [scriptUrl,setScriptUrl] = useState(""); // creator pastes script/draft link
  const [scriptSubmitted,setScriptSubmitted] = useState(false);

  // ── ACH Payment + Escrow state ──────────────────────────────────────────────
  const [achPhase,setAchPhase] = useState("idle"); // idle | creating | collecting | confirming | done | error
  const [achError,setAchError] = useState(null);
  const [releaseLoading,setReleaseLoading] = useState(false);
  const [disputeLoading,setDisputeLoading] = useState(false);
  const [showDisputeModal,setShowDisputeModal] = useState(false);
  const [disputeReason,setDisputeReason] = useState("");
  const [escrowToast,setEscrowToast] = useState(null);

  const isBrand = role === "brand";
  const escrowReleaseDays = activeDeal?.escrowReleaseDays || 14;

  const showEscrowToast = (msg,type="success") => {
    setEscrowToast({msg,type});
    setTimeout(()=>setEscrowToast(null),4000);
  };

  const handleFundDeal = async () => {
    if(!activeDeal || !authUser) return;
    setAchPhase("creating");
    setAchError(null);
    try {
      const resp = await fetch(`${BRIDGN_API_URL}/api/stripe/create-deal-payment`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          dealId:             activeDeal.id,
          amount:             activeDeal.amount,
          brandUserId:        authUser.id,
          brandEmail:         authUser.email,
          brandName:          authUser.user_metadata?.full_name || authUser.email,
          creatorUserId:      activeDeal.creatorUserId || "",
          escrowReleaseDays:  escrowReleaseDays,
        }),
      });
      if(!resp.ok) {
        const err = await resp.json().catch(()=>({error:"Network error"}));
        throw new Error(err.error || "Server error");
      }
      const { clientSecret, publishableKey } = await resp.json();

      if(!window.Stripe) throw new Error("Stripe.js failed to load. Please refresh and try again.");
      const stripeJs = window.Stripe(publishableKey);

      setAchPhase("collecting");
      const { paymentIntent: pi1, error: collectErr } = await stripeJs.collectBankAccountForPayment({
        clientSecret,
        params: {
          payment_method_type: "us_bank_account",
          payment_method_data: {
            billing_details: {
              name:  authUser.user_metadata?.full_name || authUser.email,
              email: authUser.email,
            },
          },
        },
        expand: ["payment_method"],
      });
      if(collectErr) throw new Error(collectErr.message);
      if(pi1.status === "requires_payment_method") { setAchPhase("idle"); return; }

      setAchPhase("confirming");
      const { paymentIntent: pi2, error: confirmErr } = await stripeJs.confirmUsBankAccountPayment(clientSecret);
      if(confirmErr) throw new Error(confirmErr.message);

      setAchPhase("done");
      const updated = {...activeDeal, status:"payment_processing", paymentIntentId: pi2?.id};
      setActiveDeal(updated);
      updateDeal && updateDeal(activeDeal.id, {status:"payment_processing", paymentIntentId: pi2?.id});
    } catch(err) {
      console.error("[ACH payment]", err);
      setAchError(err.message);
      setAchPhase("error");
    }
  };

  const handleRelease = async () => {
    if(!activeDeal || !authUser) return;
    setReleaseLoading(true);
    try {
      const resp = await fetch(`${BRIDGN_API_URL}/api/stripe/release-payment`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ dealId: activeDeal.id, brandUserId: authUser.id }),
      });
      const json = await resp.json();
      if(!resp.ok) throw new Error(json.error || "Server error");
      const updated = {...activeDeal, status:"payment_released"};
      setActiveDeal(updated);
      updateDeal && updateDeal(activeDeal.id, {status:"payment_released"});
      showEscrowToast("Payment released to the creator.");
    } catch(err) {
      showEscrowToast(err.message, "error");
    }
    setReleaseLoading(false);
  };

  const handleDisputeDeal = async () => {
    if(!activeDeal || !authUser) return;
    setDisputeLoading(true);
    try {
      const resp = await fetch(`${BRIDGN_API_URL}/api/stripe/dispute-deal`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ dealId: activeDeal.id, brandUserId: authUser.id, reason: disputeReason }),
      });
      const json = await resp.json();
      if(!resp.ok) throw new Error(json.error || "Server error");
      const updated = {...activeDeal, status:"payment_disputed"};
      setActiveDeal(updated);
      updateDeal && updateDeal(activeDeal.id, {status:"payment_disputed"});
      setShowDisputeModal(false);
      setDisputeReason("");
      showEscrowToast("Deal flagged — payment is on hold for admin review.");
    } catch(err) {
      showEscrowToast(err.message, "error");
    }
    setDisputeLoading(false);
  };

  // All hooks must be called before any conditional return (React Rules of Hooks).
  const DELIVERABLES = activeDeal ? (activeDeal.deliverables||"").split(",").map(d=>d.trim()).filter(Boolean) : [];
  const [approved,setApproved] = useState(DELIVERABLES.map(()=>false));

  // Reset approved checkboxes when active deal changes
  useEffect(()=>{
    if(!activeDeal) return;
    const dels = (activeDeal.deliverables||"").split(",").map(d=>d.trim()).filter(Boolean);
    setApproved(dels.map(()=>false));
  },[activeDeal?.id]);

  if(loading) return <SkeletonPage layout="deal-room"/>;
  if(!activeDeal) return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">Deal Room</div><div className="page-subtitle">Shared workspace for managing deals.</div></div></div>
      <div className="card" style={{padding:"40px 20px",textAlign:"center"}}>
        <div style={{fontSize:"32px",marginBottom:12}}>🏠</div>
        <div style={{fontSize:"15px",fontWeight:600,marginBottom:6}}>No active deals</div>
        <div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.65,marginBottom:14}}>
          {isBrand
            ? "When a creator invites you to a deal, it will appear here."
            : "Create a new deal to get started. Your shared workspace with the brand will appear here."}
        </div>
        <button className="btn btn-primary btn-sm" onClick={()=>setPage(isBrand?"deals":"new-deal")}>{isBrand?"View Deals":"+ New Deal"}</button>
      </div>
    </div>
  );
  const g=bg(activeDeal.ci);
  const sendMsg=()=>{
    if(!msgInput.trim()||!activeDeal||!authUser) return;
    const text=msgInput.trim();
    const tempId="temp-"+Date.now();
    const userName=authUser.user_metadata?.full_name||authUser.email?.split("@")[0]||"";
    // Optimistic insert
    setMsgs(m=>[...m,{id:tempId,from:"me",text,time:"Just now",animate:false,senderRole:role,senderName:userName}]);
    setMsgInput("");
    // Persist to Supabase — Realtime will deduplicate via the id check
    supabase.from("deal_messages").insert({
      deal_id:String(activeDeal.id),
      sender_id:authUser.id,
      sender_role:role,
      sender_name:userName,
      body:text,
    }).then(({error})=>{
      if(error) console.error("[sendMsg]",error.message);
    });
  };
  const pct = Math.round((activeDeal.progress/6)*100);
  return (
    <div className="fade-in">
      <div className="ph-row">
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
            <div className="page-title">Deal Room</div>
            <div style={{padding:"4px 12px",borderRadius:99,background:"linear-gradient(135deg,"+g[0]+"22,"+g[1]+"15)",border:"1px solid "+g[0]+"40",fontSize:"12px",fontWeight:700,color:g[0]}}>Live</div>
          </div>
          <div className="page-subtitle">Shared workspace — {isBrand?"you and the creator":"you and the brand"} see this in real time.</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <select className="fsel" style={{width:"auto",padding:"8px 12px",fontSize:"13px"}} value={activeDeal.id} onChange={e=>{const d=deals.find(x=>x.id===parseInt(e.target.value));if(d)setActiveDeal(d);}}>
            {deals.map(d=><option key={d.id} value={d.id}>{d.brand} — {d.campaignTitle}</option>)}
          </select>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 360px",gap:20,alignItems:"start"}}>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div className="card-lg" style={{overflow:"hidden"}}>
            <div style={{height:4,background:"linear-gradient(90deg,"+g[0]+","+g[1]+")"}}></div>
            <div style={{padding:"18px 22px"}}>
              <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:16}}>
                <div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,"+g[0]+","+g[1]+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontWeight:800,color:"white",flexShrink:0}}>{activeDeal.bi}</div>
                <div style={{flex:1}}><div style={{fontSize:"16px",fontWeight:700}}>{activeDeal.brand}</div><div style={{fontSize:"13px",color:"var(--text2)"}}>{activeDeal.campaignTitle} · {activeDeal.platform}</div></div>
                <div style={{display:"flex",gap:7}}><StatusBadge s={activeDeal.status}/>{activeDeal.escrow&&<EscrowBadge released={activeDeal.escrowReleased}/>}</div>
              </div>
              <div className="det-stats" style={{gridTemplateColumns:"repeat(3,1fr)",marginBottom:0}}>
                {[["$"+activeDeal.amount.toLocaleString(),"Deal Value"],[activeDeal.deadline,"Deadline"],[pct+"%","Complete"]].map(([v,l],i)=>(
                  <div key={i} className="det-stat"><div className="det-stat-v" style={{color:i===0?g[0]:"var(--text)"}}><AnimNum value={v}/></div><div className="det-stat-l">{l}</div></div>
                ))}
              </div>
            </div>
          </div>
          <div className="card-lg" style={{padding:"18px 22px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div style={{fontSize:"14px",fontWeight:700}}>Creative Brief</div>
              {briefSubmitted?(briefAcknowledged?<span className="badge badge-green">Acknowledged</span>:<span className="badge badge-yellow">Awaiting creator</span>):<span className="badge" style={{background:"var(--surface2)",color:"var(--text3)"}}>Not submitted</span>}
            </div>
            {isBrand ? (
              /* ── Brand side: upload file or paste link + comments ── */
              briefSubmitted ? (
                <div>
                  {/* Show what was submitted */}
                  {briefFile&&(
                    <div style={{display:"flex",gap:10,alignItems:"center",padding:"12px 14px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",marginBottom:10}}>
                      <span style={{fontSize:"20px"}}>📄</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:"13px",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{briefFile.name}</div>
                        <div style={{fontSize:"11px",color:"var(--text3)"}}>{(briefFile.size/1024).toFixed(0)} KB</div>
                      </div>
                    </div>
                  )}
                  {briefLink&&(
                    <div style={{display:"flex",gap:10,alignItems:"center",padding:"12px 14px",background:"var(--accent-light)",border:"1px solid rgba(91,138,245,.25)",borderRadius:"var(--radius-sm)",marginBottom:10}}>
                      <span style={{fontSize:"18px"}}>🔗</span>
                      <a href={briefLink} target="_blank" rel="noopener noreferrer" style={{flex:1,fontSize:"13px",color:"var(--accent)",textDecoration:"underline",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{briefLink}</a>
                    </div>
                  )}
                  {briefComments&&(
                    <div style={{background:"var(--bg)",borderRadius:"var(--radius)",border:"1px solid var(--border)",padding:"14px 16px",fontSize:"13px",color:"var(--text2)",lineHeight:1.7,marginBottom:10,whiteSpace:"pre-wrap"}}>
                      <div style={{fontSize:"11px",fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Notes</div>
                      {briefComments}
                    </div>
                  )}
                  {briefAcknowledged&&<div style={{padding:"8px 12px",background:"var(--green-bg)",border:"1px solid rgba(52,211,153,.3)",borderRadius:"var(--radius-sm)",fontSize:"12px",color:"var(--green)",fontWeight:600,marginBottom:10}}>✓ Creator has acknowledged the brief</div>}
                  <button onClick={()=>{setBriefSubmitted(false);syncDealFields({brief_submitted:false});}} className="btn btn-secondary btn-sm">Edit Brief</button>
                </div>
              ) : (
                <div>
                  <div style={{fontSize:"12px",color:"var(--text3)",marginBottom:12,lineHeight:1.5}}>Upload a brief document, paste a link, or both. Add any notes the creator should know.</div>

                  {/* File upload */}
                  <input ref={briefFileInputRef} type="file" accept=".pdf,.doc,.docx,.txt,.rtf,.pages,.ppt,.pptx,.key" onChange={handleBriefFileChange} style={{display:"none"}}/>
                  {briefFile?(
                    <div style={{display:"flex",gap:10,alignItems:"center",padding:"10px 14px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",marginBottom:10}}>
                      <span style={{fontSize:"18px"}}>📄</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:"13px",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{briefFile.name}</div>
                        <div style={{fontSize:"11px",color:"var(--text3)"}}>{(briefFile.size/1024).toFixed(0)} KB</div>
                      </div>
                      <button onClick={()=>setBriefFile(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"14px",color:"var(--text3)",padding:"2px 6px"}}>✕</button>
                    </div>
                  ):(
                    <div onClick={()=>!briefUploading&&briefFileInputRef.current?.click()} style={{border:"2px dashed var(--border)",borderRadius:"var(--radius)",padding:"16px",textAlign:"center",cursor:briefUploading?"default":"pointer",marginBottom:10,transition:"border-color .15s",opacity:briefUploading?.6:1}} onMouseEnter={e=>{if(!briefUploading)e.currentTarget.style.borderColor="var(--accent)";}} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
                      {briefUploading?<><div style={{fontSize:"18px",animation:"spin .9s linear infinite",display:"inline-block"}}>⟳</div><div style={{fontSize:"13px",marginTop:4}}>Uploading...</div></>:<><div style={{fontSize:"20px",marginBottom:4}}>📎</div><div style={{fontSize:"13px",fontWeight:600}}>Upload Brief Document</div><div style={{fontSize:"11px",color:"var(--text3)",marginTop:2}}>PDF, DOC, DOCX, TXT, PPT</div></>}
                    </div>
                  )}

                  {/* Link */}
                  <div style={{marginBottom:10}}>
                    <label style={{fontSize:"12px",fontWeight:600,color:"var(--text3)",display:"block",marginBottom:4}}>Or paste a link</label>
                    <input className="fi" value={briefLink} onChange={e=>setBriefLink(e.target.value)} placeholder="Google Doc, Notion, Dropbox link…" style={{width:"100%",boxSizing:"border-box",padding:"9px 12px",fontSize:"13px"}}/>
                  </div>

                  {/* Comments */}
                  <div style={{marginBottom:14}}>
                    <label style={{fontSize:"12px",fontWeight:600,color:"var(--text3)",display:"block",marginBottom:4}}>Notes for the creator</label>
                    <textarea
                      value={briefComments}
                      onChange={e=>setBriefComments(e.target.value)}
                      placeholder="Key things to keep in mind, tone guidance, mandatory mentions, restrictions…"
                      rows={4}
                      style={{width:"100%",boxSizing:"border-box",padding:"10px 12px",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",background:"var(--surface2)",color:"var(--text)",fontSize:"13px",fontFamily:"inherit",lineHeight:1.6,outline:"none",resize:"vertical"}}
                    />
                  </div>

                  <button onClick={()=>{if(briefFile||briefLink.trim()||briefComments.trim()){setBriefSubmitted(true);syncDealFields({brief_file_name:briefFile?.name||null,brief_file_data:briefFile?.dataUrl||null,brief_link:briefLink||null,brief_comments:briefComments||null,brief_submitted:true});}}} className="btn btn-primary" style={{width:"100%"}} disabled={!briefFile&&!briefLink.trim()&&!briefComments.trim()}>Send Brief to Creator</button>
                </div>
              )
            ) : (
              /* ── Creator side: view/download brief ── */
              briefSubmitted ? (
                <div>
                  {briefFile&&(
                    <div style={{display:"flex",gap:10,alignItems:"center",padding:"12px 14px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",marginBottom:10}}>
                      <span style={{fontSize:"20px"}}>📄</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:"13px",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{briefFile.name}</div>
                        <div style={{fontSize:"11px",color:"var(--text3)"}}>{(briefFile.size/1024).toFixed(0)} KB</div>
                      </div>
                      <button onClick={()=>{fetch(briefFile.dataUrl).then(r=>r.blob()).then(b=>{const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=briefFile.name;a.click();URL.revokeObjectURL(a.href);});}} className="btn btn-secondary btn-sm" style={{flexShrink:0}}>Download</button>
                    </div>
                  )}
                  {briefLink&&(
                    <div style={{display:"flex",gap:10,alignItems:"center",padding:"12px 14px",background:"var(--accent-light)",border:"1px solid rgba(91,138,245,.25)",borderRadius:"var(--radius-sm)",marginBottom:10}}>
                      <span style={{fontSize:"18px"}}>🔗</span>
                      <a href={briefLink} target="_blank" rel="noopener noreferrer" style={{flex:1,fontSize:"13px",color:"var(--accent)",textDecoration:"underline",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{briefLink}</a>
                      <span onClick={()=>{navigator.clipboard.writeText(briefLink).catch(()=>{});}} style={{cursor:"pointer",fontSize:"12px",color:"var(--text3)"}}>📋 Copy</span>
                    </div>
                  )}
                  {briefComments&&(
                    <div style={{background:"var(--bg)",borderRadius:"var(--radius)",border:"1px solid var(--border)",padding:"14px 16px",fontSize:"13px",color:"var(--text2)",lineHeight:1.7,marginBottom:10,whiteSpace:"pre-wrap"}}>
                      <div style={{fontSize:"11px",fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Brand Notes</div>
                      {briefComments}
                    </div>
                  )}
                  {!briefFile&&!briefLink&&!briefComments&&(
                    <div style={{fontSize:"12px",color:"var(--text3)"}}>Brief submitted with no attachments or notes.</div>
                  )}
                  {!briefAcknowledged?(
                    <button onClick={()=>{setBriefAcknowledged(true);syncDealFields({brief_acknowledged:true});}} className="btn btn-primary" style={{width:"100%",marginTop:4}}>I have read and understood the brief</button>
                  ):(
                    <div style={{padding:"8px 12px",background:"var(--green-bg)",border:"1px solid rgba(52,211,153,.3)",borderRadius:"var(--radius-sm)",fontSize:"12px",color:"var(--green)",fontWeight:600,marginTop:4}}>✓ You acknowledged this brief</div>
                  )}
                </div>
              ) : (
                <div style={{padding:"20px",textAlign:"center"}}>
                  <div style={{fontSize:"22px",marginBottom:8}}>📋</div>
                  <div style={{fontSize:"13px",fontWeight:600,marginBottom:4}}>Waiting for brief</div>
                  <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.5}}>The brand hasn't submitted the creative brief yet. You'll be able to review it here once they do.</div>
                </div>
              )

          </div>
          {/* ── Contract ── */}
          <div className="card-lg" style={{padding:"18px 22px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div style={{fontSize:"14px",fontWeight:700}}>Contract</div>
              {contractSigned?<span className="badge badge-green">Signed</span>:contractSent?<span className="badge badge-yellow">{isBrand?"Awaiting signature":"Needs your signature"}</span>:<span className="badge" style={{background:"var(--surface2)",color:"var(--text3)"}}>Not sent</span>}
            </div>
            {isBrand ? (
              /* ── Brand: upload contract or paste signing link ── */
              contractSent ? (
                <div>
                  {contractFile&&(
                    <div style={{display:"flex",gap:10,alignItems:"center",padding:"12px 14px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",marginBottom:10}}>
                      <span style={{fontSize:"20px"}}>📑</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:"13px",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{contractFile.name}</div>
                        <div style={{fontSize:"11px",color:"var(--text3)"}}>{(contractFile.size/1024).toFixed(0)} KB</div>
                      </div>
                    </div>
                  )}
                  {contractLink&&(
                    <div style={{display:"flex",gap:10,alignItems:"center",padding:"12px 14px",background:"rgba(167,139,250,.08)",border:"1px solid rgba(167,139,250,.25)",borderRadius:"var(--radius-sm)",marginBottom:10}}>
                      <span style={{fontSize:"18px"}}>✍️</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:"11px",fontWeight:600,color:"var(--purple)",marginBottom:2}}>Signing link</div>
                        <a href={contractLink} target="_blank" rel="noopener noreferrer" style={{fontSize:"12px",color:"var(--purple)",textDecoration:"underline",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"block"}}>{contractLink}</a>
                      </div>
                    </div>
                  )}
                  {contractNotes&&(
