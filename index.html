              <svg aria-hidden="true" style={{position:"absolute",left:0,top:0,width:20,height:204,pointerEvents:"none",overflow:"visible",zIndex:0}}>
                {[0,1,2,3,4].map(i=>{
                  if(activeDeal.progress<=i) return null;
                  const y1=i*34+17, y2=(i+1)*34+17, len=y2-y1;
                  return (
                    <line key={i} x1={10} y1={y1} x2={10} y2={y2}
                      stroke="var(--green)" strokeWidth={2} strokeLinecap="round"
                      style={{strokeDasharray:len,strokeDashoffset:len,animation:`drawLine .4s ease-out ${(i*.12).toFixed(2)}s both`}}
                    />
                  );
                })}
              </svg>
              {["Deal Created","Brief Sent","Contract Signed","Content Delivered","Brand Review","Payment Released"].map((step,i)=>(
                <div key={i} style={{display:"flex",gap:10,alignItems:"center",padding:"7px 0",borderBottom:i<5?"1px solid var(--border)":"none",position:"relative",zIndex:1}}>
                  <div style={{width:20,height:20,borderRadius:"50%",background:activeDeal.progress>i?"var(--green)":activeDeal.progress===i?"var(--accent)":"var(--surface2)",border:"1.5px solid "+(activeDeal.progress>i?"var(--green)":activeDeal.progress===i?"var(--accent)":"var(--border)"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",flexShrink:0,color:"white",fontWeight:700,boxShadow:activeDeal.progress>i?"0 0 8px rgba(52,211,153,.45)":activeDeal.progress===i?"0 0 8px rgba(91,138,245,.45)":"none"}}>{activeDeal.progress>i?"✓":i+1}</div>
                  <span style={{fontSize:"12px",fontWeight:activeDeal.progress===i?600:400,color:activeDeal.progress>i?"var(--green)":activeDeal.progress===i?"var(--text)":"var(--text3)"}}>{step}</span>
                  {activeDeal.progress===i&&<span style={{fontSize:"10px",fontWeight:700,color:"var(--accent)",marginLeft:"auto"}}>Current</span>}
                </div>
              ))}
            </div>
          </div>
          {/* ── Escrow / Payment Panel ── */}
          {(()=>{
            const st = activeDeal.status;
            const feeDollars = Math.round(activeDeal.amount * 0.08);
            const creatorNet = activeDeal.amount - feeDollars;

            // ── payment_released — green success, both sides ──
            if(st==="payment_released") return (
              <div className="card-lg" style={{padding:"16px 18px",background:"linear-gradient(135deg,rgba(34,197,94,.07),rgba(34,197,94,.03))",border:"1.5px solid rgba(34,197,94,.25)"}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <span style={{fontSize:"22px",flexShrink:0}}>💸</span>
                  <div>
                    <div style={{fontSize:"13px",fontWeight:700,color:"var(--green)",marginBottom:3}}>Payment released</div>
                    <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.6}}>
                      {isBrand
                        ? <span><strong>${creatorNet.toLocaleString()}</strong> has been sent to the creator. This deal is complete.</span>
                        : <span><strong>${creatorNet.toLocaleString()}</strong> is on its way to your bank account. Funds typically arrive in 2-3 business days.</span>}
                    </div>
                  </div>
                </div>
              </div>
            );

            // ── payment_disputed — red hold, both sides ──
            if(st==="payment_disputed") return (
              <div className="card-lg" style={{padding:"16px 18px",background:"linear-gradient(135deg,rgba(239,68,68,.07),rgba(239,68,68,.03))",border:"1.5px solid rgba(239,68,68,.25)"}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <span style={{fontSize:"22px",flexShrink:0}}>⚠️</span>
                  <div>
                    <div style={{fontSize:"13px",fontWeight:700,color:"var(--red)",marginBottom:3}}>Payment on hold — under review</div>
                    <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.6}}>
                      {isBrand
                        ? <span>You flagged this deal for review. <strong>${activeDeal.amount.toLocaleString()}</strong> is held securely until a bridgn admin resolves the dispute.</span>
                        : <span>The brand has raised a concern about this deal. <strong>${activeDeal.amount.toLocaleString()}</strong> is held securely until a bridgn admin resolves the dispute. You will be notified of the outcome.</span>}
                    </div>
                    <div style={{marginTop:10,display:"flex",gap:6,alignItems:"center"}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:"var(--red)",animation:"pulse 2s infinite"}}/>
                      <span style={{fontSize:"11px",fontWeight:600,color:"var(--red)"}}>Admin review pending</span>
                    </div>
                  </div>
                </div>
              </div>
            );

            // ── payment_held or content_delivered — escrow active, actions available ──
            if(st==="payment_held"||st==="content_delivered") {
              const autoRelease = activeDeal.autoReleaseAt ? new Date(activeDeal.autoReleaseAt) : null;
              const daysLeft = autoRelease ? Math.max(0, Math.ceil((autoRelease - Date.now()) / (1000*60*60*24))) : escrowReleaseDays;
              return (<>
                <div className="card-lg" style={{padding:"16px 18px",background:"linear-gradient(135deg,rgba(8,145,178,.07),rgba(8,145,178,.03))",border:"1.5px solid rgba(8,145,178,.25)"}}>
                  <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:14}}>
                    <span style={{fontSize:"22px",flexShrink:0}}>🔒</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"13px",fontWeight:700,color:"var(--teal)",marginBottom:3}}>Escrow: ${activeDeal.amount.toLocaleString()} held</div>
                      <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.6}}>
                        {isBrand
                          ? <span>Funds are secured by bridgn. Release when you approve the creator's content, or they auto-release in <strong>{daysLeft} day{daysLeft!==1?"s":""}</strong>.</span>
                          : <span>The brand's payment is held securely by bridgn. It will be released when they approve your content, or auto-releases in <strong>{daysLeft} day{daysLeft!==1?"s":""}</strong>.</span>}
                      </div>
                      {st==="content_delivered"&&(
                        <div style={{marginTop:8,padding:"6px 10px",background:"rgba(34,197,94,.1)",border:"1px solid rgba(34,197,94,.25)",borderRadius:6,fontSize:"11px",fontWeight:600,color:"var(--green)",display:"inline-flex",alignItems:"center",gap:5}}>✅ Content delivered — awaiting brand approval</div>
                      )}
                    </div>
                  </div>
                  {/* Mini breakdown */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,padding:"10px 12px",background:"var(--surface2)",borderRadius:"var(--radius-sm)",marginBottom:isBrand?14:0}}>
                    {[["Brand paid","$"+activeDeal.amount.toLocaleString()],["Platform fee","$"+feeDollars.toLocaleString()],["Creator receives","$"+creatorNet.toLocaleString()]].map(([l,v],i)=>(
                      <div key={i} style={{textAlign:"center"}}><div style={{fontSize:"14px",fontWeight:700,color:i===2?"var(--green)":"var(--text)"}}>{v}</div><div style={{fontSize:"10px",color:"var(--text3)",marginTop:2}}>{l}</div></div>
                    ))}
                  </div>
                  {/* Brand actions */}
                  {isBrand&&(
                    <div style={{display:"flex",gap:8}}>
                      <button
                        className="btn btn-primary"
                        style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,opacity:releaseLoading?.65:1}}
                        onClick={handleRelease}
                        disabled={releaseLoading}
                      >
                        {releaseLoading?<><span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>⟳</span> Releasing…</>:<>💸 Release Payment</>}
                      </button>
                      <button
                        className="btn btn-danger btn-sm"
                        style={{flexShrink:0}}
                        onClick={()=>setShowDisputeModal(true)}
                      >
                        Dispute
                      </button>
                    </div>
                  )}
                </div>
                {/* Auto-release countdown bar */}
                {(()=>{
                  const total = escrowReleaseDays;
                  const elapsed = total - daysLeft;
                  const pctBar = Math.min(100, Math.round((elapsed / total) * 100));
                  return (
                    <div style={{padding:"8px 12px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)"}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                        <span style={{fontSize:"10px",fontWeight:600,color:"var(--text3)"}}>Auto-release countdown</span>
                        <span style={{fontSize:"10px",fontWeight:700,color:daysLeft<=3?"var(--red)":"var(--teal)"}}>{daysLeft} day{daysLeft!==1?"s":""} left</span>
                      </div>
                      <div style={{height:4,background:"var(--surface2)",borderRadius:99,overflow:"hidden"}}>
                        <div style={{height:"100%",borderRadius:99,background:daysLeft<=3?"var(--red)":"var(--teal)",width:pctBar+"%",transition:"width .5s"}}/>
                      </div>
                    </div>
                  );
                })()}
              </>);
            }

            // ── payment_processing — ACH in transit ──
            if(st==="payment_processing" || achPhase==="done") return (
              <div className="card-lg" style={{padding:"16px 18px",background:"linear-gradient(135deg,rgba(91,138,245,.07),rgba(91,138,245,.03))",border:"1.5px solid rgba(91,138,245,.25)"}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <span style={{fontSize:"22px",flexShrink:0}}>⏳</span>
                  <div>
                    <div style={{fontSize:"13px",fontWeight:700,color:"var(--accent)",marginBottom:3}}>ACH payment processing</div>
                    <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.6}}>
                      {isBrand
                        ? <span>Your payment of <strong>${activeDeal.amount.toLocaleString()}</strong> is being processed via ACH Direct Debit. Funds typically settle in <strong>4–5 business days</strong>, then enter escrow until you release them.</span>
                        : <span>The brand's payment of <strong>${activeDeal.amount.toLocaleString()}</strong> is being processed. Once settled, funds will be held in escrow until the brand approves your content.</span>}
                    </div>
                    <div style={{marginTop:10,display:"flex",gap:6,alignItems:"center"}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:"var(--accent)",animation:"pulse 2s infinite"}}/>
                      <span style={{fontSize:"11px",fontWeight:600,color:"var(--accent)"}}>Awaiting settlement</span>
                    </div>
                  </div>
                </div>
              </div>
            );

            // ── payment_failed ──
            if(st==="payment_failed") return (
              <div className="card-lg" style={{padding:"16px 18px",background:"linear-gradient(135deg,rgba(239,68,68,.07),rgba(239,68,68,.03))",border:"1.5px solid rgba(239,68,68,.25)"}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <span style={{fontSize:"22px",flexShrink:0}}>❌</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:"13px",fontWeight:700,color:"var(--red)",marginBottom:3}}>Payment failed</div>
                    <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.6}}>The ACH payment was declined. {isBrand ? "Please try again with a different bank account." : "The brand has been notified to retry."}</div>
                  </div>
                </div>
                {isBrand&&<button className="btn btn-primary" style={{width:"100%",marginTop:12}} onClick={()=>{setAchPhase("idle");const d={...activeDeal,status:"Active"};setActiveDeal(d);}}>Retry Payment</button>}
              </div>
            );

            // ── Default: Fund This Deal (brand) or waiting (creator) ──
            if(isBrand) {
              const busy = achPhase==="creating"||achPhase==="collecting"||achPhase==="confirming";
              const phaseLabel = {creating:"Creating payment…",collecting:"Connecting bank account…",confirming:"Authorizing payment…"};
              return (
                <div className="card-lg" style={{padding:"16px 18px"}}>
                  <div style={{fontSize:"13px",fontWeight:700,marginBottom:4}}>Fund This Deal</div>
                  <div style={{fontSize:"12px",color:"var(--text3)",marginBottom:12,lineHeight:1.55}}>Pay <strong>${activeDeal.amount.toLocaleString()}</strong> via ACH Direct Debit. bridgn holds funds in escrow until you approve the content. An <strong>8% platform fee</strong> (${feeDollars.toLocaleString()}) is applied. Auto-releases in <strong>{escrowReleaseDays} days</strong> if not disputed.</div>
                  {achPhase==="error"&&achError&&(
                    <div style={{padding:"9px 12px",borderRadius:"var(--radius-sm)",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",fontSize:"12px",color:"var(--red)",marginBottom:12,lineHeight:1.5}}>{achError}</div>
                  )}
                  <button
                    className="btn btn-primary"
                    style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:busy?.65:1,pointerEvents:busy?"none":"auto"}}
                    onClick={handleFundDeal}
                    disabled={busy}
                  >
                    {busy?(
                      <><span style={{fontSize:"14px",animation:"spin .8s linear infinite",display:"inline-block"}}>⟳</span>{" "}{phaseLabel[achPhase]||"Processing…"}</>
                    ):(
                      <><span>🏦</span> Connect Bank &amp; Pay ${activeDeal.amount.toLocaleString()}</>
                    )}
                  </button>
                  <div style={{fontSize:"10px",color:"var(--text3)",marginTop:9,textAlign:"center",lineHeight:1.5}}>ACH payments are processed via Stripe. Your bank details are never stored on bridgn.</div>
                </div>
              );
            }

            return null; // creator sees nothing until brand funds
          })()}

          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <button className="btn btn-secondary btn-sm" style={{width:"100%"}} onClick={()=>setPage("invoices")}>View Invoice</button>
          </div>
        </div>
      </div>
      {/* Dispute modal */}
      {showDisputeModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 16px"}} onClick={()=>setShowDisputeModal(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:28,width:"100%",maxWidth:420,boxShadow:"var(--shadow-lg)"}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:8,color:"var(--red)"}}>Dispute This Deal</div>
            <div style={{fontSize:13,color:"var(--text2)",marginBottom:14,lineHeight:1.6}}>Payment of <strong>${activeDeal.amount.toLocaleString()}</strong> will remain held while a bridgn admin reviews the dispute. This cannot be undone.</div>
            <textarea
              autoFocus
              rows={3}
              value={disputeReason}
              onChange={e=>setDisputeReason(e.target.value)}
              placeholder="Describe what went wrong…"
              style={{width:"100%",boxSizing:"border-box",padding:"9px 13px",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",background:"var(--surface2)",color:"var(--text)",fontSize:13,fontFamily:"inherit",outline:"none",resize:"vertical",marginBottom:14}}
            />
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button className="btn btn-secondary btn-sm" onClick={()=>{setShowDisputeModal(false);setDisputeReason("");}}>Cancel</button>
              <button
                onClick={handleDisputeDeal}
                disabled={disputeLoading}
                style={{padding:"8px 16px",borderRadius:"var(--radius-sm)",background:"var(--red)",color:"#fff",border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13,opacity:disputeLoading?.65:1}}
              >
                {disputeLoading?"Submitting…":"Flag for Review"}
              </button>
            </div>
          </div>
        </div>
      )}
      {/* Escrow toast */}
      {escrowToast&&(
        <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:escrowToast.type==="error"?"var(--red)":"var(--green)",color:"#fff",padding:"10px 20px",borderRadius:99,fontSize:13,fontWeight:600,boxShadow:"0 4px 20px rgba(0,0,0,.25)",zIndex:3000,whiteSpace:"nowrap",animation:"slideUp .25s ease"}}>{escrowToast.msg}</div>
      )}
      <ConfettiCanvas active={confettiFiring}/>
    </div>
  );
}

    {key:"review",label:"Brand Review",icon:"🔍",done:deal.progress>=5,active:deal.progress===4,desc:"Brand is reviewing your content.",cta:null},

  return (
    <div className="fade-in">

            <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}><span style={{fontSize:"17px",fontWeight:700}}>{deal.brand}</span>{deal.source==="external"&&<ExtBadge/>}{deal.escrow&&<EscrowBadge released={deal.escrowReleased}/>}</div><div style={{fontSize:"13px",color:"var(--text2)"}}>{deal.platform} · {deal.campaignTitle}</div></div>
            <StatusBadge s={deal.status}/>
          </div>
          <div className="det-stats" style={{gridTemplateColumns:"repeat(3,1fr)",marginBottom:14}}>
            {[["$"+deal.amount.toLocaleString(),"Payment"],[deal.deadline,"Due Date"],[pct+"%","Complete"]].map(([v,l],i)=>(
              <div key={i} className="det-stat"><div className="det-stat-v" style={{color:i===0?g[0]:"var(--text)"}}><AnimNum value={v}/></div><div className="det-stat-l">{l}</div></div>
            ))}
          </div>
          <div><div style={{height:7,background:"var(--surface2)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",borderRadius:99,background:"linear-gradient(90deg,"+g[0]+","+g[1]+")",width:pct+"%",transition:"width .5s"}}></div></div></div>
        </div>
      </div>
      <div className="g2" style={{gap:18}}>
        <div className="card-lg" style={{overflow:"hidden"}}>
          <div style={{padding:"14px 20px",borderBottom:"1px solid var(--border)"}}><span style={{fontSize:"14px",fontWeight:700}}>Deal Steps</span></div>
          {STEPS.map((step,i)=>(
            <div key={step.key} style={{padding:"14px 20px",borderBottom:i<5?"1px solid var(--border)":"none",background:step.active?g[0]+"08":"transparent",position:"relative"}}>
              {step.active&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:"linear-gradient(180deg,"+g[0]+","+g[1]+")"}}></div>}
              <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                <div style={{width:34,height:34,borderRadius:10,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",background:step.done?"linear-gradient(135deg,"+g[0]+","+g[1]+")":step.active?g[0]+"18":"var(--surface2)",border:step.done?"none":step.active?"2px solid "+g[0]:"2px solid var(--border)"}}>{step.done?"✓":step.active?step.icon:<span style={{fontSize:"11px",fontWeight:700,color:"var(--text3)"}}>{i+1}</span>}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:2}}>
                    <span style={{fontSize:"13px",fontWeight:step.done||step.active?600:400,color:step.done?"var(--green)":step.active?"var(--text)":"var(--text3)"}}>{step.label}</span>
                    {step.done&&<span style={{fontSize:"10px",fontWeight:700,color:"var(--green)",background:"var(--green-bg)",padding:"1px 6px",borderRadius:99}}>Done</span>}
                    {step.active&&<span style={{fontSize:"10px",fontWeight:700,color:g[0],background:g[0]+"14",padding:"1px 7px",borderRadius:99}}>Now</span>}
                  </div>
                  <div style={{fontSize:"12px",color:step.done?"var(--text3)":step.active?"var(--text2)":"var(--text3)",lineHeight:1.5}}>{step.desc}</div>
                  {step.active&&step.cta&&<button onClick={()=>setModal(step.key)} style={{marginTop:10,padding:"7px 16px",borderRadius:"var(--radius-sm)",border:"none",background:"linear-gradient(135deg,"+g[0]+","+g[1]+")",color:"white",fontFamily:"Space Grotesk,sans-serif",fontSize:"12px",fontWeight:600,cursor:"pointer"}}>{step.cta}</button>}

        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div className="card-lg" style={{padding:"16px 18px"}}>
            <div style={{fontSize:"13px",fontWeight:700,marginBottom:10}}>Deliverables</div>
            {deal.deliverables.split(",").map((d,i,arr)=>(
              <div key={i} style={{display:"flex",gap:9,padding:"8px 0",borderBottom:i<arr.length-1?"1px solid var(--border)":"none"}}>
                <div style={{width:18,height:18,borderRadius:5,background:deal.progress>=4?"var(--green-bg)":"var(--surface2)",border:"1px solid "+(deal.progress>=4?"rgba(52,211,153,.4)":"var(--border)"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",flexShrink:0,marginTop:1}}>{deal.progress>=4?"✓":""}</div>
                <span style={{fontSize:"13px"}}>{d.trim()}</span>
              </div>
            ))}
          </div>
          {deal.escrow&&(
            <div style={{background:deal.escrowReleased?"var(--green-bg)":"rgba(8,145,178,.08)",border:"1.5px solid "+(deal.escrowReleased?"rgba(52,211,153,.3)":"rgba(8,145,178,.3)"),borderRadius:"var(--radius)",padding:"14px 16px",display:"flex",gap:10,alignItems:"flex-start"}}>
              <span style={{fontSize:"20px"}}>🔒</span>
              <div><div style={{fontSize:"13px",fontWeight:700,color:deal.escrowReleased?"var(--green)":"var(--teal)",marginBottom:3}}>Escrow: ${deal.amount.toLocaleString()}</div><div style={{fontSize:"12px",color:"var(--text3)"}}>{deal.escrowReleased?"Payment released.":"Secured by bridgn. Releases on content approval."}</div></div>
            </div>

// ─── NEW DEAL ─────────────────────────────────────────────────────────────────
function NewDealPage({setPage,onDealCreated,userName,authUser}) {
  const loading = useSkeleton();
  const [step,setStep] = useState(1);
  const [form,setForm] = useState({brandName:"",brandEmail:"",amount:"",platform:"Instagram",deadline:"",deliverables:"",notes:""});
  const [contractTypes,setContractTypes] = useState(["flat"]);
  const [sending,setSending] = useState(false);
  const [done,setDone] = useState(false);
  const [dealId] = useState(()=>String(Date.now()));
  const [copied,setCopied] = useState(false);
  const buildInviteLink = () => {
    try {
      const payload = btoa(encodeURIComponent(JSON.stringify({
        code: dealId,
        bridgnDealId: dealId,
        creatorName: userName,
        creatorUserId: authUser?.id||"",
        brandName: form.brandName,
        brandEmail: form.brandEmail,
        amount: parseInt(form.amount)||0,
        platform: form.platform,
        deliverables: form.deliverables||"",
        deadline: form.deadline||"TBD",
        campaignTitle: "External Deal — "+(form.brandName||"Brand"),
      })));
      return `${window.location.origin}?inv=${payload}`;
    } catch { return `${window.location.origin}?inv=${dealId}`; }
  };
  const inviteLink = buildInviteLink();
  const copyLink = () => {
    navigator.clipboard.writeText(inviteLink).catch(()=>{});
    setCopied(true);
    setTimeout(()=>setCopied(false),2000);
  };
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));
  if(loading) return <SkeletonPage layout="form"/>;
  if(done) return (
    <div className="fade-in" style={{maxWidth:520,margin:"50px auto",textAlign:"center"}}>
      <div style={{width:68,height:68,borderRadius:20,background:"var(--green-bg)",border:"1.5px solid rgba(52,211,153,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"30px",margin:"0 auto 18px"}}>🎉</div>
      <div className="page-title" style={{marginBottom:8}}>Deal Created!</div>
      <div style={{fontSize:"14px",color:"var(--text2)",lineHeight:1.7,marginBottom:20}}>Your deal with <strong>{form.brandName}</strong> is live. An invitation has been sent to <strong>{form.brandEmail}</strong>.</div>
      <div style={{background:"var(--surface2)",borderRadius:"var(--radius)",padding:"14px 18px",fontSize:"13px",color:"var(--text2)",marginBottom:16,border:"1px solid var(--border)",textAlign:"left"}}>
        <div style={{fontWeight:600,color:"var(--text)",marginBottom:8}}>What happens next:</div>
        {["Brand receives invite email with a secure link","They join bridgn and see the Deal Room","Manage deliverables, messaging, and payment from here","Funds protected in escrow until content is approved"].map((t,i)=>(
          <div key={i} style={{display:"flex",gap:8,marginTop:6}}><span style={{color:"var(--green)",fontWeight:700,flexShrink:0}}>✓</span><span>{t}</span></div>
        ))}
      </div>
      <div style={{background:"var(--bg)",borderRadius:"var(--radius)",border:"1px solid var(--border)",padding:"12px 14px",marginBottom:22,display:"flex",alignItems:"center",gap:10}}>
        <span style={{flex:1,fontSize:"12px",color:"var(--text3)",fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inviteLink}</span>
        <button onClick={copyLink} className="btn btn-secondary btn-sm" style={{flexShrink:0,minWidth:110}}>
          {copied?"✓ Copied!":"Copy invite link"}
        </button>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"center"}}>
        <button className="btn btn-primary" onClick={()=>setPage("deals")}>View My Deals</button>
        <button className="btn btn-secondary" onClick={()=>{setDone(false);setStep(1);setForm({brandName:"",brandEmail:"",amount:"",platform:"Instagram",deadline:"",deliverables:"",notes:""});setContractTypes(["flat"]);}}>Create Another</button>
      </div>
    </div>
  );
  const handleNext=async()=>{
    if(step<3){setStep(s=>s+1);return;}
    setSending(true);
    const dealData = {
      id:dealId, brand:form.brandName,
      bi:form.brandName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(),
      ci:Math.floor(Math.random()*6),
      amount:parseInt(form.amount)||0, platform:form.platform,
      status:"pending", deadline:form.deadline||"TBD",
      deliverables:form.deliverables, progress:0, source:"external",
      campaignTitle:"External Deal — "+form.brandName,
      escrow:false, escrowReleased:false,
      creatorUserId:authUser?.id||"", creatorName:userName,
    };
    try {
      const resp = await fetch(`${BRIDGN_API_URL}/api/deals`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          bridgnDealId: dealId,
          creatorUserId: authUser?.id||"",
          creatorName: userName,
          brandName: form.brandName,
          brandEmail: form.brandEmail,
          amount: parseInt(form.amount)||0,
          platform: form.platform,
          deliverables: form.deliverables||"",
          deadline: form.deadline||"TBD",
          campaignTitle: "External Deal — "+form.brandName,
        }),
      });
      if(resp.ok) {
        const {deal} = await resp.json();
        onDealCreated({...dealData, ...deal});
      } else {
        onDealCreated(dealData);
      }
    } catch(e) {
      console.error("[NewDeal] Failed to persist to DB, saving locally:", e);
      onDealCreated(dealData);
    }
    setSending(false); setDone(true);
  };
  return (
    <div className="fade-in">
      <button className="btn btn-secondary btn-sm" style={{marginBottom:18}} onClick={()=>step>1?setStep(s=>s-1):setPage("deals")}>Back</button>
      <div className="ph-row"><div><div className="page-title">Create External Deal</div><div className="page-subtitle">Manage any brand deal you negotiated outside bridgn.</div></div></div>
      <div style={{display:"flex",alignItems:"center",gap:0,marginBottom:28,maxWidth:480}}>
        {[["Deal Details","📋"],["Contract Type","📝"],["Invite Brand","✉️"]].map(([label,icon],i)=>{
          const sn=i+1;const isDone=step>sn;const isAct=step===sn;
          return (
            <React.Fragment key={i}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{width:34,height:34,borderRadius:"50%",border:"2px solid "+(isDone?"var(--green)":isAct?"var(--accent)":"var(--border)"),background:isDone?"var(--green-bg)":isAct?"var(--accent-light)":"var(--surface)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:700,color:isDone?"var(--green)":isAct?"var(--accent)":"var(--text3)"}}>{isDone?"✓":icon}</div>
                <div style={{fontSize:"11px",fontWeight:500,color:isAct?"var(--accent)":isDone?"var(--green)":"var(--text3)",whiteSpace:"nowrap"}}>{label}</div>
              </div>
              {i<2&&<div style={{flex:1,height:2,background:step>sn?"var(--green)":"var(--border)",margin:"0 6px",marginBottom:18}}></div>}
            </React.Fragment>
          );
        })}
      </div>
      <div style={{maxWidth:620}}>
        <div className="card-lg" style={{padding:28}}>
          {step===1&&(
            <>
              <div className="frow"><div className="fg"><label className="fl">Brand Name</label><input className="fi" value={form.brandName} onChange={e=>up("brandName",e.target.value)} placeholder="e.g. Nike, GlowUp Co."/></div><div className="fg"><label className="fl">Brand Email</label><input className="fi" type="email" value={form.brandEmail} onChange={e=>up("brandEmail",e.target.value)} placeholder="contact@brand.com"/></div></div>
              <div className="frow"><div className="fg"><label className="fl">Agreed Amount ($)</label><input className="fi" type="number" value={form.amount} onChange={e=>up("amount",e.target.value)} placeholder="2500"/></div><div className="fg"><label className="fl">Platform</label><select className="fsel" value={form.platform} onChange={e=>up("platform",e.target.value)}><option>Instagram</option><option>TikTok</option><option>YouTube</option><option>Twitter</option><option>Multiple</option></select></div></div>
              <div className="fg"><label className="fl">Submission Deadline</label><input className="fi" type="date" value={form.deadline} onChange={e=>up("deadline",e.target.value)}/></div>
              <div className="fg"><label className="fl">Deliverables</label><input className="fi" value={form.deliverables} onChange={e=>up("deliverables",e.target.value)} placeholder="e.g. 2x Feed Posts, 1x Reel, 3x Stories"/></div>
              <div className="fg"><label className="fl">Notes (optional)</label><textarea className="fta" style={{minHeight:70}} value={form.notes} onChange={e=>up("notes",e.target.value)} placeholder="Any context about how this deal was negotiated..."></textarea></div>
            </>
          )}
          {step===2&&(
            <>
              <div style={{fontSize:"13px",color:"var(--text2)",marginBottom:18}}>Select all that apply. A combined agreement will be generated.</div>
              <div style={{display:"flex",flexDirection:"column",gap:9}}>
                {CONTRACT_TEMPLATES.map(t=>{
                  const sel=contractTypes.includes(t.id);
                  return (
                    <button key={t.id} onClick={()=>setContractTypes(p=>sel?p.filter(x=>x!==t.id):[...p,t.id])} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderRadius:"var(--radius)",border:"2px solid "+(sel?"var(--accent)":"var(--border)"),background:sel?"var(--accent-light)":"var(--surface)",cursor:"pointer",textAlign:"left"}}>
                      <div style={{width:18,height:18,borderRadius:5,border:"2px solid "+(sel?"var(--accent)":"var(--border)"),background:sel?"var(--accent)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{sel&&<span style={{color:"white",fontSize:"10px",fontWeight:700}}>✓</span>}</div>
                      <span style={{fontSize:"20px",flexShrink:0}}>{t.icon}</span>
                      <div style={{flex:1}}><div style={{fontSize:"13px",fontWeight:600,color:sel?"var(--accent)":"var(--text)"}}>{t.label}</div><div style={{fontSize:"12px",color:"var(--text3)",marginTop:1}}>{t.desc}</div></div>
                    </button>
                  );
                })}
              </div>
            </>
          )}
          {step===3&&(
            <>
              <div style={{fontSize:"13px",color:"var(--text2)",marginBottom:18}}>We will send an email to <strong>{form.brandEmail||"the brand"}</strong> with a secure link to join this deal on bridgn.</div>
              <div style={{background:"var(--bg)",borderRadius:"var(--radius)",border:"1px solid var(--border)",padding:"16px 18px",marginBottom:14,fontSize:"13px",color:"var(--text)",lineHeight:1.75}}>
                <strong>Subject:</strong> {userName} has invited you to manage a deal on bridgn
                <div className="divider"></div>
                Hi there,<br/><br/>
                <strong>{userName}</strong> has set up your partnership deal on bridgn.<br/><br/>
                <strong>Deal summary:</strong><br/>
                Deliverables: {form.deliverables||"TBD"}<br/>
                Value: ${parseInt(form.amount||0).toLocaleString()} on {form.platform}<br/>
                Due: {form.deadline||"TBD"}<br/><br/>
                Click below to join — it takes less than a minute.
              </div>
              <div style={{background:"var(--surface2)",borderRadius:"var(--radius)",border:"1px solid var(--border)",padding:"12px 14px",marginBottom:4,display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"11px",color:"var(--text3)",fontWeight:600,marginBottom:3,textTransform:"uppercase",letterSpacing:".05em"}}>Or share invite link directly</div>
                  <div style={{fontSize:"12px",color:"var(--text2)",fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inviteLink}</div>
                </div>
                <button onClick={copyLink} className="btn btn-secondary btn-sm" style={{flexShrink:0,minWidth:120}}>
                  {copied?"✓ Copied!":"Copy invite link"}
                </button>
              </div>
            </>
          )}
          <div style={{display:"flex",gap:10,marginTop:22}}>
            <button className="btn btn-primary btn-lg" onClick={handleNext} disabled={step===2&&contractTypes.length===0||sending} style={{opacity:(step===2&&contractTypes.length===0)||sending?.5:1}}>
              {sending?<><span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>⟳</span> Sending...</>:step===3?"Send Invite & Create Deal":"Continue"}
            </button>
            {step<3&&<button className="btn btn-secondary btn-lg" onClick={()=>setPage("deals")}>Cancel</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── DISPUTE PAGE ─────────────────────────────────────────────────────────────
function DisputePage({deal,setPage}) {
  const loading = useSkeleton();
  const [type,setType] = useState("");
  const [desc,setDesc] = useState("");
  const [submitted,setSubmitted] = useState(false);
  if(loading) return <SkeletonPage layout="form"/>;
  if(!deal) return null;
  const TYPES=[
    {id:"content",label:"Content not approved",icon:"🎬",desc:"Brand has not approved submitted content after review period"},
    {id:"payment",label:"Payment not released",icon:"💰",desc:"Invoice is overdue and brand has not released payment"},
    {id:"brief",label:"Brief changed after signing",icon:"📋",desc:"Brand changed deliverables or scope after contract was signed"},
    {id:"other",label:"Other issue",icon:"⚠️",desc:"Something else has gone wrong with this deal"},
  ];
  if(submitted) return (
    <div className="fade-in" style={{maxWidth:480,margin:"50px auto",textAlign:"center"}}>
      <div style={{fontSize:"48px",marginBottom:14}}>🛡️</div>
      <div className="page-title" style={{marginBottom:8}}>Dispute Filed</div>
      <div style={{fontSize:"14px",color:"var(--text2)",lineHeight:1.75,marginBottom:20}}>Our team will review your case within 24 hours. Escrow funds are held until resolved.</div>
      <button className="btn btn-secondary" onClick={()=>setPage("deals")}>Back to Deals</button>
    </div>
  );
  return (
    <div className="fade-in">
      <button className="btn btn-secondary btn-sm" style={{marginBottom:18}} onClick={()=>setPage("active-deal")}>Back to Deal</button>
      <div style={{maxWidth:580}}>
        <div className="ph-row"><div><div className="page-title">File a Dispute</div><div className="page-subtitle">Something wrong? Let us help resolve it.</div></div></div>
        <div className="card-lg" style={{padding:"14px 18px",marginBottom:18,display:"flex",gap:12,alignItems:"center"}}>
          <div className="deal-av" style={{background:bc(deal.ci)}}>{deal.bi}</div>
          <div><div style={{fontSize:"14px",fontWeight:600}}>{deal.brand} · {deal.campaignTitle}</div><div style={{fontSize:"12px",color:"var(--text2)"}}>${deal.amount.toLocaleString()} · {deal.platform}</div></div>
        </div>
        <div className="card-lg" style={{padding:24}}>
          <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:18}}>
            {TYPES.map(t=>(
              <button key={t.id} onClick={()=>setType(t.id)} style={{display:"flex",gap:12,padding:"13px 15px",borderRadius:"var(--radius)",border:"2px solid "+(type===t.id?"var(--red)":"var(--border)"),background:type===t.id?"var(--red-bg)":"var(--surface)",cursor:"pointer",textAlign:"left",alignItems:"center"}}>
                <span style={{fontSize:"18px",flexShrink:0}}>{t.icon}</span>
                <div style={{flex:1}}><div style={{fontSize:"13px",fontWeight:600,color:type===t.id?"var(--red)":"var(--text)"}}>{t.label}</div><div style={{fontSize:"11px",color:"var(--text3)",marginTop:1}}>{t.desc}</div></div>
                {type===t.id&&<span style={{color:"var(--red)"}}>✓</span>}
              </button>
            ))}
          </div>
          <div className="fg"><label className="fl">Describe the issue</label><textarea className="fta" style={{minHeight:100}} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Provide as much detail as possible including dates and evidence..."></textarea></div>
          <div style={{padding:"11px 14px",background:"var(--surface2)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",fontSize:"12px",color:"var(--text3)",marginBottom:16,display:"flex",gap:7}}>🛡️ bridgn holds any pending escrow payments during a dispute. Resolution typically takes 3-5 business days.</div>
          <button disabled={!type||!desc.trim()} onClick={()=>setSubmitted(true)} className="btn btn-danger btn-lg" style={{opacity:!type||!desc.trim()?.5:1}}>Submit Dispute</button>
        </div>
      </div>
    </div>
  );
}

            <button className="btn btn-success btn-lg" style={{flex:1}} onClick={()=>{setRes("accepted");fireConfetti();}}>Accept Offer</button>

            <button className="btn btn-secondary btn-lg" onClick={()=>setPage("messages")}>Message</button>
          </div>
        ):(
          <div className="card" style={{padding:20,textAlign:"center",background:res==="accepted"?"var(--green-bg)":"var(--red-bg)",borderColor:res==="accepted"?"rgba(52,211,153,.3)":"rgba(248,113,113,.3)"}}>
            <div style={{fontSize:"28px",marginBottom:7}}>{res==="accepted"?"🎉":"👋"}</div>
            <div style={{fontSize:"15px",fontWeight:700,color:res==="accepted"?"var(--green)":"var(--red)"}}>Offer {res==="accepted"?"Accepted!":"Declined"}</div>
            {res==="accepted"&&<button className="btn btn-primary btn-sm" style={{marginTop:12}} onClick={()=>setPage("deals")}>Go to Deals</button>}
          </div>
        )}
      </div>
      <ConfettiCanvas active={confettiFiring}/>
    </div>
  );
}

// ─── CREATOR ANALYTICS ───────────────────────────────────────────────────────
function CreatorAnalyticsPage({onAnalyticsUploaded}) {
  const loading = useSkeleton();
  const [uploads,setUploads] = useState({
    Instagram:{uploaded:false,date:null,age:null,file:null},
    TikTok:{uploaded:false,date:null,age:null,file:null},
    YouTube:{uploaded:false,date:null,age:null,file:null},
  });
  const [uploading,setUploading] = useState(null);
  const [toast,setToast] = useState(null);
  const platforms=["Instagram","TikTok","YouTube"];
  const showToast=msg=>{setToast(msg);};
  const simulate=p=>{setUploading(p);setTimeout(()=>{
    setUploads(u=>{
      const next={...u,[p]:{uploaded:true,date:"Mar 25, 2025",age:0,file:p.toLowerCase()+"_insights_mar25.pdf"}};
      if(!Object.values(u).some(x=>x.uploaded)) onAnalyticsUploaded?.();
      return next;

    setUploading(null);showToast("✅ "+p+" analytics uploaded!");
  },1800);};
  const remove=p=>{setUploads(u=>({...u,[p]:{uploaded:false,date:null,age:null,file:null}}));showToast(p+" analytics removed.");};
  const uploaded=Object.values(uploads).filter(u=>u.uploaded).length;
  const PGRADS=[["#be185d","#c17c3a"],["#065f46","#0891b2"],["#6d28d9","#0369a1"]];

      <div className="card" style={{padding:"12px 18px",marginBottom:22,display:"flex",alignItems:"center",gap:14}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:"13px",fontWeight:600}}>Profile completeness</span><span style={{fontSize:"13px",fontWeight:700,color:"var(--accent)"}}>{uploaded}/{platforms.length} platforms</span></div>
          <div style={{height:7,background:"var(--surface2)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",borderRadius:99,background:"linear-gradient(90deg,var(--accent),#a78bfa)",width:((uploaded/platforms.length)*100)+"%",transition:"width .5s"}}></div></div>
        </div>
        {uploaded===platforms.length&&<span className="badge badge-green">All uploaded</span>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {platforms.map((p,pi)=>{
          const u=uploads[p];const g=PGRADS[pi];const isUp=uploading===p;
          return (
            <div key={p} className="card-lg" style={{overflow:"hidden"}}>
              <div style={{height:4,background:"linear-gradient(90deg,"+g[0]+","+g[1]+")"}}></div>
              <div style={{padding:"18px 22px"}}>
                <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
                  <div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,"+g[0]+","+g[1]+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px",flexShrink:0}}>{PICONS[pi]}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:9,marginBottom:8}}><span style={{fontSize:"15px",fontWeight:700}}>{p}</span>{u.uploaded?<span className="badge badge-green">Uploaded</span>:<span className="badge badge-gray">Not uploaded</span>}</div>
                    {u.uploaded?(
                      <div>
                        <div style={{display:"flex",gap:8,padding:"7px 11px",background:"var(--surface2)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",marginBottom:8,alignItems:"center"}}>
                          <span style={{fontSize:"13px"}}>📄</span><span style={{fontSize:"12px",fontWeight:500,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.file}</span><span style={{fontSize:"11px",color:u.age===0?"var(--green)":"var(--text3)",fontWeight:600,flexShrink:0}}>{u.age===0?"Just now":u.age+"d ago"}</span>
                        </div>
                        <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:10}}>🔒 Brands see upload timestamp — cannot be edited</div>
                        <div style={{display:"flex",gap:7}}><button onClick={()=>simulate(p)} style={{padding:"6px 12px",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",background:"var(--surface2)",fontFamily:"Space Grotesk,sans-serif",fontSize:"12px",cursor:"pointer",color:"var(--accent)"}}>Update</button><button onClick={()=>remove(p)} className="btn btn-danger btn-sm">Remove</button></div>
                      </div>
                    ):(
                      <div onClick={()=>!isUp&&simulate(p)} style={{border:"2px dashed var(--border)",borderRadius:"var(--radius)",padding:"22px",textAlign:"center",cursor:"pointer",background:"var(--bg)"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=g[0];}} onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";}}>
                        {isUp?<><div style={{fontSize:"20px",animation:"spin .9s linear infinite",display:"inline-block"}}>⟳</div><div style={{fontSize:"12px",marginTop:5}}>Uploading...</div></>:<><div style={{fontSize:"22px",marginBottom:6}}>📤</div><div style={{fontSize:"13px",fontWeight:600,marginBottom:3}}>Drop {p} insights here</div><div style={{fontSize:"11px",color:"var(--text3)"}}>PDF, PNG, JPG</div></>}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

// ─── RATE CARD ────────────────────────────────────────────────────────────────
function RateCardPage({onRateCardFilled}) {
  const loading = useSkeleton();
  const [niche,setNiche] = useState("Lifestyle");
  const [ig,setIg] = useState({followers:"",eng:""});
  const [tt,setTt] = useState({followers:"",eng:""});
  const [yt,setYt] = useState({subscribers:"",views:""});
  const [hideInactive,setHideInactive] = useState(false);
  const [flaggedFilled,setFlaggedFilled] = useState(false);

  const nicheMult={Tech:1.4,Finance:1.4,Fashion:1.2,Beauty:1.15,Wellness:1.1,Gaming:0.9}[niche]||1.0;

  // per-platform rate calc
  const calcIG=()=>{
    const f=parseInt(ig.followers)||0, e=parseFloat(ig.eng)||0;
    if(!f||!e) return null;
    const b=(f/1000)*0.01*e*nicheMult;
    const tier=f<10000?"Nano":f<50000?"Micro":f<250000?"Mid-tier":f<1000000?"Macro":"Mega";
    return {
      active:true, tier,
      f, e,
      rates:[
        {type:"Feed Post",icon:"📸",low:Math.round(b*0.8*100)*10,high:Math.round(b*1.2*100)*10},
        {type:"Reel",icon:"🎬",low:Math.round(b*1.0*100)*10,high:Math.round(b*1.6*100)*10},
        {type:"Stories (3×)",icon:"📱",low:Math.round(b*0.4*100)*10,high:Math.round(b*0.7*100)*10},
      ]
    };
  };
  const calcTT=()=>{
    const f=parseInt(tt.followers)||0, e=parseFloat(tt.eng)||0;
    if(!f||!e) return null;
    const b=(f/1000)*0.01*e*nicheMult*0.85; // TikTok CPM slightly lower
    const tier=f<10000?"Nano":f<50000?"Micro":f<250000?"Mid-tier":f<1000000?"Macro":"Mega";
    return {
      active:true, tier,
      f, e,
      rates:[
        {type:"Video",icon:"♪",low:Math.round(b*0.6*100)*10,high:Math.round(b*1.1*100)*10},
        {type:"Live Integration",icon:"🔴",low:Math.round(b*0.4*100)*10,high:Math.round(b*0.8*100)*10},
        {type:"Duet / Stitch",icon:"🔀",low:Math.round(b*0.35*100)*10,high:Math.round(b*0.65*100)*10},
      ]
    };
  };
  const calcYT=()=>{
    const s=parseInt(yt.subscribers)||0, v=parseInt(yt.views)||0;
    if(!s||!v) return null;
    const b=(v/1000)*nicheMult*2.2; // YouTube CPM premium
    const tier=s<10000?"Nano":s<50000?"Micro":s<250000?"Mid-tier":s<1000000?"Macro":"Mega";
    return {
      active:true, tier,
      f:s, extra:`${v.toLocaleString()} avg views`,
      rates:[
        {type:"Dedicated Video",icon:"🎥",low:Math.round(b*1.8*100)*10,high:Math.round(b*3.2*100)*10},
        {type:"Mid-Roll Integration",icon:"▶",low:Math.round(b*0.9*100)*10,high:Math.round(b*1.6*100)*10},
        {type:"Shorts",icon:"⚡",low:Math.round(b*0.3*100)*10,high:Math.round(b*0.6*100)*10},
      ]
    };
  };

  const igData=calcIG(), ttData=calcTT(), ytData=calcYT();
  const anyActive=igData||ttData||ytData;

  useEffect(()=>{
    if(anyActive&&!flaggedFilled){setFlaggedFilled(true);onRateCardFilled?.();}
  },[anyActive]);

  const tierColor=tier=>tier==="Nano"?"var(--text3)":tier==="Micro"?"var(--green)":tier==="Mid-tier"?"var(--accent)":tier==="Macro"?"var(--accent2)":"#f87171";

  const PlatformCard=({name,color,icon,data,inputs})=>{
    const isActive=!!data;
    if(hideInactive&&!isActive) return null;
    return (
      <div className="card-lg" style={{padding:0,overflow:"hidden",opacity:isActive?1:0.55}}>
        <div style={{padding:"14px 20px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:10,background:isActive?`linear-gradient(90deg,${color}18,transparent)`:"transparent"}}>
          <span style={{fontSize:"20px"}}>{icon}</span>
          <span style={{fontFamily:"Syne,sans-serif",fontSize:"15px",fontWeight:800,color:isActive?color:"var(--text2)"}}>{name}</span>
          {isActive&&<span style={{marginLeft:"auto",fontSize:"11px",fontWeight:700,padding:"2px 9px",borderRadius:99,background:color+"22",color,border:`1px solid ${color}44`}}>{data.tier}</span>}
          {!isActive&&<span style={{marginLeft:"auto",fontSize:"11px",color:"var(--text3)"}}>No data</span>}
        </div>
        <div style={{padding:"16px 20px"}}>
          <div className="frow" style={{marginBottom:isActive?14:0}}>{inputs}</div>
          {isActive&&(
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {data.rates.map((r,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:"var(--surface2)",borderRadius:"var(--radius-sm)"}}>
                  <span style={{fontSize:"16px",flexShrink:0}}>{r.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:"12px",fontWeight:600,color:"var(--text2)"}}>{r.type}</div>
                    <div style={{height:2,background:"var(--border)",borderRadius:99,overflow:"hidden",marginTop:5}}><div style={{height:"100%",borderRadius:99,background:`linear-gradient(90deg,${color},${color}88)`,width:((i+1)/data.rates.length*60+30)+"%"}}/></div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:"14px",fontWeight:700,fontFamily:"Syne,sans-serif",color}}>${r.low.toLocaleString()} – ${r.high.toLocaleString()}</div>
                    <div style={{fontSize:"10px",color:"var(--text3)"}}>per deliverable</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  };

  if(loading) return <SkeletonPage layout="form"/>;
  return (
    <div className="fade-in">
      <div className="ph-row">
        <div><div className="page-title">Rate Card Generator</div><div className="page-subtitle">Per-platform suggested rates based on your real stats.</div></div>
        {anyActive&&<button className="btn btn-secondary btn-sm">Download PDF</button>}
      </div>

      {/* Global controls */}
      <div className="card-lg" style={{padding:"16px 20px",marginBottom:20,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:200}}>
          <label className="fl" style={{margin:0,whiteSpace:"nowrap"}}>Primary Niche</label>
          <select className="fsel" value={niche} onChange={e=>setNiche(e.target.value)} style={{margin:0}}>
            {["Lifestyle","Wellness","Fashion","Beauty","Food","Tech","Finance","Gaming","Travel","Fitness","Education"].map(n=><option key={n}>{n}</option>)}
          </select>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:9,flexShrink:0}}>
          <span style={{fontSize:"12px",color:"var(--text2)"}}>Hide inactive platforms</span>
          <button onClick={()=>setHideInactive(h=>!h)} style={{width:40,height:22,borderRadius:11,border:"none",cursor:"pointer",background:hideInactive?"var(--accent)":"var(--surface2)",position:"relative",transition:"background .15s",flexShrink:0}}>
            <span style={{position:"absolute",top:3,left:hideInactive?20:3,width:16,height:16,borderRadius:8,background:"white",transition:"left .15s",boxShadow:"0 1px 3px rgba(0,0,0,.3)"}}/>
          </button>
        </div>
        <div style={{fontSize:"11px",color:"var(--text3)",flexShrink:0}}>Niche multiplier: <strong style={{color:"var(--text2)"}}>{nicheMult}×</strong></div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <PlatformCard
          name="Instagram" icon="📸" color="#e1306c" data={igData}
          inputs={<>
            <div className="fg" style={{margin:0}}><label className="fl">Followers</label><input className="fi" value={ig.followers} onChange={e=>setIg(p=>({...p,followers:e.target.value}))} placeholder="280,000"/></div>
            <div className="fg" style={{margin:0}}><label className="fl">Engagement Rate (%)</label><input className="fi" value={ig.eng} onChange={e=>setIg(p=>({...p,eng:e.target.value}))} placeholder="6.2"/></div>
          </>}
        />
        <PlatformCard
          name="TikTok" icon="♪" color="#69c9d0" data={ttData}
          inputs={<>
            <div className="fg" style={{margin:0}}><label className="fl">Followers</label><input className="fi" value={tt.followers} onChange={e=>setTt(p=>({...p,followers:e.target.value}))} placeholder="150,000"/></div>
            <div className="fg" style={{margin:0}}><label className="fl">Engagement Rate (%)</label><input className="fi" value={tt.eng} onChange={e=>setTt(p=>({...p,eng:e.target.value}))} placeholder="8.4"/></div>
          </>}
        />
        <PlatformCard
          name="YouTube" icon="▶" color="#ff0000" data={ytData}
          inputs={<>
            <div className="fg" style={{margin:0}}><label className="fl">Subscribers</label><input className="fi" value={yt.subscribers} onChange={e=>setYt(p=>({...p,subscribers:e.target.value}))} placeholder="95,000"/></div>
            <div className="fg" style={{margin:0}}><label className="fl">Avg Views per Video</label><input className="fi" value={yt.views} onChange={e=>setYt(p=>({...p,views:e.target.value}))} placeholder="42,000"/></div>
          </>}
        />
      </div>

      {!anyActive&&(
        <div className="card" style={{padding:"32px 20px",textAlign:"center",marginTop:16}}>
          <div style={{fontSize:"30px",marginBottom:10}}>💲</div>
          <div style={{fontSize:"14px",fontWeight:600,marginBottom:6}}>Enter your stats above</div>
          <div style={{fontSize:"12px",color:"var(--text2)"}}>Fill in at least one platform to generate suggested rates. You can add all three for a full picture.</div>
        </div>
      )}

      {anyActive&&(
        <div className="card-lg" style={{padding:"14px 20px",marginTop:16,display:"flex",gap:20,flexWrap:"wrap"}}>
          <div style={{fontSize:"12px",color:"var(--text3)",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",alignSelf:"center"}}>Cross-platform UGC</div>
          {[["UGC Package (no post)","🎨",0.3,0.6],["Brand Ambassador (mo.)","🌟",4.0,8.0]].map(([type,icon,lo,hi])=>{
            const bestBase=Math.max(
              igData?(parseInt(ig.followers)||0)/1000*0.01*(parseFloat(ig.eng)||0)*nicheMult:0,
              ttData?(parseInt(tt.followers)||0)/1000*0.01*(parseFloat(tt.eng)||0)*nicheMult*0.85:0,
              ytData?(parseInt(yt.views)||0)/1000*nicheMult*2.2:0
            );
            return (
              <div key={type} style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:220,padding:"9px 12px",background:"var(--surface2)",borderRadius:"var(--radius-sm)"}}>
                <span style={{fontSize:"16px"}}>{icon}</span>
                <div style={{flex:1,fontSize:"12px",fontWeight:600,color:"var(--text2)"}}>{type}</div>
                <div style={{fontSize:"14px",fontWeight:700,fontFamily:"Syne,sans-serif",color:"var(--accent)"}}>${Math.round(bestBase*lo*100)*10 .toLocaleString()} – ${Math.round(bestBase*hi*100)*10 .toLocaleString()}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

// ─── PROFILE SETTINGS ─────────────────────────────────────────────────────────
function ProfileSettingsPage({socialLinks,setSocialLinks,userName,userInitials}) {

  const [toast,setToast] = useState(null);

  const verify=(k)=>{if(local[k].trim())setVerified(p=>({...p,[k]:true}));};
  const save=()=>{setSocialLinks(local);setToast({m:"Profile saved",e:"✓"});};
  const g=bg(0);
  if(loading) return <SkeletonPage layout="form"/>;
  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">Profile Settings</div><div className="page-subtitle">Manage your public profile, social links, and bio.</div></div></div>

          <div style={{fontSize:"16px",fontWeight:700}}>{userName}</div>

      {/* Social Profiles */}

          {SOCIALS.map(s=>(

              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:"11px",fontWeight:600,color:"var(--text3)",marginBottom:4,textTransform:"uppercase",letterSpacing:".05em"}}>{s.label}</div>

                  className="fi"
                  style={{margin:0}}
                  value={local[s.key]}

                <div style={{width:70,height:34,borderRadius:"var(--radius-sm)",background:"rgba(52,211,153,.12)",border:"1px solid rgba(52,211,153,.3)",display:"flex",alignItems:"center",justifyContent:"center",gap:5,flexShrink:0}}>
                  <span style={{color:"var(--green)",fontWeight:700,fontSize:13}}>✓ Saved</span>
                </div>
              ):(
                <button
                  onClick={()=>verify(s.key)}
                  disabled={!local[s.key].trim()}
                  className="btn btn-secondary btn-sm"
                  style={{flexShrink:0,width:70,opacity:local[s.key].trim()?1:.45}}

      {/* Bio + Location */}

        <div className="fg" style={{marginBottom:0}}><label className="fl">Location</label><input className="fi" value={local.location} onChange={e=>up("location",e.target.value)} placeholder="e.g. Los Angeles, CA"/></div>

      <button onClick={save} className="btn btn-primary btn-lg" style={{width:"100%"}}>Save Profile</button>

    </div>
  );

              <div className="fg"><label className="fl">Campaign Description</label><textarea className="fta" value={bookForm.description} onChange={e=>setBookForm(f=>({...f,description:e.target.value}))} placeholder="Describe your campaign, what you need, timeline, etc."></textarea></div>
              <div style={{display:"flex",gap:9}}><button onClick={()=>setBookSent(true)} className="btn btn-primary btn-lg" style={{flex:1}}>Send Inquiry</button><button onClick={()=>setBookingModal(false)} className="btn btn-secondary btn-lg">Cancel</button></div>
            </div>
          )}
        </Modal>
      )}
    </div>
  );
}

// ─── EARNINGS & P&L ──────────────────────────────────────────────────────────
function EarningsPage() {
  const loading = useSkeleton();
  const [goal,setGoal] = useState(()=>{try{const g=parseInt(localStorage.getItem("bridgn_earnings_goal"));return g>0?g:0;}catch{return 0;}});
  const [editGoal,setEditGoal] = useState(false);
  const [goalInput,setGoalInput] = useState("");
  const [fireConfetti,confettiFiring] = useConfetti();
  const firedRef = useRef(false);

  const earningsMonthly = EARNINGS_MONTHLY;
  const earningsByBrand = EARNINGS_BY_BRAND;
  const hasEarnings = earningsMonthly.length > 0;
  const currentMonth = hasEarnings ? earningsMonthly[earningsMonthly.length-1] : null;
  const current = currentMonth ? currentMonth.amount : 0;
  const pct = goal>0 ? current/goal : 0;
  const done = pct>=1;

  useEffect(()=>{
    if(goal>0 && done && !firedRef.current){
      firedRef.current = true;
      fireConfetti();
    }
  },[goal,done]);

  if(loading) return <SkeletonPage layout="analytics"/>;

  const saveGoal = () => {
    const v = parseInt((goalInput||"").replace(/[^0-9]/g,""))||0;
    if(v>0){
      setGoal(v);
      try{localStorage.setItem("bridgn_earnings_goal",String(v));}catch{}
      firedRef.current = false;
    }
    setEditGoal(false);
    setGoalInput("");
  };

  const maxAmt = earningsMonthly.length ? Math.max(...earningsMonthly.map(e=>e.amount)) : 0;
  const ytd = earningsMonthly.reduce((s,e)=>s+e.amount,0);
  const avg = earningsMonthly.length ? Math.round(ytd/earningsMonthly.length) : 0;
  const best = earningsByBrand.length ? earningsByBrand.reduce((a,b)=>a.amount>b.amount?a:b) : {brand:"—",amount:0};

  // SVG ring geometry
  const R=54, CX=64, circ=2*Math.PI*R;
  const dashOffset = circ*(1-Math.min(pct,1));

  return (
    <div className="fade-in">
      <ConfettiCanvas active={confettiFiring}/>

      {/* ── Monthly Goal Card ───────────────────────────────── */}
      <div className="card-lg" style={{padding:"26px 28px",marginBottom:26,position:"relative",overflow:"hidden"}}>
        {/* subtle background glow */}
        {done&&<div style={{position:"absolute",top:-40,right:-40,width:200,height:200,borderRadius:"50%",background:"radial-gradient(circle,rgba(52,211,153,.12),transparent 70%)",pointerEvents:"none"}}/>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
          <div>
            <div style={{fontSize:"14px",fontWeight:700,color:"var(--text)"}}>Monthly Goal</div>
            <div style={{fontSize:"12px",color:"var(--text2)",marginTop:2}}>{currentMonth?currentMonth.month+" earnings tracking":"Track your monthly income target"}</div>
          </div>
          {!editGoal&&(
            <button className="btn btn-secondary btn-sm" onClick={()=>{setEditGoal(true);setGoalInput(goal?String(goal):"");}}>
              {goal?"Edit Goal":"Set Goal"}
            </button>
          )}
        </div>

        <div style={{display:"flex",gap:36,alignItems:"center",flexWrap:"wrap"}}>
          {/* Progress ring */}
          <div style={{position:"relative",width:148,height:148,flexShrink:0}}>
            <svg width={148} height={148} style={{transform:"rotate(-90deg)"}}>
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stopColor="#5b8af5"/>
                  <stop offset="55%" stopColor="#a78bfa"/>
                  <stop offset="100%" stopColor="#c084fc"/>
                </linearGradient>
                <filter id="ringGlow">
                  <feGaussianBlur stdDeviation="3" result="blur"/>
                  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
              </defs>
              {/* Track */}
              <circle cx={CX+10} cy={CX+10} r={R} fill="none" stroke="var(--surface2)" strokeWidth={11}/>
              {/* Progress arc */}
              {goal>0&&(
                <circle
                  cx={CX+10} cy={CX+10} r={R}
                  fill="none"
                  stroke={done?"#34d399":"url(#ringGrad)"}
                  strokeWidth={11}
                  strokeLinecap="round"
                  strokeDasharray={circ}
                  strokeDashoffset={dashOffset}
                  filter={done?"url(#ringGlow)":undefined}
                  style={{transition:"stroke-dashoffset .75s cubic-bezier(.16,1,.3,1),stroke .4s ease"}}
                />
              )}
            </svg>
            {/* Center label */}
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
              {goal>0 ? (
                <>
                  <div style={{fontSize:done?"20px":"26px",fontWeight:800,fontFamily:"Syne,sans-serif",lineHeight:1,color:done?"var(--green)":"var(--text)",transition:"color .4s"}}>
                    {done?"🎉":Math.round(Math.min(pct,1)*100)+"%"}
                  </div>
                  {!done&&<div style={{fontSize:"10px",color:"var(--text3)",marginTop:4,fontWeight:600,letterSpacing:".04em"}}>OF GOAL</div>}
                </>
              ):(
                <div style={{fontSize:"11px",color:"var(--text3)",textAlign:"center",padding:"0 16px",lineHeight:1.45}}>No goal set</div>
              )}
            </div>
          </div>

          {/* Right panel */}
          <div style={{flex:1,minWidth:200}}>
            {editGoal ? (
              <div>
                <div style={{fontSize:"12px",fontWeight:600,color:"var(--text2)",marginBottom:10}}>Set your target for {currentMonth.month}</div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <div style={{position:"relative",flex:1}}>
                    <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"var(--text2)",fontWeight:700,fontSize:15,pointerEvents:"none"}}>$</span>
                    <input className="fi" style={{paddingLeft:24}} type="number" placeholder="e.g. 15000" value={goalInput} onChange={e=>setGoalInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveGoal()} autoFocus/>
                  </div>
                  <button className="btn btn-primary btn-sm" onClick={saveGoal}>Save</button>

                </div>
                {goal>0&&<div style={{fontSize:"11px",color:"var(--text3)",marginTop:8}}>Current goal: ${goal.toLocaleString()}</div>}
              </div>
            ) : goal>0 ? (
              <div style={{display:"flex",flexDirection:"column",gap:16}}>
                <div style={{display:"flex",gap:28,flexWrap:"wrap"}}>
                  <div>
                    <div style={{fontSize:"10px",fontWeight:800,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>Earned ({currentMonth.month})</div>
                    <div style={{fontSize:"30px",fontWeight:800,fontFamily:"Syne,sans-serif",color:"var(--accent)",lineHeight:1}}>${current.toLocaleString()}</div>
                  </div>
                  <div>
                    <div style={{fontSize:"10px",fontWeight:800,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>Target</div>
                    <div style={{fontSize:"30px",fontWeight:800,fontFamily:"Syne,sans-serif",color:"var(--text)",lineHeight:1}}>${goal.toLocaleString()}</div>
                  </div>
                </div>
                {done ? (
                  <div style={{display:"inline-flex",alignItems:"center",gap:8,padding:"10px 16px",background:"var(--green-bg)",border:"1px solid rgba(52,211,153,.25)",borderRadius:"var(--radius-sm)"}}>
                    <span style={{fontSize:16}}>🎉</span>
                    <span style={{fontSize:"13px",fontWeight:700,color:"var(--green)"}}>Goal reached! You crushed it this month.</span>
                  </div>
                ) : (
                  <div>
                    <div style={{fontSize:"10px",fontWeight:800,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>Still needed</div>
                    <div style={{fontSize:"22px",fontWeight:700,fontFamily:"Syne,sans-serif",color:"var(--accent2)"}}>${(goal-current).toLocaleString()}</div>
                    <div style={{marginTop:10,height:5,background:"var(--surface2)",borderRadius:99,overflow:"hidden",maxWidth:280}}>
                      <div style={{height:"100%",width:(Math.min(pct,1)*100)+"%",background:"linear-gradient(90deg,var(--accent),#a78bfa)",borderRadius:99,transition:"width .75s cubic-bezier(.16,1,.3,1)"}}/>
                    </div>
                  </div>
                )}
              </div>
            ) : (
              <div>
                <div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.65,marginBottom:14}}>Set a monthly income target and watch your progress fill up in real time. Hit your goal and we'll celebrate with you. 🎉</div>
                <button className="btn btn-primary btn-sm" onClick={()=>{setEditGoal(true);setGoalInput("");}}>Set a goal →</button>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ── Page header + stats ─────────────────────────────── */}
      <div className="ph-row"><div><div className="page-title">Earnings & P&L</div><div className="page-subtitle">Your income, brand performance, and business health at a glance.</div></div>{hasEarnings&&<button className="btn btn-secondary">Export CSV</button>}</div>
      {!hasEarnings&&(
        <div className="card" style={{padding:"48px 24px",textAlign:"center",maxWidth:480,margin:"0 auto"}}>
          <EmptySVG type="earnings" size={136}/>
          <div style={{fontSize:"16px",fontWeight:600,marginBottom:8}}>No earnings yet</div>
          <div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.7}}>Once you complete deals and receive payments, your income breakdown, charts, and P&L will appear here.</div>
        </div>
      )}
      {hasEarnings&&<><div className="g4 section" style={{gap:12}}>
        {[
          {l:"YTD Earnings",v:"$"+ytd.toLocaleString(),spk:earningsMonthly.map(m=>m.amount),sc:"#34d399"},
          {l:"Monthly Avg",v:"$"+avg.toLocaleString(),spk:earningsMonthly.map(m=>m.amount)},
          {l:"Best Brand",v:best.brand,spk:earningsByBrand.map(b=>b.amount),vs:{fontSize:"18px",WebkitTextFillColor:"rgba(255,255,255,.85)"}},
          {l:"Deals Closed",v:String(earningsByBrand.reduce((s,b)=>s+b.deals,0)),spk:earningsByBrand.map(b=>b.deals)}
        ].map((s,i)=>(

          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── AVAILABILITY ─────────────────────────────────────────────────────────────
function AvailabilityPage({onAvailabilitySet}) {
  const loading = useSkeleton();
  const [status,setStatus] = useState("open");
  const [blocked,setBlocked] = useState([]);
  const [booked,setBooked] = useState([]);
  const [flaggedSet,setFlaggedSet] = useState(false);
  const days = Array.from({length:30},(_,i)=>i+1);
  const toggle=(d)=>{
    if(booked.includes(d)) return;
    if(blocked.includes(d)){setBlocked(b=>b.filter(x=>x!==d));}
    else{
      setBlocked(b=>[...b,d]);
      if(!flaggedSet){setFlaggedSet(true);onAvailabilitySet?.();}
    }
  };
  const getStatus=d=>{if(booked.includes(d))return "booked";if(blocked.includes(d))return "blocked";return "open";};
  const openDays=days.filter(d=>getStatus(d)==="open").length;
  if(loading) return <SkeletonPage layout="calendar"/>;
  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">Availability</div><div className="page-subtitle">Let brands know when you are open to new work. Click days to block or unblock.</div></div></div>
      <div className="g3 section" style={{gap:12}}>
        {[["Open Days",String(openDays),"var(--green)"],["Blocked",String(blocked.length),"var(--red)"],["Booked",String(booked.length),"var(--accent2)"]].map(([l,v,col],i)=>(
          <div key={i} className="card" style={{padding:"14px 18px",display:"flex",gap:12,alignItems:"center"}}>
            <div style={{width:12,height:12,borderRadius:"50%",background:col,flexShrink:0}}></div>
            <div><div style={{fontSize:"20px",fontWeight:700,fontFamily:"Syne,sans-serif",lineHeight:1,color:col}}>{v}</div><div style={{fontSize:"11px",color:"var(--text3)",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginTop:3}}>{l}</div></div>
          </div>

// ─── BRIDGN SCORE ────────────────────────────────────────────────────────────
function calcBridgnScore(c) {
  // 1. Profile completeness (0–25): analytics uploaded + location + multi-platform
  let completeness = 0;
  if(c.analyticsUpdated) completeness += 15;
  if(c.loc)              completeness += 5;
  if(c.platforms && c.platforms.length > 1) completeness += 5;

  // 2. Analytics freshness (0–25): recency of last analytics upload
  let freshness = 0;
  const age = c.analyticsAge;
  if(age != null){
    if(age <= 7)       freshness = 25;
    else if(age <= 14) freshness = 22;
    else if(age <= 30) freshness = 18;
    else if(age <= 60) freshness = 12;
    else if(age <= 90) freshness = 6;
    else               freshness = 2;
  }

  // 3. Deal volume (0–25): completed partnerships
  const d = c.totalDeals || 0;
  const dealScore = d>=15?25 : d>=11?22 : d>=6?18 : d>=3?12 : d>=1?5 : 0;

  // 4. Brand rating (0–25): average star rating scaled
  const ratingScore = Math.round((parseFloat(c.rating)||0)/5*25);

  const total = Math.min(100, completeness+freshness+dealScore+ratingScore);
  return {
    total,
    breakdown:[
      {label:"Profile completeness", score:completeness, max:25, desc:c.analyticsUpdated?"Analytics on file":"No analytics uploaded"},
      {label:"Analytics freshness",  score:freshness,    max:25, desc:age==null?"Never uploaded":age+"d since last upload"},
      {label:"Completed deals",      score:dealScore,    max:25, desc:d+" deal"+(d===1?"":"s")+" completed"},
      {label:"Brand rating",         score:ratingScore,  max:25, desc:(c.rating||"—")+"★ average rating"},
    ]
  };
}

function BridgnScoreBadge({score, breakdown}) {
  const [showTip,setShowTip] = useState(false);
  const [tipPos,setTipPos]   = useState({top:0,left:0});
  const ref = useRef(null);

  const DIM=80, R=31, SW=7.5;
  const circ = 2*Math.PI*R;
  const offset = circ*(1-score/100);

  const col = (() => {
    if(score<=50){
      const t=score/50;
      return `rgb(${Math.round(248+(251-248)*t)},${Math.round(113+(191-113)*t)},${Math.round(113+(36-113)*t)})`;
    }
    const t=(score-50)/50;
    return `rgb(${Math.round(251+(52-251)*t)},${Math.round(191+(211-191)*t)},${Math.round(36+(153-36)*t)})`;
  })();

  const onEnter = () => {
    if(ref.current){
      const rect = ref.current.getBoundingClientRect();
      setTipPos({top:rect.bottom+10, left:Math.max(8, rect.right-240)});
    }
    setShowTip(true);
  };

  const tipContent = (
    <div style={{position:"fixed",top:tipPos.top,left:tipPos.left,width:240,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:"16px",boxShadow:"var(--shadow-lg)",zIndex:9000,animation:"fadeIn .15s ease both"}}>
      <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:13}}>
        <span style={{fontSize:"13px",fontWeight:800,fontFamily:"Syne,sans-serif",color:"var(--text)"}}>bridgn Score</span>
        <span style={{fontSize:"22px",fontWeight:800,fontFamily:"Syne,sans-serif",color:col,marginLeft:"auto",lineHeight:1}}>{score}</span>
        <span style={{fontSize:"11px",color:"var(--text3)"}}>/ 100</span>
      </div>
      {breakdown.map((b,i)=>{
        const pct = b.score/b.max;
        const bCol = pct>=.8?"var(--green)":pct>=.4?"var(--accent2)":"var(--red)";
        return (
          <div key={i} style={{marginBottom:i<breakdown.length-1?11:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:4}}>
              <div>
                <div style={{fontSize:"11px",fontWeight:600,color:"var(--text)",lineHeight:1.2}}>{b.label}</div>
                <div style={{fontSize:"10px",color:"var(--text3)",marginTop:1}}>{b.desc}</div>
              </div>
              <span style={{fontSize:"12px",fontWeight:700,color:bCol,marginLeft:8,flexShrink:0}}>{b.score}<span style={{fontWeight:400,color:"var(--text3)"}}>/{b.max}</span></span>
            </div>
            <div style={{height:3,background:"var(--surface2)",borderRadius:99,overflow:"hidden"}}>
              <div style={{height:"100%",width:(pct*100)+"%",background:bCol,borderRadius:99,transition:"width .5s cubic-bezier(.16,1,.3,1)"}}/>
            </div>
          </div>
        );
      })}
      <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid var(--border)",fontSize:"10px",color:"var(--text3)",lineHeight:1.6}}>
        Composite of profile completeness, analytics freshness, deal history, and brand ratings. Encourages creators to stay active.
      </div>
    </div>
  );

  return (
    <div ref={ref} style={{display:"inline-flex",flexDirection:"column",alignItems:"center",cursor:"default"}} onMouseEnter={onEnter} onMouseLeave={()=>setShowTip(false)}>
      <div style={{position:"relative",width:DIM,height:DIM,background:"rgba(0,0,0,.38)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",borderRadius:"50%",border:"1px solid rgba(255,255,255,.12)",boxShadow:"0 4px 16px rgba(0,0,0,.35)"}}>
        <svg width={DIM} height={DIM} style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}}>
          <defs>
            <filter id="sGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2.5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <circle cx={DIM/2} cy={DIM/2} r={R} fill="none" stroke="rgba(255,255,255,.1)" strokeWidth={SW}/>
          <circle cx={DIM/2} cy={DIM/2} r={R} fill="none" stroke={col} strokeWidth={SW} strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset} filter="url(#sGlow)" style={{transition:"stroke-dashoffset .7s cubic-bezier(.16,1,.3,1),stroke .4s ease"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
          <div style={{fontSize:"20px",fontWeight:800,fontFamily:"Syne,sans-serif",lineHeight:1,color:col}}>{score}</div>
          <div style={{fontSize:"7.5px",fontWeight:800,color:"rgba(255,255,255,.45)",letterSpacing:".12em",marginTop:2}}>SCORE</div>
        </div>
      </div>
      <div style={{fontSize:"9px",fontWeight:700,color:"rgba(255,255,255,.55)",marginTop:5,letterSpacing:".04em",whiteSpace:"nowrap"}}>bridgn Score ⓘ</div>
      {showTip && ReactDOM.createPortal(tipContent, document.body)}
    </div>
  );
}

function BrandCampaignsPage({setPage,setSelected,campaignQuestions={},setCampaignQuestions}) {
  const loading = useSkeleton();
