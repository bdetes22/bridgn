// ─── AVAILABILITY ─────────────────────────────────────────────────────────────
function AvailabilityPage() {
  const loading = useSkeleton();
  const [status,setStatus] = useState("open");
  const [blocked,setBlocked] = useState([]);
  const [booked,setBooked] = useState([]);
  const days = Array.from({length:30},(_,i)=>i+1);
  const toggle=(d)=>{
    if(booked.includes(d)) return;
    if(blocked.includes(d)){setBlocked(b=>b.filter(x=>x!==d));}
    else{setBlocked(b=>[...b,d]);}
  };
  const getStatus=d=>{if(booked.includes(d))return "booked";if(blocked.includes(d))return "blocked";return "open";};
  const openDays=days.filter(d=>getStatus(d)==="open").length;
  if(loading) return <SkeletonPage layout="calendar"/>;
  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">Availability</div><div className="page-subtitle">Let brands know when you are open to new work. Click days to block or unblock.</div></div></div>
      <div className="g3 section" style={{gap:12}}>
        {[["Open Days",String(openDays),"var(--green)"],["Blocked",String(blocked.length),"var(--red)"],["Booked",String(booked.length),"var(--accent2)"]].map(([l,v,col],i)=>(
          <div key={i} className="card" style={{padding:"14px 18px",display:"flex",gap:12,alignItems:"center"}}>
            <div style={{width:12,height:12,borderRadius:"50%",background:col,flexShrink:0}}></div>
            <div><div style={{fontSize:"20px",fontWeight:700,fontFamily:"Syne,sans-serif",lineHeight:1,color:col}}>{v}</div><div style={{fontSize:"11px",color:"var(--text3)",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginTop:3}}>{l}</div></div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:16,marginBottom:18,flexWrap:"wrap"}}>
        {[["open","Open","var(--green)"],["blocked","Blocked","var(--red)"],["booked","Booked","var(--accent2)"]].map(([s,l,col])=>(
          <div key={s} style={{display:"flex",gap:7,alignItems:"center"}}><div style={{width:14,height:14,borderRadius:4,background:s==="open"?"rgba(52,211,153,.15)":s==="blocked"?"rgba(248,113,113,.15)":"rgba(240,160,80,.15)",border:"1.5px solid "+col}}></div><span style={{fontSize:"12px",color:"var(--text2)",fontWeight:500}}>{l}</span></div>
        ))}
        <div style={{fontSize:"12px",color:"var(--text3)",marginLeft:"auto"}}>Click open days to block · Click blocked days to unblock</div>
      </div>
      <div className="card-lg" style={{overflow:"hidden",marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 18px",borderBottom:"1px solid var(--border)"}}>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button className="btn btn-secondary btn-sm">‹</button>
            <span style={{fontFamily:"Syne,sans-serif",fontSize:"16px",fontWeight:700}}>April 2025</span>
            <button className="btn btn-secondary btn-sm">›</button>
          </div>
          <button className="btn btn-secondary btn-sm" onClick={()=>setBlocked([])}>Clear All Blocked</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"var(--surface2)",borderBottom:"1px solid var(--border)"}}>
          {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} style={{padding:"9px",textAlign:"center",fontSize:"10px",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--text3)"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {[0,1].map(i=><div key={"e"+i} style={{minHeight:66,border:"1px solid var(--border)",background:"var(--surface)"}}></div>)}
          {days.map(d=>{
            const st=getStatus(d);
            const bg2=st==="open"?"var(--surface)":st==="blocked"?"rgba(248,113,113,.06)":"rgba(240,160,80,.08)";
            const bc2=st==="open"?"var(--border)":st==="blocked"?"rgba(248,113,113,.3)":"rgba(240,160,80,.3)";
            const col=st==="open"?"var(--text2)":st==="blocked"?"var(--red)":"var(--accent2)";
            return (
              <div key={d} onClick={()=>toggle(d)} style={{minHeight:66,padding:"10px",border:"1px solid "+bc2,background:bg2,cursor:st==="booked"?"default":"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}} onMouseEnter={e=>{if(st!=="booked")e.currentTarget.style.background=st==="open"?"rgba(91,138,245,.05)":"";}} onMouseLeave={e=>{e.currentTarget.style.background=bg2;}}>
                <span style={{fontSize:"13px",fontWeight:600,color:col}}>{d}</span>
                {st==="booked"&&<span style={{fontSize:"8px",fontWeight:700,color:"var(--accent2)",textTransform:"uppercase"}}>Booked</span>}
                {st==="blocked"&&<span style={{fontSize:"8px",fontWeight:700,color:"var(--red)",textTransform:"uppercase"}}>Blocked</span>}
              </div>
            );
          })}
          {[0,1,2,3,4].map(i=><div key={"f"+i} style={{minHeight:66,border:"1px solid var(--border)",background:"var(--surface)",opacity:.4}}></div>)}
        </div>
      </div>
      <div style={{background:"var(--accent-light)",border:"1px solid rgba(91,138,245,.3)",borderRadius:"var(--radius)",padding:"12px 16px",fontSize:"12px",color:"var(--accent)"}}>💡 Brands viewing your profile can see your open availability. Booked days show a deal from Bridgn is confirmed — blocked days show you marked yourself unavailable.</div>
    </div>
  );
}

// ─── EXPENSES & TAX ───────────────────────────────────────────────────────────

  const loading = useSkeleton();

            <div style={{display:"flex",gap:9}}><button onClick={addExpense} className="btn btn-primary btn-lg" style={{flex:1}}>Add Expense</button><button onClick={()=>setModal(false)} className="btn btn-secondary btn-lg">Cancel</button></div>
          </div>
        </Modal>
      )}
    </div>
  );
}

              <button className="btn btn-primary" style={{width:"100%"}} onClick={()=>{setInviteModal(false);setInviteSent(false);setInviteEmail("");}}>Done</button>
            </div>
          ):(

              <div className="fg"><label className="fl">Creator's Email Address</label><input className="fi" type="email" value={inviteEmail} onChange={e=>setInviteEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendInvite()} placeholder="creator@example.com" autoFocus/></div>
              <button className="btn btn-primary" style={{width:"100%",marginTop:8}} disabled={!inviteEmail.trim()} onClick={sendInvite}>Send Invite</button>

          )}
        </Modal>
      )}
      {toast&&<Toast msg={toast.m} emoji={toast.e} onDone={()=>setToast(null)}/>}
    </div>
  );
}

// ─── BRAND CAMPAIGNS ─────────────────────────────────────────────────────────
function BrandCampaignsPage({setPage,setSelected,campaignQuestions={},setCampaignQuestions}) {
  const loading = useSkeleton();

  const [modal,setModal] = useState(false);const [step,setStep] = useState(1);const [form,setForm] = useState({title:"",platform:"Instagram",budget:"",type:"Paid",deadline:"",desc:"",deliverables:"",requirements:"",brief:""});const [briefTemplate,setBriefTemplate] = useState(null);const [created,setCreated] = useState(false);
  const [replyText,setReplyText] = useState({});  // keyed by question id
  const [replyOpen,setReplyOpen] = useState({});  // keyed by question id
  const [qExpanded,setQExpanded] = useState({});  // keyed by campaign id
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));

  // Flatten all questions across all campaigns for the brand inbox
  const allQuestions = Object.entries(campaignQuestions).flatMap(([cid,qs])=>
    qs.map(q=>({...q, campaignId: Number(cid), campaignTitle: CAMPAIGNS.find(c=>c.id===Number(cid))?.title||"Campaign #"+cid}))
  ).sort((a,b)=>b.id-a.id);

  const sendReply = (q) => {
    const text = (replyText[q.id]||"").trim();
    if(!text) return;
    setCampaignQuestions(prev => ({
      ...prev,
      [q.campaignId]: (prev[q.campaignId]||[]).map(item => item.id===q.id ? {...item, reply:text} : item)
    }));
    setReplyText(r=>({...r,[q.id]:""}));
    setReplyOpen(r=>({...r,[q.id]:false}));

    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">Campaigns</div><div className="page-subtitle">Manage and launch your influencer campaigns.</div></div><button className="btn btn-primary" onClick={()=>{setModal(true);setStep(1);setCreated(false);}}>+ New Campaign</button></div>
      {/* Creator Questions Inbox */}
      {allQuestions.length>0&&(
        <div className="card-lg" style={{padding:0,overflow:"hidden",marginBottom:20}}>

          </div>
          <div style={{display:"flex",flexDirection:"column"}}>

              <div key={q.id} style={{padding:"14px 20px",borderBottom:i<allQuestions.length-1?"1px solid var(--border)":"none"}}>
                <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,var(--accent),var(--accent2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:800,color:"white",flexShrink:0}}>
                    {(q.creatorName||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{fontSize:"13px",fontWeight:600}}>{q.creatorName}</span>
                      <span style={{fontSize:"11px",padding:"1px 7px",borderRadius:99,background:"var(--surface2)",color:"var(--text3)",border:"1px solid var(--border)"}}>{q.campaignTitle}</span>
                      <span style={{fontSize:"10px",color:"var(--text3)",marginLeft:"auto"}}>{q.ts}</span>
                    </div>
                    <div style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.55,marginBottom:8}}>{q.text}</div>
                    {q.reply?(
                      <div style={{padding:"8px 12px",background:"rgba(52,211,153,.06)",border:"1px solid rgba(52,211,153,.2)",borderRadius:"var(--radius-sm)",fontSize:"12px",color:"var(--text2)",lineHeight:1.5}}>
                        <span style={{fontWeight:700,color:"var(--green)"}}>✓ Replied: </span>{q.reply}

                        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                          <textarea
                            className="fta"

  );
}

// ─── ROI TRACKER ──────────────────────────────────────────────────────────────
function ROITrackerPage() {
  const loading = useSkeleton();
  if(loading) return <SkeletonPage layout="list"/>;
  const roiData=[];
  if(!roiData.length) return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">ROI Tracker</div><div className="page-subtitle">Measure the real return on every creator investment.</div></div></div>

    <div className="fade-in">

        {[
          {l:"Total Spend",v:"$"+totalSpend.toLocaleString(),sc:"#f87171"},
          {l:"Total Revenue",v:"$"+totalRev.toLocaleString(),sc:"#34d399"},
          {l:"Avg ROI",v:avgROI+"%",c:"↑ vs industry avg 150%",cls:"stat-up",sc:"#a78bfa"},
          {l:"Net Profit",v:"$"+(totalRev-totalSpend).toLocaleString(),sc:"#34d399"}

          <StatCard key={i} label={s.l} value={s.v} change={s.c} changeClass={s.cls} sparkColor={s.sc}/>

      </div>
      <div className="card-lg" style={{overflow:"hidden"}}>
        <table className="tbl">
          <thead><tr><th>Creator</th><th>Campaign</th><th>Platform</th><th>Spend</th><th>Revenue</th><th>ROI</th><th>Clicks</th><th>Conv.</th></tr></thead>
          <tbody>
            {[...roiData].sort((a,b)=>b.roi-a.roi).map((r,i)=>(
              <tr key={i}>
                <td><div style={{display:"flex",gap:8,alignItems:"center"}}><div style={{width:26,height:26,borderRadius:"50%",background:bc(r.ci),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",fontWeight:700,color:"white"}}>{r.creator.split(" ").map(n=>n[0]).join("")}</div><span style={{fontWeight:500}}>{r.creator}</span></div></td>
                <td style={{color:"var(--text2)"}}>{r.campaign}</td>
                <td><PlatformBadge p={r.platform}/></td>
                <td style={{fontWeight:600}}>${r.spend.toLocaleString()}</td>
                <td style={{fontWeight:700,fontFamily:"Syne,sans-serif",color:"var(--green)"}}>${r.revenue.toLocaleString()}</td>
                <td><div style={{display:"flex",gap:7,alignItems:"center"}}><div style={{width:60,height:5,background:"var(--surface2)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",background:r.roi>300?"var(--green)":r.roi>100?"var(--accent)":"var(--accent2)",borderRadius:99,width:Math.min((r.roi/700)*100,100)+"%"}}></div></div><span style={{fontSize:"13px",fontWeight:700,color:r.roi>300?"var(--green)":r.roi>100?"var(--accent)":"var(--accent2)"}}>{r.roi}%</span></div></td>
                <td style={{color:"var(--text2)"}}>{r.clicks.toLocaleString()}</td>
                <td style={{color:"var(--text2)"}}>{r.conv.toLocaleString()}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── AI MATCH ─────────────────────────────────────────────────────────────────
function AIMatchPage({setPage,setSelected}) {
  const loading = useSkeleton();
  const [q,setQ] = useState("");const [results,setResults] = useState(null);const [searching,setSearching] = useState(false);const [loadMsg,setLoadMsg] = useState("");
  const msgs=["Analyzing niche alignment...","Reviewing engagement data...","Scoring authenticity...","Ranking matches..."];
  const run=()=>{if(!q.trim())return;setSearching(true);setResults(null);let mi=0;const t=setInterval(()=>{mi=(mi+1)%msgs.length;setLoadMsg(msgs[mi]);},700);setTimeout(()=>{clearInterval(t);setSearching(false);const scored=CREATORS.map(c=>({...c,matchScore:Math.floor(Math.random()*30)+70})).sort((a,b)=>b.matchScore-a.matchScore);setResults(scored);},3000);};
  if(loading) return <SkeletonPage layout="simple"/>;
  return (
    <div className="fade-in">
      <div className="ph-row"><div><div className="page-title">AI Match</div><div className="page-subtitle">Describe your campaign, and AI will find your best creator matches.</div></div></div>
      <div className="card-lg" style={{padding:"22px 24px",marginBottom:20}}>

// ─── CARD TILT ────────────────────────────────────────────────────────────────
function useTiltEffect() {
  useEffect(()=>{
    const MAX = 6;
    let active = null;

    // Walk up from event target until we hit a card-hover or the body
    const nearest = el => {
      while(el && el !== document.body) {
        if(el.classList?.contains('card-hover')) return el;
        el = el.parentElement;
      }
      return null;
    };

    const tilt = (card, e) => {
      const r  = card.getBoundingClientRect();
      const x  = (e.clientX - r.left)  / r.width;   // 0 → 1 left→right
      const y  = (e.clientY - r.top)   / r.height;  // 0 → 1 top→bottom
      const rx = ((0.5 - y) * MAX * 2).toFixed(2);  // positive = top tilts toward viewer
      const ry = ((x - 0.5) * MAX * 2).toFixed(2);  // positive = right tilts toward viewer
      // Fast response while moving, slow spring on release (handled via CSS transition swap)
      card.style.transition =
        'box-shadow .22s, transform .08s linear, border-color .22s';
      card.style.setProperty('--rx', rx  + 'deg');
      card.style.setProperty('--ry', ry  + 'deg');
      card.style.setProperty('--tz', '10px');
      card.style.setProperty('--sx', (x * 100).toFixed(1) + '%');
      card.style.setProperty('--sy', (y * 100).toFixed(1) + '%');
      card.style.setProperty('--so', '1');
    };

    const reset = card => {
      // Restore CSS-class transition so the spring-back is smooth
      card.style.transition = '';
      card.style.setProperty('--rx', '0deg');
      card.style.setProperty('--ry', '0deg');
      card.style.setProperty('--tz', '0px');
      card.style.setProperty('--so', '0');
    };

    const onMove = e => {
      const card = nearest(e.target);
      if(!card) {
        if(active){ reset(active); active = null; }
        return;
      }
      if(active && active !== card) reset(active);
      active = card;
      tilt(card, e);
    };

    // Reset if pointer leaves the browser window entirely
    const onDocLeave = e => {
      if(!e.relatedTarget && active){ reset(active); active = null; }
    };

    document.addEventListener('mousemove',  onMove,     {passive:true});
    document.addEventListener('mouseleave', onDocLeave);
    return ()=>{
      document.removeEventListener('mousemove',  onMove);
      document.removeEventListener('mouseleave', onDocLeave);
      if(active) reset(active);
    };
  },[]);
}

function TiltEffect() { useTiltEffect(); return null; }

// ─── PARTICLE CANVAS ──────────────────────────────────────────────────────────
function ParticleCanvas() {
  const ref = useRef(null);
  useEffect(()=>{
    const canvas = ref.current;
    const ctx = canvas.getContext("2d");
    let W, H;

    const resize = () => {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    };
    resize();
    window.addEventListener("resize", resize);

    const mouse = {x:-9999, y:-9999};
    const onMove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
    window.addEventListener("mousemove", onMove, {passive:true});

    const COLS = ["rgba(91,138,245,0.4)","rgba(167,139,250,0.3)"];
    const COUNT = 60;
    const particles = Array.from({length:COUNT}, ()=>({
      x:  Math.random() * window.innerWidth,
      y:  Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
      r:  1 + Math.random(),
      col: COLS[Math.random() < 0.5 ? 0 : 1]
    }));

    let raf;
    const REPEL  = 120;
    const CONNECT = 100;

    const tick = () => {
      ctx.clearRect(0, 0, W, H);

      // ── update ──────────────────────────────────────────────────────────────
      for(const p of particles) {
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if(d < REPEL && d > 0) {
          const f = (1 - d / REPEL) * 0.22;
          p.vx += (dx / d) * f;
          p.vy += (dy / d) * f;
        }
        p.vx *= 0.97;
        p.vy *= 0.97;
        const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
        if(spd > 1.5) { p.vx = p.vx/spd*1.5; p.vy = p.vy/spd*1.5; }
        p.x = (p.x + p.vx + W) % W;
        p.y = (p.y + p.vy + H) % H;
      }

      // ── connection lines ─────────────────────────────────────────────────────
      ctx.lineWidth = 0.5;
      for(let i = 0; i < COUNT; i++) {
        const a = particles[i];
        for(let j = i + 1; j < COUNT; j++) {
          const b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if(d < CONNECT) {
            ctx.strokeStyle = `rgba(91,138,245,${((1 - d/CONNECT) * 0.12).toFixed(3)})`;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      // ── dots ─────────────────────────────────────────────────────────────────
      for(const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.col;
        ctx.fill();
      }

      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);

    return ()=>{
      cancelAnimationFrame(raf);
      window.removeEventListener("resize", resize);
      window.removeEventListener("mousemove", onMove);
    };
  }, []);

  return <canvas ref={ref} style={{position:"fixed",top:0,left:0,pointerEvents:"none",zIndex:-1}}/>;
}

// ─── CURSOR GLOW ──────────────────────────────────────────────────────────────
function CursorGlow() {
  const ref = useRef(null);
  useEffect(()=>{
    const el = ref.current;
    if(!el) return;
    const onMove = e => {
      el.style.transform = `translate(${e.clientX-150}px,${e.clientY-150}px)`;
    };
    window.addEventListener("mousemove", onMove, {passive:true});
    return () => window.removeEventListener("mousemove", onMove);
  }, []);
  return <div ref={ref} className="cursor-glow"/>;
}

              <div className="fg"><label className="fl">Password</label><input className="fi" type="password" value={form.password} onChange={e=>up("password",e.target.value)} placeholder="Your password" onKeyDown={e=>e.key==="Enter"&&handleLogin()}/></div>
              <div style={{textAlign:"right",marginTop:-8,marginBottom:20}}><button onClick={()=>{setMode("reset");setError("");setSuccess("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--accent)",fontFamily:"Space Grotesk,sans-serif"}}>Forgot password?</button></div>
              <button onClick={handleLogin} disabled={loading||!form.email||!form.password} className="btn btn-primary btn-lg" style={{width:"100%",opacity:loading||!form.email||!form.password?.6:1}}>
                {loading?<span style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}><span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>⟳</span>Signing in...</span>:"Sign In"}
              </button>
              <div style={{textAlign:"center",marginTop:20,fontSize:13,color:"var(--text2)"}}>No account?<button onClick={()=>{setMode("signup");setError("");setSuccess("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--accent)",fontFamily:"Space Grotesk,sans-serif",marginLeft:6}}>Create one free</button></div>
            </>
          )}
          {mode==="signup"&&(
            <>
              <div style={{fontFamily:"Syne,sans-serif",fontSize:26,fontWeight:800,marginBottom:6,letterSpacing:"-.3px"}}>Create your account</div>
              <div style={{fontSize:13,color:"var(--text2)",marginBottom:24}}>Join Bridgn free — no credit card needed</div>
              {error&&<div style={{padding:"10px 14px",background:"var(--red-bg)",border:"1px solid rgba(248,113,113,.3)",borderRadius:"var(--radius-sm)",fontSize:13,color:"var(--red)",marginBottom:16}}>{error}</div>}
              <div className="fg"><label className="fl">{form.role==="brand"?"Company Name":form.role==="agency"?"Agency Name":"Full Name"}</label><input className="fi" value={form.name} onChange={e=>up("name",e.target.value)} placeholder={form.role==="brand"?"e.g. Nike, Halo Health, Acme Corp":form.role==="agency"?"e.g. Viral Nation, Whalar, Open Influence":"Your full name"}/></div>
              <div className="fg"><label className="fl">Email</label><input className="fi" type="email" value={form.email} onChange={e=>up("email",e.target.value)} placeholder="you@example.com"/></div>
              <div className="fg"><label className="fl">Password</label><input className="fi" type="password" value={form.password} onChange={e=>up("password",e.target.value)} placeholder="At least 6 characters"/></div>
              <div className="fg">
                <label className="fl">I am joining as a...</label>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginTop:4}}>
                  <button onClick={()=>up("role","creator")} style={{padding:"11px",borderRadius:"var(--radius-sm)",border:"2px solid "+(form.role==="creator"?"var(--accent)":"var(--border)"),background:form.role==="creator"?"var(--accent-light)":"var(--surface2)",cursor:"pointer",fontFamily:"Space Grotesk,sans-serif",fontSize:13,fontWeight:500,color:form.role==="creator"?"var(--accent)":"var(--text2)",transition:"all .12s"}}>✨ Creator</button>
                  <button onClick={()=>up("role","brand")} style={{padding:"11px",borderRadius:"var(--radius-sm)",border:"2px solid "+(form.role==="brand"?"var(--accent2)":"var(--border)"),background:form.role==="brand"?"var(--accent2-light)":"var(--surface2)",cursor:"pointer",fontFamily:"Space Grotesk,sans-serif",fontSize:13,fontWeight:500,color:form.role==="brand"?"var(--accent2)":"var(--text2)",transition:"all .12s"}}>📋 Brand</button>
                  <button onClick={()=>up("role","agency")} style={{padding:"11px",borderRadius:"var(--radius-sm)",border:"2px solid "+(form.role==="agency"?"var(--purple)":"var(--border)"),background:form.role==="agency"?"rgba(167,139,250,.12)":"var(--surface2)",cursor:"pointer",fontFamily:"Space Grotesk,sans-serif",fontSize:13,fontWeight:500,color:form.role==="agency"?"var(--purple)":"var(--text2)",transition:"all .12s"}}>💼 Agency</button>
                </div>
              </div>
              {form.role==="agency"&&(
                <div className="fg" style={{marginTop:2}}>
                  <label className="fl">Brands you manage <span style={{color:"var(--text3)",fontWeight:400}}>(optional)</span></label>
                  <input className="fi" value={form.brands} onChange={e=>up("brands",e.target.value)} placeholder="e.g. Nike, Adidas, Halo Health"/>
                </div>
              )}
              <button onClick={handleSignup} disabled={loading||!form.email||!form.password||!form.name} className="btn btn-primary btn-lg" style={{width:"100%",marginTop:8,opacity:loading||!form.email||!form.password||!form.name?.6:1}}>
                {loading?<span style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}><span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>⟳</span>Creating account...</span>:"Create Account"}
              </button>
              <div style={{textAlign:"center",marginTop:20,fontSize:13,color:"var(--text2)"}}>Already have an account?<button onClick={()=>{setMode("login");setError("");setSuccess("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--accent)",fontFamily:"Space Grotesk,sans-serif",marginLeft:6}}>Sign in</button></div>
            </>
          )}
          {mode==="reset"&&(
            <>
              <div style={{fontFamily:"Syne,sans-serif",fontSize:26,fontWeight:800,marginBottom:6,letterSpacing:"-.3px"}}>Reset your password</div>
              <div style={{fontSize:13,color:"var(--text2)",marginBottom:24}}>Enter your email and we will send a reset link.</div>
              {error&&<div style={{padding:"10px 14px",background:"var(--red-bg)",border:"1px solid rgba(248,113,113,.3)",borderRadius:"var(--radius-sm)",fontSize:13,color:"var(--red)",marginBottom:16}}>{error}</div>}
              {success&&<div style={{padding:"10px 14px",background:"var(--green-bg)",border:"1px solid rgba(52,211,153,.3)",borderRadius:"var(--radius-sm)",fontSize:13,color:"var(--green)",marginBottom:16}}>{success}</div>}
              <div className="fg"><label className="fl">Email</label><input className="fi" type="email" value={form.email} onChange={e=>up("email",e.target.value)} placeholder="you@example.com"/></div>
              <button onClick={handleReset} disabled={loading||!form.email} className="btn btn-primary btn-lg" style={{width:"100%",opacity:loading||!form.email?.6:1}}>
                {loading?"Sending...":"Send Reset Link"}
              </button>
              <div style={{textAlign:"center",marginTop:20}}><button onClick={()=>{setMode("login");setError("");setSuccess("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--accent)",fontFamily:"Space Grotesk,sans-serif"}}>Back to sign in</button></div>
            </>
          )}
        </div>
        <div style={{textAlign:"center",marginTop:20,fontSize:12,color:"var(--text3)"}}>By signing up you agree to the Bridgn Terms of Service and Privacy Policy.</div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [authUser,setAuthUser] = useState(null);
  const [authLoading,setAuthLoading] = useState(true);
  const [role,setRole] = useState("creator");
  const [page,setPage] = useState("dashboard");
  const [selected,setSelected] = useState(null);
  const [deals,setDeals] = useState(CREATOR_DEALS_INIT);
  const [availStatus,setAvailStatus] = useState("open");
  const [mobSidebar,setMobSidebar] = useState(false);
  const [socialLinks,setSocialLinks] = useState({ig:"",tt:"",yt:"",tw:"",web:"",bio:"",location:""});
  const [campaignQuestions,setCampaignQuestions] = useState({});
  const [onboarding,setOnboarding] = useState({seen:false,steps:{analytics:false}});
  const [darkMode,setDarkMode] = useState(true);

  useEffect(()=>{
    document.documentElement.classList.toggle("light",!darkMode);
  },[darkMode]);

  // Load/save onboarding state from localStorage once user is known
  useEffect(()=>{
    if(!authUser) return;
    try {
      const raw = localStorage.getItem("bridgn_ob_"+authUser.id);
      if(raw) setOnboarding(JSON.parse(raw));
    } catch {}
  },[authUser]);

  const updateOnboarding = upd => {
    setOnboarding(prev => {
      const next = {...prev,...upd,steps:{...prev.steps,...(upd.steps||{})}};
      try { localStorage.setItem("bridgn_ob_"+(authUser?.id||"guest"), JSON.stringify(next)); } catch {}
      return next;
    });
  };

  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      setAuthUser(session?.user||null);
      if(session?.user){
        const r=session.user.user_metadata?.role||"creator";
        setRole(r);
      }
      setAuthLoading(false);
    });
    const {data:{subscription}}=supabase.auth.onAuthStateChange((_event,session)=>{
      setAuthUser(session?.user||null);
      if(session?.user){
        const r=session.user.user_metadata?.role||"creator";
        setRole(r);
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  const handleSignOut=async()=>{
    await supabase.auth.signOut();
    setAuthUser(null);
    setPage("dashboard");
  };

  const addDeal = d => setDeals(x=>[...x,d]);

  if(authLoading) return (
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontFamily:"Syne,sans-serif",fontSize:40,fontWeight:800,letterSpacing:"-1px",background:"linear-gradient(135deg,var(--accent) 0%,#c084fc 48%,var(--accent2) 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>Bridgn</div>
      <div style={{width:28,height:28,border:"2.5px solid var(--border)",borderTop:"2.5px solid var(--accent)",borderRadius:"50%",animation:"spin .8s linear infinite"}}></div>
    </div>
  );

  if(!authUser) return React.createElement(AuthScreen,{onAuth:u=>{setAuthUser(u);const r=u.user_metadata?.role||"creator";setRole(r);}});

  const userName = authUser.user_metadata?.full_name || authUser.email.split("@")[0];
  const userInitials = userName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();

  const render = () => {
    if(role==="creator") {
      switch(page) {
        case "dashboard":    return React.createElement(CreatorDashboard,{setPage,setSelected,deals,availStatus,setAvailStatus,userName,socialLinks,onboarding,updateOnboarding});
        case "campaigns":    return React.createElement(CampaignsPage,{setPage,setSelected,campaignQuestions,setCampaignQuestions,userName});
        case "campaign-detail": return React.createElement(CampaignDetail,{campaign:selected,setPage});
        case "deals":        return React.createElement(CreatorDealsPage,{setPage,setSelected,deals});
        case "deal-room":    return React.createElement(DealRoomPage,{setPage,setSelected,deals});
        case "active-deal":  return React.createElement(ActiveDealPage,{deal:selected,setPage});
        case "new-deal":     return React.createElement(NewDealPage,{setPage,onDealCreated:addDeal,userName});
        case "dispute":      return React.createElement(DisputePage,{deal:selected,setPage});
        case "offer":        return React.createElement(OfferPage,{offer:selected,setPage});
        case "analytics":    return React.createElement(CreatorAnalyticsPage,{});
        case "calendar":     return React.createElement(ContentCalendarPage,{deals});
        case "rate-card":    return React.createElement(RateCardPage,{});
        case "media-kit":    return React.createElement(MediaKitPage,{userName,userInitials,socialLinks});
        case "invoices":     return React.createElement(InvoicesPage,{role});
        case "public-profile": return React.createElement(PublicProfilePage,{setPage,userName,userInitials,socialLinks});
        case "profile-settings": return React.createElement(ProfileSettingsPage,{socialLinks,setSocialLinks,userName,userInitials});
        case "earnings":     return React.createElement(EarningsPage,{});
        case "contracts":    return React.createElement(ContractVaultPage,{});
        case "availability": return React.createElement(AvailabilityPage,{});
        case "expenses":     return React.createElement(ExpensesPage,{});
        case "messages":     return React.createElement(MessagesPage,{setPage});
        case "notifications":return React.createElement(NotificationsPage,{setPage});
        default:             return React.createElement(CreatorDashboard,{setPage,setSelected,deals,availStatus,setAvailStatus,userName});
      }
    } else {
      switch(page) {
        case "dashboard":     return React.createElement(BrandDashboard,{setPage,setSelected});
        case "browse":        return React.createElement(BrowseCreatorsPage,{setPage});
        case "creator-profile": return React.createElement(CreatorProfilePage,{creator:selected,setPage});
        case "campaigns":     return React.createElement(BrandCampaignsPage,{setPage,setSelected,campaignQuestions,setCampaignQuestions});
        case "campaign-calendar": return React.createElement(CampaignCalendarPage,{});
        case "deals":         return React.createElement(BrandDealsPage,{setPage,setSelected});
        case "deal-room":     return React.createElement(DealRoomPage,{setPage,setSelected,deals});
        case "content-library": return React.createElement(ContentLibraryPage,{});
        case "affiliate":     return React.createElement(AffiliateManagerPage,{});
        case "brief-builder": return React.createElement(BriefBuilderPage,{});
        case "scorecards":    return React.createElement(CreatorScorecardsPage,{});
        case "team":          return React.createElement(TeamManagementPage,{});
        case "roi":           return React.createElement(ROITrackerPage,{});
        case "ai-match":      return React.createElement(AIMatchPage,{setPage,setSelected});
        case "shortlists":    return React.createElement(ShortlistsPage,{setPage,setSelected});
        case "invoices":      return React.createElement(InvoicesPage,{role});
        case "messages":      return React.createElement(MessagesPage,{setPage});
        case "notifications": return React.createElement(NotificationsPage,{setPage});
        case "profile-settings": return React.createElement(ProfileSettingsPage,{socialLinks,setSocialLinks,userName,userInitials});
        default:              return React.createElement(BrandDashboard,{setPage,setSelected});
      }
    }
  };

  return (
    <div className="app-shell">
      <Navbar role={role} setPage={setPage} userInitials={userInitials} onSignOut={handleSignOut} onMenuToggle={()=>setMobSidebar(o=>!o)} darkMode={darkMode} setDarkMode={setDarkMode}/>
      <div className="main-layout">
        <div className={"sidebar-overlay"+(mobSidebar?" show":"")} onClick={()=>setMobSidebar(false)}/>
        <Sidebar role={role} page={page} setPage={setPage} userName={userName} userInitials={userInitials} mobOpen={mobSidebar} onClose={()=>setMobSidebar(false)}/>
        <main className="content-area">
          <div key={page} className="page-enter">
            {render()}
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(React.Fragment, null,
    React.createElement(TiltEffect),
    React.createElement(ParticleCanvas),
    React.createElement(CursorGlow),
    React.createElement(App)
  )
);
</script>
</body>
</html>
