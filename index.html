                  <button onClick={()=>up("role","brand")} style={{padding:"11px",borderRadius:"var(--radius-sm)",border:"2px solid "+(form.role==="brand"?"var(--accent2)":"var(--border)"),background:form.role==="brand"?"var(--accent2-light)":"var(--surface2)",cursor:"pointer",fontFamily:"DM Sans,sans-serif",fontSize:13,fontWeight:500,color:form.role==="brand"?"var(--accent2)":"var(--text2)",transition:"all .12s"}}>Brand</button>
                  <button onClick={()=>up("role","agency")} style={{padding:"11px",borderRadius:"var(--radius-sm)",border:"2px solid "+(form.role==="agency"?"var(--purple)":"var(--border)"),background:form.role==="agency"?"rgba(167,139,250,.12)":"var(--surface2)",cursor:"pointer",fontFamily:"DM Sans,sans-serif",fontSize:13,fontWeight:500,color:form.role==="agency"?"var(--purple)":"var(--text2)",transition:"all .12s"}}>Agency</button>
                </div>
              </div>
              {form.role==="agency"&&(
                <div className="fg" style={{marginTop:2}}>
                  <label className="fl">Brands you manage <span style={{color:"var(--text3)",fontWeight:400}}>(optional)</span></label>
                  <input className="fi" value={form.brands} onChange={e=>up("brands",e.target.value)} placeholder="e.g. Nike, Adidas, Halo Health"/>
                </div>
              )}
              <button onClick={handleSignup} disabled={loading||!form.email||!form.password||!form.name} className="btn btn-primary btn-lg" style={{width:"100%",marginTop:8,opacity:loading||!form.email||!form.password||!form.name?.6:1}}>
                {loading?<span style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}><span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>⟳</span>Creating account...</span>:"Create Account"}
              </button>
              <div style={{textAlign:"center",marginTop:20,fontSize:13,color:"var(--text2)"}}>Already have an account?<button onClick={()=>{setMode("login");setError("");setSuccess("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--accent)",fontFamily:"DM Sans,sans-serif",marginLeft:6}}>Sign in</button></div>
            </>
          )}
          {mode==="reset"&&(
            <>
              <div style={{fontFamily:"DM Serif Display,serif",fontSize:26,fontWeight:400,marginBottom:6,letterSpacing:"-.3px"}}>Reset your password</div>
              <div style={{fontSize:13,color:"var(--text2)",marginBottom:24}}>Enter your email and we will send a reset link.</div>
              {error&&<div style={{padding:"10px 14px",background:"var(--red-bg)",border:"1px solid rgba(248,113,113,.3)",borderRadius:"var(--radius-sm)",fontSize:13,color:"var(--red)",marginBottom:16}}>{error}</div>}
              {success&&<div style={{padding:"10px 14px",background:"var(--green-bg)",border:"1px solid rgba(52,211,153,.3)",borderRadius:"var(--radius-sm)",fontSize:13,color:"var(--green)",marginBottom:16}}>{success}</div>}
              <div className="fg"><label className="fl" htmlFor="reset-email">Email</label><input className="fi" id="reset-email" name="email" type="email" autoComplete="email" value={form.email} onChange={e=>up("email",e.target.value)} placeholder="you@example.com"/></div>

                {loading?"Sending...":"Send Reset Link"}
              </button>
              <div style={{textAlign:"center",marginTop:20}}><button onClick={()=>{setMode("login");setError("");setSuccess("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--accent)",fontFamily:"DM Sans,sans-serif"}}>Back to sign in</button></div>
            </>
          )}
        </div>
        <div style={{textAlign:"center",marginTop:20,fontSize:12,color:"var(--text3)"}}>By signing up you agree to the bridgn Terms of Service and Privacy Policy.</div>
      </div>
    </div>
  );
}

// ─── MOBILE BOTTOM NAV ───────────────────────────────────────────────────────
// ─── MARKETPLACE: Creator Social Feed ────────────────────────────────────────
function MarketplaceCreatorPage({setPage,setSelected,deals,addDeal,showToast}) {
  const [tab,setTab] = useState("foryou"); // foryou | following | applied
  const [liked,setLiked] = useState({}); // {campaignId: true}
  const [saved,setSaved] = useState({}); // {campaignId: true}
  const [expanded,setExpanded] = useState({}); // {campaignId: true}
  const [following,setFollowing] = useState(()=>{
    // Auto-follow brands the creator has worked with + pre-seed a couple
    const worked = new Set(deals.map(d=>d.brand).filter(Boolean));
    worked.add("GlowUp Skincare"); worked.add("ByteBrew Coffee"); worked.add("Apex Gaming");
    return worked;
  });
  const [filterPlatform,setFilterPlatform] = useState("All");
  const [heartAnim,setHeartAnim] = useState(null);
  const [brandProfile,setBrandProfile] = useState(null); // brand name or null
  const lastTapRef = useRef({});

  // Unique brands for following bar
  const allBrands = useRef(DEMO_CAMPAIGNS.reduce((acc,c)=>{
    if(!acc.find(b=>b.name===c.brandName)) acc.push({name:c.brandName,init:c.brandInit,gradIdx:c.brandGradIdx});
    return acc;
  },[])).current;

  // Trending: top 3 by engagement
  const engagementRef = useRef(Object.fromEntries(DEMO_CAMPAIGNS.map(c=>[c.id,{
    interested:Math.floor(Math.random()*80)+12,
    views:Math.floor(Math.random()*2000)+200,
  }]))).current;
  const trendingIds = useRef(DEMO_CAMPAIGNS.sort((a,b)=>(engagementRef[b.id].interested)-(engagementRef[a.id].interested)).slice(0,3).map(c=>c.id)).current;

  const filtered = DEMO_CAMPAIGNS.filter(c=>{
    if(tab==="following" && !following.has(c.brandName)) return false;
    if(filterPlatform!=="All" && !c.platforms.includes(filterPlatform)) return false;
    return true;
  });
  const applied = DEMO_CAMPAIGNS.filter(c=>liked[c.id]);

  // Brands with new campaigns (for glow ring)
  const brandsWithNew = useRef(new Set(["GlowUp Skincare","Altitude Athletics","Verdant Home Co."])).current;

  const toggleLike = (id) => {
    const campaign = DEMO_CAMPAIGNS.find(c=>c.id===id);
    setLiked(s=>{
      const next={...s};
      if(next[id]){delete next[id];}else{next[id]=true;}
      return next;
    });
    if(!liked[id]) {
      showToast("Interested! "+campaign.brandName+" will be notified.");
      // Auto-follow the brand when you apply
      if(campaign) setFollowing(s=>{const n=new Set(s);n.add(campaign.brandName);return n;});
    }
  };
  const toggleSave = (id) => setSaved(s=>{const n={...s};if(n[id])delete n[id];else n[id]=true;return n;});
  const toggleFollow = (brandName) => {
    setFollowing(s=>{
      const n=new Set(s);
      if(n.has(brandName)){n.delete(brandName);showToast("Unfollowed "+brandName);}
      else{n.add(brandName);showToast("Following "+brandName);}
      return n;
    });
  };

  const handleDoubleTap = (id) => {
    const now = Date.now();
    if(lastTapRef.current[id] && now - lastTapRef.current[id] < 350) {
      if(!liked[id]) toggleLike(id);
      setHeartAnim(id);
      setTimeout(()=>setHeartAnim(null),700);
      lastTapRef.current[id] = 0;
    } else {
      lastTapRef.current[id] = now;
    }
  };

  // Brand profile modal
  const renderBrandProfile = () => {
    if(!brandProfile) return null;
    const brandCampaigns = DEMO_CAMPAIGNS.filter(c=>c.brandName===brandProfile);
    const brand = allBrands.find(b=>b.name===brandProfile);
    if(!brand) return null;
    const gr = bg(brand.gradIdx);
    const isFollowing = following.has(brandProfile);
    const totalInterested = brandCampaigns.reduce((s,c)=>s+(engagementRef[c.id]?.interested||0),0);
    const followerCount = Math.floor(Math.random()*200)+50+following.size;

    return ReactDOM.createPortal(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setBrandProfile(null)}>
        <div className="card-lg fade-in" onClick={e=>e.stopPropagation()} style={{maxWidth:480,width:"100%",maxHeight:"85vh",overflowY:"auto",padding:0}}>
          {/* Brand header */}
          <div style={{background:`linear-gradient(135deg,${gr[0]},${gr[1]})`,padding:"28px 24px 20px",position:"relative"}}>
            <button onClick={()=>setBrandProfile(null)} style={{position:"absolute",top:12,right:12,background:"rgba(255,255,255,.2)",border:"none",borderRadius:99,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff",fontSize:18}}>×</button>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <div style={{width:64,height:64,borderRadius:16,background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:700,color:"#fff"}}>{brand.init}</div>
              <div>
                <div style={{fontSize:20,fontWeight:700,color:"#fff"}}>{brandProfile}</div>
                <div style={{fontSize:13,color:"rgba(255,255,255,.7)",marginTop:2}}>{brandCampaigns[0]?.niche||"Brand"}</div>
              </div>
            </div>
          </div>

          {/* Stats row */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",borderBottom:"1px solid var(--border)"}}>
            <div style={{textAlign:"center",padding:"14px 0"}}>
              <div style={{fontSize:18,fontWeight:700,color:"var(--text)"}}>{brandCampaigns.length}</div>
              <div style={{fontSize:11,color:"var(--text3)"}}>Campaigns</div>
            </div>
            <div style={{textAlign:"center",padding:"14px 0",borderLeft:"1px solid var(--border)",borderRight:"1px solid var(--border)"}}>
              <div style={{fontSize:18,fontWeight:700,color:"var(--text)"}}>{followerCount}</div>
              <div style={{fontSize:11,color:"var(--text3)"}}>Followers</div>
            </div>
            <div style={{textAlign:"center",padding:"14px 0"}}>
              <div style={{fontSize:18,fontWeight:700,color:"var(--green)"}}>{totalInterested}</div>
              <div style={{fontSize:11,color:"var(--text3)"}}>Interested</div>
            </div>
          </div>

          {/* Follow button */}
          <div style={{padding:"14px 20px",borderBottom:"1px solid var(--border)"}}>
            <button onClick={()=>toggleFollow(brandProfile)} style={{width:"100%",padding:"10px",borderRadius:10,fontSize:13,fontWeight:700,border:isFollowing?"1px solid var(--border)":"none",background:isFollowing?"var(--surface)":"var(--accent)",color:isFollowing?"var(--text2)":"#fff",cursor:"pointer"}}>
              {isFollowing?"Following ✓":"Follow"}
            </button>
          </div>

          {/* Brand's campaigns */}
          <div style={{padding:"16px 20px"}}>
            <div style={{fontSize:14,fontWeight:600,color:"var(--text)",marginBottom:12}}>Campaigns</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {brandCampaigns.map(c=>(
                <div key={c.id} className="card card-hover" style={{padding:"14px",display:"flex",gap:12,alignItems:"center"}} onClick={()=>{setBrandProfile(null);}}>
                  <div style={{width:48,height:48,borderRadius:10,background:`linear-gradient(135deg,${gr[0]},${gr[1]})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{c.heroEmoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--text)",display:"flex",alignItems:"center",gap:6}}>
                      {c.title}
                      {trendingIds.includes(c.id)&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:4,background:"rgba(248,113,113,.12)",color:"var(--red)",fontWeight:700}}>🔥 Trending</span>}
                    </div>
                    <div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>{c.platforms.join(", ")} · ${c.budgetMin.toLocaleString()}–${c.budgetMax.toLocaleString()}</div>
                  </div>
                  {liked[c.id]&&<span style={{fontSize:11,fontWeight:600,color:"var(--green)",background:"rgba(52,211,153,.1)",padding:"3px 8px",borderRadius:6}}>Applied</span>}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>,
      document.body
    );
  };

  const renderPost = (campaign,i) => {
    const gr = bg(campaign.brandGradIdx);
    const isLiked = liked[campaign.id];
    const isSaved = saved[campaign.id];
    const isExpanded = expanded[campaign.id];
    const eng = engagementRef[campaign.id];
    const isFollowing = following.has(campaign.brandName);
    const isTrending = trendingIds.includes(campaign.id);

    return (
      <div key={campaign.id} className="card" style={{padding:0,overflow:"hidden",position:"relative",animation:`fadeInScale .35s ease ${Math.min(i,4)*0.06}s both`}} onClick={()=>handleDoubleTap(campaign.id)}>
        {/* Post header */}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px"}}>
          <div onClick={(e)=>{e.stopPropagation();setBrandProfile(campaign.brandName);}} style={{width:36,height:36,borderRadius:99,background:`linear-gradient(135deg,${gr[0]},${gr[1]})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#fff",flexShrink:0,cursor:"pointer",border:isFollowing?"2px solid var(--accent)":"2px solid transparent"}}>{campaign.brandInit}</div>
          <div style={{flex:1,minWidth:0}} onClick={(e)=>{e.stopPropagation();setBrandProfile(campaign.brandName);}}>
            <div style={{fontSize:13,fontWeight:700,color:"var(--text)",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
              {campaign.brandName}
              {isTrending&&<span style={{fontSize:9,padding:"1px 5px",borderRadius:4,background:"rgba(248,113,113,.12)",color:"var(--red)",fontWeight:700}}>🔥</span>}
            </div>
            <div style={{fontSize:11,color:"var(--text3)"}}>{campaign.postedAgo} · {campaign.niche}</div>
          </div>
          <button onClick={(e)=>{e.stopPropagation();toggleFollow(campaign.brandName);}} style={{padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:700,border:isFollowing?"1px solid var(--border)":"1px solid var(--accent)",background:isFollowing?"transparent":"var(--accent)",color:isFollowing?"var(--text2)":"#fff",cursor:"pointer"}}>
            {isFollowing?"Following":"Follow"}
          </button>
        </div>

        {/* Hero visual */}
        <div style={{background:`linear-gradient(135deg,${gr[0]},${gr[1]})`,aspectRatio:"4/3",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden",cursor:"pointer"}}>
          <div style={{position:"absolute",width:200,height:200,borderRadius:"50%",background:"rgba(255,255,255,.06)",top:"-20%",right:"-10%"}}/>
          <div style={{position:"absolute",width:150,height:150,borderRadius:"50%",background:"rgba(255,255,255,.04)",bottom:"-15%",left:"-8%"}}/>
          <div style={{fontSize:64,marginBottom:12,filter:"drop-shadow(0 4px 20px rgba(0,0,0,.2))"}}>{campaign.heroEmoji}</div>
          <div style={{fontSize:28,fontWeight:800,color:"#fff",textAlign:"center",padding:"0 24px",lineHeight:1.3,fontFamily:"'DM Serif Display',serif",textShadow:"0 2px 12px rgba(0,0,0,.2)"}}>{campaign.title}</div>
          <div style={{fontSize:14,color:"rgba(255,255,255,.8)",marginTop:8,textAlign:"center",padding:"0 32px",fontStyle:"italic"}}>{campaign.heroTagline}</div>
          {/* Budget badge */}
          <div style={{position:"absolute",bottom:14,right:14,background:"rgba(0,0,0,.5)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",borderRadius:10,padding:"6px 14px"}}>
            <span style={{fontFamily:"'DM Serif Display',serif",fontSize:18,fontWeight:700,color:"#fff"}}>${campaign.budgetMin.toLocaleString()} – ${campaign.budgetMax.toLocaleString()}</span>
          </div>
          {/* Trending badge */}
          {isTrending&&<div style={{position:"absolute",top:14,left:14,background:"rgba(0,0,0,.5)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700,color:"#fff",display:"flex",alignItems:"center",gap:4}}>🔥 Trending</div>}
          {/* Platform badges */}
          <div style={{position:"absolute",top:14,right:14,display:"flex",gap:4}}>
            {campaign.platforms.map(p=><span key={p} style={{padding:"3px 8px",borderRadius:6,fontSize:10,fontWeight:600,background:"rgba(0,0,0,.4)",backdropFilter:"blur(4px)",color:"#fff"}}>{p}</span>)}
          </div>
          {/* Double-tap heart flash */}
          {heartAnim===campaign.id && (
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none",zIndex:5}}>
              <svg width="90" height="90" viewBox="0 0 24 24" fill="#fff" stroke="none" style={{animation:"heartFlash .7s ease forwards",filter:"drop-shadow(0 6px 30px rgba(255,255,255,.5))"}}>
                <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
              </svg>
            </div>
          )}
        </div>

        {/* Action bar */}
        <div style={{display:"flex",alignItems:"center",padding:"10px 14px 4px",gap:0}}>
          <button onClick={(e)=>{e.stopPropagation();toggleLike(campaign.id);}} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 8px",background:"none",border:"none",cursor:"pointer",borderRadius:8,color:isLiked?"var(--green)":"var(--text3)"}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill={isLiked?"var(--green)":"none"} stroke={isLiked?"var(--green)":"currentColor"} strokeWidth="2" strokeLinecap="round" style={{transition:"all .2s",transform:isLiked?"scale(1.15)":"scale(1)"}}>
              <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
            </svg>
          </button>

            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          </button>
          <button onClick={(e)=>{e.stopPropagation();}} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 8px",background:"none",border:"none",cursor:"pointer",borderRadius:8,color:"var(--text3)"}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          </button>
          <button onClick={(e)=>{e.stopPropagation();toggleSave(campaign.id);}} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 8px",background:"none",border:"none",cursor:"pointer",borderRadius:8,color:isSaved?"var(--accent)":"var(--text3)",marginLeft:"auto"}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill={isSaved?"var(--accent)":"none"} stroke={isSaved?"var(--accent)":"currentColor"} strokeWidth="2" strokeLinecap="round" style={{transition:"all .2s"}}>
              <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
            </svg>
          </button>
        </div>

        {/* Engagement counts */}
        <div style={{padding:"0 16px 4px",fontSize:13,fontWeight:700,color:"var(--text)"}}>
          {eng.interested+(isLiked?1:0)} interested · {eng.views.toLocaleString()} views
        </div>

        {/* Caption */}
        <div style={{padding:"4px 16px 6px"}}>
          <span style={{fontSize:13,fontWeight:700,color:"var(--text)",marginRight:6}}>{campaign.brandName}</span>
          <span style={{fontSize:13,color:"var(--text2)",lineHeight:1.5}}>
            {isExpanded ? campaign.brief : campaign.brief.slice(0,90)+"... "}

              <button onClick={(e)=>{e.stopPropagation();setExpanded(s=>({...s,[campaign.id]:true}));}} style={{background:"none",border:"none",color:"var(--text3)",fontSize:13,cursor:"pointer"}}>more</button>
            )}
          </span>
          {isExpanded && (
            <div style={{marginTop:8}}>
              <div style={{background:"var(--surface2)",borderRadius:8,padding:"8px 12px",marginBottom:8}}>
                <div style={{fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:3}}>Deliverables</div>
                <div style={{fontSize:12,color:"var(--text)",lineHeight:1.4}}>{campaign.deliverables}</div>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:6}}>
                <span style={{fontSize:12,color:"var(--text3)",display:"flex",alignItems:"center",gap:3}}>{ICONS.calendar(12)} {new Date(campaign.deadline).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>

              </div>
              <button onClick={(e)=>{e.stopPropagation();setExpanded(s=>({...s,[campaign.id]:false}));}} style={{background:"none",border:"none",color:"var(--text3)",fontSize:12,cursor:"pointer"}}>Show less</button>
            </div>
          )}
        </div>

        {/* Apply CTA */}
        <div style={{padding:"6px 16px 14px"}}>
          <button onClick={(e)=>{e.stopPropagation();if(!isLiked)toggleLike(campaign.id);else showToast("Already applied!");}} style={{width:"100%",padding:"10px",borderRadius:10,fontSize:13,fontWeight:700,border:isLiked?"1px solid var(--border)":"none",background:isLiked?"var(--surface)":"var(--accent)",color:isLiked?"var(--text2)":"#fff",cursor:"pointer",transition:"all .2s"}}>
            {isLiked?"Applied ✓":"I'm Interested"}
          </button>
        </div>
      </div>
    );
  };

  return (
    <div style={{maxWidth:560,margin:"0 auto"}}>
      {/* Sticky header */}
      <div style={{position:"sticky",top:0,zIndex:20,background:"var(--bg)",paddingBottom:4,paddingTop:4}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <h1 style={{fontSize:22,fontWeight:700,color:"var(--text)",margin:0}}>Marketplace</h1>
          <div style={{display:"flex",gap:4}}>
            <button onClick={()=>setTab("applied")} style={{padding:"5px 12px",borderRadius:99,fontSize:11,fontWeight:600,border:"1px solid "+(tab==="applied"?"var(--accent)":"var(--border)"),background:tab==="applied"?"var(--accent-light)":"none",color:tab==="applied"?"var(--accent)":"var(--text3)",cursor:"pointer"}}>Applied ({applied.length})</button>
          </div>
        </div>

        {/* For You / Following tabs */}
        <div style={{display:"flex",gap:0,marginBottom:8}}>
          {[{k:"foryou",l:"For You"},{k:"following",l:"Following"}].map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} style={{flex:1,padding:"8px 0",fontSize:13,fontWeight:tab===t.k?700:500,color:tab===t.k?"var(--text)":"var(--text3)",borderBottom:tab===t.k?"2px solid var(--accent)":"1px solid var(--border)",background:"none",border:"none",borderBottom:tab===t.k?"2px solid var(--accent)":"1px solid var(--border)",cursor:"pointer"}}>{t.l}</button>
          ))}
        </div>

        {/* Following bar — brand avatars with glow rings */}
        {(tab==="foryou"||tab==="following") && following.size>0 && (
          <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:8,paddingTop:4,WebkitOverflowScrolling:"touch"}}>
            {allBrands.filter(b=>following.has(b.name)).map(b=>{
              const gr=bg(b.gradIdx);
              const hasNew = brandsWithNew.has(b.name);
              return (
                <div key={b.name} onClick={()=>setBrandProfile(b.name)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",flexShrink:0,minWidth:56}}>
                  <div style={{width:48,height:48,borderRadius:99,padding:2,background:hasNew?"linear-gradient(135deg,var(--accent),var(--green))":"var(--border)"}}>
                    <div style={{width:"100%",height:"100%",borderRadius:99,background:`linear-gradient(135deg,${gr[0]},${gr[1]})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#fff",border:"2px solid var(--bg)"}}>{b.init}</div>
                  </div>
                  <span style={{fontSize:10,color:hasNew?"var(--text)":"var(--text3)",fontWeight:hasNew?600:400,maxWidth:56,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textAlign:"center"}}>{b.name.split(" ")[0]}</span>
                </div>
              );
            })}
          </div>
        )}

        {/* Platform filters */}
        {(tab==="foryou"||tab==="following") && (
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6,WebkitOverflowScrolling:"touch"}}>
            {["All","TikTok","Instagram","YouTube"].map(p=>(
              <button key={p} onClick={()=>setFilterPlatform(p)} style={{padding:"5px 12px",borderRadius:99,fontSize:11,fontWeight:600,border:"1px solid "+(filterPlatform===p?"var(--accent)":"var(--border)"),background:filterPlatform===p?"var(--accent-light)":"var(--surface)",color:filterPlatform===p?"var(--accent)":"var(--text2)",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{p}</button>
            ))}
          </div>
        )}
      </div>

      {/* Feed */}
      {(tab==="foryou"||tab==="following") && (
        <div style={{display:"flex",flexDirection:"column",gap:16,paddingBottom:80}}>
          {filtered.length===0 ? (
            <div className="card-lg" style={{textAlign:"center",padding:"50px 20px"}}>
              <p style={{fontSize:14,color:"var(--text2)"}}>{tab==="following"?"No campaigns from brands you follow yet.":"No campaigns match your filters."}</p>
              {tab==="following"?<button className="btn btn-primary" style={{marginTop:14}} onClick={()=>setTab("foryou")}>Browse For You</button>
              :<button className="btn btn-primary" style={{marginTop:14}} onClick={()=>setFilterPlatform("All")}>Clear Filters</button>}
            </div>
          ) : filtered.map((campaign,i) => renderPost(campaign,i))}
        </div>
      )}

      {/* Applied tab */}
      {tab==="applied" && (
        <div style={{display:"flex",flexDirection:"column",gap:10,paddingBottom:80}}>
          {applied.length===0 ? (
            <div className="card-lg" style={{textAlign:"center",padding:"40px 20px"}}>
              <p style={{fontSize:14,color:"var(--text2)"}}>No applications yet. Browse the feed and tap "I'm Interested" on campaigns you'd love to work on!</p>
              <button className="btn btn-primary" style={{marginTop:16}} onClick={()=>setTab("foryou")}>Browse Feed</button>
            </div>
          ) : applied.map(c=>{
            const gr = bg(c.brandGradIdx);
            const statuses = ["Brand reviewing your profile","Offer incoming!","Under consideration"];
            const status = statuses[c.id.charCodeAt(c.id.length-1)%statuses.length];
            const isOffer = status.includes("Offer");
            return (
              <div key={c.id} className="card card-hover" style={{padding:"16px 18px",display:"flex",gap:14,alignItems:"center"}}>
                <div onClick={(e)=>{e.stopPropagation();setBrandProfile(c.brandName);}} style={{width:42,height:42,borderRadius:10,background:`linear-gradient(135deg,${gr[0]},${gr[1]})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#fff",flexShrink:0,cursor:"pointer"}}>{c.brandInit}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{c.title}</div>
                  <div style={{fontSize:12,color:"var(--text2)"}}>{c.brandName} · {c.platforms.join(", ")}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:"var(--green)",fontFamily:"'DM Serif Display',serif"}}>${c.budgetMin.toLocaleString()}+</div>
                  <div style={{fontSize:11,color:isOffer?"var(--green)":"var(--accent)",fontWeight:600}}>{status}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Brand Profile Modal */}
      {renderBrandProfile()}
    </div>
  );
}

              <div><label style={{fontSize:12,fontWeight:600,color:"var(--text2)",marginBottom:4,display:"block"}}>Deadline</label>
              <input className="fi" type="date" value={newCampaign.deadline} onChange={e=>setNewCampaign(x=>({...x,deadline:e.target.value}))}/></div>
              <div><label style={{fontSize:12,fontWeight:600,color:"var(--text2)",marginBottom:4,display:"block"}}>Brief</label>
              <textarea className="fi" rows={3} placeholder="Describe what you're looking for..." value={newCampaign.brief} onChange={e=>setNewCampaign(x=>({...x,brief:e.target.value}))} style={{resize:"vertical"}}/></div>

              <button className="btn btn-primary" onClick={handlePostCampaign} style={{marginTop:4}}>Post Campaign</button>
            </div>
          </div>
        </div>,
        document.body
      )}

      {/* Send Offer Modal */}
      {showOfferModal && selectedCampaign && ReactDOM.createPortal(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setShowOfferModal(null)}>
          <div className="card-lg fade-in" onClick={e=>e.stopPropagation()} style={{maxWidth:440,width:"100%",padding:24}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h3 style={{fontSize:18,fontWeight:700}}>Send Offer</h3>
              <button onClick={()=>setShowOfferModal(null)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text3)"}}>×</button>
            </div>
            <div style={{background:"var(--surface2)",borderRadius:10,padding:14,marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{selectedCampaign.title}</div>
              <div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>To: {showOfferModal.name} ({showOfferModal.handle})</div>
              <div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>Budget range: ${selectedCampaign.budgetMin.toLocaleString()} – ${selectedCampaign.budgetMax.toLocaleString()}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div><label style={{fontSize:12,fontWeight:600,color:"var(--text2)",marginBottom:4,display:"block"}}>Offer Amount ($)</label>
              <input className="fi" type="number" value={offerAmount} onChange={e=>setOfferAmount(e.target.value)} placeholder="Enter amount"/></div>
              <div><label style={{fontSize:12,fontWeight:600,color:"var(--text2)",marginBottom:4,display:"block"}}>Message (optional)</label>
              <textarea className="fi" rows={3} value={offerMessage} onChange={e=>setOfferMessage(e.target.value)} placeholder="Hey! We loved your content and think you'd be a great fit..." style={{resize:"vertical"}}/></div>
              <button className="btn btn-primary" onClick={handleSendOffer}>Send Offer & Create Deal Room</button>
            </div>
          </div>
        </div>,
        document.body
      )}
    </div>
  );
}

// ─── CONTENT REVIEW QUEUE — Brand reviews submitted content ─────────────────
function ReviewQueuePage({deals=[],setPage,setSelected,showToast}) {
  const [filter,setFilter] = useState("pending"); // pending | approved | revision | all
  const [reviewModal,setReviewModal] = useState(null); // deal object or null
  const [revisionNote,setRevisionNote] = useState("");
  const [localStatuses,setLocalStatuses] = useState({}); // {dealId: "approved"|"revision"|"pending"}

  // Items that have content submitted
  const withContent = deals.filter(d=>d.contentFiles?.length>0 || d.contentFile);
  const items = withContent.map(d=>{
    const status = localStatuses[d.id] || (d.escrowReleased?"approved":(d.status==="Completed"?"approved":"pending"));
    return {...d,reviewStatus:status};
  });

  const filtered = filter==="all"?items:items.filter(d=>d.reviewStatus===filter);
  const pendingCount = items.filter(d=>d.reviewStatus==="pending").length;
  const approvedCount = items.filter(d=>d.reviewStatus==="approved").length;
  const revisionCount = items.filter(d=>d.reviewStatus==="revision").length;

  const handleApprove = (dealId) => {
    setLocalStatuses(s=>({...s,[dealId]:"approved"}));
    setReviewModal(null);
    showToast("Content approved!");
  };

  const handleRequestRevision = (dealId) => {
    if(!revisionNote.trim()) return;
    setLocalStatuses(s=>({...s,[dealId]:"revision"}));
    setReviewModal(null);
    setRevisionNote("");
    showToast("Revision requested — creator will be notified.");
  };

  const statusColors = {pending:"var(--accent)",approved:"var(--green)",revision:"#f0a050"};
  const statusLabels = {pending:"Needs Review",approved:"Approved",revision:"Revision Requested"};

  return (
    <div style={{maxWidth:800,margin:"0 auto"}}>
      <div className="ph-row" style={{marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
        <div>
          <h1 className="page-title" style={{fontSize:24,fontWeight:700}}>Review Queue</h1>
          <p style={{fontSize:13,color:"var(--text2)",marginTop:2}}>Review submitted content from your creators</p>
        </div>
        {pendingCount>0&&<span className="badge badge-green" style={{fontSize:13,padding:"6px 14px"}}>{pendingCount} pending</span>}
      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
        <div className="card" style={{padding:"14px 18px",textAlign:"center",cursor:"pointer",border:filter==="pending"?"1px solid var(--accent)":undefined}} onClick={()=>setFilter("pending")}>
          <div style={{fontSize:22,fontWeight:700,color:"var(--accent)",fontFamily:"'DM Serif Display',serif"}}>{pendingCount}</div>
          <div style={{fontSize:11,color:"var(--text3)",fontWeight:600}}>Needs Review</div>
        </div>
        <div className="card" style={{padding:"14px 18px",textAlign:"center",cursor:"pointer",border:filter==="approved"?"1px solid var(--green)":undefined}} onClick={()=>setFilter("approved")}>
          <div style={{fontSize:22,fontWeight:700,color:"var(--green)",fontFamily:"'DM Serif Display',serif"}}>{approvedCount}</div>
          <div style={{fontSize:11,color:"var(--text3)",fontWeight:600}}>Approved</div>
        </div>
        <div className="card" style={{padding:"14px 18px",textAlign:"center",cursor:"pointer",border:filter==="revision"?"1px solid #f0a050":undefined}} onClick={()=>setFilter("revision")}>
          <div style={{fontSize:22,fontWeight:700,color:"#f0a050",fontFamily:"'DM Serif Display',serif"}}>{revisionCount}</div>
          <div style={{fontSize:11,color:"var(--text3)",fontWeight:600}}>Revisions</div>
        </div>
      </div>

      {/* Filter tabs */}
      <div style={{display:"flex",gap:0,marginBottom:16,borderBottom:"1px solid var(--border)"}}>
        {[{k:"pending",l:"Pending"},{k:"approved",l:"Approved"},{k:"revision",l:"Revisions"},{k:"all",l:"All"}].map(t=>(
          <button key={t.k} onClick={()=>setFilter(t.k)} style={{padding:"10px 18px",fontSize:13,fontWeight:filter===t.k?700:500,color:filter===t.k?"var(--accent)":"var(--text3)",background:"none",border:"none",borderBottom:filter===t.k?"2px solid var(--accent)":"2px solid transparent",cursor:"pointer"}}>{t.l}</button>
        ))}
      </div>

      {/* Queue */}
      {filtered.length===0?(
        <div className="card-lg" style={{textAlign:"center",padding:"50px 20px"}}>
          <div style={{fontSize:32,marginBottom:12}}>{filter==="pending"?"✅":"📋"}</div>
          <h3 style={{fontSize:16,fontWeight:600,marginBottom:6,color:"var(--text)"}}>{filter==="pending"?"All caught up!":"No items"}</h3>
          <p style={{fontSize:13,color:"var(--text2)"}}>{filter==="pending"?"No content waiting for your review.":"No content in this category yet."}</p>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtered.map(d=>{
            const gr=bg(d.ci);
            const files = d.contentFiles || (d.contentFile?[{name:d.contentFile,url:"#",size:"—"}]:[]);
            const color = statusColors[d.reviewStatus];
            const label = statusLabels[d.reviewStatus];
            const daysSinceDeadline = Math.floor((Date.now()-new Date(d.deadline).getTime())/(86400000));
            const isOverdue = daysSinceDeadline > 0 && d.reviewStatus==="pending";

            return (
              <div key={d.id} className="card card-hover" style={{padding:0,overflow:"hidden",borderLeft:"3px solid "+color}}>
                <div style={{padding:"16px 18px"}}>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{width:42,height:42,borderRadius:10,background:`linear-gradient(135deg,${gr[0]||bc(d.ci)},${gr[1]||bc(d.ci)})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#fff",flexShrink:0}}>{d.bi||(d.creatorName||"?").slice(0,2).toUpperCase()}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                        <span style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{d.creatorName||"Creator"}</span>
                        <span style={{fontSize:11,fontWeight:600,color:color,background:color+"1a",padding:"2px 8px",borderRadius:4}}>{label}</span>
                        {isOverdue&&<span style={{fontSize:10,fontWeight:700,color:"var(--red)",background:"rgba(248,113,113,.1)",padding:"2px 6px",borderRadius:4}}>Overdue</span>}
                      </div>
                      <div style={{fontSize:12,color:"var(--text2)",marginBottom:8}}>{d.campaignTitle} · {d.platform} · ${d.amount.toLocaleString()}</div>

                      {/* Files */}
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                        {files.map((f,i)=>(
                          <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",background:"var(--surface2)",borderRadius:8,border:"1px solid var(--border)"}}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" strokeWidth="2" strokeLinecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            <span style={{fontSize:11,color:"var(--text)",fontWeight:500}}>{f.name}</span>
                            <span style={{fontSize:10,color:"var(--text3)"}}>{f.size}</span>
                          </div>
                        ))}
                      </div>

                      {/* Actions */}
                      <div style={{display:"flex",gap:8}}>
                        {d.reviewStatus==="pending"&&<>
                          <button className="btn btn-primary" style={{fontSize:12,padding:"7px 16px",minHeight:"auto"}} onClick={()=>handleApprove(d.id)}>Approve</button>
                          <button className="btn btn-secondary" style={{fontSize:12,padding:"7px 16px",minHeight:"auto"}} onClick={()=>setReviewModal(d)}>Request Revision</button>
                        </>}
                        {d.reviewStatus==="approved"&&<span style={{fontSize:12,color:"var(--green)",fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg> Approved
                        </span>}
                        {d.reviewStatus==="revision"&&<span style={{fontSize:12,color:"#f0a050",fontWeight:600}}>Waiting for creator to resubmit</span>}
                        <button className="btn btn-secondary" style={{fontSize:12,padding:"7px 14px",minHeight:"auto",marginLeft:"auto"}} onClick={()=>{setSelected(d);setPage("deal-room");}}>Open Deal Room</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Revision Request Modal */}
      {reviewModal && ReactDOM.createPortal(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setReviewModal(null)}>
          <div className="card-lg fade-in" onClick={e=>e.stopPropagation()} style={{maxWidth:440,width:"100%",padding:24}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{fontSize:18,fontWeight:700}}>Request Revision</h3>
              <button onClick={()=>setReviewModal(null)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text3)"}}>×</button>
            </div>
            <div style={{background:"var(--surface2)",borderRadius:10,padding:14,marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{reviewModal.creatorName}</div>
              <div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>{reviewModal.campaignTitle} · {reviewModal.platform}</div>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:600,color:"var(--text2)",marginBottom:4,display:"block"}}>What needs to change?</label>
              <textarea className="fi" rows={4} value={revisionNote} onChange={e=>setRevisionNote(e.target.value)} placeholder="e.g. Please adjust the lighting in the first clip and add the product link in the caption..." style={{resize:"vertical"}}/>
            </div>
            <button className="btn btn-primary" onClick={()=>handleRequestRevision(reviewModal.id)} style={{width:"100%"}}>Send Revision Request</button>
          </div>
        </div>,
        document.body
      )}
    </div>
  );
}

                <div style={{background:"var(--surface2)",borderRadius:8,padding:"8px",textAlign:"center"}}><div style={{fontSize:12,fontWeight:600,color:"var(--text)"}}>{c.analytics.audienceAge}</div><div style={{fontSize:9,color:"var(--text3)"}}>Age Range</div></div>
                <div style={{background:"var(--surface2)",borderRadius:8,padding:"8px",textAlign:"center"}}><div style={{fontSize:12,fontWeight:600,color:"var(--text)"}}>{c.analytics.audienceGender}</div><div style={{fontSize:9,color:"var(--text3)"}}>Gender</div></div>
                <div style={{background:"var(--surface2)",borderRadius:8,padding:"8px",textAlign:"center"}}><div style={{fontSize:12,fontWeight:600,color:"var(--text)"}}>{c.analytics.topCountry}</div><div style={{fontSize:9,color:"var(--text3)"}}>Top Country</div></div>
              </div>
            </div>

            {/* Tags */}
            <div><div style={{fontSize:12,fontWeight:600,color:"var(--text3)",marginBottom:6,textTransform:"uppercase",letterSpacing:".5px"}}>Tags</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
                {c.tags.map((t,i)=><span key={t} style={{padding:"3px 8px",borderRadius:4,fontSize:11,fontWeight:600,background:TAG_COLORS[i%TAG_COLORS.length]+"1a",color:TAG_COLORS[i%TAG_COLORS.length],display:"flex",alignItems:"center",gap:4,cursor:"pointer"}} onClick={()=>{removeTag(c.id,t);setSelectedCreator({...c,tags:c.tags.filter(x=>x!==t)});}}>{t} ×</span>)}
              </div>
              <div style={{display:"flex",gap:6}}>
                <input className="fi" placeholder="Add tag..." value={newTag} onChange={e=>setNewTag(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){addTag(c.id);setSelectedCreator({...c,tags:[...new Set([...c.tags,newTag.trim()])]});}}} style={{flex:1,fontSize:12,padding:"6px 10px",minHeight:"auto"}}/>
                <button className="btn btn-primary" onClick={()=>{addTag(c.id);setSelectedCreator({...c,tags:[...new Set([...c.tags,newTag.trim()])]});}} style={{fontSize:12,padding:"6px 12px",minHeight:"auto"}}>Add</button>
              </div>
            </div>

            {/* Notes */}
            <div><div style={{fontSize:12,fontWeight:600,color:"var(--text3)",marginBottom:6,textTransform:"uppercase",letterSpacing:".5px"}}>Notes</div>
              <div style={{display:"flex",gap:6,marginBottom:8}}>
                <input className="fi" placeholder="Add a note..." value={newNote} onChange={e=>setNewNote(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addNote(c.id);}} style={{flex:1,fontSize:12,padding:"6px 10px",minHeight:"auto"}}/>
                <button className="btn btn-primary" onClick={()=>addNote(c.id)} style={{fontSize:12,padding:"6px 12px",minHeight:"auto"}}>Add</button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {c.notes.map((n,i)=>(
                  <div key={i} style={{background:"var(--surface2)",borderRadius:8,padding:"8px 12px"}}>
                    <div style={{fontSize:12,color:"var(--text)",lineHeight:1.4}}>{n.text}</div>
                    <div style={{fontSize:10,color:"var(--text3)",marginTop:3}}>{n.date}</div>
                  </div>
                ))}
                {c.notes.length===0&&<div style={{fontSize:12,color:"var(--text3)",fontStyle:"italic"}}>No notes yet</div>}
              </div>
            </div>

            {/* Deal History */}
            <div><div style={{fontSize:12,fontWeight:600,color:"var(--text3)",marginBottom:6,textTransform:"uppercase",letterSpacing:".5px"}}>Deal History</div>
              {c.completedDeals>0?(
                <div style={{fontSize:12,color:"var(--text2)"}}>{c.completedDeals} deals completed · Avg rate: {c.avgRate}</div>
              ):(
                <div style={{fontSize:12,color:"var(--text3)",fontStyle:"italic"}}>No deals yet</div>
              )}
            </div>
          </div>
        </div>
      </div>,
      document.body
    );
  };

  // Add Creator Modal
  const renderAddModal = () => {
    if(!showAddModal) return null;
    return ReactDOM.createPortal(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setShowAddModal(false)}>
        <div className="card-lg fade-in" onClick={e=>e.stopPropagation()} style={{maxWidth:480,width:"100%",maxHeight:"85vh",overflowY:"auto",padding:24}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <h3 style={{fontSize:18,fontWeight:700}}>Add Creator</h3>
            <button onClick={()=>setShowAddModal(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text3)"}}>×</button>
          </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><label style={{fontSize:11,fontWeight:600,color:"var(--text3)",marginBottom:3,display:"block"}}>Name *</label>
              <input className="fi" placeholder="Creator name" value={newCreator.name} onChange={e=>setNewCreator(x=>({...x,name:e.target.value}))}/></div>
              <div><label style={{fontSize:11,fontWeight:600,color:"var(--text3)",marginBottom:3,display:"block"}}>Handle</label>
              <input className="fi" placeholder="@handle" value={newCreator.handle} onChange={e=>setNewCreator(x=>({...x,handle:e.target.value}))}/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><label style={{fontSize:11,fontWeight:600,color:"var(--text3)",marginBottom:3,display:"block"}}>Niche</label>
              <select className="fi" value={newCreator.niche} onChange={e=>setNewCreator(x=>({...x,niche:e.target.value}))}>
                {niches.map(n=><option key={n}>{n}</option>)}
              </select></div>
              <div><label style={{fontSize:11,fontWeight:600,color:"var(--text3)",marginBottom:3,display:"block"}}>Platform</label>
              <select className="fi" value={newCreator.platforms[0]} onChange={e=>setNewCreator(x=>({...x,platforms:[e.target.value]}))}>
                <option>TikTok</option><option>Instagram</option><option>YouTube</option>
              </select></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><label style={{fontSize:11,fontWeight:600,color:"var(--text3)",marginBottom:3,display:"block"}}>Followers</label>
              <input className="fi" placeholder="e.g. 50K" value={newCreator.followers} onChange={e=>setNewCreator(x=>({...x,followers:e.target.value}))}/></div>
              <div><label style={{fontSize:11,fontWeight:600,color:"var(--text3)",marginBottom:3,display:"block"}}>Engagement Rate</label>
              <input className="fi" placeholder="e.g. 4.5%" value={newCreator.engagement} onChange={e=>setNewCreator(x=>({...x,engagement:e.target.value}))}/></div>
            </div>
            <div><label style={{fontSize:11,fontWeight:600,color:"var(--text3)",marginBottom:3,display:"block"}}>Bio</label>
            <textarea className="fi" rows={2} placeholder="What they're known for..." value={newCreator.bio} onChange={e=>setNewCreator(x=>({...x,bio:e.target.value}))} style={{resize:"vertical"}}/></div>
            <div style={{fontSize:12,fontWeight:600,color:"var(--text3)",marginTop:4}}>Social Links</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <input className="fi" placeholder="📸 Instagram handle" value={newCreator.ig} onChange={e=>setNewCreator(x=>({...x,ig:e.target.value}))} style={{fontSize:12}}/>
              <input className="fi" placeholder="🎵 TikTok handle" value={newCreator.tt} onChange={e=>setNewCreator(x=>({...x,tt:e.target.value}))} style={{fontSize:12}}/>
              <input className="fi" placeholder="▶️ YouTube handle" value={newCreator.yt} onChange={e=>setNewCreator(x=>({...x,yt:e.target.value}))} style={{fontSize:12}}/>
              <input className="fi" placeholder="🌐 Website" value={newCreator.web} onChange={e=>setNewCreator(x=>({...x,web:e.target.value}))} style={{fontSize:12}}/>
            </div>
            <button className="btn btn-primary" onClick={handleAddCreator} style={{marginTop:4}}>Add to Database</button>
          </div>
        </div>
      </div>,
      document.body
    );
  };

  return (
    <div style={{maxWidth:1000,margin:"0 auto"}}>
      <div className="ph-row" style={{marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
        <div>
          <h1 className="page-title" style={{fontSize:24,fontWeight:700}}>Creator CRM</h1>
          <p style={{fontSize:13,color:"var(--text2)",marginTop:2}}>{crmCreators.length} creators in your database</p>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowAddModal(true)}>{ICONS.plus(14)} Add Creator</button>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:0,marginBottom:16,borderBottom:"1px solid var(--border)"}}>
        {[{k:"database",l:"Database",icon:ICONS.users},{k:"pipeline",l:"Pipeline",icon:ICONS.chart}].map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"10px 20px",fontSize:13,fontWeight:tab===t.k?700:500,color:tab===t.k?"var(--accent)":"var(--text3)",background:"none",border:"none",borderBottom:tab===t.k?"2px solid var(--accent)":"2px solid transparent",cursor:"pointer",display:"flex",gap:6,alignItems:"center"}}>{t.icon(14)} {t.l}</button>

      </div>

      {/* DATABASE VIEW */}
      {tab==="database" && <>
        {/* Search + Filters */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:200,position:"relative"}}>
            <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"var(--text3)"}}>{ICONS.search(14)}</span>
            <input className="fi" placeholder="Search creators..." value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:34}}/>
          </div>
          <select className="fi" value={filterPlatform} onChange={e=>setFilterPlatform(e.target.value)} style={{width:"auto",minWidth:100}}>
            <option value="All">All Platforms</option>
            <option>TikTok</option><option>Instagram</option><option>YouTube</option>
          </select>
          <select className="fi" value={filterNiche} onChange={e=>setFilterNiche(e.target.value)} style={{width:"auto",minWidth:120}}>
            <option value="All">All Niches</option>
            {niches.map(n=><option key={n} value={n}>{n}</option>)}
          </select>
        </div>

        {/* Creator Grid */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
          {filtered.map(c=>renderCreatorCard(c,false))}
          {filtered.length===0&&<div className="card-lg" style={{textAlign:"center",padding:"40px 20px",gridColumn:"1/-1"}}><p style={{fontSize:14,color:"var(--text2)"}}>No creators match your search.</p></div>}
        </div>
      </>}

      {/* PIPELINE VIEW */}
      {tab==="pipeline" && (
        <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:20,WebkitOverflowScrolling:"touch"}}>
          {PIPELINE_COLS.map(col=>{
            const colCreators = crmCreators.filter(c=>c.pipelineStage===col.key);
            const isOver = dragOver===col.key;
            return (
              <div key={col.key} style={{minWidth:240,flex:"0 0 240px"}}
                onDragOver={e=>{e.preventDefault();setDragOver(col.key);}}
                onDragLeave={()=>setDragOver(null)}
                onDrop={e=>{
                  e.preventDefault();
                  if(dragId){
                    setCrmCreators(x=>x.map(c=>c.id===dragId?{...c,pipelineStage:col.key}:c));
                    showToast("Moved to "+col.label);
                  }
                  setDragId(null);setDragOver(null);
                }}>
                {/* Column header */}
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"0 4px"}}>
                  <span style={{width:8,height:8,borderRadius:99,background:col.color,flexShrink:0}}/>
                  <span style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>{col.label}</span>
                  <span style={{fontSize:11,fontWeight:600,color:"var(--text3)",background:"var(--surface2)",borderRadius:99,padding:"1px 7px"}}>{colCreators.length}</span>
                </div>
                {/* Column cards */}
                <div style={{display:"flex",flexDirection:"column",gap:8,minHeight:100,padding:8,background:isOver?"var(--accent-light)":"var(--surface2)",borderRadius:12,border:isOver?"2px solid var(--accent)":"1px dashed var(--border)",transition:"all .15s"}}>
                  {colCreators.length===0&&<div style={{textAlign:"center",padding:"20px 0",fontSize:12,color:isOver?"var(--accent)":"var(--text3)"}}>{isOver?"Drop here":"No creators"}</div>}
                  {colCreators.map(c=>{
                    const gr=bg(c.gradIdx);
                    const isDragging = dragId===c.id;
                    return (
                      <div key={c.id} className="card card-hover" draggable
                        onDragStart={()=>setDragId(c.id)}
                        onDragEnd={()=>{setDragId(null);setDragOver(null);}}
                        onClick={()=>setSelectedCreator(c)}
                        style={{padding:"12px",cursor:"grab",opacity:isDragging?.5:1,transition:"opacity .15s"}}>
                        <div style={{display:"flex",gap:12,alignItems:"center"}}>
                          <div style={{width:36,height:36,borderRadius:8,background:`linear-gradient(135deg,${gr[0]},${gr[1]})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#fff",flexShrink:0}}>{c.init}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{c.name}</div>
                            <div style={{fontSize:11,color:"var(--text3)"}}>{c.handle} · {c.niche}</div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {renderProfile()}
      {renderAddModal()}
    </div>
  );
}

    {key:"contracts", label:"Contracts",

    {key:"public-profile", label:"Profile",

        d="M20 21v-1a7 7 0 0 0-7-7H11a7 7 0 0 0-7 7v1"
        d2="M12 13a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>},
  ];

  const brandTabs = [
    {key:"dashboard", label:"Home",
      icon:(a)=><IC active={a} filled d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1H15v-6H9v6H4a1 1 0 0 1-1-1z"/>},
    {key:"deal-room", label:"Deals",
      icon:(a)=><IC active={a} filled d="M3 21h18M9 8h1M9 12h1M9 16h1M14 8h1M14 12h1M14 16h1M5 21V5a2 2 0 012-2h10a2 2 0 012 2v16"/>},
    {key:"new-deal", label:"New Deal",
      icon:(a)=><IC active={a} d="M12 5v14M5 12h14"/>},
    {key:"settings", label:"Settings",
      icon:(a)=><IC active={a} d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z" d2="M12 15a3 3 0 100-6 3 3 0 000 6z"/>},
